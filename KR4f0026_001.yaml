body:
  text: 于清端政書卷一兩江總督于成龍撰羅城書條陳引鹽利弊議看得栁屬地瘠民貧兼以猺獞雜處自入版圖以來從無引鹽舊例因粵東積引壅滯疏通無術波及粵西郡縣乃有銷引之議蓋自康熙元年始也栁屬以引鹽决不能銷考成斷不能完各陳艱苦詳請免銷文案如山附卷可查撫臺憐憫各郡詳請痛切題請免銷部議未允事出兩難一面行催立埠招商而商人因引目數多無人敢於承應一面行文僉派里商赴東領運一靣催開未完鹽引州縣職名吏民驚惶無措幸撫臺深知吏民病苦補牘再陳區畫户口食鹽之法極力調停部議始允而鹽引幸減三分之二矣自此鹽課已定有司雖愁苦中積亦無可奈何有招商立埠者有設法官運者有僻處山中招商不應請命於上司代為招商運銷者咸屬急迫無聊之計幸數年以來考成俱完且有溢額之引原其行鹽之初何嘗計及此也今有司之考成雖完而民窮愈不可支不可不蚤為之變計也成龍奉條議之文確知民苦不敢坐視不言謹條列鄙議於左一官運之宜禁也當行鹽之始民苦無素封之家吏苦無㸃金之術不得不賖借於有鹽之處以救考成之急鹽主因無現價倍昻其值鹽之來也既貴則有司之發也自不得賤且在官之僕役明知鹽價出之百姓領運盤費誰肯較銖計兩以為官民計者鹽價之貴職此故也至於發鹽之權自上操之有招商領運鹽包數多而頻發者有不係招商假名色而豫以必發者上之發於州縣也無已則州縣之發於民也亦無已有司明知民苦即引目已完而亦不敢不領為無可如何之勢領之必速發發之必速催鹽價雖貴而民不敢爭催納雖急而民不敢議引價雖銷而民不敢言日復一日而民病已入膏肓遲之又久不惟纍正賦而且恐無民之可纍矣官與民皆沉淪鹽引之中而莫之救其宜禁者一也一埠商之宜革也官鹽係梧州賖來之物引稅水腳俱在其中有司止幸完其考成而不敢復議貴賤為窮逼所使而然也若埠商運自廣東鹽價可屈指而計且競刀錐之利誰肯浪費一二及至地方探知官鹽之價若干亦照樣行之利踰本數倍乃無良心之極也即有輕利之商欲減其鹽價而又恐官鹽不行而獲戾焉是官不樂商鹽之賤而致壅積商更樂於官鹽之貴而獲厚利兩相騰湧民無賤鹽可食而民愈窮更有可異者既名埠商其發賣自應聽乎其便無如其發鹽也必求之有司而其收價也三五成羣挨門逐户而遍索焉埠商之病民於斯為甚其宜革者一也欲除以上二弊莫若曉諭流商從便發賣渠較鹽本幾何鹽利幾何斷不至湧貴數倍民亦不得從而爭議况前商之鹽貴而後商繼之勢不得不減價以求速售如是而隨時貴賤非同官勢强壓而鹽可無一定之貴價民亦得量其有無因其緩急任其多寡隨便而公易之而民可無不得不領不敢不領之苦民窮稍蘇流商喜於疏銷有利而來之必廣窮民一旦得食賤鹽而銷之必多則引額較前更踰有司亦不至有考成之慮矣然尤有宜為流商計者從粵東領鹽至梧州交引换票其查核已嚴矣後抵栁府交梧州之票另换栁州之牌任意於各屬州縣交易不必畫疆界分彼此以免煩瑣流商之害而盤詰私鹽諸務亦可中止民商俱被寬大之恩矣惟恐流商罕至而提標數萬兵口一年食鹽無算馬平鹽包不及二百其餘之引或可以備不足是又意外之一策也若王公將軍有鹽亦與流商等任其銷賣不必經有司之手則流商之鹽從何而壅食鹽之民從何而苦也對金撫臺問地方事宜問緑林草竊如何消弭逋誅逆獞如何擒緝山川地理之險要如何屯戍設防狑犽狼獞之驕悍如何撫綏馴制倒廢驛站如何興復如初森嚴欽限如何依期完結土司漢夷交錯之地如何立法使邉陲藩籬鞏固相安錢糧關稅納汚之藪如何釐剔使陋規火耗悉除殆盡何以清刑獄使民無幽繫何以懲刁頑使民不健訟何以招流移使開墾蓁蕪何以懲貪酷使澄清仕途何以察芟衙蠧何以積儲備荒竊敉寧地方之要莫若安民而安民之法必以肅清吏治為先務吏得其人而潔已愛民則弭盜固圉省刑息訟興利剔弊諸務畢舉雖在邉徼可漸次化理矣成龍寡昧書生荒裔下吏不識時務仰承憲問具稔憂時逺慮為國為民之盛心敢不率其芻見以佐末議今天下車書一統中外臣服粵西逺在南荒天威底定巨寇已殄滅無遺而未雨綢繆猶厪憲慮誠為國家樹萬年不拔之基為萬姓謀久安長治之道也夫地方何盜盜即民也民雖無知决不樂於為盜必為飢寒刑罰迫之而為盜也責在有司清淨寡欲先之德教以端風俗繼之保甲以防不虞勿戕民命勿剝民膚俾各安室家各戀妻子此弭草竊之末議也粵西猺獞種類不一素號凶悍以殺戮為生兼之十數年來地方無主强陵弱衆暴寡無一淨地天戈一指么魔屏跡彼雖仰畏其威然未盡懷其德若稍疏一面之網多方招撫開誠布公消疑釋嫌逆獞雖愚亦必樂生惡死悉歸王化不煩弓矢而土宇寧謐此安逆獞之末議也山川地理或水或陸未厯其地難以懸擬大約粵西地險獞悍屯戍之兵不可不設而統兵之法不可不嚴兵以衛民亦有禍民者兵以防奸亦有作奸者屯戍設防寧簡無濫此防險要之末議也狑犽狼獞不事詩書不諳禮法驕悍固其素習責在有司暫羈縻之漸教育之寬舒其手足約束其心思撫綏馴制寧猛無寬此撫綏驕悍之末議也若夫驛站最為民苦當湯火初出或可徐議興復然煌煌功令火牌勘合之外嚴禁私役需索等弊四季循環立簿查核有司實心奉行勿加譴責則民吏不受害而興復如初亦不難矣此興復驛站之末議也欽限事件最為森嚴有司敢不殫竭心力勉副功令然粵西與腹裏不同猺獞不習書數吏役乏人一二經承兼理六房事繁人寡簿書堆案有司攢眉晝夜不停而案牘彌積如造由單造奏銷造㑹計造徴解册籍繁多毫釐不敢苟簡此係每年一定之成例又加以清丈田畝編審户口催造開墾無事不重且大以一二書役朝夕拮据心血嘔盡一不合式查駁再造而限期已逾此事之無可如何者也或有粵東善書算者投充彼明知工食盡裁必求里甲私幫赫赫功令誰敢自罹法網是僉役土著苦無其人召募流役苦無其資書算者寡事必遲延則依期完結之法不能自為之解矣此早完欽件之末議也至于土司古昔設立土官撫其種類誠以人地相宜性情相近以夷治夷縻之以爵祿而為朝廷用故無反側之憂今日夷漢錯處殘忍多乖皆因土官左右無正人教導無良法以至於此若諭以輔導擇人循法奉公使彼內地和平輸納其貢稅而無復苛求自可相安於無事此土司相安之末議也錢糧關稅國課攸關然今日粵西之百姓當兵火二十年財力俱竭目擊荒烟茅籬遍皆鳩形鵠面榖賤金貴幸而正賦蚤完已出望外况鹽引加派束手待斃萬無疏銷之術國法難逃而陋規火耗雖甚不肖者或未必能行之兹土此除陋規之末議也刑獄者民命所係寧失出毋失入而好生之德自洽詞訟者風俗所關禁止教唆嚴絶赦前先審察原告之詞色勿為濫准而刁頑之風可息此清刑獄止健訟之末議也殺戮之後人民逃散田地荒蕪但使遵行三年起科之實政吏靜民安流移可不招而自來烟火輳集蓁蕪可漸次而開闢此開墾蓁蕪之末議也貪酷者害民害政之本然蠻烟瘴雨地瘠民貧性命之念重富貴之心冷加以憲臺之嚴肅有司雖不肖或亦望風而畏罪之不暇殃民者莫若衙蠧芟之毋使濫充一嵗必更察之毋使幸生而置辟不貸此清仕途察衙役之末議也救荒者莫若積儲常平一倉萬古良法春發秋收與民便宜而緩急有濟備荒之法莫逾於此他如土物之採買里甲之苛派新役之幫貼當此邉荒初蘇之域未必如腹裏之事事可議也再陳粵西事宜一塘兵之騷擾未盡除也奉文嚴飭遞送公文文設鋪兵武設塘兵兩不相涉遵行久有定例無如有司與防辨或情面相狥或私弊牽制縱放塘兵居住民村日供柴水米食以故民不聊生惟在嚴察一見年之答應未盡革也奉文嚴飭見年止許催辦錢糧不許答應有司衙內供給上司差役飯食及過往仕客下程酒席無如積習難破肆行無忌者夫亦不少且無恥輩藉口某縣有供應恐嚇里民逐件欲行不思洗滌惟在嚴察一知府之權太重也往例州縣有道府㕔為之伺察三分其權而情難私飾勢難獨齗公道不能盡泯今道㕔奉裁而有司之賢否藩臬耳目稍逺惟知府為最近若府得其人則官方自清民生自遂地方自安或不得其人則是非慿其喜怒賢否任其髙下而有司畏知府更甚於畏院司在下曲意為阿從在上極力為徇庇從此效尤成風而民命邉境關係不淺惟在裁酌一部頒法馬之宜公用也粵西地瘠民貧錢糧不容拖缺正宜恤民財以完公事若徒知刻剝則民多一分之私費便缺朝廷一分之正項以至嚴刑追比差役拷索使民號泣無訴必倍貸以緩目前逮至秋成雖豐田中之禾先歸債主一遇嵗歉賣兒鬻女奔走流離是當亟加憫念嚴革收銀用戥以除暗加明加之害凡收條編有司宜親坐堂上將天平法馬置之座右不得拘定某盤放銀某盤下馬聽從百姓完納有司即發印票不得假手書役一力掌定民不敢言如有用戥收銀及書役兑平者許百姓赴告一納銀納米之宜速收糧票糧單之宜速發也近奉新例四月九月催徵夫四月適當耕耘之候九月又在收穫之時農工正殷而催科逼迫民之赴納也已非得已又從而掯延之夫復何望且有司所司何事若百姓納銀米而不即上堂躬收是怠惰也若百姓羣集不能隨到隨收即時發放以至百姓隔宿守候則有司之才不才亦大可見矣是在嚴察一四月九月之新例宜通融也粵西與腹裏不同夏禾最寡而秋稻為多即秋稻亦有二種有七八月收者有九十月收者是四月正耘九月正收之候也於此而催科太逼則公私不勝其擾矣或稍為通融聼從民便自三月起至四月止有願輸納者收之願全完者奬之何必拘拘定以四月為限也或孤單貧弱或水火災喪一時力不能辦者許具呈寬限秋收上納又何必於四月納半九月納半之拘拘也窮者不得與富者較有故者不得與無故者較量人情之緩急而權衡之期於完正賦而止即有艱難困苦者量免一二而在官俸食豈不可相為開除奚若與㷀㷀赤子較輜量銖而算之無遺力也又恐不肖藉名豁免而開侵欺工食之弊是必將豁免者大張榜示俾民役咸知各抄一張存照以杜弊端如此新例雖定而恩行於例之中是催科中之撫字也若夫未及四月而催徴全完是必急於火耗已經徵完而未行起解是必隂為那移種種弊端難逃洞察一見年之亟宜憫恤也粵西見年名色與腹裏里長排年為一例係十年輪任正務若不加撫恤任意刻求勢必家破人亡於一年之中即加數十年培養之力不能復其元氣夫既革其供應矣而遂其力以催辧錢糧是正務也然見年亦有田地若終日奔走挨門逐户而催之則自已之田禾荒不能顧雖未竭其財而亦已蹶其生矣當開徴之候有司出示曉諭俾百姓隨便上納如輸納不前令見年催單頭單頭催花户可不勞而坐致也至於朔望之㸃卯嵗時之謁見日用之伺候當此邉荒極苦之地猺獞畏疑之衆似可盡革而期於相安是在裁酌一雜派之不可包於官由單之亟宜發於民也夫雜派之禁奉㫖嚴飭不啻再四然亦有確不可少者每嵗之中造由單紙張工墨有派在縣造實徵紙張工墨有派藥材本色額銀不足有派表箋包袱額銀不足有派春秋二祭禮不敢儉起解編銀水腳盤費有派兩次奏銷水腳費用有派是皆一定之例萬不能除但當堂與民公議期於足用眼同交出其派單有司硃墨㸃定散於見年存照縱有不肖料不敢將多派硃單留之百姓為話柄也至於意外之事如往年幫解雲貴之餉費有派幫各道之進表有派幫潯州之水腳有派凡如此類咸由上派定原有定數應將原牌付與百姓從公議派完解庶有司無不可告語百姓之事百姓亦無疑畏有司之心上下相知而緩急可以相濟若夫愚㺯猺獞欺其無知藉口派項之多在官一力包管初則猶相照顧終則包外加派民苦不堪而逃亡相繼是在亟為勸諭禁止也正賦雜項界限不眀總由不發由單之過猺獞雖不識字彼亦知遇人而過問焉不發由單則原熟新墾混淆無所查明雜派得由而入之矣然功令日嚴諱過愈巧印結甘結徒事紛煩若出其不意稽查一二鄉民問其有由單否而官吏無所施其巧也即如收銀大流水簿俱係奏銷時打㸃停當無關實事止將納銀發票與由單合否而官吏又何所肆其貪也一有司之亷耻宜養百姓之泣訴宜詳也夫官之於民猶父之於子父不慈則子不孝官不清則民不良况邉徼之民雖刁與腹裏大異腹裏有勢宦挾制劣襟把持光棍肆惡捕風捉影若夫蠢爾猺獞則不然不諳官語不識文字惟聽外江流棍唆哄告狀誆騙使用及至提審茫無一應此粵西開闢初年之情形也數年以來百姓告官吏者不一非盡流棍之唆哄實有逼於不得已者夫民之告官吏豈盡是子虛豈盡是刁詐且有司之於民宜化刁為良上下親睦至於致民控訴全無體面亟宜引罪自悔聽上處分辭職離任庶不致於官民搆訟以傷體統若反復爭辨以祈免罪加民以刁寧不自愧縱使辨明無辜復何面目靦居民上乎倘民含寃不能剖訴復增一仇敵愈使民重足而立也如立意與民洗寃此風一倡始也訴之出於無奈猶知犯上之科究也稍拂其意而肆行無忌恐開刁詐之漸是在憲臺默挽風化以釀和平之福也如有告官吏等事留中而不必明行按事而漸除之以去地方之蠧以伸百姓之寃則官吏知警不至與民廷辨庶公法行而廉恥亦全百姓知狀之未有准行也必俯首歸家不敢居告官之名及官掛彈章百姓羣頌為上之明而不自以為得意是官之罪狀取之羣議而無隱匿參核之權專之於上而不顯恃乎告訐如此則民情上逹而民風或可幾乎淳良也且以省案牘之煩而上下䝉清靜之休矣一粵西之邉防宜加毖也邇來交南內爭附於中國以為聲援然弱則帖息聽命强則跳梁抗尊勢所不免彼目覩兵馬雲集敢不惟命是從然二豎之勢不相下兵馬一退緩必相謀彼內豈無智者陽為順從隂為修備事未可知况數年以來土司之官亦殫力矣改土為流之民亦未服心矣且猺獞嗜殺為性反覆無常即有司恩養如赤子而終不能必其革心也是可危也又在憲臺未雨之綢繆焉治羅自紀併貽友人荆雪濤廣西栁州之羅城偏處山隅東北界連湖南道通一帶西北界連貴州清平一帶其餘土司環繞山如劍排水如湯沸蠻烟瘴雨北人居此生還者什不一二土民有猺獞狑狼之種帶刀攜鎗其性好殺父子兄弟反目操戈恬不知怪順治十六年冬初入版籍成龍於十八年到任掣簽後親者不以為親友者不以為友行李蕭條自覺面目可憎賖腳錢寄口食行至清源敝同年王諱吉人初為蕭山尹繼轉蘇丞時讀禮家居慷慨仗義反覆開明粵西非吉祥之地素知成龍家食尚可自給力勸勿任以繳慿為髙見成龍時年四十五英氣有餘私心自揣讀書一場曾知見利勿趨見害勿避古人義不辭難之說何為也俯首不答王兄默知其意亦不復阻灑淚而别五月初三日至家别繼母妻兒資斧艱難典田賣屋設法止有百金攜蒼頭五人勇壯可伴臨行敝族相餞歡飲至夜扶醉就枕而天已明矣古云壯士非無淚不灑别離間此不情語也天眀舉家拜别大兒廷翼入庠已久猶如處子將祖遺田産文劵開眀交付外止云我做官不管你你治家莫想我二語甫出户庭而哭聲已逹外矣拜别祠堂不覺腸齗門裏門外相聚而泣不復回顧攬轡登程此時之壯氣真可吞猺獞餐烟瘴而不為之少屈逮行至湖南冷水灘一病顛連未免英雄氣短勉强扶病陸行至桂林謁見上臺皆知羸體伶仃詢及病狀咋舌驚訝惟勸以延醫調治勿亟赴任抱疴之人至是膽落往日豪氣從何得來病幾危以苦孽未盡不速死扶病至栁州稍愈尚不知羅城在何方也羅城與融縣沙鞏連界行至沙鞏遇許鄉老仔細盤問方知對山即為羅境登山一望蒿草彌目無人行徑周山遍似營陳哀哉此何地也胡為乎來㦲悔無及矣從此想敝同年之忠告不置也癡人作夢以為邉境如此漸入腹裏或不然可憐黃茅直抵城下八月二十日入縣中一如郭外居民六家茅草數椽寄居關夫子廟安牀於周倉背後夜不瞑目痛如刀割黎眀上任無大門無儀門兩墀茅草一如荒郊中堂草屋三間東邉隔為賓館西邉隔為書辦房中間開一門入為內宅茅屋三間四圍俱無墻壁哀哉此一活地獄也胡為乎來哉鬱從中來病不自持一卧月餘從僕環嚮而泣無一生氣張目一視各不相顧無如罪孽未盡死而不死乞歸無路扶病理事立意修善以回天意凡有陋弊清查詳革可憾己命不殞禍及從僕黃瘦似壁畫隂鬼相對而泣莫能相救無何而一僕喪命餘僕驚惶不知所以至康熙元年正月羣謀為歸計成龍自付一官落魄復何憾諸僕無罪何苦纍之叮嚀各自逃生內有一僕蘇朝卿仗義大言曰若今生當死於此回去亦不得活棄主人流落他鄉要他們何用哀哉幸有此也其餘掉頭不顧當時通詳邉荒久反之地一官一僕難以理事乞賜生歸當事者置之一哂而已本年逃僕歸家大兒悲念天涯萬里一主一僕何以安身續覔四僕來任而三僕皆登鬼籙止存一僕在衙晝夜號跳一如風魔事處兩難一人難以逺行欲將存僕伴歸隻身更苦無如存僕亦有思歸之念聽其浩然長往萬里惟餘一身生死莫能自主夜枕刀一口牀頭貯鎗二桿為護身符然思為民興利除害囊無一物猺獞雖頑想無可取之貨亦無可殺之仇帖然相安事到萬不得已之時只得勉强做來申眀保甲不許帶刀攜鎗咸遵無違間有截路傷命無踪盜情務期跟尋緝獲隱昧事情盡心推敲必得真實立刻誅戮懸首郊野漸次心服地方寧靜而上臺採訪真確於是有大事殺了解省小事即行處决之通行也境內雖平憾與栁城西鄉為鄰此地祖孫父子長於為賊擾害無己申眀當事皆以盜案為艱置之髙閣成龍思漸不可長身為父母而可使子弟遭殃乎約㑹鄉民練兵親督勦殺以對命為主殺牛盟誓齊心攻擊先發牌修路刻日進勦此未奉上命而專征自揣功成亦在不赦之條但奮不顧身為民而死勝於瘴病而死也主意已定决不可回而渠魁俯首乞恩講和搶虜男女牛隻盡行退回仍約每年十月犒賞牛隻花酒一次取各地方甘結存案敢有侵我境界者不報上司竟行勦滅苐獞人不怕殺號令一以剝皮為主而鄰盜漸息至是上臺採訪更確反厭各州縣之請兵不已報盜不休之為多事也嗣後官民親睦或三日或六日環集問安如家人父子言及家信杳絶悲痛如切已膚土謡武陽岡三年必反亂一場任至三年寢食為之不安賴人心既和謠言不足信也又云三年一小勦五年一大勦及至五年又當愁苦賴官民相愛謠言不足慿也時法令太嚴有犯必殺情誼為重婚娶喪祭民間之禮一行無不逹之隱羅城之治如斯而已康熙二年藩憲金公特取入簾諸官扛從盛飾成龍止帶皮套一件共相驚訝留意相難時藩憲峻厲異常輒欲詬詈屬官成龍心不平居闈中屢以抗直不少挫辱從此見重朝夕必求坐談盛典不可悉數嗣升本省巡撫即以條對下詢盡心敷陳民間利病俱係入告重事納言如流事事題疏而主文者辭不逹意㫖允者什之七八康熙六年成龍以邉俸逾期八月升四川合州時報未到金撫臺靣諭兩司如不舉羅城令本院當特疏薦舉矣兩司唯唯從命而以卓異聞撫臺又恐地方委用不得人反滋擾害專疏新舊交代哀哉數年來一舉一動原非為功名富貴計止欲生歸故里日食二餐或日食一餐讀書堂上坐睡堂上毛頭赤腳無復官長體統夜晚酒一壺值錢四文並無小菜亦不用箸快讀唐詩寫俚語痛哭流涕並不知杯內之為酒為淚也間嘗祝告城隍謂我無虧心事一㸃當令我及早還鄉幸得保出性命回想同寅諸公死亡無一得脫鬼神無爽能不寒心赴蜀之日别金撫臺䝉諭云我薦舉一場指望行取知道你窮苦我為你凑下盤費誰知你先升了此亦是你的命但兩司因認不得你不肯薦舉你本院發怒方才舉來誰想督臺將你考語淡薄自甘四字圈了立意粵西單舉薦你一個亦是公道難泯處今你往四川又是苦了照羅城縣做去萬不可壞我名聲我與書二封一與總督一與撫臺因此益勵前操至死不變此數年之大槩也合州書請復祀典詳照得一代之興首重祭祀之禮在外府州縣職司守土各有宜祀鬼神載在舊章萬世不刋一切香帛牲醴咸支用各處正賦錢糧纂入經費全書煌煌典制率土遵行如春秋丁日祭至聖先師啓聖公梓潼帝君戊日祭社稷山川風雲雷雨城隍土地諸神三月初一日七月十五日十月初一日祭無祀孤魂或以崇文教或以敦祈報或以恤幽魂皆有祭享一定之期簡而不數豐而不儉是誠聖天子百神來享之盛典也有司奉行罔敢怠忽成龍新任合州目覩地方荒殘招撫百姓為急務然當安輯之初必須培風化之源重衣食之本釋厲鬼之恫則至聖先師為禮樂文物之祖社稷諸神為百榖生成之佑至於無主孤魂倍宜憫恤蜀土遭劫屠戮白骨滿地燐火遍野往時民人寂寥雖悲號夜月無能為祟兹流民漸歸烟火漸生則此等無主孤魂當人間祭祀之期必悽愴愈甚恩祀不及怨氣所激或為災眚或為妖孽必然之理以上諸祭祀皆宜急為修舉不可闕一者也曩因蜀中田地未闢賦稅無多祭祀未舉遂為缺典間有有司捐俸舉行或派居民相助然未䝉聖恩神鬼必不歆享且以如此重典而下需吏民捐助適所以羞朝廷而輕大典矧今日車書一統富有四海一切祭祀舉無缺略何獨靳毫末之費而俾蜀疆神鬼不得霑聖天子之恩歟伏乞憲臺裁奪題請修復祀典豐儉之宜動支本處正賦錢糧銷算或開徵糧多者從豐開徴糧少者從儉俟田土成熟漸次如禮則蜀疆神鬼均受皇恩而於一代之典制有光矣事關大典冒昧上陳請正朝儀詳照得朝賀大禮天下遵行臣子敬君自有一定之儀恐難以邉徼殘荒任其儀制參差成龍原籍山西永寧州凡遇朝賀各官前一日昧爽齊集萬壽院習儀祝聖分班跪迎萬嵗龍亭前至州治大堂本日昧爽各官齊集州治向龍亭行朝賀禮有司詣龍亭前跪廩生宣祝聖文畢復位分班跪送此成龍原籍朝賀之禮也成龍初任廣西在栁州府遇冬至朝賀禮前一日提督分守右江道併文武各官齊集分司衙門習儀迎龍亭至栁州府大堂本日昧爽文武各官齊集栁州府衙門文東武西魚貫而進提督與道官上月臺先行朝賀禮分東西面立後文武各官在月臺下行禮畢通贊禮生唱祝文引贊禮生引知府詣龍亭前跪通贊禮生唱衆官皆跪廩生宣祝聖文畢知府復位分班叩頭跪送龍亭此成龍目見栁州府朝賀之禮也今當冬至成龍肅查朝賀儀式因地方荒殘原無上頒定規往嵗文武各官前一日齊集嘉福寺習儀本日仍於嘉福寺行朝賀禮此合州舊嵗朝賀之禮也朝賀大典天威咫尺臣子拜蹈罔敢差失苐成龍素未習禮又無頒式未知在寺朝賀與在州治朝賀孰為正禮又本日祝聖文云維某年某月某日某省某府州縣臣等荷國厚恩叨享祿位皆賴天生我君保民致治今兹長至聖壽益增臣等無任踴躍歡忭之至此成龍原籍與粵西祝聖之詞今查合州舊儀將冬至進賀表文宣讀又未知二者孰為通行定式夫以合州荒殘典籍軼失當草創之時儀文缺略然朝賀大禮臣子不敢苟且但儀式未頒成龍寸心難安謹將儀式申請伏乞憲臺裁酌舊章俯准頒賜定式遵行雖地方荒殘而威儀漸有可觀則尊君之禮大彰而典制可垂永久矣查採楠木詳康熙七年十一月二十五日奉巡撫四川都察院張憲牌案照查楠一事屢奉嚴㫖隨即通行各屬遍查具報去後事關欽工本院不得不親往志載産楠之馬湖永遵一帶躬率彼地各官兵役直抵深山逺箐確查大材楠木以資國用除具疏題明擇吉起馬外合先行委為此仰該州官吏查照牌內事理即束裝星馳前往彭水武隆二縣㑹同該縣文武各官率領兵役鄉導確查搖櫓白馬江口及近酉陽一帶山箐併南川縣金佛山馬嘴等箐堪充梁棟大材楠木逐一開列圍圓丈尺計其臨江道里逺近馳赴遵桐回報本院以慿親臨彼地覆行查看酌估需用錢糧題報施行該州查明一處即詳悉具稟封入􅊾筒飛遞駐節處所投閲仍減從兼程前去不許多帶人役滋擾地方若奉行不善有誤欽工法在必行非比他事可恕如著勤勞本院定當特薦仍先將起程日期報明等因成龍捧讀憲諭凛遵減從止帶書吏二名快皂二名門子一名前往合併報明竊思楠木關係欽工憲臺題明親勘成龍仰承牌委何敢不夙夜黽皇惟是蜀川之産楠木列朝雖有成案而今日之蜀川非昔時全盛可比田地荒蕪烟火絶滅賦役户口載在由單厯厯可數即有一二孑遺驚魂未定亟待撫綏設辦理一有不善誠恐逺近傳聞或滋擾纍䝉憲臺諭令輕騎减從毋遲毋擾此誠憲臺為國為民之盛心而一介下吏亦竊願上不誤工下不纍民以仰報於萬一邇者凛承皇上嚴諭踧踖無地星夜就道躬入深箐確查無遺用以仰副憲命然不覺有切身之慮焉成龍由粵西來任路經楚黔目覩大箐之中雲樹參天日光不到即夏秋之交尚有冷氣逼人當此寒冬栗冽竟成氷穴大樹之中林薄叢密藤蘿纒結虎豹成羣人跡罕至必需夫斬伐開徑為容身之路火炮刀鎗防猛獸之奔逸且蜀中居民與他省不同平日既乏皮襖又無絮衣驅此啼飢號寒之衆修深山密箐之路無衣無食何以禦寒必致冷凍顛仆一慮也倘有一二顛仆四外居民聞風奔竄是工尚未舉而地方已為騷動二慮也隆冬天氣民徙無依相聚為奸是目前所必無之事亦古來所恆見之事意外可虞三慮也成龍身肩重委不敢不過為顧慮復思成龍入箐必與本地文武官員同行文官有衙役或可令備斧頭鈎鐮凡密箐無路之所指揮砍伐武官有兵丁或可令備火炮鎗刀以防猛獸且大箐所在四圍併無村舍若朝入山而暮就舍則奔走於茂林蔓草之域往返耽延必遲時日何以報命必須武官帶一二帳房偕抵深箐日暮攢宿於箐中庶無出入往返之遲誤而功可刻期告竣但成龍位微兼屬同寅勢在難行伏祈憲臺迅諭武隆南川等處文官衙役備修路之具武官兵丁帶防獸之器仍攜帳房為露宿野處之備是可不用民間一夫而地方自安靜無驚至於國家安危生民休戚憲臺封疆大臣自有灼見非成龍所敢輕議也規畫銅梁條議一在外流移宜招也自甲申之變黎明逃至土司為其迫脅留難者有之或流居别屬因種糧而逗遛不歸者有之或原係宦僕又負人錢債懼主索財畏縮不歸者有之或一家先歸而為民上者不論歸與不歸將名入册以阻歸志者有之為今日計或遍發告示或坐名關取或見在載册之民歸自外方凡有父族母黨給以照票令其招徠招到三五家或五六家俱准入本名户下俟三年例滿輸賦使在外之民播聞此風各自襁負而至矣一土著流寓既入版籍俱係縣民理宜和也夫食毛踐土悉屬朝廷赤子兼奉定例凡一插標即為已業後亦不得爭論今載册者多屬流寓萍踪以充户口在流寓之民見有房有地願自整理整時别無人言及至料理齊備土著則云族人之業或云母黨之産彼此爭奪禁人插占甘心傾圯若不嚴示地方終無起色不惟不廣招來即見住之民日益思散矣一荒田宜闢也查縣屬所轄二十六里載糧二萬二千有竒今歸籍者寥寥載册者僅三十有九户奉行清丈之糧止三兩一錢有零開墾萬不及一各民又防京丈將見開之田懈怠如單夫隻妻租牛辦榖一年不足一嵗之用終無展眉之日猶幸安堵如故務須給示奬勸教民廣墾男耕女織各守其業毋致飢寒仍應差人逐月採訪勤惰勤者賞之惰者懲之如此鼓勵自是家給户足有比屋蓋藏之慶矣一風俗宜整也查銅邑地方向稱人文禮義之邦自張冦變亂二十年來人烟絶跡雖經開復禮教未興歸籍之民間有幼時拉入營伍竟不知孝弟忠信為何事酗酒放肆任意橫行官逺法疏縱橫得以自便雖有鄉官幾人本無官守言責同居桑梓誰人得而禁之務令上下二鄉設立鄉約各一名每遇朔望將上諭十六條諄切講解以禮讓為先勤儉為本戒遊逸賭飲無以小過而不改間有不遵約束者許令指名報究使知目有王章勿令若輩視法如辨髦也一縣城之駐防宜撤也當年王師進滇經過銅梁因餘衆尚未遷移每被逃兵過銅劫掠自遷移之後逃兵久已絶跡前以銅梁有官有印䝉上司設兵駐防誠為衛民久安長治之基今銅梁官撤印繳民雖零星野處而頻年賊盜消弭以城內八九户之民安用三十餘名之駐兵耶兼以將領不能鈐束兵卒動輒酗酒恣肆大營尚在䕫門相去千有餘里向有合州駐鎮可以節制今云已裁愈不能約束矣應否詳撤庶免殘黎滋擾一寡婦幼子宜恤也天下最苦者莫若寡婦伶仃無告者莫過孤兒自宜優加憫恤乃有奸弊陋規令人詫異者如夫死妻必嫁之言雖未可槩信而有等奸民乘民婦夫死視為竒貨或有鄰居出備衣衾板木代葬經年纍月不即取償扣算本利若干逼其再醮天理何存寡婦無門可訴寧甘受嫁索財更有賄送官長紅銀假此因公苛求雖奉兩院勒石碑禁公然視為故紙今吏治清賞罰明宜立法飭行嗣後有翁姑主婚者方許他適若無翁姑叔伯者當聽本婦自便不許奸民逐逼庶生者安心死者瞑目也上提督請留合州營防兵揭照得大臣謀國固相緩急以設防禦而下吏守土亦審時勢以詳去留本提督開闢蜀疆剪除羣冦躬親戎伍險阻偹嘗及成功大定度形勢之或險或易議防兵之宜有宜無㑹同前任總督李爰定經制為國家久安長治之圖灼見合州據三江之要㑹六路之總必需營兵坐鎮以資彈壓因設將領兵丁五百員名載在經制垂之永久成龍於本年九月初六日到任尚未熟悉地方要害風聞有裁省合州營兵之議驚惶無措姑就營兵之有關吏治者條晰上陳䝉撫憲批候部議在案嗣後成龍審閲合陽山川風景扼重䕫之上流當順保之屏障地勢險要么魔敢於盤據烏合易為糾集每當厯代季世遂為瓜裂如釣魚城之舊跡純陽山之石刻鑿鑿可據以是知本提督與前部院李老成謀謨增設營伍憂深慮逺兹本月二十四日接閲邸報為厯陳邉地等事已經奉㫖依議是部臣據疏參酌知永寧之為邉慮而未知合州之有隱憂也為久逺之計本提督焦心為國瞻前顧後已定之經制必不可更為目前之計則成龍利害切膚審時度勢已裁之成命尚需挽回本提督封疆大臣凡地方利害知無不言如合陽之裁兵實關地方之安危事非渺小伏乞憲臺重念甫定之殘疆不可輕為搖動萬全之經制難以驟為更易㑹同撫憲酌議逺圖題請遵照舊制留營駐防庶初年之經畫有始有終或以永寧重鎮勢需增兵然重慶新設總鎮衙門所有城守三千之兵去留未定亦可通融調撥則合陽之營兵可不裁蜀省之經制可不更而中外之土宇可以寧謐無虞成龍腐儒不達時務祗因利害當身激切再陳統祈憲鑒武昌書為武昌各屬請緩徴詳看得府屬州縣驚鴻未集民生失所尚望殊恩安輯若復議徴恐小民輸納不前軍需必致違誤悉陳各屬情形懇乞憲恩生全如蒲圻嘉魚逼近臨湘冦賊犯境雖飄忽而逝然士民驚避罔顧農業通城密邇平江民不安生被賊乘夜襲城黎明逺揚而烟火已絶咸寧聯接蒲圻人民逺竄湖山境內十室九空崇陽處蒲咸通城之間雖未流離而警息時聞不能盡力南畝至於大冶當風鶴之餘土冦作祟即不終朝而滅斯民已受疑畏興國武昌通山與大冶為鄰土冦煽惑兼以逼脅肆虐生民不得樂業江夏為省㑹首縣衝煩疲苦民不堪命是各屬危苦情形久在憲臺洞鑒中兹奉查議合就據實直陳均當軫恤安輯以恤民生則開徴之議尚非其時似應仍前緩徴以救民困庶小民無催徴危迫之虞有司免違誤軍需之慮請復臨湘驛站詳本月二十七日據蒲圻縣詳稱鳯官港三驛馬夫徐但陳等禀懇詳迅起嶽站等事該本縣知縣張圻隆查看得蒲屬三驛接壤嶽州長雲等驛原奉編以六十里為一站所以節勞逸惜物力也目今鄰邑未行起站無馬換騎節經大人差使往上俱經越站長驅三百餘里以致夫馬困疲前馬既去後差無以接濟差使絡繹勢必貽誤關係匪輕合無詳請俯念驛傳急務轉詳蚤發嶽屬馬匹各驛起站接換庶軍機無誤人馬得蘇等情到府該本府看得湖北蒲邑與湖南臨湘為鄰蒲有官塘鳯山港口三驛臨湘有長安雲溪二驛雖有南北之分而驛站實為血脈相通之路目前蒲圻三驛招撫馬夫增補馬匹應差無誤奈臨湘兩驛未設將港口之夫馬越站至嶽港口勢不能支將鳯山官塘夫馬越站至嶽路程愈逺夫馬愈敝是以臨湘未設之驛而纍及蒲圻已設之驛恐三驛夫馬愈敝則差使絡繹將何以應此該縣據馬夫之禀而急由請也伏懇憲臺念郵傳關軍前急務刻不容緩移㑹偏院設法馬匹蚤立臨湘兩驛則蒲驛不至拖纍軍機得以迅傳矣飛報收復蒲圻詳成龍奉憲委修咸寧河橋當有李守備及巡驛各員協力相助于初七日工成已經飛報在案初八日至蒲圻官塘驛宣布德意有大貴雙丘二團鄉民投見成龍遵發憲示鄉民罔不悅服亦經飛報在案初九日沿路鄉民迎接泣訴各有陳詞現經彚繳咸乞憲示但頒發者已盡懇領甚衆祈速多頒以安人心本日晚成龍同武昌衛李守備城守王把總金口郭巡檢咸寧孫典史渡河進蒲圻縣城寂無人烟止有原任丁憂巡檢潘宏錦閣家在城隨查縣有六門即壅塞四門僅留北門水門以通往來以便修橋所有收復蒲圻緣由合就飛報規復蒲圻上王憲副禀自憲駕回蒲成龍因崇陽􅊑歸日夜不寧今船已足數值王把總從大營旋奉撫憲有守橋梁之命則橋有責成定於二十九日聯舟為橋庶成龍之職可寬責任至於招撫士民當大兵渡河之後人心踴躍思歸雖朝來暮去而路有行旅市有貿易無如天雨連綿道途泥濘繼以逃兵浪言煽惑人心前此阻士民欲歸之路者天也後此阻士民欲歸之心者人也天時人事如此縱成龍竭盡心力其何能濟惟有株守歎息而已既無益於地方應歸省以謝罪一畏士民之無主空城寥落一畏屬員之偕行驛站廢棄暫且居蒲以圖可乘之機但請署之文未下精力愈疲神氣愈耗似一廢人居一棄地矣若逃兵乃德安興國蘄州黃協四鎮兵也於二十七日早渡蒲河流言散布耳不堪聞從崇陽大冶逃者十之七從蒲逃者十之三恐通城一帶自此倍為多事未知撫憲如何布置通城咸寧官不勝任成龍因蒲署未下亦不敢多言地方事目前靜坐河干料理船隻鄉紳伺其動靜頗為帖息二十八日鄉民往來不絶以通南北一線之路王把總歸來道營中事甚悉二十三日我師在陳陵磯遇賊勝負未分但南冦多鳥銃料不敵我師之徑弓矢為輕便天氣晴明利於馳射戰勝在即嗣容報聞籌畫蒲圻防守詳看得蒲圻城內留兵防守必然之勢也然止留一將領足矣恐主將多則兵丁難於約束士民畏懼不歸依然一空城耳且兵丁盡住民房目前士民歸來將何為安身之處更有不忍言者民房家資木器已不可問再過數日土底蓄物亦在難保士民歸家一見傷心必號泣而他往成龍亦乏撫循羈縻之術矣伏乞憲臺酌留何營何將該兵若干牌行遵照或止留城守王把總兵三十名防守城池遞送塘報亦足濟用今日之事兵不在多止在收拾人心而已上張撫臺籌報各屬情形禀成龍駐守蒲邑士民初有歸意可憾興國蘄州黃州德安逃兵回營浪布流言人心震驚蒲邑附近各縣危如纍卵上憲差使慌張空回一應公文塘兵打轉道路梗塞通城文武恐懼離汛賴有崇陽一縣砥柱中流差役探成龍動靜地方稍寧通城因之報文回縣嘉魚自冦夜來明去後避居鄉間聞今亦已歸縣蒲邑漸有歸民村落擊鼓插秧山中採茶肩擔沿河船隻貿易未盡齗絶前尼將軍票查病駱駝一隻成龍差武童賀世沿賫收管繳營本月初六日午時來見言四月二十九日離營我兵駐扎離陳陵磯五里附近大江糧米不絶止缺燒柴二十三日陸路大戰殺賊無數滿兵引他看殺死者俱係頭有長髮二十四日水路大戰炮打壞賊船無數二十七日二十九日陸路俱大戰每日我兵四千餘人巡哨此係確信本日忽有大冶縣報文二角武昌縣報文一角愚民作祟恐縣文失之驚張亦冝早為安慰大冶逼近興國有柯陳二家且通城久已思亂嘉魚頑悍異常倘聞風附和大為心腹憂縱殄滅不難亦傷元氣守憲素得民心敕速發示以遏亂萌且撫有柯陳庶民密差曉諭解散發兵防守此要著也恐愚民生疑反逼成釁端是解散防守緩急之間憲臺自有萬全長䇿依成龍愚見俾興國將領嚴加隄防通山武昌兩縣發重兵守禦且置大冶於不問順而撫之則反側子自安不發兵可無走險之虞發鄰兵以張鎮壓之威且以杜鄰封通謀之漸未知可行與否此事關係非小專役賫投伏乞憲臺垂念封疆密與守道計議若守憲肯親臨大冶相機安撫自可無事但不可輕帶兵耳前日逃兵各懷疑懼務令各營將領收拾安慰加以告病假歸名色無使密釀禍種聚而成黨再懇將大冶通城通山咸寧所供荆需移㑹督臺暫緩以安人心成龍為地方起見非敢乘機怠緩軍務也統惟憲裁成龍僻處山隅鞭長不及以貽憲慮罪難擢數蒲邑大水冒城垜垣摧倒城內房屋傾圮合併附報報咸蒲浮橋被水衝壞情形詳咸寧橋成洪水衝壞是實天降災殃也咸寧古有石橋亦被山水衝傾則一浮橋又安能支泛漲無涯之水成龍初九日冒雨至蒲圻大雨水漲漫無下樁之所已經申報在案初十日料理物料十一日將橋梁雨中成就值有咸寧橋被水衝之報成龍心神慌亂茫無措手本日蒲圻大雨如注水聲如雷是咸寧已壞之橋不知如何復修目前蒲圻已成之橋又在十分危急也成龍的於十二日赴咸寧多方布置物料力謀再舉不識天意何如合就申報呈報委撫東山起程日期詳本月二十二日奉撫部院憲牌內開麻城縣土冦劉青藜狂悖猖亂本應遣發官兵擒拿但恐無知愚民或偶被蠱惑或勢迫脅從不忍俱加誅戮特先委武昌道黃州協㑹同前往相機撫慰今恐小民疑畏不前查該府先任黃州駐劄岐亭廉能自持士民素所愛戴合行遴委備牌仰府照牌事理即將發來告示十張兼程前去麻城縣各山寨地方曉諭民人急蚤悔悟如為土賊迫脅不妨自首以贖前愆若有力能擒拿賊首亦許自新仍加優賚倘或執迷不悟該府諭以忠義曉以國法力為解散事平之日本部院自有酬庸之典齗不負該府賢勞也等因奉此成龍已於二十二日晚自㑹城起程於二十四日已抵白杲的於二十五日進東山安撫理合申報初撫東山遣牌照得本㕔鎮岐四載有餘凡我士民罔不開誠見赤相安無事至於分守鄉汛賴保無虞殱滅鼠盜藉力協助因之偷兒逺遁狼子回心年來頗稱寧謐固本㕔之幸實士民之力也二月覲歸詢知地方平靜不勝慶喜及赴省署理武昌府事辦理軍務又往咸蒲造搭浮橋仍駐蒲防守城池雖諸務叢集未嘗一刻忘爾岐民自蒲旋省忽聞東山作亂誠為怪事以東山尚義之鄉胡為有此不義之舉父母妻子立見亡滅可惜本㕔數年生養一旦成灰燼也真可痛心酸鼻再三請命撫部院矜宥無知幸䝉撫部院如天之仁特允所請以開一面之網今本㕔奉命來撫合先遣牌傳諭為此牌諭東山士民知悉牌到之日速候本㕔親臨投見辨明作反情由爾民素稱良善何忍背叛朝廷將本㕔平昔勸諭安生理保身家等語竟置若罔聞也如數月不見竟成讐敵本㕔立即回省任兵馬剿滅本㕔亦不為爾民姑息矣言出衷腸切勿朦視勸畈間歸農諭照得劉青藜官激民變一案人心疑畏地方震驚以致該縣請兵安慰自與附近良民無涉况協府久鎮黃州禮士愛民賑荒放生一片婆心爾民共知兹統兵來撫自是紀律森嚴爾民當農忙之時一刻千金惟恐驚慌逺竄致誤農業合行曉諭為此示諭沿路居民人等知悉各宜歸家盡力南畝勿畏賊黨扳害涇渭定有分别勿懼兵丁往來軍令毫無假借如仍前遠避不惟誤自已一年之生計且有負協府平昔恤民無方用兵有律之至意安慰各堡諭照得本㕔奉撫部院命安撫東山於本月二十四日至白杲據徐家堡生員朱珏方士位黃金聲鄉民周吉甫等呈稱本堡士民夙係耕讀樂業並無外事禍因三四匪類附㑹東山本月初十日已經解散十四日復被訛報鄉堡耆民善人再查並無形跡十五日鄉約周美公㸃卯遭誣合堡皆賊見在監禁以致善良疑畏驚散又據生員朱珏等結稱本區除四凶附入東山外再有匪類願甘認罪又據白杲王家水垣等五堡生員戴其進等結稱生員朱珏等俱屬良儒如有不端願甘認罪各等情已經申報撫院外合行給示安慰為此示諭徐家堡士民知悉各歸堡內乘時務農勿得自誤生意如有挾詐讐害揚言害衆許即禀明立刻詳院究治凡我士民切勿再生疑畏離家失業申徐道臺請釋無辜詳看得狂夫倡亂則宜勦赤子弄兵則宜撫自古皆然况逼而走險嘯聚山林情有可原者乎至於嚴刑慘刻逼報良善為賊意欲一網打盡何能免鬼神之忌古人於賊黨之中尚冀開一生路為脅從罔治之法何今人於良善之中務期株連蔓引為殱滅無遺之舉仁人君子安忍存是心行是法也兹據生員鄉民哀訴前來合亟請命伏乞憲臺憐念無辜遭此慘刑罹此法網速行縣釋放不惟受刑之殘喘可留旦夕之命且四境良善得免人人自危之虞否則逼人於危畏禍偷生將有不可言者矣申張撫臺釋放無辜詳看得東山之禍起於官激民變而究其根源由於縣官心神昏亂何物鄒克忠乃衣頂生鄒惺不孝不慈無仁無義此麻邑之窮凶極惡也縣官視為心腹衙役倚為爪牙乘機賈禍唆官峻刑逼士民於危亡陷士民於株連將縣城紳襟槩稱通賊力脅離縣驚疑無依又云縣城之外無非賊黨贊謀遍勦以致士民號泣怨氣衝天除朱珏徐克成等呈已經申報外兹據徐阿曾李中素呈詞合亟報明伏乞憲慈迅查縣官陷害良善并鄒克忠主謀羅織情由釋放監禁夾傷平民焚毁刑扳無辜供詞庶人心自安禍端可息報東山就撫詳成龍凛奉憲命於本月二十七日單騎進山劉青藜之父劉啓禎帶鎗手三百餘歡躍投見成龍曉諭以憲恩不忍加誅安慰解散天地父母之至意啓禎跪泣衆冦崩角稽首感頌憲德已經就撫然山愚無知猶恐事後加誅意外就戮環泣始終赦宥成龍仰體憲慈已許轉達矜全伏乞憲恩迅賞矜宥保全告示以𢎞不殺之仁聞山中尚有數孽祈諭啓禎盡行招撫無留遺種商城英山匪類隄防入境藏匿倘有疏虞應將啓禎前罪俱發目前安撫必須解散解散必須安插乞速撤黃協兵回汛敕守憲暫駐以便安插以釋疑畏仍飭麻城縣將監禁疑獄查報釋放已逐紳襟曉諭進城勿再偏聽誅求以安地方成龍必俟山黨肅清安置妥當方敢旋省但報文苦無驛馬傳遞多稽時日乞憲差星夜馳送告示諭帖可蚤結此局成龍可免稽滯日久文案堆積之慮矣上張撫臺陳情小禀東山安撫一案五月二十七日就緒本日差役飛報候命安插值禁旅路經麻城四境鄉民又驚避一空成龍係地方安危隻身駐居白杲經過將軍嗔責藉伊兵威竊取成功嚴聲厲色問賊在何處我們去殺成龍不敢遜對以安撫在先兵到在後何為藉威已經安撫何為又殺將軍愈怒云既有本事何不殺吳三桂去成龍回稱原不曾帶領兵馬亦曾收復蒲圻將軍言我不是與你爭功成龍稱與朝廷辦事夫有何功將軍問成龍鄉貫忿然而往成龍無端受其凌辱竊思成龍年近六旬鬚髮皓白耳聾眼花自筮仕粵西由蜀至楚離别妻子隻身奔走十三年磨苦已極功名念灰近因地方多事不敢規避前受知於總憲新沐寵於憲臺知無不為事無不任風雨寒濕艱辛備嘗止圖報憲恩於萬一實無邀功求進之念無如時事多艱大將領兵咸以嗜利攘功為心毫無推賢讓能之德成龍下吏秉性愚直實難安位伏乞憲恩早定東山成龍星馳旋省陳情乞休合先報明慰東山士民樂業諭照得本㕔鎮岐四載自愧教養無能然誠信不欺爾士民知之有素兹東山不靖赤子㺯兵撫部院好生為心不忍加誅特命守憲徐總府王統兵撫慰又虞爾山中士民疑畏不前因本㕔平昔為爾士民所信旋委前來曉以忠義諭以國法力為解散以是奉命馳臨本月二十七日單騎進山爾士民果釋疑畏撤旗奔獻環呼歡躍申訴寃抑辨明陷害除詳報撫部院給示安慰外合再曉諭為此示諭東山士民知悉既傾心就撫宜實意安生履毛踐土無非皇恩鑿井耕田當圖報效即司牧有一行之乖方然天下無不是之父母嘯聚雖稱避禍㺯兵豈為良民繩以國法剿滅何辭幸撫憲有力為解散之諭恩侔天地本㕔有力為請命之誓炳若日星凡我士民盡釋疑二歸寧父母各安身家僻處山隅南北之兵戈不到游優田里婦子之嬉笑自如何等快活何等受用永革一時邪念共享山中太平本㕔千言萬語無非為爾父母妻子各宜書紳永佩不忘申報東山撫事已竣詳成龍凛遵星馳於五月二十四日至白杲駐扎離賊窠十五里寂無人烟已經報明在案本月二十七日單騎進山劉青藜之父劉啓禎帶鳥鎗三百餘名歡躍投見成龍曉諭以撫部院不忍加誅安慰解散天地父母之至意啓禎跪泣衆冦崩角稽首咸願就撫成龍隨即申報六月初一日奉憲牌恩允矜宥給示安慰復遵發示曉諭本月初三日劉啓禎率衆來白杲獻傾心向化旗一靣赴守憲投誠賞賚勸諭衆皆悅歸又奉撫部院諭劉啓禎既率衆投歸倘能招致他寨强頑一體歸誠尤當加以優奬守憲仰體德意特委劉啓禎執牌向各寨宣諭招撫於本月初七日啓禎招鮑洪功陳恢恢李公茂等率衆來白杲獻安家樂業旗一面赴守憲投誠各賞賚勸諭給照牌告示護身寧家衆皆悅歸東山已靖撫事已竣伏乞批示回省招撫後諭東山士民照得本府前駐岐鎮頗與士民無忤近因東山作難撫部院遴委勸慰今爾士民相安無事本府應歸省復命合行曉諭為此示諭東山士民知悉本府於本月某日由白杲暫駐岐鎮爾等須念撫部院生全之德堪侔天地至誠之心可格豚魚凡有血氣誰無知覺父母妻子朝夕歡聚誰歡聚之也雞犬桑麻優遊恬熙誰恬熙之也婦子無山棲日暴之苦壯丁無瞭髙守隘之纍無畏乎兵戈而免負銃帶火之艱無憂乎捕役而獲薅棉鋤豆之樂夫妻安枕而夜半可以不驚親友往來而株連可以無慮此恩此德今生今世何以報撫部院之萬一也自示之後各安生理永革邪念食新在即秋收不遠山中正好避兵愚民豈堪將相一念之錯皆由訛言之誤回心之早即是終身之福耕田當差勿藉口禁捕而併阻乎官役安下敬上勿藉口激變而兼撓乎王法朝廷設官治民一定之體有司差役勾攝不易之法從今循理守分自無恐懼憂患命由天定禍自人作思之慎之招撫事竣慰東山士民諭照得東山官激民變一案撫部院好生為念不忍加誅夙知守憲徐慈祥素著副府王老成持重特命撫慰又虞山中士民疑畏不前因本府昔駐岐鎮頗為爾信愛遴委安撫於五月十七日單騎進山士民果釋疑畏劉青藜之父率衆歡迎泣訴寃害六月初三日出山赴守憲行署傾心向化仍宣布院道德意鮑洪功陳恢恢李公茂相繼悅歸辨明前愆咸願安家樂業䝉撫部院矜念無知槩加恩宥守憲遍給照示嚴禁毒捕仇家株連揑害多方生全㺯兵赤子安帖無驚合行曉諭為此示諭東山內外人等知悉亂民已靖官兵已撤凡爾原未脅從士民可無逼脅之慮亦無玉石之憂毒捕不敢肆虐仇家不敢揑害各安厥居共享山中太平布告逺邇咸使聞知又安慰士民諭照得東山官激民變一案本㕔奉院道憲委駐扎白杲單騎進山曉以忠義諭以國法力為解散山中士民泣訴寃害畏禍聚集情願歸家安業已於本月初三日劉青藜之父投見守憲特賜袍帽歡躍歸家現今守憲駕臨白杲開誠布赤布告士民凡有一切身被逼害或以舊事吹求或以親友波及情實可憫合行曉諭為此示諭東山中外士民知悉監禁寃誣俱已釋放被俘良善半已昭雪衆所共知捕緝尚未銷案疑畏不能帖息因山路隔絶毒捕碁布寃情阻於上達驚惶無所依歸示到之日或星馳申訴執示護身務各安厥居萬勿仍前疑懼聚衆失業至於喜亂奸宄多屬逰手好閒之徒逃匿亡命之流原無身家可慮且有罪案未結好為訛傳以驚亂人心苟全已命凡我士民咸有父母妻子産業身家縱有株連尚存公論一辨自明切勿為彼輩所愚也諭鄰境各屬照得撫院發示安慰百姓凡東山相連一帶地方山寨嘯聚人等俱在一視同仁之內不止為麻城一縣也或黃岡羅田等處有願領示者開明某縣某處以便填注示尾給發收照委護程宦牌照得本府奉撫部院牌委安撫東山已經安撫報明在案所有程鎮邦援例赴府乞撫具文詳報撫院已䝉批准援例安撫合行投見為此牌仰河泊景可賢差役左先護送程鎮邦前去㑹城投見撫部院守候回文沿途毋得稽延時日致干取咎未便宣慰陳恢恢諭照得本府奉撫部院安撫東山費盡苦心推誠置腹劉君孚信之最真陳恢恢在沙廟相見甚是爽利恨見之晚不料鄒君升為盜僕逼脅君孚仗義進勦本府因之㑹集鄉勇協力相助申報各憲以劉君孚陳恢恢為勦主四境告示昭然耳目且恢恢與衆紳士陪本府每夜飲酒情意浹洽何物畜生輒布浮言離間我同心本府年近六旬離家一十四載止帶二僕孤身萬里一片實心惟欲保全百姓駐岐數年一舉一動士民咸知非為功名起見兹恢恢見疑本府使心跡未明殊切憤恨望君孚作速傳諭恢恢見亮此心無異若懷狐疑將以禽獸待本府也本府焦勞招撫精力疲竭久思回籍何可久戀官職為人所疑忌如本府不以實意待恢恢天地鬼神速加誅殛東山就撫後飭行保甲諭照得東山向化士民安業本府親履田畈編立保甲稽查匪類勸勉為善惟恐遊手好閒之徒凶逆亡命之流不遵本府勸諭且憾山中就撫心懷叵測匿名山間流禍地方潛行不軌勒良從逆一以壞安撫之實一以貽良善之憂深可痛恨為此牌仰知悉如有匪類速勸投見倘執迷不悟脅良作亂凡我士民嚴行保甲協力擒解或殱滅報功本府申詳院道厚加奬賞以勵忠義以靖地方切不可藉端報復讐害無辜不惟有負本府撫輯民人清靖地方至意且以犯神人之忌不淺矣禁止嚇詐就撫士民諭照得東山就撫守憲勸賞給撫部院告示安插逺近咸知但其中有鄰封愚民附和入山既撫之後願各歸本地安業恐鄉保地棍衙蠧惡捕藉口稽查恐嚇索詐將歸業好意反致失所殊非院道安撫之意合行曉諭為此示諭本地士民人等知悉查本人歸家驗明守道給票并告示即善為安插如有諸色人等藉端嚇詐除本人禀究外鄉保即刻指名呈報以憑報道申院拏解正法倘通同作弊或縱容肆害事犯之日鄉保均難姑宥清理保甲諭照得東山已靖應冝安插為撫良善後之計兹本府沿堡清理設立户長教訓子弟編擇甲長稽查烟民各安生理毋縱為非唯恐有流移遊手之類無家可歸無業可務聚集山中衣食不足甚之凶逆亡命之徒有罪案未消匿處林藪苟延旦夕均應處置得宜以撫良善合行曉諭為此示仰陳恢恢知悉亟清理山區除將本區居民安插務農照例設立户長編擇甲長外如有流移遊手之類作何安插至於凶逆亡命之徒罪案未消速趁此時投首可以免罪若觀望不前則此㑹一失投首無門山中終非逋逃匿奸之地後悔何及思之思之保甲事竣再行申飭諭照得麻城東山撫勦咸輯士民向化本府駐麻時已經親履垣區編立保甲稽查匪類勸勉為善日無寧晷心未刻閒雖有成規惟恐本府離麻之後人心渙散無有聯屬特委各方總堡督領垣主户首分任勤勞逐户清查倘有流亡凶逆之輩遊手好閒之徒不遵本府勸諭不聽保長約束心懷叵測為害地方潛行不軌煽惑我民以壞安撫之實以貽良善之憂深可痛恨爾西南北一帶山勢不甚險峻士民原無異心但地連兩界路通光黃必須稽察嚴密永保地方申飭區堡諭照得設堡長户首原為清理保甲稽查匪類若不徹底清查顧惜情面大非借重之意嗣後凡屬領牌堡甲所轄區分户首烟民務要遵依憲行保甲之法聽信堡長教戒為此示仰領委堡長及區內人等知悉作速稽查匪類盜賊教率子弟驅除强暴防守要路勿使容隱不軌縱放逃僕一家有警鄰里協力救護一方有警鄰堡同心堵勦爾等冝各以身家性命為重今日本府拳拳委託再三叮嚀總欲爾等共享太平無事之福也本府更有囑者地方重大事務除真實密報即宜相機早圖毋令遺患慎之慎之再諭東山士民照得本府奉部院命安撫山中爾等念朝廷德意傾心向化不越十日漸次蕩平止因該縣有爾等陽順隂逆之議部院飭本府暫駐安插毋得擅離麻邑期為善後事宜以致羈留一月有餘目覩亢旱憂心如焚兼之訛言沸騰傳本月初二初七爾等破城縣中男婦縋城逃走人情洶洶本府寢食不安今訛期已逾保甲巳編幸天雨霑足四民稱快又李公茂隨守憲赴省投見部院劉青藜出首副將僞劄候題優叙劉君孚保全地方一片實心本府倚為左右手陳恢恢屢次謁見毫無芥蒂鮑洪功夜行歌舞李子茂名雖掛於招撫實無預於激變皆爾士民耳聞目見山中復有何疑本府難於久駐的於某日回省復命合行曉諭為此示諭山中人民知悉嗣後各安生理共享豐年須念該縣撫後復叛之文爾等誰無良心應與本府爭氣勿使其言效驗為所耻笑本府駐武昌相隔不逺凡事可速禀報其餘人民安家樂業勿再為訛言蠱惑致生驚擾勸諭士民照得東山作難止因被誣士民嘯聚將附近居民逼脅入黨哀哉耆年父老曾經兵戈之慘曾罹流亡之苦萬死一生留此殘喘撫兒孫而心酸覩田宅而魂銷又有衣冠子弟身受朝廷恩榮顧惜祖宗門第禮義廉恥不忍棄絶中夜倣徨莫知所措父母妻子環聚而欷歔泣下又有種田農夫賦性愚朴十數年來耳不聞金革之聲目不覩旌旗之色止知終嵗勤動納糧之外積儲粟豆花布茅屋之中畜養雞鴨猪犬稍有餘裕買牛生犢便稱山中富翁聞此警息捶胸頓足件件難捨又有商賈之流或係已資或係借貸拋妻别子經營江湖折本羞見故鄉倘有生意歸家修理房屋治買衣服桌椅器皿好為精緻婢女僕兒好為役使忽聽無端啓釁顧惜從前辛苦棄之不忍守之難保痛哭流涕天日昏慘凡此士民情狀堪憐因之族微勢寡者含淚棄家逺避他鄉苟全性命㷀㷀無依族大勢重者糾合同姓異姓督修堡垣器械能自守衛决不苟且從逆此等苦情壅於上聞在爾等各為身家性命在朝廷便是忠義良善若不奬勸何以勵後合行給示奬勵為此示諭東山士民知悉爾等自能守衛者忠義可嘉望風逺避者良善堪憫自今伊始潢池赤子俱是一家各宜安心樂業共享山中太平本府更有囑焉值此多事之時不無一二姦民引誘後生徼幸功名殊不思耕田鑿井之民豈慣為披甲荷戈之事本府曾有訓言山中正好避兵農民豈堪將相古語有云一將功成萬骨枯這事豈是容易做的嗣後須嚴行保甲責成户長稽查詐僞勤約子弟勿留禍害之種勿蹈危亡之轍慎終如始以靖地方招撫事竣詳看得劉啓禎即劉君孚而劉青藜乃啓禎之姪自幼喪父啓禎養為已子住東山曹家河區內禍緣夏寅生李攀龍為僞劄一案忽被拏解人心已屬驚疑該縣未出示曉諭而捕役藉端恐嚇凡東山一帶舊日招撫遺民并訛傳劄內姓名及貿易歸家商賈形涉疑似人人有莫保之勢而徐家堡劉公先李君聖方燕及談召賢疑畏入山鄉保報明該縣委耆老安慰已經解釋陡於五月十五日魯家台鄉約魯象美徐家堡鄉約周美公曹家河鄉約李祥陳家集鄉約徐克承赴縣㸃卯該縣輕聽人言將周美公等硬夾取供仍行監禁至於楊楚喬係劉青藜十二年當差頭之保户因差銀角口用刑成招並無報呈奸細緣由周美公等泣訴有據而劉君孚聞風嘯聚脅衆㺯兵鮑洪功陳恢恢李子茂亦以捕嚇嚮應山中震驚縣治戒嚴幾於燎原此起釁之由而該縣請兵鎮勦之所從來也成龍於五月二十二日奉撫部院遴委安撫二十七日進山曉諭六月初三日劉啓禎率衆出山獻傾心向化旗一面赴守憲投誠賞賚有差給照票安插而劉公先李君聖方燕及談召賢均在安插寧家之內劉青藜主張在父非别有事端脅從劉元兒鄒先甫均已解散本月初四日報明撫部院發示宥罪安慰在案劉啓禎䝉守憲牌委招撫山中餘孽本月初七日啓禎招鮑洪功陳恢恢李子茂率衆出山獻安家樂業旗一面赴守憲投誠賞賚有差給照票安插本月初七日報明督撫部院照例宥罪安慰在案本月初八日奉督撫部院為撫綏全賴賢能等事牌仰即將發來告示特諭各士民凡被劉逆煽從黨羽或令徑行解散或令隨該府赴道協投明歸農一槩不得株連慎勿任其執迷不悛慘遭殺戮纍辱父母妻子有負本部院軫恤至意等因奉此遵依發示曉諭士民凡煽從黨羽有徑行解散者有赴憲領票歸農者咸體督撫部院軫恤至意在案再查該縣飛報叛形案內開周美公供稱方韶友在雲南來散劄付藏於劉君孚家自招撫之後遍查無方韶友踪跡藏劄亦無的據李祥瑞供稱雲南二人不知姓名送劄付與劉君孚劉青藜邵君弼查邵君弼年老並未倡亂而雲南二人不知姓名涉於風影徐克承供稱郭輝之在君孚家行走呌小的探報信息查徐克承係陳家集鄉約在東山之外離曹家河三十餘里郭輝之何由囑其探信也且曹家河鄉約李祥瑞亦赴縣㸃卯何信不可探而囑徐克承焉如疑㸃卯鄉約為奸細則無人不可疑矣又六月十七日劉啓禎領程鎮邦出山赴守憲投誠十九日護送赴省投叩撫部院求賜發落本月二十四日奉批已據守道詳批發臬司將所繫家口取保候給在案緣係安撫事宜合逐一據實詳報招募反側充伍諭照得東山逆黨一嵗三叛繩以國法當大肆殺戮盡絶根株本府仰體各憲好生德意念爾愚民無知為奸宄煽惑以致發兵勦絶身首異處妻子家業一旦成空真可憾又可憐也除將首逆擒解正法外餘黨概行免死但爾等共圖不軌釀禍地方凡被害之家何能甘心隱忍爾等餘黨中懷疑畏莫若乘召募鎗手之名投見本府充兵食糧如有技勇另加提拔先給安家銀一兩五錢隨帶鳥鎗照例領價與其提心弔膽不如披甲荷戈為此示仰東山一帶士民人等知悉凡有願充招募速行報名决不相强至若地方士民與衙蠧惡捕假稱兵役肆行嚇詐毒害無辜者本府已訪知一二件仰受害人等作速申寃立刻通詳拿究勿謂城狐社鼠本府生性執拗决不假借總使勢不兩立亦自無妨也上張撫臺善後事宜禀成龍奉嚴命酌行善後之法焦心勞思採訪山中地勢路徑隘口已有成局大約良民居多而頑民有數編以保甲諭以利害各有互保身家之心成龍擇殷實良善舉為區長聫絡守禦家自為守人自為戰料宵小不能出其範圍木樨河現委夏鼎安夏正宗夏栁宗丁貴卿丁吉生等彈壓夏族人丁有二百餘前倡亂之時立志不變已與逆為讐用之此路可保無虞二里河果有李公茂先撫不知名姓因劉啓禎未行招撫氣激嘯聚本月十八日啓禎聞風往慰十九日報信安息且此地有鄉耆田初陽二男俱係青襟啓禎未往慰之先因公茂作孽曾設相鬭之勢公茂氣餒嗣啓禎往慰而止李公茂即李攀龍之叔攀龍在監可以挾制其心目前委田初陽為區長以樹其敵且有東義洲區長鄭君佩等殷家園區長商克繩等落梅河區長張在如等南莊區長金鼎黃等木子店區長童瑞之等俱巨族富室為之聲援此逆已在籠中但因啓禎往慰姑開一面兹奉憲諭亦必令出山申誡以懲將來十九日據劉啓禎密禀稱外縣竟有不軌之徒私來殺禎不忿招撫似此人心不體朝廷德意非勦不能靖祈發四張密票給余公進夏仲昆袁興明督烟民堵截關口要路布揚聲勢自然奪魄至於山中李公茂已經解散禎大膽承任凡事不煩過慮尚有潘家塘大盜馬歪嘴乘釁劫虜人家禎欲處死不卜肯發令否成龍時在麻城當夜密差飛遞硃票相機擒殱數日尚無動靜今麻城附近東山內外編甲巳就紳襟和好成龍尅期仍赴杲鎮布置山中有黃寅生並無黃日升守道甚得人心雖交代在即尚宜欵留善後局面已定可計日以待成龍年邁力疲不善飲食强勉辦事以報憲恩之萬一仰祈洪慈俯念成龍奔走之苦委員接署生死感激倘有可效力之處决不以官之去留異心也請委武昌署員詳本年六月十四日奉總督部院蔡憲票差官張虎前去武昌府著落官吏查照後開榖草數目勒限全完協同解官人役限本月中旬以內飛解來荆接濟等因奉此該職遵查於六月十六日為亟請署員等事竊成龍係黃州府同知于本年三月初九日委署武昌府事因就近補授一案授武昌府知府尚未領慿值禁旅南征成龍奉委修搭浮橋被山水衝毁失誤軍務題參部議處分應遵奉離任且成龍奉憲往撫東山遙隔省治一切府事俱髙閣耽誤如軍前草束舊缺新派不及催辦欽案部件熱審重情不及清理負罪滋深幸東山已靖撫事已竣本月初七日詳憲候批歸省䝉批一應安插善後事宜該府必須計慮停妥另詳報奪回省成龍凛遵成命撫事雖就而善後非旦夕可奏仰體憲慮為地方生民圖久安之計現在清查保甲立守望相助之法延日逾久積案逾多現今武昌同知新任正可接署料理府事伏乞憲臺俯念欽部案件軍需關係重大迅委同知接理成龍受憲籌畫得以盡心效力不敢以去位貽害地方生民等因具詳憲臺未䝉批發又於六月二十五日奉布政司信牌為特參違玩官員事本年六月十四日奉撫部院張憲牌行司照牌內咨文奉㫖事理欽遵施行等因奉此看得成龍原任黃州府同知本年三月初九日委署武昌府事䝉題補武昌府知府尚未領慿因浮橋一案題參革職例應解任伏乞憲臺敕司速詳委員署篆理事庶一應軍需欽部案件責有攸歸等因於六月二十六日申詳亦未䝉批發今奉憲差催辧榖草隨該看得自五月二十二日成龍委撫東山未嘗一刻忘解荆軍需奈羈處僻隅不能分身以應憂心如焚亟欲撫竣回省料理又因善後之計多方布置非旦夕可就唯恐日久遲誤於六月十六日詳請委署催辧軍需又本月二十六日詳請署員接理撫事軍需兩無違延俱未䝉憲示兹差官目覩成龍艱辛疲病之狀事出兩難伏乞憲臺查批原詳仰鮑同知接印理事刻期督催不至遲誤於公事庶可有濟耳任合州時張撫臺復札計二道合陽荒殘冲瘠得髙賢撫而綏之自必漸有起色頃聞初蒞新政驅冗役卻輿從及絶無名之應付清操毅力即此已見一斑甚快甚慰也武隆酉陽一帶地方素産楠木所以特遴門下遍查耳及接來翰山形地勢燎如指掌併分五路並進到處插牌橛記認具見門下措置井井有條乃所報之木並無一株合式者門下可悉心確查如獲巨料不佞自於疏中題叙以酬門下勤勞也萬勿以尖細者搪塞可耳不盡佐黃州署武昌時湖廣張撫臺來札計五道親翁此行能不負不佞愛惜麻民之意為之喜而不寐此時惟推好生之心以答上帝守如保之念以全小民何頑梗之不可輸誠何强梁之不可感化劉啓禎既率衆投誠自當令其仍安耕鑿倘能招致他寨强頑一體歸誠尤當加以優奬决不食言也至吳逆散劄之人作何縛獻其脅從之衆解散之後安插何處目今漢陽業已增兵黃協亦請添兵額應否可令入伍或仍編入各里甲俱煩一一斟酌行之招撫之議既成黃協自可回黃惟留一守備駐麻此非疑麻民猶有反側蓋麻城地界二省向欲添設守備駐防此不佞之初意非自今日始也諸凡就緒之後方可回省發去告示十道可即張掛曉諭二十八日接到詳驗已批行守道矣二十九日接到來文俱一一照行惟二十四日報文何尚未至耶幸查之劉啓禎傾心向化具見親翁善於招徠但未投誠人等應逐一招撫毋令卧榻之側猶有他人鼾睡也至啓禎招撫有功可否令其轅門效用當以戎旗守備待之各鳥鎗手作何安插尤當得所可否令其入伍目今漢陽營已奉文召兵黃州協亦添設麻城羅田守備業經題請增兵六百名而不佞撫標亦見需人倘入撫標其中果有雄武之士當拔置材官千把之列蓋投誠之衆恆苦其反側未安須以至誠待之令彼易於輸心向化則地方自可無事耳投誠盡至黃協方可撤兵鄉紳盡歸小民自然樂業諸凡事宜總煩親翁措置妥當與守道商酌行之投誠事竣可叙妥詳不佞當以親翁招撫之功題請優叙目今地方多故之際早為上聞亦足慰朝廷宵旰之憂也竚切竚切前浮橋一案因准將軍咨移不得不為題參詎意部議處分太過但親翁賢聲素著不佞自即題留以孚輿論况重以麻城安撫之功乎惟勉力竣事幸勿以此思賦歸來也程鎮邦至省其家屬已取保發領以信招徠今仍令赴親翁處倘能將黃金龍梅公素及黃日升令彼設計擒拿將來尚可為之叙其功能也又孫調元及散僞劄諸人俱須留神密訪奸人盡得則民心自安此尤安插事宜之要緊者也專布不一東山招撫全屬親翁勞績今徐守道交代在即則善後事宜尤為親翁獨力成之矣頃聞木樨二里河又有嘯聚之事不知果否想大隊既已招撫此小醜自易為平定也惟留神不一接來翰具悉尊意但疆圉多事正藉賢刺史善為撫馭以恤殘黎不佞行即繕疏題留矣幸親翁盡瘁王事勉抑私情其東山善後事宜尤望留意于清端政書卷一
