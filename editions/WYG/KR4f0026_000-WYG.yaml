body:
  text: 于清端政書别集類六國朝提要臣等謹案于清端政書國朝于成龍撰成龍山西永寧州人由副榜貢生官至兩江總督卒諡清端贈太子太保事蹟具國史本傳是集皆其歴任所作曰羅城書官羅城縣知縣時稿也曰合州書官合州知州時稿也曰武昌書官黄州同知署武昌府時稿也曰黄州書官黄州江防道時稿也曰八閩書官福建兩司時稿也曰畿輔書官直𨽻巡撫時稿也曰兩江書官兩江總督時稿也任監司以前皆申詳條議札檄誡諭之作任巡撫以後始列奏疏第八卷曰吟咏書則其所作各體詩并以文六首附于後别有于山奏牘七巻其編次不及是集為有端緒另録存目成龍以清節著名而自起家令牧至兩膺節鉞安民戢盜諸政蹟皆綽有成算其經濟亦有足傳今觀是書其平生規畫猶可見其本末也乾隆四十九年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀于清端政書原序今上之二十年王師克滇所向底定神武既昭罪人斯得薄海内外悉主悉臣罔不賔服上大嘉悦益精維治理以大中丞夫子于公之治畿輔爲天下最特晉位大司馬總制兩江以風有位葢上知公自令牧二千石及監司藩臬以迄開府上谷厯閩楚蜀粤垂二十年清操偉略鴻文鉅績乆而彌厲故兩歲之中節鉞再加一時眷遇罕有其匹明年夏四月公請假在里祭𦵏畢即單騎至金陵惟攜圖書數巻直馳入署五月素自楚趨侍恭覩御書賜公詩卷兼聞駕幸䧺縣召見幄殿溫語移時且詢公曩撫𠞰東山時事甚悉益歎君臣相得今古維難而公獨遭際聖明若此不有編述懼不足以傳乆逺因發所攜圖書得公自令羅城以來諸牘及詩文稿跪請於公以爲古人著書立言非徒誇示文字良欲開導後學使知所取法無其事者尚欲有其言况公之著作皆因時立議見諸行事深切著明小之治安一方大者動關國計非鑿空結想借物託興之比且公三舉卓異屢平劇冦天子知之已十數年故復於雄縣親垂顧問倘一旦詔公條上行事用備採覽而編簡無稽其何以對公許諾乃次第諸稿片楮隻字皆公親筆細書歲乆黴蠧霑蝕半就脫落彚其可識者爲若干巻伏讀十許日曰於戲盛哉今而知無意於功者始能成天下之大功不遺一事者始能集天下之大事本内聖外王之學以行其致君澤民之志其在斯夫其在斯夫方公初仕粤西瘴癘所侵異類與居凡七年矣北人宦此者百不一歸而公處之泰然略不爲動卒之猺獞革心民安盜戢其規畫條議至今猶用之不盡抑何偉也及由蜀入楚遍厯艱險數定大亂使内地悉平王師得一意南征無後顧之慮迄今讀與中丞張公徃復諸議真死而後生危而後存其難更有百倍於往日者當東山逆賊首倡江右吳豫轉相煽熾使蘄黄不守則吭扼㗋噎荆武非我有矣公獨與張公定策率門下十餘人督鄉勇數百直搗賊巢身自陷堅親冒矢石一敗之黄土坳一敗之紙棚河旬月間一撫再勦諸逆授首而吳豫江右間聞風潰散南北之路始通方是時外誅巨寇内辦軍需既飭屬僚復撫百姓羽檄交馳人馬擐甲凡所設施皆手自裁荅于倉皇中示閒整於擾攘中恤民力罔不纎悉曲當洞中機冝此又素所親炙不假披閲始知者至若出八閩于湯火之餘調劑軍民各安厥所贖還難民動以千百每一書上王公大人皆虚心聽受撫綏上谷屢建讜言爲民請命天子知公直皆特㫖報可以故得蘇解困痼全活死徙無算古人得一節足以傳之無窮公則萃於一身無徃不備矣論者謂公以外臣重邀陛見上親灑宸翰兼賜白金良馬乳酒銀貂麞兎魚鳬等物恩禮叠加人臣之榮至此已極不知公之得此皆出意外當其入粤初不自意能至蜀也及乎仕楚更不意能至閩也又安朢開府畿輔總制兩江哉惟出萬死不一生之計祗知君父深恩在所必報其身家性命已乆置度外故凡有建白輒掀髯而談略無嚄唶使稍有顧戀其伸紙著筆雖曲極組織其於國家事終屬隔鞾搔癢又何能功成事集如此其烈耶是故爲人臣而知讀是書其常也必亷其變也必勇爲人子而知讀是書其養也必力其哀也必毁以此治兵必無覆敗之虞以此臨民必免貪戾之祸以之爲國則逹經權以之居家則敦孝悌於戲公仕且二十年危行特立觸忌諱不少矣所頼聖天子及當代王公大人知之於今千百世忠臣孝子志士仁人奉之於後今雖華衮被躬騶㦸衛道退處一室鷄鳴而起鐘定而卧惡衣麤食有寒士之所難堪而文章經濟顧廣大精切若此又孰得孰失也公嘗謂所受知諸大人君子皆及身顯庸無復欠缺獨中丞張公鞠躬報國盡瘁以殁今滇黔蕩平而身不及見每展對手書輒愴然出涕不知此書傳則張公之功徳自與之俱傳即當代諸大人君子亦無不與之俱傳於以副聖天子精維治理之盛心使士大夫服官攷業者咸有所矜式更使天下後世知凡欲成大功集大事者必於此不於彼其爲禆益豈淺鮮哉公兹甫蒞兩江未期月綱紀整飭俗易風移每有示諭閭里小民爭手錄口誦旬日成帙由此平章天下髙文典册方昌未已奏之廊廟鼓吹休明将盈車充棟有一書再書不勝書而已者更請以俟諸異日云康熈二十有二年嵗次癸亥春王正月上元楚黄亭州門下士李中素拜撰
