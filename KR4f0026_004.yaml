body:
  text: 于清端政書卷四兩江總督于成龍撰黄州書申蔡制臺張撫臺乞歸守制詳成龍譾劣庸材荷恩提拔感戴終身兹有下情泣血上陳念成龍父兄先逝上無叔伯終鮮兄弟㷀㷀一身奉侍慈幃希冀升斗以祿養親不料任粤任蜀逺隔天涯及佐黄郡又苦卑濕不敢迎養身羈一官心懸白雲十六年來烏鳥之私未嘗刻忘康熙十三年成龍有終養之請屢詞吿休實為髙堂母老中懷隱憂不得不為之乞憐也今忽焉永訣母北子南幽明殊隔訃音馳至肝腸慘裂魂魄黯銷號天搶地欲見無由追悔無及痛成龍母老不能養母死不能殮目前柩停中堂亡靈無依倚門倚閭死後望兒倍切生前成龍他鄉孤哀腐心疾首淚已血凝形已骨立惟奔喪營葬觸棺躃踊少釋終天之恨此成龍痛哭呼號而不得不為之乞憐也伏乞憲恩垂憐他鄉孤哀母死無治喪之子施浩蕩之仁慈積萬代之隂隲循例題達歸家守制亡母有靈叩感地下成龍倘邀餘生焚香頂祝即與母偕逝銜環結草永矢世世矣復蔡制臺禀成龍自康熙十二年叩謁憲堦䝉褒諭之寵章服之錫恩逾格外誠千載一時也十三年入京復任值南冦蠢動湖北震驚地方多事軍務繁劇未能趨謁罪戾殊甚自鄂至黄終嵗靡寧成龍心血已枯筋力盡竭龍鍾堪憐通詳乞休未荷恩允強勉從事每多疎漏至於羅田文武互訐闗係地方成龍何敢一刻放懷此事急則彼此相激緩則意氣自平况均係貴族子弟忿爭之日少親愛之日多兹屢奉憲檄不敢久稽謹將大略申覆伏乞憲鑒上蔡制臺用兵方略成龍受知遇之恩雖竭犬馬之力無以報稱於萬一然年邁氣衰力不勝任况當軍興旁午之時猶非太平腐儒可坐理也伏乞憲臺埀念數月奔走恩全離任成龍得與十四年濶别之老母妻子再相聚㑹闔家焚頂無既然時事孔棘憲臺膺封疆重任宜亟為朝廷計安危也用兵之法察天時審地利有守有戰有攻有竒有正有緩有急知己知彼以逸待勞攻其無備出其不意之數者不可不審也今天下之大勢在荆州據長江之險賊不能憑空飛渡相持數月金風一起川湖之賊必兩路爭渡彼利在戰我利在守以逸待勞賊氣自奪若我兵先賊而渡江未為勝策我欲渡彼必備安能保其萬全倘或賊有狡謀陽示之以弱而伏勁兵于澧常間我兵不揣虚實踴躍爭先入其彀中則危甚在我無必勝之勢而進退失䇿此知己知彼渡江之戰在所當緩者也岳州對壘勢足相當水陸更宜增兵以守為戰勝負難決然曠日持久將若之何目前陽平已復蜀無可據勿拘六月不興師之例乘勝而入進可以戰退可以守蜀中空虚鄭蛟麟老懦其餘浮夸之輩無智勇之將先之以撫繼之以戰蜀可傳檄而定大兵直抵遵義而黔省震驚三桂必退守貴陽然後荆兵渡江以尾其後必勝之局此竒兵在所當急而出其不意攻其無備者也至於武昌受病在通城小路須委老成將官鎮守勿騷擾民間收拾人心將平江一帶土寇撫而用之探長沙之虚實藉鄉民為引導而長沙可襲取矣然後請偏院坐鎮乘便招撫衡辰寶永亦足以奪賊人之膽而壯我軍之氣矣上蔡制臺南征方略四月内聞憲駕渡江南征兵威振厲成龍不勝雀躍用兵三年見此義舉然以江湖水漲暫旋天戈此誠審酌乎天時地利識兵家進退之機成龍儒生也未諳軍旅之事第以素所見聞上瀆憲聰兵家之要有戰有攻有守今日長江之險古稱天限南北者也守為長策然非徒守之而已須訓練士卒常有必戰必攻之勢若止使之把守要隘何異乎逍遥河上也訓練之法非止騎射鎗銃之末務五人為伍十人為什自管隊至百總把總千總守備上下相統休戚相闗將知士意士識將心如身之有臂臂之有指呼吸貫通一旦臨陣晝視旗幟夜聽聲音可聚可散仍可散可聚而終不可亂兩軍對壘如手足之捍頭目子弟之衞父兄是訓練之要圖此議涉於迂闊而實非迂闊也守備親乎千總千總親乎把總把總親乎百總百總親乎管隊管隊親乎士卒士卒雖衆然由管隊層累而上則頭領漸約風雨晦明同其甘苦鋒鏑死亡共其患難古大將吮疽投醪用斯道也水師營亦然但水戰之法久缺不講似宜大小船隻相間以便利為上計總之兵不在多闗夫子用刀斧手三百岳武穆用步兵五百以少禦多誠得乎兵心而已將將之法亦無異是目前國用匱乏最為喫緊則屯種當議舉行荆州用武之地必有荒蕪之田以守兵輪流耕種如臨江一帶九十月水退種以大麥至三四月水漲之時即可收割其餘髙阜之處種以粟穀不比水田多費人工勿先計收獲多寡實意行之自有功効亦可助朝廷些須之費而亦不曠乎兵務當此主憂臣辱之時憲臺為封疆大臣責任綦重拔武夫於行伍之中寄以干城腹心之任古人有行之者至於通徹占候曉暢謀略用兵已久草莽料不乏人虚心延訪使貪使詐此又運籌帷幄之要著也成龍邇來老病纒綿憂時心切不克躬親叩謁恭陳芻言未知頗合時宜否上蔡制臺酌畱營將竊照黄州西接武昌漢陽東連九江安慶長江一帶亘綿數百里上以鍵荆岳之門户下以搤潯吳之咽喉實屬要害之區當承平之日黄州原設副將一員額兵六百六十名分汛黄岡黄陂麻城黄安蘄水羅田六縣蘄州原設參將一員額兵四百五十名分汛蘄州廣濟黄梅三州縣而黄協所轄地廣兵少常有鞭長不及之虞康熙十三年滇黔吿變人心叵測麻城羅田素為盜藪憲臺慮周萬全題請黄協添設守備二員分防麻羅各召兵三百名因蘄州勢踞江干密邇黄州議裁參將一缺畱兵三百守備管理而統轄於黄協彼時江右無驚議設議裁緩急適宜嗣豫章用兵憲臺審時度勢請復蘄州參將一缺兩牘補陳無非為朝廷封疆起見部議相左葢以九江有提督坐鎮而江右已漸次蕩平也然今日之憂又不在水路而在陸路聞江右寧州吿警與武昌之大冶興國接壤不無震鄰之恐查大冶從小河出黄石港直抵大江在黄州之下蘄州之上興國從富池口直入大江在蘄州之下廣濟之上雖賊寇不敢猝犯但恐大冶興國受敵而沿江一帶須處處隄防以一協鎮遥制九屬之水陸瞻前顧後不無可慮莫若暫畱雅參將坐鎮蘄州仍分汛蘄州廣濟黄梅而對江之興國等處亦得專謀隄防黄蘄協力聲勢相援兵威自壯防禦自密不惟黄州鞏固無憂即武昌之屬邑亦可恃以無恐伏乞憲臺為封疆謀萬全因時制宜暫畱營將輔車相依以成不可摇動之勢如欲必裁或俟事平再議可也復張撫臺論設水師議用兵之道審時度勢陸路以騎兵勝水路以舟師勝自湖南失陷長江之險賊視耽耽相其機宜設立水師誠為要務荆州重地武昌省㑹水師二營題請設立可謂無遺策矣惟蘄黄一帶上接荆鄂下扼潯吳為全楚門户水師不可不亟為之議然增設水師必廣招募而募一兵必增一兵之費當國用匱乏何敢議增查道士洑一營處黄州之下流踞蘄州之上游現設兵三百名原稱水塘或可易為水師似不必增兵止易其名習其技便壯南北之雄圖也如云兵寡難成營制或將蘄州已裁兵一百二十名補入道士洑共兵四百二十名統以名將聮荆鄂而制潯吳思患預防審時度勢之長策誠有如黄協鎮改設水師之議允合機宜第議水師必議舟楫若復新造工費浩繁便難舉行或將岳州新裁水師營大船議發十隻儘可足用再查道士洑原設防江小船以濟之大小兼資聲勢自赫守禦自固兹奉查議理合悉心籌畫伏候憲裁上張撫臺論蘄黄守禦前九江湖口情形乃蘄營千總等員塘報十三日晩投之王協鎮請成龍㑹議通報速發郁千總帶兵一百名駐扎蘄州北闗前哨偵探成龍於十四日賫書差役前往九江府知㑹逆賊實跡救援機宜俟役回另報第黄梅與九江密邇蘄州既與黄參將密議竟不申報是視地方大事為戲局乞憲嚴飭十四日成龍據協移復行詳報請守憲幷江防同知未䝉憲示十五日奉憲牌備船二十隻成龍自合遵行但民船備用終非永久之計成龍欲備價公買為緩急之需特苦貧乏不能濟事且古有水師似宜倣而行之黄參將已經裁缺赴部改選王協鎮自應速往蘄州整練兵馬黄梅空虚亦應特委專員領兵協守城池以壯聲勢廣濟無城恐人心驚恐弁兵均應駐防今日事勢以蘄州為重鎮以黄梅為藩垣龍坪武穴正用兵扼要之地布置須周密事屬萬緊綂候憲裁謹獻地里圖一紙祈察收程鎮邦已至正資助理為此具禀上張撫臺論九江事宜看得禁旅南下逆賊自然聞風竄伏目前正可從容綢繆黄梅為武黄下游門户今據該縣禀稱恐發兵駐防則城内之廬舍人民難保萬全為慮誠切細閱形勢湖口與斷腰近清江鎮與九江近莫若發兵駐扎清江鎮守與九江聲勢相連可以大壯兵氣湖口離安慶不逺或移安徽撫憲亟發精兵駐防則三面鼎峙彼此相倚可保無虞至於清江鎮似應築兩土垣兵居其一民居其一庶兵民不致混雜綂候憲裁上張撫臺論兵事守憲十七日臨黄十八日有南康之報聞郁千總領兵赴梅成龍深切心腹之憂請命守憲立刻發兵當日給散兵糧借支黄梅草銀二百兩營兵方束裝而憲命適至船隻不足李知縣帶家丁夜渡樊口十九日天明船集大小共四十隻大船給銀三錢小船給銀一錢五分文武臨江釃酒誓師頗有投石超距之勢又聞郁千總往蘄無復可慮守憲優禮相待較前逈若霄壤一應事宜守憲協鎮為政成龍與中軍料理府事如有緊要機㑹亦不敢坐視緘黙六安州麻埠地方土寇倡亂與麻城東山為鄰羅山解散餘黨無人安插三五成羣由麻城潛入東山六安之界利在守隘羅山之黨利在驅逐聞風已報守憲仰候布置羅田麻城文武不睦麻城文弱武強羅田武弱文強事處兩難調停無術九江江守書到馳報船隻目前買備尚無定局綂冀憲鑒申張撫臺請增防兵議竊照黄州地方寥廓水陸兼防原設協鎮副將一員額兵八百六十名分汛黄岡黄陂麻城黄安蘄水羅田六縣昇平之日尤虞地廣兵寡盜賊竊發自滇黔吿變地方多事麻城羅田已新設守備各一員募兵各三百名無庸協兵防守查千總羅登雲領兵五十名防守石人嘴把總賈思玊領兵五十名防守黄陂千總郁某領兵一百名防守陽邏府城止畱六百六十名各塘汛分防不足議撥羅田兵五十名防守石人嘴撤兵回協分守各塘目前江右寧州吿警大冶興國有震鄰之恐黄州沿江倍宜慎加巡防麻羅營兵不時聽候調遣兹聞督部院撥麻城營兵五十名駐防陽店但大冶興國與黄州一江相隔處處需兵防守以黄協一千四百之兵尚恐不足分防尤望蘄州畱將協力若調麻邑之兵前往楊店則兵勢愈分防汛愈疎況楊店係德安地方尚屬内地或德營撥兵五十名亦可以資彈壓也成龍本屬文職不宜越位譚兵但文武同城安危與共凡有闗於地方者未敢坐視不言綂冀憲裁與吳道臺論東征方略成龍自前月二十七夜星馳賫送偽劄後二十八日晩賊突然至陽邏不知何來飄然而逝不知何往十一月初一日忽報黄岡永寧鄉有警界連麻城東山恐陽邏之賊必然入夥則聲勢益張九江有重兵黄梅無事蘄州賴憲臺駐鎮威德宣布當自萬全止須畱兵百餘以資協守府城空虚祈㑹商王協鎮回師與成龍密議布置更祈密授方略初一日已有禀報撫憲轅門專懇協鎮旋師用藉彈壓調度再懇憲臺迅賜臨黄封疆倚賴東南安危在此一舉成龍惟拌命入山躬彰撻伐亦可紓憲臺内顧之憂也可勝拳切之至與鄭學憲書初七日忽捧憲諭諄諄誥誡念桑梓之末員篤以家人父子之厚誼感激之下倍增酸楚成龍年邁力竭沈滯苦海遥望白雲肝腸碎裂祗因撫憲恩深義重不敢云瘁地方事務各屬年少恐不諳練事事闗心至於蘄黄原名盜藪數年以來躬親稽察不遺餘力水陸頗靜近日諸兇口稱成龍養髙必不冒險敢於私臆横行若不出其意外破其惡膽將何底止扶病巴河之行非得已也即身居署中未嘗不心馳境内出入勤慎之諭真令人痛哭流涕事出無奈將若之何如此嚴密尚有諱盜不報之弊訛傳髙尚實屬本心但目前難以卸肩相度時勢或終不免此一著耳承惠種種尊者之賜不敢吿却解衣之恩當佩服終身敬望駕臨齊安未卜福星何日照臨也陞閩臬上張撫臺成龍受知遇之恩即天地父母何以踰也淪骨浹髓莫可名言昨叩别慈顔痛不能割于焉永訣肝腸碎裂䝉笑語之燕醉飽之德愧莫能承復䝉清問俯及敢不罄抒素所見聞仰贊盛治但恐芻瞽鄙言無裨髙深伏望鑒宥焉自十三年禍亂之初正憲臺蒞政之始承平日久人不知兵一時風鶴處處城郭蕩空若非憲臺鎮靜屹如山岳彼時乾坤不知作何光景也焦心勞思選將守鄂呼吸之頃轉危為安復請侍衞之兵大彰國威上緩徵之疏收拾人心試問今日之天下金甌如故者誰之力也憶昔逆氛漸逼江夏城門之外文書不能行兼以糗芻匱乏費用浩繁天降災殃淫雨如注慷慨悲傷此成龍之所親睹也尤憾奸宄喜亂内變紛生大冶煽禍於前東山接踵於後嗣江右諸邑失守南北震驚漢口黄岡麻城黄安攘臂蜂起憲臺發策指使用兵如神𠞰撫兼施保有疆宇題請恩免逆首家屬用彰朝廷不殺之仁至於脅從罔治視偽劄如棄紙反側自安又其餘事矣皇天在上毫無佞諛之辭兼以天災異常洊遭水旱請蠲請賑苦無寧晷數年來享平安之福殊不知臥薪甞膽之苦也從前功德累紙難盡目前事務較昔倍苦官民交困不忍不言如轅門瑣屑細事無闗地方安危似不必煩憲慮也圖治之大要在用人行政而已用人之權雖出自朝廷而激濁揚清之法又在封疆大臣操之但知人則哲自古為難賢良佐理易與為治監司為憲臺耳目朝夕籌畫國家大事最為喫緊如驛傳襄陽二道皆正人之選倚為心膂自可相與有成守令為親民之官時加勸勉人孰無良且八法具在敢不自愛而勞苦之吏亦宜拔擢一二以快人心以示鼓勵如夷陵知州身履危險之地黄梅知縣躬親奔走之苦日久神疲情狀堪憐前任漢陽江防修理杉船傾家助國均難冺滅倘徼特典則人人自奮於功名之路罔不捐軀報効若夫各府屬員難以盡知不敢冒昧上陳此用人之大要也行政多端目前苦累惟在軍需一事今王諭一頒時刻難緩然寓仁慈於催辦之内寛一分則軍民受一分之福一切木料油麻鐵釘等項先查經理衙門存剰幾何勿令沈匿尚需用幾何量其多寡確實分派勿令浮冒凡司道分派數目申飭詳報以俟開銷之日徹底對查則沈匿浮冒之弊可杜而吏書不敢作奸至採買米豆等項現在發價申飭司道不許牌内開如價不足另行補發字樣此係騙局陽為君子隂為小人止許地方官照時價買解造冊報銷如有浮冒者痛加駁減如大部奏銷之例則公事易辦而官民無平空墊賠之累至驛站之事苦於倒追各驛官無隔宿之糧而拖欠至成千累百號天泣地不可聽聞將何以周恤各屬吏員奔馳軍前枵腹從事内不能顧妻子外不能贍跟役衣服襤縷殊無居官之體將何以存濟排夫數減差使日增累及烟户漸已逃避將何以調停大江舟楫乃商賈血脈之路封船不已船户潛匿商賈絶跡將何以疏通漢沔一帶堤受水害百姓流亡將何以修築長江上下塘汛無兵盜賊必致横行將何以預防湖南一日不復軍供一日不休楚地居民日就剝削患在肘腋將何以籌度楚民健訟頓輒傾家敗産縱有一二富室破壞不堪將何以禁止事務多端難以枚舉此行政之大要也若督臺帥師洞庭焦勞殊甚鬚髮半白尤賴憲臺同心戮力時勤寛慰此又封疆大臣利害與共視同手足之誼矣若察核官吏下及衙役此太平之常事當今日極苦極累之時更冀憲臺寛其文法恩先於威俾各屬黽勉圖治咸樂寛平之化成龍歸休邱園遥相慶幸冗言瀆聽曷勝惶悚緣奉下問不識忌諱綂乞憲鑒可否採擇施行若吳逆㝠誅天將悔過蕩平可望憲臺凌烟之慶成龍身在草莽亦與有榮施焉上徐藩臺書兩接諭命讀至苦海陷穽之句不覺痛如刀割孰料時事一至於此曾憶去嵗五月内成龍亟言切諫明知時事之難處而瑣瑣慮及此也憲臺亦憶及此乎已往不諫來猶可追時事雖不可為而尚可及早圖之也成龍又有芻蕘之言深知不足聽而又不忍不激切言之也惟望憲臺俯閱裁酌可否實意行之爾今日財用惟有餘不足兩者而已酌盈濟虚補偏救弊之法古人行之今人不可傚而則之乎懇憲臺大舒胸臆勤惜分隂全副精神注於㑹計念兹在兹日積月累彈兌勿落他手支放必須躬親登記莫緩時刻非孳孳為利也亦以云救也若愁悶日集毁言日至一味放倒將來何以處之其緊要之法有三焉一曰覈實數傳集經承清查錢糧民賦不足幾何協餉不足幾何捐納不足幾何立為欠數著經手軍需書吏清算各項軍供應開銷幾何立為存數再將在庫在内已發銀兩徹底清查某府州縣有已發之銀某等如修理杉船之類某府州縣有發買之米如黄岡蘄水二千兩之數查明立刻催解立為存數以所存抵補所欠尚有不足幾何復查在省棕麻板片等項已用實數幾何未用存畱幾何俱係有用之物料查明交付武漢兩府因便支用一以省另買一以作實數可杜藉端盜賣之弊已聞有盜賣鐵斤者不可不蚤為之計也一一確查然後一手出入節次省減量入為出雖有吝嗇之名可免陷穽之累矣一曰親吏書朝廷之有百官百官之有吏書一也百官之内豈乏不肖吏書之中豈無賢者亦在因才器使而已耕問諸農織問諸婢必然之理一身之精力有限衆人之耳目無窮各執事分辦於下一人察核於上彼焉廋哉但不可過疑亦不可過信用人勿貳古之道也樂彼之園其下維籜古之言也好而知惡惡而知美衆吏莫不樂為之用何憂財用之不足乎若寂處尊嚴屛絶吏胥止有一二親信恐利歸他人禍歸一已種種弊生不可救藥矣一曰閱文書藩司為一省總滙衙門百官之賢否民生之休戚嵗時之水旱民賦之起解軍餉之領支俱屬望焉文書隨到隨閱隨閱隨行則百官畏其丰裁民生保其性命水旱賴以調劑民賦軍餉無守候稽滯之怨若不勤加拆閱則諸事塵積一二奸吏伺其喜怒賄行文書利斂於下怨歸於上縱財賦雖無可慮而陷穽愈不可測矣更望親近正人君子相助為理神氣日清名譽日彰功名置之度外禍患杜於將來以上瑣言出之痛腸惟台鑒焉成龍行矣承憲臺贈言讀不忍終及見詩如見我之句灑淚沾襟閩楚之隔山川之遥後事不及聞知且成龍年踰六十邇來多病又恐有生死契闊之痛矣臨别未面後㑹無期黯黯魂銷不知所云敬呈俚句誌别惟憲臺見之一如見成龍焉又為藩憲上張撫臺成龍任道日淺衙門事件亦少經䕶道查明已具結申報訖惟任府治五年錢糧軍供等項例應綂為查核近日藩司行查黄州府出具並無未完事件印結合據結申繳成龍任内之事俱已明白應赴新任且閩役扵本月十三日到黄迎接不便久為逗遛前藩司劄云回荆查明詳請憲臺批允發憑迄今未知查明詳請否尚有十六年八月内買豆一事當時議定買豆十萬石成龍具六萬兩印領一紙藩司止發銀一萬兩買豆二萬石此項豆銀黄梅領銀七千兩買豆一萬四千石景照磨領銀三千兩買豆六千石俱已交收清楚而六萬兩之印領未發今嵗領買豆銀二萬兩此項銀兩鮑同知領過一萬兩景照磨領過四千兩尚有銀六千兩眼同庫官吏收明司庫而二萬兩之領未發又有修理杉船一案借司庫銀一千七百五十兩印領三紙據前任郭同知云止收過銀一千兩此項銀兩黄州府俱已承當而一千七百五十兩之印領應行查發九月初旬姚監生赴荆清算遇藩司於江夏面云回荆查發手劄又云各領應存者存應還者還斷不貽慮言詞凄楚讀之不勝痛切僚屬之情利害闗心但朝廷餉銀理宜逐一清算為一了百當之事此成龍為藩司慮又不得不為一身慮也乃成龍痛心疾首而無如之何者也綂望憲臺始終曲全為拔救之法昨聞憲臺嚴聲厲色乃一片婆心實意教訓而藩司不勝氣短惟恐愧悔之下事件頭緒繁雜急不能理必至寢食俱廢而大事愈不可問矣成龍愚見莫若相其性情而節次清之但荆南路逺事多遲滯懇憲臺啟請糧道暫赴荆料理星夜調回藩司朝夕面商温言寛慰令其心志舒暢愁悶暫展喚經手錢糧吏書逐日清算限期歸結則錢糧之出入多寡有無水落石出縱有差錯逐案清補事尚可為也若不蚤為籌畫必至僨事苦至此極矣藩司止有一子不幸早逝㷀㷀母妻天各一方内外憂偪又無親屬解慰將來作何結局又成龍之晝夜不寧而鰓鰓過慮者也印領一日不發成龍決不敢輕離黄州赴任違限之咎甘心受之成龍執抝鄙見未知有合時宜否上兩粤金制臺禀成龍才劣數竒蹇仕粤西蠻烟瘴雨孤身七載幸䝉知遇千載一時榮膺計典格外提拔迄今回想叩别瑶堦叮嚀勿變操守不覺痛切肝腸及赴蜀任荒涼情狀滿目悽愴踏勘楠木踰山入箐奔馳百日轉秩黄丞雖屬冷曹而逼處盜藪驅除撫輯倍費心力刑名繁劇日昃不遑兼理黄漢捕務苦肩重任又兩值入京奔走雨雪又經五載䝉蔡督臺識拔特賜章服仍膺異數吿誡勿變操守一如憲命成龍不覺痛切心腸無端滇黔起禍南服不靖成龍於時星赴軍前代理武昌事務適量移建寧守張撫臺畱任鄂郡因浮橋一案㕘黜值麻城土寇生發委任撫𠞰題授黄州守一切軍需躬親料理神疲力竭南賊潛入黄地煽惑肆逆領兵進𠞰焦心勞思鬚髮盡白事平乞休屢詳未允勉力供職以報兩臺今日之知遇即以報憲臺當日之知遇也更瀆陳者目今西南鼎沸而東粤一省隔斷滇閩之聲援天下安危所繫憲臺一力保全真所謂朝廷封疆大臣矣自豫章吿變粤東孤立一方四面受敵竊甚憂之幸江右蕩平則東粤軍威倍壯頃閱邸報西粤撫軍克復梧郡須善守之平樂灘髙水險不便進兵宜密訪别路出永州一帶可以直抵桂林舊右江黄守道素蓄膽略陷入賊中必有歸意倘得内應孫孺子不足謀也舊線將軍未卜存亡此老若在可與黄協力至於馬雄成龍料必附賊羅城温守備久在標下習知馬營虚實倘起兵栁羅間襲取慶逺猺獞聞風響應是亦摇動彼地之一策也惟恐細作難得其人耳成龍治蘄黄頗稱寧謐荆岳相拒邇來鄖襄多事亦已合兵㑹𠞰江右寧州失守不過土寇作祟無有大患秦中賊勢略已斂跡天下事全賴憲臺諸大臣盡心區畫兵不可輕動機不可輕失相度時勢戰守自有機宜成龍愚瞽下吏沐恩髙厚夢寐難忘兹因便羽特將成龍前後艱苦備陳兼述時事以表鄙忱臨禀不盡瞻切八閩書公上康親王求罷㔍夫啟康熙十九年正月二十八日據福州府知府蔣璷海防同知蘇佳嗣糧捕通判林有蘭呈據閩縣知縣祖寅亮侯官縣知縣姚震㑹報稱本月二十四日䝉撫院傳奉王諭令職等照舊撥給各旗官兵㔍草人夫職等以未奉院檄難以撥派民間隨因出師行逼職等不得不再行請示至二十七日各旗官弁兵甲填塞縣堂刻著職等撥派㔍草人夫職等以此項人夫前係督院具題禁草未奉上文不敢擅撥當經面禀參贊大臣倂各司道於二十八日公同商議摘叙原題事理詳悉啓知王爺聽候批示間詎合城内外諸色人等傳聞仍取前項人夫以大兵雲集徭役繁重民命不堪突然廢業罷市喧泣街衢事闗地方理合詳請乞賜示禁庶地方得以安堵等緣由到司道據此職等隨即傳喚保甲人等查詢據稱大兵㔍草人夫子民竭力已久前此曽荷䝉王爺洞鑒軫念小民困苦特准豁免實䝉再生不擬昨二十七日旗兵復向兩縣取撥小民典鬻已竭委難再支因此驚惶廢業不得已瀝陳下悃號乞憲轅祈轉懇王爺等語職等即曉諭令其照舊開市安業外但閩省殘黎困苦已極業䝉垂鑒豁免各旗㔍草人夫百姓邀恩已久今應否仍准照前免撥此出浩蕩洪慈職等仰邀簡命身任地方為民請示伏望鑒裁施行再肅上康親王啟竊照國家之安危由於人心之得失而人心之得失在於用人行政識其順逆之情而已孟子曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也是國與民相倚之切千古誠不可誣載諸簡冊可考而知也恭惟我親王為國家之大宗實維城維翰之所攸賴因滇黔背德東南煽動皇上命將出師審浙閩為東南重鎮有藉於親賢熟知親王仁育義正可當大任授閫外之寄以平定東南是即太祖太宗世祖章皇帝之所式憑也任大責重非比尋常於時我親王毅然受命簡師閱旅平復浙疆直入閩闗醜類望風効順海逆逺遁救斯民於水火之中登之袵席之上神武不殺古之用兵無以逾也數年以來小民歌頌戴髙履厚莫知所報十七年海逆偶爾犯順旋即驅逐而小民獲有寧宇無非我王仰體宸衷愛養斯民之所致也邇來京師地震太和殿災皇上憂勤惕勵下罪已求言之詔惓惓以愛民察吏為念且北直江南山東河南處處吿饑賑濟之㫖日頒豈不知滿漢兵馬從征日久勞於王事軍需浩繁内帑吿匱難於供給而愛民心切未嘗因之而少置也我王朝廷宗臣鎮靜海邦地方寧謐皇上少紓宵旰之憂者惟親王是賴我親王忠君愛國體皇上之心敬天畏災屢諭滿兵毋擾百姓宣布恩㫖下痛民隱上徹宸聰是又太祖太宗世祖在天之靈所喜悅也職司成龍年逼桑榆受國家知遇之恩無以報答惟審人情順逆之故敬獻狂瞽之言祈有禆於國事伏願親王俯念國與民相倚之切以一夫不獲曰予之辜一吏不法曰予之咎為保邦致治之本為回天慰祖之實以尊朝廷以服海醜莫是過焉成龍章句腐儒不識治體冒昧瀆陳伏乞恕其愚䝉察其誠懇實地方之大幸也惟親王採擇施行上吳撫臺論閩疆事宜成龍山右腐儒未習軍旅然謬任閩職已幾一載切知生民之塗炭皆由海逆之憑陵此賊一日不滅閩疆一日不寧憲臺勞心焦思圖報朝廷知遇之特恩拔救閩省之殘黎必殱除海逆以底蕩平因之殫心籌畫以難與慮始之見為一勞永逸之舉修理戰艦製造軍器夏不避暑冬不避寒且浹洽歸誠交驩平勃一片苦心未嘗一刻忘朝廷也兹戰具齊備厲兵秣馬擇吉興師將見澄清海宇乂安邊疆在指顧間也成龍雖屬毦瞶踴躍懽忭慶太平之有日矣然不揣狂瞽為攘外必先安内之議未知有當憲鑒否敢敬陳之一省㑹根本之地不可不慎也閩民姦詭而好亂多圖徼倖為不終朝之計逃兵匿寇竄伏閭左乘便思逞遷民窶夫室家仳離一呼易叛歸誠者雖多革心而歸農者豈盡化服憲駕南征腹内空虛么魔窺伺實繁有徒雖王師靜鎮可保無虞而南臺種類雜處人心易為煽動倘有小警未免煩憲臺閫外之慮此林鼎陳德楓二案似當早為處决以絶觀望者也一上游形勝之區不可不固也延建邵武為八閩咽喉米穀所由輸運商賈所由流通邇來山寇出沒建郡之浦陽崇甌等縣咸受荼毒延邵二郡順昌光澤均遭侵犯至於杉闗要路民不安枕商旅視為畏途各協守兵惟知按月索餉不知所守何地所防何賊且江紀楊一豹二賊日以歸誠為餌而焚掠倍慘憲駕南征彼復何顧忌雖尚將軍駐建可恃無恐而延邵之間鞭長不及二豎必更有一畨計算目前古田已藏逆種永安復報寇黨順昌尤沙尚畱燃灰倘有小警又未免煩憲臺閫外之慮此順昌杉闗似宜各設防兵三百名以資守禦尤沙似宜分兵數十名以伺釁隙者也一各營分守之兵不可不練也國家養兵期於禦侮未有止以迎送往來守汛瞭望空縻糧餉為者近稽兵籍郡有鎮守邑有分防星羅碁布如常山之勢然細加察核或調赴漳南或撘配水師或分防塘汛在伍之兵實有幾何憲駕南征各營必逸豫髙枕惟計餉銀之完欠誰復騐弓馬之生熟倘有小警在伍之兵寡而未必精在汛之兵呼而未必應又難免憲臺閫外之慮似宜為綢繆之計亟加申飭務覈在伍實兵若干名時加操練寡而期精在塘之兵若干名日加稽查呼而期應各成一枝勁兵互相聮絡以通聲氣以資禦侮以備調遣者也至於海上形勢憲臺久已洞悉成龍何敢妄陳戈矛所指勢如破竹以紓九重宵旰之憂酬知遇之恩建葢世之竒勲鐫功名於鼎鐘此成龍之雀躍欲狂者也統祈憲鑒候吳撫臺禀憲駕出征為國受勞成龍逸居省㑹無刻不厪諸懷毎閱南報陟天馬屯崇武披草萊翦荆棘驅除游逆安撫降丁為水師先聲憲臺社稷臣也破海壇越江隂戰湄洲泥澳之間真可謂一月三捷矣三月朔日厦門露布除兩朝之逋寇建葢世之竒勲從此海不揚波民獲寧宇用紓九重南顧之慮成龍喜躍如狂更竊有請焉臺灣尚在宜為善後之計或云得其人不足臣得其地不足耕此眉睫事也久之必為厦門憂武侯擒縱之策正在此時銅鼓之威海内咸仰望焉成龍不識時勢謬陳一見乞憲裁酌畫國家久安長治之圖萬世將倚賴之矣但憲臺冒隂雨觸海風晝夜靡寧聞憲體清癯成龍寢食不安區區下情望為朝廷保重綂祈憲鑒上姚制臺禀本月初三日捧讀憲檄為大計一案以和衷為惓惓是誠大臣之體朝廷之福也成龍老邁迂儒不學無術厯仕二十年縱觀古今名賢身任國家大事無不同心協力相濟以有成者况閩省之危岌為何如地閩民之殘疲為何狀也謹將大計一事緣由備陳之部文大計以一月為限期成龍於十月初旬患病吿假而大計賢否髙藩司差役守催成龍以老病列款移司通詳則大計重典成龍事不能理也適髙藩司有楚省之議撫臺以揭内不便列名十月十九日催成龍議事即以藩篆相付成龍以病辭未允彼時二十五日大計之限滿矣二十日催迫任事二十一日受篆二十二日即以大計請命撫臺隨詢主稿之例成龍未經其事即傳吏書問云軍政乃憲臺主稿大計乃撫臺主稿也復檢查舊案厯厯不爽撫臺方諭吏書速行此成龍在坐天日共鑒者也成龍又以地方多事屬員為軍務所苦且一年之中已被劾八員此番似難過刻乃成龍所力懇者二十三日即開列三員通報以副限内之舉是大計緣由厯厯有案可考者也憲臺廓達大度敬賢容衆同撫臺以定海安民為己任是今日閩省之封疆朝廷所倚重士民所待命百官所畏威者憲臺撫臺也數年來勞朝廷數十萬兵馬費朝廷數十萬金錢全望㑹師大舉以紓朝廷宵旰之憂以解閩民倒懸之苦兩憲功名埀於竹帛福䕃綿於子孫在此一時矣和衷之論憲臺盛德事也成龍愚見以吹壎吹篪之誼原無彼此爾我之形和衷之美可併不有也成龍耳聾眼花不似人形龍鍾可厭久應在廢棄之列何敢與言國家事但䝉憲臺知遇之恩知之何敢不言言之何敢不盡臨禀悚切上姚制臺議捐濟禀泉郡米價騰貴兵民交困䝉憲臺特疏題請捐濟救此一方誠飢溺由已之盛心也復奉憲檄設立站運先動憲捐銀五千兩司道府捐銀五千兩在省買米五六千石星夜運泉如救焚溺實為朝廷兵民實為朝廷封疆籌畫周詳成龍奉命竭蹶遵行撫憲幷念泉郡米貴協濟難容刻緩諭查延建邵三府從前發餉買米尚有四萬石委糧道星往清理督運又恐府縣米石一時難清聞餉銀四十萬將至諭糧道於省餉十五萬内畱三萬兩迅為買米期於無悞急需是撫憲熱腸同憲臺苦心兩地合符也值省㑹米價亦陡至二兩一二錢以外成龍虞在省買米則米價必為興化之續若候上游米到又難副目前之急隨懇撫憲諭借糧道十九年秋糧米令閩縣備米一千石侯官縣備米二千石成龍凑米二千石俟上游米到陸續補還一時協力辦備站運可有頭緒也嗣䝉憲委線副使來省催銀買米成龍區區下情有瀆陳者省米數日内減至一兩有零若經採買勢必仍前騰湧省㑹貿易者衆力田者寡嗷嗷待哺將何以濟此其可議者一也大兵月折料穀二萬石毎石折銀六錢五分目前因米穀價貴勒不允折費盡委曲若米價再騰必索本色則每月二萬石料穀將何以支其可議者二也各道捐銀事屬急公誰不樂從但成龍與各道朝夕共事頗悉底裏如李糧道陞任蒼梧資斧吿窘王驛道陞任南臬尚負債息隱隱在聽聞間王運使陞任嘉湖日用亦甚蕭索楊學道蒞任未久當此三空四盡無不捉襟露肘夙荷憲臺矜念至於在外各道成龍未悉知然值軍興浩繁物力吿匱之時一舉一動難逃憲鑒若夫各府認捐勢必索之屬邑私派民間為偷兒竊取之計其可議者三也前䝉憲恩代解泉餉一萬餘兩因協餉未至久未清還目前司庫匱乏成龍苦情不敢上陳大兵毎月折料穀銀八千兩折草價銀二千兩月餉銀四千兩共需銀一萬四千兩東那西補心血嘔盡竊思成龍初任粤西令止徵地丁銀一千二百兩次任蜀牧止徵地丁銀九兩再任黄州錢糧徑解藩司從不知收放銀兩成千累萬為何事忽遭此火坑苦累欲死此又成龍之不敢議者四也憲臺寛洪大度體恤下情成龍敢不披陳肝膽以候裁奪成龍更有請焉泉郡兵馬雲屯料在省數千石之米真如一杯之水但相時度勢或米價稍平清查壓欠餉銀如數補足則月餉無缺民間積米自出或可綽有裕餘也憲臺嚴守一介海内咸知慨然以萬金自任無非為此朝廷兵民朝廷封疆成龍豈無人心甘為鄙吝下流惓惓鄙懷惟祈審時度勢而已綂乞憲臺鑒酌焉附八閩藩司紫薇堂一聮累萬盈千盡是朝廷正賦倘有侵欺誰替你披枷帶鎖一絲半粒無非百姓脂膏不加軫惜怎饒得男盜女娼附五顯嶺山到窮時現許多峭壁層崖歎富貴功名何似林禽野鳥路逢狹處經無數行雲流水任盤桓談笑休孤翠竹蒼松補遺簡訟省刑檄訟獄為民命攸闗聽斷讞決務合情罪使民無寃然後能使民無犯本司為通省刑名總理法紀專司而簡訟省刑載在勅諭所謂刑期無刑聖意即經意也值今時屆農忙亂後孑遺方得歸農樂業大小衙門俱應停訟現䝉督撫兩院給示曉諭逺近諒已具聞兹除一切民間小忿爭角細事槩不許濫准拘審騷擾妨工幷擅擬罪贖婪追外如有闗係重大或由上發事件必虛心平聽俾吐真情毋逞嚴刑以求必得至引用罪名必照律例方稱明允倘或上下其手出入任情是為刑罰不中民無所措安望簡訟省刑以符功令合亟申飭仰府官吏查照事理即便通飭所屬自輕罪細故簡刑停訟外其有應行審理及奉發等事務平心剖決應照律者照律應遵例者遵例擬議妥確獄不滋煩本司即以此定考核若有苛酷淫刑草菅民命及徇私賣法巧為輕重者本司徑行平反改正仍以舛錯與故出入人罪報㕘決不姑容毋以身先嘗法也嚴戢衙蠧檄衙役犯贓首嚴功令本司法紀攸司剔蠧除奸尤為急務自下車之始即已畱心體察知八閩地方向來叢姦藪惡咸借衙門為䕶身之符其積年盤踞公門者為害尤甚葢緣巨猾老奸機深術巧始以甘言微利攄忠獻勤而不肖有司遂以心腹相托或為掊克之謀主或作暮夜之傳宣猫鼠同心呼應捷于影響由是小民愚者畏其威福狡者藉以鑽營閭閻脂膏從而吸盡良民蟊賊莫酷于斯况閩地自變亂之餘萬户凋殘豈容復縱此輩貪狼任其吞噬本司細行密訪業已亷得其實如採辦軍輸則濫加科派取用夫役則賣富差貧以致詞訟為之線索惟利是圖是非顛倒者所在有人本應指名立挐蠧處官揭姑念地方遭亂法紀久弛未經剴切申明毋怪冒攖禁網姑已往不究外合亟申飭仰該府官吏即便移行所屬㕔縣嚴諭各役人等知悉務各痛改前非洗心易轍奉公守法保守身家如有怙終不悛者本司三尺具在斷不再行寛假官以貪縱揭㕘蠧以大法重處速宜猛省毋貽噬臍申飭招格檄照得臬司乃刑名總滙招由悉闗題奏重案口供讞語務必簡潔至當難容厖雜舛謬毎閱各屬申詳招由如欵贓之案多有不入原欵問答口供鋪敘冗長牽混葛藤贓無指實甚至招冒議照前後矛盾不成招體倘有舛誤干係匪小合行頒格通飭備牌仰府嗣後承讞贓欵之案務照格式首列原欵次列前件問答口供後空數行以備本司親訊標謄招情必期簡明毋得繁冗仍移行㕔縣一體恪遵各具遵依報查申飭差擾檄衙蠧肆害法所必誅本司總持風紀首以除蠧安民為事豈容狐輩假威公行無忌此緣該府官吏玩怠從事視欽部憲重大案件如泛常毎至屆限猶然寢閣不報不結羽檄交催等為故套不得已而差役守催葢期亟完公務亦所以免該有司遲悮之㕘罰也該府若能體諒勉強差催苦心事事如期報結捷如影響何用煩本司出差以滋繁擾近聞司差奉票在外或借端需索者有之或咆哮恣肆者有之殊干法紀本司法行自近將以盡剔大小各衙門之蠧豈可令本司衙門養蠧不除念以往未有確據姑從免究合亟飭行仰該府官吏凡奉行大小事件務上緊完報除尋常詞訟等事原槩不差提外遇有萬分緊急重務恐致貽悞不得已而出差者若該役有犯需索恣肆等弊該府立行據實具文押回赴司以憑重處設猶拘投器之忌即密具禀揭報明另差挐究倘再隱忍不言是必該府有何隂事俾操短長因而顧畏首尾本司察出先以該府委靡無能揭報法在必行務各恪遵本司將以此覘該府之風力才幹矣設立木籖檄本司奉行欽部憲案俱定有嚴限少或逾期㕘罰立隨其後前緣各屬玩愒成習任呼不應往往事致違悞猶慮差催滋擾是以設為風火雷三催號票俾得次第報完及雷票去後猶逾限不到即不得不行差提現行之法如此各屬果能上緊料理何事不依限完結何苦必煩遣役此差役到彼即極守法不敢需索豈能免于一番供應盤纒當兹賦繁財匱之時該府㕔經承亦安所從出本司興念及此雖在重處玩法之下又不覺為之體䘏今特再設木籖以代差役合先飭知仰該府官吏知悉凡木籖一到定限幾日務必將所催事件著該承親賫回覆若事已妥當不煩駁詰該承尚可法外從寛如或苟且塞責仍不能完結除責懲外再差役押還另限妥確回覆結案倘若木籖到後猶若罔聞不如限完報是該府已不自愛立即選役星夜鎖挐經承先以重法處治隨將該府違玩職名揭報法在必行斷不姑忍各屬其各振刷精神痛袪積習毋負本司設法體諒諄諄誡諭之意于清端政書巻四
