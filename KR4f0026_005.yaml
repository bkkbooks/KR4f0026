body:
  text: 于清端政書卷五兩江總督于成龍撰畿輔書初任直撫請陛見疏恭請陛見以盡微誠事臣本草茅下士濫叨祿秋由知縣而厯任府廳十有餘載寸長未見實切曠瘝之愆乃於三年之內荷蒙皇上隆恩由楚省監司厯遷閩省藩臬此誠恩逾望外迥出非常履任以來惟有朝夕竭蹶以圖報效實恐庸劣未能稱職今復荷新綸不以臣為譾劣畀以直撫重任臣捧讀之餘自揣下乘菲才何堪畿甸重寄然聞命自天又不敢控辭有負特簡至意竊念臣屢受皇上知遇洪恩久切覲闕之念今既謬叨皇恩優升巡撫且自保定前赴京都計程止三百餘里與他省相隔迢遞者不同況直𨽻係畿輔重地連歲荒旱頻仍黎庶困苦臣係庸才必得天語指示庶足以撫蒞兹土仰祈鑒臣愚衷俯允陛見使臣得以匍匐金階瞻睹天顔躬聆天語提命即便回任盡心供職以仰副皇上簡任至意伏乞睿慈俞允施行奉旨于成龍簡任巡撫正資料理不必來京陛見該部知道報災傷請蠲錢糧疏恭報勘明災傷分數事該臣看得順德府屬之內丘唐山任縣真定府屬之真定衛順天府屬之涿州武清房山昌平永清大城寶坻良鄉東安涿鹿河間府屬之交河阜城青縣天津共十八州縣衛各被旱雹災傷臣據詳報情形業經具疏題報在案今據守道詳稱各屬被災地畝分委廳印官員踏勘除涿州房山良鄉昌平寶坻五州縣勘不成災外其內丘唐山任縣真定武清永清大城東安涿鹿交河阜城青縣等十二州縣衛俱經勘明成災備造册結呈送理合具題隨該户部議覆內開奉旨這本內議免被災地方著差爾部司官一員作速前往踏看具奏餘依議欽此隨差郎中額爾赫圖前往踏看去後今據額爾赫圖疏稱交河阜城二縣原報被夏旱災十分九分七分地二千七百六十六頃九十二畝麥收既少秋田收穫歉薄應將此二縣被災分數如其原報唐山內丘任縣青縣真定阜城涿鹿等七縣衛原報被夏旱災十分八分地六千八百九十六頃七十五畝麥雖收一二分秋禾已收五六分應比原報分數減其二分大城東安永清武清四縣原報被夏旱災十分九分八分七分地九千一百七十七頃二十八畝麥收雖少秋禾已收七八分麥田所種禾苗又得收穫應將此四縣具報被旱災不準算入其東安大城永清三縣地內麥與秋禾兼種並不將麥地秋田分晰俱作夏旱災具報應一併交與部議等語又查報文內天津衛被災田地坐在青縣此地應照青縣一體等語查各屬被災分數既經郎中額爾赫圖踏勘明白俱照額爾赫圖所議其東安等三縣並不分麥禾秋禾俱作夏旱災具報不合但未開原報官員職名不便遽議相應行文該撫開列職名具題之日將該撫一併查議可也等因具題奉旨這本內各縣地方自去年被災民生困苦俱著照原報分數準蠲免其東安等處地方官職名免察議請增驛站工料疏衝驛繁苦已極草豆騰貴異常亟請加增工料以救危站以速軍機事該臣看得直𨽻驛站錢糧十分裁四之後每馬一匹日支料豆草麩額銀五分四釐康熙十七年以前連歲豐稔僅足支應十七年秋收微薄各價已昂至十八年荒歉更甚時值日益騰貴較前不啻數倍原定之銀不敷用度所有額設夫役工食與廪糧飯食并買補馬價及煮料柴薪等銀又皆必需之項無可通融直屬當天下之衝往來差使晝夜絡繹多係緊急軍務必須臕壯馬匹以資馳騁日需料草勢難減少而額銀不足各州縣驛賠墊應用日難一日紛紛告苦是以巡道僉事吳元萊有暫增站銀之詳臣批守道參議董秉忠確議據稱直𨽻地方係萬國總滙之區驛站非他省可比今連歲凶荒衝途各官賠纍難堪亟當變通以濟驛困請將各驛所用豆草照時辦支除原定銀數之外其長墊之銀於荒歉價貴之時暫時準給俟豐年停止臣思值兹度支匱絀之際內外臣工惟當生財節用以資不逮何敢建議加增但豆草之騰湧已經二載衝途之賠纍亦已二載靡不筋疲力盡矣如不速為軫恤各驛勢將不支必致馬斃夫逃貽誤軍國重計此臣不敢不以上聞也既據兩道呈詳前來理合具題請蠲宣屬衝壓地糧疏請豁水衝沙壓地糧以廣皇仁以蘇民纍事該臣看得宣府所屬西城與懷安蔚州等衛邊隅土瘠逼近渾乾等河有水衝沙壓地畝小民包糧為纍經前撫臣金世德於康熙十四年十月內具疏請豁部覆以厯年錢糧俱係報完不係未完拖欠仍令照舊徴收在案但查糧從地出地既積荒而厯年錢糧仍報全完者是皆小民竭盡脂膏以包賠者也自部覆之後又厯五六年矣除稍有可墾者已陸續勸民墾種外其實實衝壓不毛之地人力有所難施煢煢小民包糧年久困苦益深漸至徴比不前催呼莫應在地方各官莫不以考成關切而無術彌補屢以未完開報矣前撫臣稔知其纍苐以時值軍需孔亟數年未得即為覆請故於伏枕彌留之際猶惓惓以此為未了之餘衷而遺疏乞蠲仰邀聖德也臣履任後廣咨民瘼當經檄行查勘兹據守道參議董秉忠詳稱口北道李如桂公同廳衛各官逐處勘明懷安衛實有水衝沙壓地一百九十一頃二十一畝零蔚州衛實有水衝沙壓地三百一十八頃二十三畝零西城實有水衝沙壓地三百四十三頃六十畝零又東城地方亦有水衝沙壓之地緣從前猶望水退沙消勉力墾種以完正賦是以十四年未經開報乃年來衝壓益甚耕耨無期故官民激切呼籲亦經口北道親詣勘明實有荒沙地九百五十五頃二十九畝零取有該道廳衛印結并造册呈送前來臣思民之有地原藉所産以資生今地荒而糧存不特無以資生而且以為害也邊徼窮黎綿力幾何奚堪永逺包賠此數處之荒糧一日不除則數處之民生一日不遂雖目今師旅未息需餉尚殷但逆氛殄滅殆盡唯遺黔滇餘孽指日蕩平此後軍需似無虞於不足而合計四處荒地本色糧不過三千餘石銀僅一千餘兩免之則涓滴之損似無關於國計而數千餘户貧民得免包賠實受惠於無窮仰祈皇上特沛洪恩準與豁免俟水乾沙退之日勸墾輸糧庶荒邊僻壤之民永蘇其纍頂感皇仁於生生世世矣既據該道呈詳前來除册結送部外理合具題隨經戶部議覆查得宣屬西城等處水衝沙壓地畝事關永蠲錢糧不便遽議應仍令該撫遴委賢能道官一員親詣踏勘果否水衝沙壓據實具題到日再議可也又經戶部議覆內開該臣等查得先據直撫于成龍將宣府屬懷安蔚州二衛并東西二城水衝沙壓地畝錢糧具題請豁臣部以事關永蠲錢糧行令該撫遴委賢能道員親詣踏勘去後今據該撫疏稱遴委天津道李玠踏勘懷安衛實有水衝沙壓地一百九十一頃二十一畝零蔚州衛地三百一十八頃二十三畝零東城地九百五十五頃二十九畝零西城地三百四十三頃六十畝零取其踏勘官員印結具題請豁前來查懷安衛等處地畝該撫既稱委官勘明實係水衝沙壓等語此項錢糧應準其二十年為始照數豁免其地畝仍令該撫速行設法開墾徵糧可也等因具題奉旨依議請禁訐告以正名義疏有司疊訐上官初為謀陷詐贓之舉漸成反噬挾制之風流害無已名義與國體俱傷謹特疏糾參伏乞睿鑒以肅法紀以昭體統事竊照上下者名義之所關舉劾者國體之攸重自督撫以及監司至諸執事上下名義昭然不容紊越若三年計典與薦舉必不可停等案並不時糾參事務必司道府據實款揭合之督撫訪聞無異方敢列疏入告權不旁貸事不獨制上下相維名實俱存法至周詳盡善矣未有如直屬之有司蔑視王章逞訐上官相沿成習名義廢弛體統倒置之甚者也臣六月抵任檢結舊案如任縣已故知縣施埏寶為申明威勒等事一案訐報大名道范永茂順德府知府殷作霖廣平縣已故知縣夏顯煜為利債之罔取等事一案訐報大名道范永茂署廣平府事河間府同知周從謙夫以前任撫臣之清慎明決貪墨從無漏網法紀凛然又安容屬員縱吻肆訐無忌糾劾之權操之下吏蓋以施埏寶夏顯煜侵欠庫銀盈千纍萬謀陷詐贓已死不可復詰是豫道府以不得不揭撫臣以不得不參之勢也無如效尤成風恬不知怪及臣任事數月惓惓以驅除貪吏亟救民生為念以少酬皇上知遇之特恩擇其已甚於百人之中據道府揭報略劾數員以示懲創以豫改悔隨有永清縣知縣萬一鼒依襲故轍將霸昌道沈志禮列款開揭臣業據文入告在案此猶從守巡兩道轉報者也其中恐有勒索情弊尚未可定已行守巡兩道會訊未幾而獻縣知縣喬國棟訐河間府知府徐可先同知周從謙之文又至矣內稱兹因嚴禁火耗錙銖盡除中秋無有餽送節禮府廳因此懷恨藉魯道村崔成失事一案明知是交河地方捏誣獻縣且謬執别人糧票枉稱獻縣等語附訐知府徐可先同知周從謙十六十七等年各款正在查閲間據守巡兩道回稟前情除批守巡二道會審確實另報外臣查得魯道村崔成家被盜乃本年三月二十一日事也崔成赴部報獻縣魯道村失事喬令以交河相推抗不開具職名天津道委徐知府親勘據實開報喬令輒肆汚衊之言致徐知府結舌不敢定案限期久逾事無定局天津道復委周同知往勘查魯道村原屬獻縣地方因當日同周家莊髙官上夫莊等村誤圈入旗下共地二百七十餘頃交河還獻縣段家莊等村共地二百七十餘頃嗣後魯道村為旗下圈莊厯來未設保甲稽查亦無失事相沿已久兹忽有崔成被盜一案喬令堅不承認周同知細問交河還獻縣段家莊等村一切逃盜俱責之交河而誤圈獻縣魯道村之地逃盜等事何獻縣可脫然無涉也轉報天津道開揭獻縣遲延職名臣據參在案此乃地方公務恩讐無可巧施何輒以未送節禮為辭托拾往事公然具訐且不由守巡兩道徑以驗文封送似此悍藐將來道府必懷投鼠忌器之嫌而隱忍養姦法紀大不可問矣各屬有司包藏禍心任意橫肆剋剝小民道府決不敢有過而問者法紀頽靡將何底止我國家數十年振綱飭紀大小臣工無不以名義自持何容此干名犯義之輩挾制上官壞綱亂紀於畿輔之地也倘海內效尤風俗人心為之大壞伏乞敕部嚴議如道府不法而撫臣姑容恣害應作何從重治罪而反噬挾制之員作何處分於以申飭法紀嚴戢體統大義明而國體昭以養國家久安長治之休所關匪淺鮮矣隨該吏部議覆查道府不法督撫姑容不行題參者有降三級調用之例應無庸議至凡官員若上司有將伊勒索苛求之處應於未將伊列款揭報糾參之先首告將伊列欵揭報糾參之後乃將上司列欵首告者因將伊揭報糾參之隙捏款首告亦未可定相應定其處分之例查定例內開京察大計降級革職官員如有將考伊官員以受賄侵勒控告者將所告之事不準行本官有冠帶者革職無冠帶者交與刑部議罪等語嗣後凡官員將伊列款揭報糾參之後乃將上司列款首告者應照此例將所告之處不準行治罪俟命下之日通行直𨽻各省遵行可也奉旨依議急救口北飢民疏謹陳急救口北飢民之議仰祈酌行事該臣看得宣府所屬衛堡連年歉收民多困苦今歲夏秋東西二城宣府前衛懷安衛萬全左衛又被旱雹等災深井堡蔚州衛秋間亦被雹災經臣委員勘明成災分數先後具題在案今據守道參議董秉忠詳議緩徴平糶二款前來臣查宣屬徴糧多係本色今疊被災傷籽粒無出必須糴米完納值此飢寒交迫之際災黎已難存濟而重之以催科臣恐徒煩敲撲究竟不能輸將雖國儲綦重不敢輕議全蠲然民命所關又不敢不仰體皇上愛養羣黎至意急請軫恤也臣查宣屬每年約徴本色糧九萬石其每年支放不及五萬石所徴者多而所用者少康熙十八年奏銷實在糧共計二十七萬七千餘石除十九年給散蒙古併支放官兵外仍有存貯糧二十萬石康熙二十年儘足支用而尚有餘十九年應徴新糧又約計九萬石此糧徴完不過積留在倉無有支用之處若將災傷地方分别輕重酌量緩徴被災之民實沾無窮之惠今宣屬被災之處惟東西二城為最所有康熙十九年額賦除折銀照數催納外其本色糧一萬三千餘石祈請恩準本年先徴十分之三其餘七分緩至明秋帶徴至於前衛及懷左蔚深四衛堡雖俱被災未至如東西二城之甚本年折銀亦照數催納其本色糧三萬三千餘石本年先徴十分之七其餘三分亦緩至來秋帶徴此不過暫寬時日其於額糧毫無虧損而稍緩一分之追呼小民即受一分之𢎞濟不致立填溝壑矣再查東西二城厯年所徴糧石支銷無幾現存之糧約計四萬五千餘石久貯在倉將有浥爛之虞今二城罹此重災百姓粒食維艱若將陳積之糧平價出糶不許外境興販不許富戶多糴祗聽災民計口糴買米價既平民間易於得食雖遇凶年或可安鄉井而無流移之苦亦救荒之一䇿也臣謹具題再為口北飢民題請急賑疏二城飢困已久三冬民命垂斃懇祈題賑亟救殘黎事該臣看得宣屬地方連年歉收今歲東西兩城及萬全左右前懷蔚保柴溝西陽等處俱報夏災臣到任後勸諭守道及口北道倡率官紳士民共捐銀一千三百八十二兩四錢米七百七十九石九斗委保定府同知何玊如前往分賑外尚存銀二百八十三兩八錢三分逮至秋間東西二城及前懷蔚左深井等處復被災傷據守道詳議將東城等處被災地方本年應徴糧石分别緩徴及將積貯糧石平價出糶以救凶荒臣於本年十一月初九日具疏題請此時該地方官尚未報有飢死之民也今於十一月二十七日據守道董秉忠詳稱據南路通判陳天棟報稱東西二城春夏以來民食草根木荄逮至秋冬西成無望捐賑無幾向之根荄不可復得近於二十餘日之間飢死者不下數十人即城坊鬧市每日亦偃仆幾口等語臣展閲至此不勝憫惻伏思臣題平糶之疏見候部覆即荷皇仁允臣所請尚須二十餘日止可救來春而不能救目前亦止救稍能措糴之民而不能救囊無一錢殭卧待斃之民即再疏請發廩賑濟其間下部議覆候旨允行亦須一月此一月之內民之飢死者又不知凡幾矣臣與守道董秉忠共相籌度東西兩城既無常平倉穀可動雖有從前勸捐存剩之銀然止二百八十餘兩為數無幾欲再勸捐一時銀米不能驟集而又迫不能待再四圖維别無良䇿惟有西城陳積之糧臣已題明平價出糶以救災荒今西城飢民奄奄一息勢須急為拯救不能稍緩須臾臣仰體皇上惠愛元元至意委保定府同知何玉如等馳赴東西兩城查有實實飢困不能謀生窮民動支前項倉糧每名口賑給二斗俾此垂危之民少延月餘之生其前衛并蔚深懷左等五處據守道詳報俱有飢民臣檄守道轉行同知何玊如等俟賑完兩城之後將此五處飢民查明亦動各本處倉糧給賑至動過糧石容臣通查各屬積貯無項舊銀照依宣府前衛經變康熙十七年以前倉糧之價按數抵補如或不敷再行勸捐補足至各處飢民除目前賑濟之外其善後之舉容臣酌議另疏題請今據守道呈詳前來理合具題隨該戶部議覆查該撫既稱東西二城及前衛等五處飢民委官賑濟應行該撫速將存剩米石動支賑救務須仰副皇上愛恤飢民之至意毋致離散仍將賑救過飢民數目動支米數報部查核其動過米石該撫照時估價勸捐抵補可也奉旨依議謝賜書經解義疏恭謝天恩事康熙十九年十二月初七日臣提塘李懋功自京領齎皇上頒賜書經解義到臣臣隨恭設香案望闕叩頭祗受訖伏思皇上至德生知體執中於堯舜聖修典學懋建極於商周念兹疏庸咸宜訓迪頒賜成書俾有矜式臣成龍雖以固陋之資淵微莫測益不敢不夙夜小心講求古訓期於仰副我皇上砥礪臣工之盛意焉臣謹具疏奏謝再請陛見疏微臣躬率舁請夫役前赴沙河路由京都謹請陛見以遂夙誠事臣以譾劣菲才謬蒙皇上知遇授以巡撫巨任聖德如天感激無地臣於蒞任之初具有恭請陛見以盡微誠一疏奉旨于成龍簡任巡撫正資料理不必來京陛見該部知道欽此欽遵不敢再疏陳請然瞻天仰聖之愚忱刻刻在懷今工部題明舁請二位皇后梓宫夫役一萬八百四十名咨臣揀選齊備親身率領於二月初八日前至沙河臣俟屆期躬率人夫趨赴應役伏思臣前疏恭請陛見未荷皇上俯允今自保定前赴沙河路由京都咫尺闕廷益切覲聖之念且臣才識庸常膺兹畿輔重寄必得天語提命俾知砥礪臣謹再疏恭懇聖恩伏乞睿慈俞允施行奉旨于成龍著陛見該部知道陛見恭謝疏恭謝天恩事竊臣因督率舁請二位皇后梓宫夫役至沙河荷蒙聖恩俯俞臣請於康熙二十年二月初五日陛見獲覲天顔躬承提命賜坐賜茶賜食當即謝恩趨赴沙河料理夫役於二月十二日翰林院掌院學士庫勒納一等侍衛對親傳奉上諭褒嘉特賜內帑銀一千兩及內廏連鞍良馬一匹到臣當即叩頭祗領訖又於二月十八日大學士明珠翰林院掌院學士庫勒納一等侍衛對親奉上諭賜臣御製詩一章御筆手卷臣恭隨明珠等親詣行殿叩頭祗領訖及臣料理夫役事畢回京于三月十四日詣闕謝恩又奉欽賜鞍馬一匹臣隨祗領一併叩謝天恩當經恭請聖安復蒙傳諭賜茶伏念臣以一介腐儒厯任外吏硜守淡泊曾無寸長謬蒙特達之知簡授撫畿之職今兹陛見親覲龍光幸抒仰聖之微忱欣遂瞻天之夙願詎荷睿慈過承寵眷賜坐賜茶特撤御膳賜食更念臣家計涼薄特賜內府帑金御乘良馬且蒙聖製詩章宸揮彩翰綸音溢美愧感交深似此殊恩異數誠曠古所希聞臣何人斯乃邀榮於非分唯有益加砥礪以無負我皇上知遇之隆已耳臣謹恭疏奏謝題報蠲賑宣屬米石疏題明勸蠲運宣米石以盡臣誼少佐邊儲事竊照宣府等處歲歉民飢邊外蒙古亦飢頻行賑濟存倉米石告匱我皇上念切邊儲為重令部臣撥運京倉米石又以溽暑之時恐勞民力復厪睿慮再命王公以下卿二以上各捐車輛運米萬餘石以備急需仰見我皇上惠愛斯民甚深且切也竊念內外臣工均屬一體在內王公大臣既已急公捐車挽運臣與道府等官叨沭聖恩忝居外任無以仰紓宵旰揣分何以自安且臣前奉旨往宣府賑濟飢民親見鎮城倉米支放已竭現在竟無存貯而前衛本年額徴之糧已奉特恩全蠲直至明歲秋成始有新糧接濟目今宣鎮在城營兵無米可支軍糈所關亦屬緊要臣抵署後旋與守道參議董秉忠巡道僉事吳元萊面同酌議乘今秋收之際於直屬道府等勉其各量力捐輸仍自備車腳運至宣府交收約略計算可得米二萬石有此儲備則宣鎮兵糧不虞缺少若遇賑濟蒙古等項亦可少資於用除臣已檄行各道府勸勉輸助俟將願捐數目報明催令運宣交倉之日容臣核明確數開列捐助各官職名另疏題報外此臣仰體皇上懷保之仁亦效廷臣急公之誼勸令道府各輸涓埃以盡臣分少佐邊儲於萬一耳臣謹先疏題明伏乞睿鑒施行奉旨于成龍率屬捐米二萬石運至宣府備賑可嘉著議奏該部知道再為驛站請增工料疏衝驛繁苦已極豆草騰貴異常亟請加增工料以救危站以速軍機事該臣看得直屬當天下之衝各省差使莫不經由其地驛站之繁難自昔稱最各驛原額工料當編定之時蓋幾經籌畫量其足用而設立乃自吳逆倡亂軍需浩繁屢經裁減差愈多而銀愈少各驛始困然於康熙十七年以前值年歲豐稔猶可勉力支持不期十七年秋收歉薄厯十八十九年疊罹災傷豆草等價一切騰湧較前不啻數倍裁剩之銀不敷於用各官賠墊難堪紛紛籲請臣據守巡兩道詳議是以有暫給長墊之疏未荷允準隨通飭各屬遵照部覆仍令於裁存銀內通融支給亦何敢再為陳請但自連歲災荒之後未遇豐收物價曾不少減而所存工料各有項款如夫役工食廩糧飯食及買補馬價與煮料柴薪等銀無一可省更無一足用實無可以通融其間各驛賠纍既久日見困迫自準部文檄行之後呼籲疊至比前更切其不得已之苦情誠難殫述兹據巡道僉事吳元萊詳稱直屬原額工料銀五十三萬四千一十兩零奉文十分裁四止應裁銀二十一萬三千六百四兩零今合先後裁銀共有二十五萬二百四十七兩零除應裁外多裁銀三萬六千六百四十三兩零此多裁之數原係各驛應留六分以內之銀請仍還各驛少濟時艱等情臣復批令會同守道查議今據兩道查明原有多裁銀兩詳請題覆前來臣猶恐未確又檢閲原裁案卷前撫臣金世德於康熙十五年奉文裁減之時原按額銀計算統合各案共裁銀二十一萬三千六百餘兩後經部駁又找裁銀三萬六千六百餘兩曾於疏內敘有原額計算幾及五分等語則是後次找裁者實係應裁四分以外之銀況前撫臣於十五年題覆裁四一疏內稱直𨽻無處不衝無處不繁較之安徽相去懸殊不啻倍蓰今將額設錢糧照依安徽裁減誠恐各驛遞將來力不能支其於軍機緊差所關匪淺若日後存剩之銀不敷供應必須再為題請臣等身在地方洞悉各衝驛之苦不得不預為陳明等語則是前撫臣當日仰體一時籌餉之計勉為裁減固已逆知日後之必不敷於用也假使撫臣至今尚在值此連遭荒歉物力艱難之際亦將請復之恐後矣臣今身在地方目覩各驛困苦情形安敢坐視倒廢而不亟為上請也合無仰懇皇仁軫念驛站關係軍機重務特敕部議將前項多裁銀兩自康熙二十年起給還各驛容臣酌量繁簡均勻補給庶驛困得以少蘇而馳遞軍機可無貽誤之虞矣真屬被災州縣請停徴疏􅅹陳災邑萬分重困懇恩援例帶徴以蘇民命以固邦本事據直𨽻守道參議董秉忠呈稱據獲鹿井陘等縣申詳前事內稱獲井等縣環邑皆山地盡沙石别無水源在雨㿩時若之年收穫無幾不意旱魃肆虐遂連三年雖前經微雨繼以暴風麥穗焦枯顆粒無望穀種未播秋收無期嗟此下民釡甑生塵爨煙斷絶因而流離載道幸蒙各上司多方賑救雖得續命之膏然錢糧終無可措若云緩徴於春夏勢必併徴於秋冬則此溝壑待斃之民輾轉究無生路有土地者因徴地丁而逃有房舍者因徴房號而逃丁口日見凋耗國賦從何徴輸是緩徴在常年為破格之恩在獲井等邑此地此時仍屬朝三暮四案查口北被災深重業蒙本院題請帶徴獲井等邑三歲竒荒災黎之苦雖疊牘難盡其狀實與口北相同今除驛遞一項關係軍機祭祀一項關係典禮别縣既無協供之理應於現年徴給其餘除春季已經支給外一切起運存留各款通作十分計算將康熙二十年地丁等項錢糧槩行停徴於二十一二十二二十三等年分别帶徴倘邀時和年豐尚可通融辦納轉移緩急之間於國賦無虧額之憂民命有更生之望若不為民請命終無善全之䇿職等蟻命固無足惜又安忍坐視千萬生靈盡填溝壑不得不冒昧申請伏祈鑒奪等情又據真定府呈詳前事內稱獲井等邑詳同前情該真定府知府趙瑾看得真屬地方災荒連歲大概歉收而西北沿山一帶之獲鹿井陘曲陽平山靈夀五邑災黎困苦尤甚惟冀雨㿩時若春秋俱熟庶幾可望起色不意本年自三月初中二旬各得微雨之後迄今彌月以來河漢為昭麥苗不能盈尺抑且漸見焦枯已種之穀不長未耕之地咸荒幸蒙賑救頻加暫得苟延目下然賑濟救其一時亢旱無如復見黎民仰事俯育急公完糧者惟此地土是賴地土一荒下既切於飢餒倘上再迫於徴輸欲其不逃不散不可得也職府目擊災黎俱皆鳩形鵠面慘苦之狀鄭圖難繪五邑士民紛紛籲控二麥枯死無餘郊原悉為赤地除踏勘確實另請題蠲外兹據五邑將本年錢糧援口北帶徴之例為民請命前來職府不得不據實呈請俯賜具題以救殘黎等情呈詳本院蒙批仰速妥議詳等因批行到道蒙此該守道參議董秉忠看得真屬獲鹿井陘曲陽平山靈夀五縣地方連旱三年小民困苦已極雖前經詳請多方蠲備買米及借穀兩經賑濟在案然不過少救目前之飢餒惟望二麥以蘇生今據獲井等縣與真定府詳稱各該地方自本年三月初中二旬各得微雨之後迄今彌月以來河漢為昭麥苗枯稿已種之穀不長未耕之地咸荒旱災復見黎民所藉以資生完糧者惟此土地是賴地土一荒下既切於飢餒倘上更迫於徴輸勢必逃散呈請確查災地請蠲併援例詳請帶徵前來是獲井等五縣二麥絶望夏災已見除委員踏勘確實另行詳奪外但獲井等五縣連被重災十室九空小民糊口無䇿以此重困垂斃之飢民而令其辦納國課此徒事追比究竟不能完納反多流離散亡之慘康熙二十年分錢糧實實難於徴解合據實在情形呈詳請先賜具題將獲鹿井陘曲陽平山靈夀五縣康熙二十年地丁錢糧寬至二十一年帶徴完解是一轉移間在國賦仍無虧缺而千萬殘黎得獲再生之恩也等因呈詳到臣該臣看得直屬地方連年荒歉去歲復被水旱災傷者三十餘處畿北唯宣府為最業蒙皇恩蠲賑頻施且允臣所請將康熙十九年本色糧石準於二十年帶徴矣至畿南被災之處惟真定府屬之獲鹿井陘曲陽平山靈夀五縣為最蓋此數處皆沿山一帶地固沙磧民素困窮何堪疊罹災傷苐以宣屬飢民衆多方煩發廪是以未敢輕為入告重費國帑臣鼓勸道府等官多方蠲備買米借穀自春初至今兩經賑濟被災窮黎稍為苟延所望者惟二麥成熟秋田收穫資生完賦俱藉此以給不意今歲自春以來雨雪甚少各處同然然於三月初七八等日時有雨澤雖或未盡溥遍而别屬已有沾足者獨此五縣偏不得雨且彌月以來亢旱如故麥苗悉已枯稿夏災已成民心惶惶錢糧無措該府縣咸激切詳請蠲除帶徴臣批守道查議兹據該道參議董秉忠議將各縣康熙二十年地丁錢糧寬至二十一年帶徴前來臣思此五縣目下情形實屬困迫誠難復事徴輸但時在夏初雖麥田無望若得透雨秋禾之未長者尚可長茂未種者尚可布種幸邀天眷秋田有收則民心安而民力紓當兹軍需孔亟之際臣何敢輕請帶徴併何敢輕議緩徴也若此後仍無透雨則秋田又復無望將見數縣民生不免流離溝壑之虞國賦從何辦納臣於此際又不得不懇皇上寬恤之恩也所有各縣被災情形並目下民困難徴緣由理合先疏具題請免河間災民估買房地疏盆寃屢控未伸變産勉圖賠納等事該臣看得袁珩未完逆本銀兩前將親友曹振平所助河間文安兩縣房地抵銀六千三百兩內河間縣地每畝作價五錢七分草土等房每間作價銀一兩一錢四分計地九十三頃四十八畝零房四百三十八間共作價銀五千八百餘兩準刑部移咨行追變解先據守巡兩道會詳內稱前項地畝悉皆鹻薄不堪耕種照時估值每地一畝不過價銀一錢其隨地房屋每間不過價銀數錢曹振平虛開多價捐助袁珩以抵欠本如照部單所開之價勒令種地貧民承買萬難完納請照時值估變其所缺之銀相應仍於袁珩名下補追等因經前撫臣金世德移咨刑部咨回仍令照數嚴追變賣行據守道參議董秉忠巡道僉事吳元萊會詳內稱前項鹻地破房所值無幾河間縣疊罹災荒米珠薪桂老幼啼飢流離載道幸蒙皇恩賑濟雖散者復聚而正供輸將不前窮民即有房地尚皆拋棄何能重價置買代完逆本銀兩若必嚴追佃種之民照數納價貧民不能措交勢必逃竄他方是不惟無益於公而反重害災黎仍請照依時值變價其原抵逆本不敷之銀在袁珩名下追補或將房地仍歸曹振平令代袁珩措完欠銀或將房地歸於原業主曹克恭等於克恭名下追出原得房地價銀以結夙案統聽部議既據兩道呈詳前來理合具題刑部議覆內開曹振平所助房地該撫既稱若必嚴追佃種之民照數納價貧民不能措交勢必逃竄等語相應將曹振平所助房地歸回原主仍於袁珩名下追銀五千八百餘兩以完逆本可也奉旨依議請寬盜案處分以惜人才疏盜案之處分久定不敢擅請從寬人才之淹抑可矜特為酌陳通變以鼓舞積困之勞吏事竊查盜案處分定例內開道路村莊被劫將承緝州縣印捕官併捕盜同知通判住俸文到扣算限一年緝拿若限滿不獲降一級調用又兼轄道官罰俸六個月限一年催緝限滿不獲再罰俸一年等語此係已定通行之例何敢輕議變更第直屬之盜案與他省逈不相同直屬圈占之區民無恆産既往往流習為非而又旗民雜處乘馬挾矢呼羣引類無可稽查紛紛申報失事幾無虛日故監司廳印等官求其與盜案脫然無纍得與升轉之例者十不能三四其間豈無廉能素著之員可期大受者而一官疲劇之區此案未獲彼案又起一案幸完數案未獲甚有一日而失盜之案數家經年纍月攢睂莫䇿始焉未嘗不勵精求為消弭之計而無如飄忽凶徒焚劫不時積案多宗降罰隨至灰心進步無計自拔以朝廷有用之人才而皆以盜案沈滯鐫級去任殊可憐惜臣目擊淹抑多員不得不懇恩稍為變通也除城內被盜行劫各官仍照定例處分外其道路村莊失事在州縣身在地方既不能消弭於未行復不能緝拿於己劫責無可諉一年不能緝獲降級調用允宜但原失事之州縣既降級去任接緝之官事不切已恐未肯實心搜緝則強盜反有漏網之弊合無將州縣官於一年未能緝半題參者降一級仍留原任賊犯照案緝拿若於己參議處之後有能續獲一半以上仍許開復還其原降之級是於懲過之中寓以勸勉則各官不因去任隳心咸知自奮必能悉力擒拿不致強徒幸免也至於薦舉卓異行取官員乃朝廷超拔人才之典而亦督撫諸臣盡其以人事君之義但有才守兼優堪膺斯選者每因一二案未完格於定例而不敢輕列薦剡致使逺大之器困於百里深為可惜前見江寧撫臣慕天顔為請旨行取事一疏將有未完錢糧之知縣林象祖任辰旦題請行取欽奉特旨俞允仰見我皇上憐才之殷初未欲以成例限人也直𨽻盜案之多與江南錢糧之繁事同一轍其中非無品行卓越才具優長如林任二令者倘邀一視之仁特開破格之舉遇薦舉大計及行取之期容臣將真知灼見確有才守之員不論盜案之銷否一體薦揚以備擢用庶真才不致於淹抑而朝廷可收得人之實效矣再查捕盜同知通判雖専司督緝之任但所屬有十餘州縣及二三十州縣不等既不能分身經理又無由遍厯搜拿竟同各州縣一體處分似屬過甚查武職議處之例千把等官為専汛守備等官為兼轄副參等官為統轄州縣印捕既與武職專汛之員同一處分則同知通判亦當與武職兼轄之員同一處分也比例更定則各廳員未有不鼓舞勉力者矣至督緝道員定例原止罰俸臣亦何敢再為置議但於罰俸之外停其升轉限年緝賊今承緝州縣與同知通判既請量輕處分而道員所轄地方遼闊一歲之內有失事數起至十數起不等停升之案先後接續竟無銷結之期故直屬有督緝責任之道員欲與推轉之例終不可得臣思方面大吏或由京官改授或由外吏升補厯任既久率多練達之才及其年力精壯正可矢圖報效乃令困頓一職無復進階之期更為可惜況督緝與承緝原自不同在承緝州縣等官固應停其升轉限年緝賊而督緝之道員既已罰俸似可免其停升輕重區别之間或亦上下之體統宜然若夫武職副參等官則又視文職之道員相等所當併請一體變通以昭畫一之例者也緣係憐惜人才起見敬陳末議如果臣言可採伏乞睿鑒敕部議覆施行奉旨九卿詹事科道會議具奏吏部等衙門會議得直𨽻巡撫于成龍疏稱云云相應將此處無庸議奉旨直𨽻地方盜案繁多官民殊為苦纍著將該撫原疏內各款事情再加逐一詳議具奏欽此再會議得直𨽻巡撫于成龍疏稱直屬地方旗民雜處失事甚多故監司廳印等官求其與盜案脫然無纍得與升轉之列者十不能三四官員而以盜案沈滯殊可憐惜道路村莊失事合無將州縣官於一年未能緝半題參者降一級仍留原任賊犯照案緝拿若於己處之後有能續獲一半以上仍許開復其原降之級至品行卓越才具優長者遇薦舉大計行取之期不論盜案之銷否一體薦揚擢用又捕盜同知通判所屬有十餘州縣及二三十州縣不等既不能分身經理又不能遍厯搜拿竟同各州縣一體處分事屬過甚當與武職兼轄之員同一處分至於督緝道員所轄地方遼闊停升之案先後接續欲與推升之列終不可得況督緝與承緝原自不同既已罰俸似可免其停升若夫武職副參等官視之道員相等當併請一體變通等語查定例內道路村莊被劫承緝州縣印捕并捕盜同知通判及専汛武職住俸限一年緝拿兼轄道官及兼轄副參等官罰俸六個月限一年催緝限內拿獲一半者免罪若限滿不獲州縣等官及専汛武職俱降一級調用有加級紀録準抵道官及兼轄武職罰俸一年賊犯照案緝拿同城知府照州縣例處分等語查盜案限一年不獲即行降一級調用餘賊交與接任官緝拿限期急迫本官既經去任接任官事不切已反不將盜賊查拿以致盜賊愈多嗣後州縣等官及專汛武職等官一年限滿不獲降一級留原任再限一年緝拿無級可降之官革職亦留原任限一年緝拿如再不獲調用革職同知通判管轄數州縣應照先定處分兼轄官員例初參停升罰俸六個月限一年緝拿限內不獲罰俸一年照案緝拿同城知府以下既有承緝知縣其知府應照同知通判例議處道官與兼轄武職初參既罰俸六個月免其停升仍限一年緝拿限滿不獲仍照例罰俸一年若未滿一年之限升遷照離任官例罰俸一年盜案俱係一體各省盜案亦照此定例行又查定例無錢糧盜案官員方準薦舉卓異行取知縣林象祖任辰旦係奉特旨準行不為例在案應將此處無庸議命下之日以後所到盜案照此例議可也奉旨依議請緩徵災邑房課疏山邑慘罹竒荒房課力難措辦懇祈題蠲以救民命事該臣看得真定府屬獲鹿井陘曲陽平山靈夀五縣連年疊被災傷今歲復遭亢旱經臣將所被夏災委員勘明分數具題在案其應徵房稅銀兩先因難以措納咨部俟麥熟之後開徴今各縣咸稱房稅緩俟麥熟開徵原望麥收輸納今自春至夏亢旱異常麥無收獲災黎救死不暇豈能責其完納房稅詳請蠲免前來臣批守道查議兹據該道參議董秉忠詳稱獲鹿等五縣連被災荒今又二麥無收目下雖得雨澤止可布種秋禾救死將來此時正在青黃不接之際若按追徵房稅勢必流離散亡終無有濟臣查宣府被災地方房稅銀兩已蒙皇恩免徴而獲鹿井陘等五縣災傷與宣府無異其房稅銀兩請俟二十一年徵收不過暫寬時日於稅銀仍可補徵而災黎實沾無窮之惠矣既據該道呈詳前來理合具題隨經戶部議覆相應準其俟秋收之日徵解可也奉旨依議報賑宣屬飢民疏康熙二十年六月初七日準户部咨內開康熙二十年五月二十七日奉上諭諭戶部前因大同等處地方自去歲飢荒百姓無食流離失所已經發銀二十萬兩遣官賑濟又將應徵房稅悉與豁除務期小民家室復完不失故業今復差官各處察看閭閻尚多逃亡田土仍然荒棄耕種無資衣食奚賴朕心深為憫惻所有本年應徵地丁各項正賦併厯年帶徵拖欠錢糧盡行蠲免但小民困苦已極猶恐無濟目前此外有何應行事宜可以速拯災黎俾得存活者爾部即行詳議具奏以副朕軫恤百姓至意特諭欽此欽遵該臣等議得除應行事宜另行確議具奏外將大同宣府太原此三處賑過州縣衛所應徵二十年分地丁各項正項錢糧米穀并節年帶徵拖欠錢糧米穀俱行蠲免其未賑州縣衛所錢糧仍照舊徵收俟命下之日行文該撫將蠲免錢糧之處大張告示通行曉諭俾其均沾皇上愛民實惠如有不肖官員將蠲免錢糧私徵或被害之民首告或傍人出首者將州縣官照貪官治罪巡撫司道等官一併從重議處現今仍有無食飢民亦未可定應請敕下直𨽻山西巡撫作何速行設法賑救以副皇上愛民至意之處確議舉行可也康熙二十年五月二十九日題六月初二日奉旨依議著差爾部賢能司官前往會同該撫賑濟飢民務使得沾實惠併作何設法拯救著會同詳議具奏欽此欽遵移咨到臣除將蠲免錢糧之處頒發告示通行七處曉諭務使均沾皇上愛民實惠外隨該戶部員外郎葉倫等同臣會議親往七處查看將實實乏食飢民自六月十五日起至八月十五日止借支存倉米豆再賑兩個月俟勸捐補還情由業經會疏題明臣隨於本月初九日起程亦經具疏題報在案至本月十四日已抵宣府會同員外郎葉倫於十五日開倉賑濟前衛飢民次至萬全左衛懷安深井堡東城西城蔚州衛俱逐處遍厯親行查賑今於本月二十八日已經賑完訖臣於所到之處逐一詳加察看自出居庸關以外地土率皆石磧山坡非如口內平衍之原田而時方溽暑涼爽自生一似口內仲秋節令若至仲秋則肅殺之氣已至而草木應先凋落矣是口外之地勢天時均與口內大不相同故常年稱為豐稔之秋亦適與口內之中年相等若遇雨㿩不均則荒歉甚於他處今此七城衛堡去年災祲又稱特甚民無素蓄致多飢餒前已蒙我皇上疊賑之恩得以存活所最苦者尤在錢糧無從措辦今兩奉特恩將應徵房稅銀兩悉與豁除本年應徵地丁各項正賦并厯年帶徴拖欠錢糧盡行蠲免萬姓歡呼載道幸免催科咸有安居之慶此七處之民情大率如此臣等察看宣府前衛地方民間所種麥田雖收穫甚薄而秋禾得沾雨澤收成可望見今農忙之際少壯之人傭工力作俱可度日且豆果菜蔬之類隨時採取可以易米亦可供食較去冬今春與夏初無雨之際已大不相同是以請賑之民亦不如前此之多臣等查驗將老疾困苦力不能自給者賑過大口飢民六十七名萬全左衛地方見今情形大槩與前衛相等唯東南之閻家莊等村一帶地土砂磧最甚先遭亢旱有棄而不種者有種而至今萎短不堪者臣等逐一查驗將實實困苦之飢民賑過大口四百一十一名小口一十名懷安衛地方情形亦與前衛相去不逺而山僻之區窮民較多於附郭之處臣等逐一查驗將實實困苦之飢民賑過大口二百二十名小口一十名深井堡地方地狹民少見今秋禾較之左懷等衛更為茂盛臣等查驗除可自食其力者不給外將老弱無力飢民賑過大口十八名小口二名東城地方麥田無收所種秋禾先苦亢旱風沙近賴雨澤連綿不被氷雹之處已漸長茂唯千家營王家窑東水地馬圈堡西水地東六馬房等村於五月十七日為氷雹打傷間存根楂或復布晚禾幸今有雨亦漸生發將來少有收穫亦不可定但此等復被災之處民人困苦臣等親詣各村查驗確實賑過大口飢民三百零二名小口一十三名西城地方其情形不特比前左等衛堡懸殊即較之東城為尤苦麥田既不接濟秋收又難懸望其被氷雹打傷之黃羊坡等村共計二十四處禾苗殘毁一空率多拋棄不復再種即有再種者無力耘鋤草多苗少長不盈寸欲望收成全然難定及查看民間屋舍之內所貯唯有野菜男婦老稚無不飢餓現於形色緣此處被災獨重是以窮民獨多臣等逐一查驗賑過大口飢民三千二百三十名小口飢民八百五十名蔚州衛地方麥田因旱為災大率與各處相同而秋禾則較各處為尤盛臣等查驗除可以力作自食者不賑外將困苦無力飢民賑過大口一百八十名小口二十六名以上七處共賑濟大口飢民四千四百二十八名每名給米二斗四升小口飢民九百一十一名每名給米一斗二升通共借支各倉米一千一百六十六石二斗八升豆五石七斗六升此七處飢民得此兩月米糧已可接濟至秋收凡有收成之處民人俱可自給但如西城等之復被氷雹村莊若秋禾仍無所獲勢須再賑容臣於應賑之時另疏題明設法拯救至於賑過飢民花名細數已檄令各地方官備造清册俟送到之日咨部查核其借支米豆亦一面勸捐補還併俟捐補交倉之日另咨報部合將臣等賑完緣由具疏題報奉旨這賑濟過宣府所屬地方飢民知道了該部知道報賑濟事竣回署疏恭報微臣回署日期事切臣奉旨會同户部員外郎葉倫等賑濟宣屬前左懷蔚四衛東西二城深井堡七處飢民俱經逐處親查給賑於六月二十八日事竣業經具疏題報在案臣於拜疏之後於六月二十九日自蔚州衛起程由紫荆關入口於康熙二十年七月初二日回署訖臣於所到之處詳察地方情形咨訪民間疾苦一切利弊所關與應行事宜容臣次第入告外所有微臣回署日期理合具題雄縣蒙賜謝恩疏恭謝天恩事恭逢皇上行幸雄縣地方臣依望天顔孺誠倍切隨具疏奏明於康熙二十年九月初十日蒙欽賜魚二包麂一隻兔二十隻雁二隻孤汀五隻臣衙門筆帖式郎圖齎捧到保臣即叩頭祗受分頒同城文武各官均沾聖惠臣隨躬率守道參議董秉忠巡道僉事吳元萊保定營參將張玊麒馳赴行殿祗請聖安復蒙恩賜御膳併賜銀鼠褂一件奶酒一瓶臣當即叩頭謝恩訖念臣謬任撫畿毫無寸補屢蒙聖惠寵錫頻頒仰承眷注之彌深益慚報稱之無術唯有矢竭駑駘冀答隆恩於萬一耳臣謹恭疏奏謝請更定宣屬文武儀注疏宣屬廳員轄衛之分名實未符特賜酌復舊制以重事權以専責任事竊照宣府一鎮地處邊方雖四境遼闊而山多田少荒沙彌望寥寥土民或築堡以居或穴山為室蓋此地自來為屯牧之所原與腹裏不同故於附近口內之處僅置延慶保安二州此外唯設有十衛地土人民悉令守備經管而衛備之所不及者即令營辨兼理其統轄之官則口北道總持要綱六路廳分任督率也緣邊塞之區糧微丁少不堪為縣而置衛不必立府而設廳其稽察錢糧督緝盜逃一切地方事務皆六路廳之責任是宣府各衛之屬於廳亦猶州縣之屬於府非若外省衛所徑𨽻都司與府廳毫無統攝者可比也舊制守備於廳員俱行屬禮自更定儀注以來改行賓主之禮文移俱用手本原為彼此不相轄而定乃宣府各衛辨亦遂以文武分途竟抗禮平行而稽察不服呼應不靈毫無統轄之實也近如蔚州衛已故守備何藩懷安衛守備王曰熹等缺少倉糧皆盈千纍萬又萬全左衛守備吳文儀等或貪縱不法或酷烈濫刑俱經參究矣至各衛連年本折錢糧率多未完十九年夏秋二災不遵六九兩月之限奏銷文册至五月終尚無送到悉已逐案參處而各廳員以有督率之故因之亦屢挂彈章並受處分矣臣思各廳既任統轄之責必重其統轄之權名實相符則呼應靈而諸事不致廢弛未可以不相轄之廳備概論也合無將宣府衛備於所轄之廳員仍照舊時儀注另行更定庶使各知分之所在不復敢縱恣抗玩而公務獲濟矣再查城堡守備等官兼管地丁事務者其錢糧亦係各廳任其督催稽核而地方有失盜等事除兼轄營將外各廳仍有督緝之責雖營辨而與衛備無異既有廳員統轄之事亦應行廳員統轄之禮所當併請俯賜更定以重事權以専責任者也禮部議覆內開該臣等查得順治十八年臣部與內三院吏兵二部會定文武官員相見儀注內各守備見知府同知通判推官俱不相轄行賔主之禮等因通行在案相應將撫院于成龍更定儀注之處無庸議奉旨這各路同知等官有専管稽察錢糧之責屯衛守備與營伍守備不同著再議具奏欽此該臣等再議得直撫于成龍疏稱宣府衛地土人民悉令衛備經管於廳員俱行屬禮自更定儀注以來稽察不服呼應不靈其城堡營辨兼管錢糧者亦與衛辨無異併行更定而公務獲濟等語臣部查順治十八年以前所定儀注內既有廳員行屬官之禮嗣後相應照舊定儀注例統轄可也奉旨依議請全蠲災邑錢糧疏欽奉上諭事康熙二十年九月二十三日準户部咨內開康熙二十年九月二十日奉上諭諭戶部頃者朕巡行近畿至霸州地方見其田畝窪下多遭水患小民生計無資何以供納正賦其該州見在被淹田地應徵本年錢糧著察眀酌量蠲免以示朕勤恤民隱至意爾部即遵諭行特諭欽此欽遵相應移咨直撫將霸州現在被淹田地數目并應蠲錢糧數目速行查明具題可也移咨到臣隨檄直𨽻守道欽遵將該州見在被淹田地數目并應蠲錢糧數目查明詳報去後今據該道參議董秉忠詳覆查該州水淹地畝先經勘明成災十分九分具疏題報部覆照例免本年錢糧十分之三在案共計被災地一千五百四頃零本年額徵錢糧共該銀六千三百八十二兩零若照十分免三之數計算應蠲銀一千九百一十四兩零但該州地勢最窪被水為患民生之困苦業在我皇上睿照之中既奉特恩軫恤合無於常例之外將本年錢糧破格全蠲以廣皇仁統聽部臣覆奪酌派驛站銀兩疏衝驛站銀缺額墊應維艱謹請敕部定擬撥補以蘇郵困事竊照直屬各府州縣驛遞夫馬工料錢糧向有額編定數毋分衝僻俱於本州縣所徵地丁銀內照數支給惟涿州良鄉通州三河等州縣地圈丁散錢糧無徵站銀缺額厯來申請撥給康熙八年以前前撫臣按年移咨户部請撥康熙八年十月內戶部具題直𨽻因無布政司各州縣缺額銀兩各道轉詳巡撫咨部撥給今經具題通薊道改為守道總轄直𨽻錢穀事務以後一應缺額等項銀兩照各省布政司之例專責守道經管其收放錢糧數目造册申報巡撫查對明白年終奏銷等因奉有依議之旨移咨前撫臣嗣經前撫臣移咨户部請示凡一切撥補缺額錢糧是否俱聽守道徑自動給年終彚册報銷抑或先行逐案咨部始行該道動撥復準户部咨開直𨽻一切錢糧俱守道總管動撥年終奏銷以憑查核題定咨行甚明無庸咨問相應咨回查照原題奉行等因自此以後各州縣驛站缺額銀兩俱係守道詳明前撫臣按時撥給驛站支用有賴所以康熙十三年以後軍興差繁之際各屬應付無誤至康熙十五年九月內户部具題部撥錢糧之外凡有動用銀兩均應預先報明奏銷之時以憑查對若有緊急軍需一面報明一面撥用奉有依議之旨移咨前撫臣遵將各屬缺額銀兩於十五年以後移咨戶部請撥俱係隨咨隨允隨即撥給康熙十九年五月內準兵部移咨內開如有衝驛不敷及災傷缺額者責令驛道查造細數先行咨報本部應否動用驛站裁四銀兩核明定奪如不行造報本部遽將藩庫銀兩動用除不準銷外定將經管及轉報各官一併以違例題參等因臣於康熙十九年六月初四日蒞任查涿良等州縣康熙十九年缺額站銀除護理直撫印務守道董秉忠移咨戶部準撥之外涿州尚有未撥銀四千二百三十四兩零良鄉縣尚有未撥銀七千七百七十六兩零通州尚有未撥銀五千三百八十三兩零三河縣尚有未撥銀一千六百九十兩零臣於十九年六七等月及二十年正五等月屢次移咨户兵二部請撥户部以所請之銀係應給之數將涿良三河三州縣缺額照數補足其通州缺額先準撥銀二千兩兵部以未經奏銷將户部已準應補各州縣之銀一槩不準撥給各州縣訴艱訴苦之文殆無虛日臣復屢為咨請兵部屢駁不允今康熙二十年涿州缺額銀四千三十四兩零良鄉縣缺額銀九千八百二十七兩零通州缺額銀三千四百三兩零三河縣缺額銀七百三十兩零臣又陸續移咨户兵二部請撥戶部準將通州三河縣之銀全撥其良鄉縣先準撥銀三千兩涿州之銀戶部移咨俟兵部準撥之日再議而兵部又以未經奏銷俱不準撥各驛所缺站銀乃經制額設按日支銷之項凡人夫工食馬匹草料以及過往員役廪給口糧無項不取足於斯厯年以來皆係按數撥給非自康熙十九年及二十年始也乃兵部於奏銷之前將所缺之銀槩不允撥則是僻處站銀尚得在本處地丁銀內照額全支而涿良二處當天下之衝通三二處為兩京喜峯孔道均係差使至多至繁之區反令其拮據賠墊從前之逋欠既不能清向後之預墊又須設措以衝苦之州縣為力幾何而能久於支持勢必馬匹倒斃夫役逃散稽遲緊急差使貽誤軍國重務所關甚巨實為可虞各州縣原額站銀十分之內除裁減四分外所留六分之銀原屬應領之項且係必不可少之數兹良鄉縣康熙二十年額銀一萬四千七兩零本年地丁徵銀四千一百七十九兩零止足三月有餘之需缺額銀九千八百二十七兩零計少八月有餘之銀涿州康熙二十年額銀一萬四千八兩零本年地丁徵銀九千九百七十四兩零止足八月有餘之需缺額銀四千三十四兩零計缺三月有餘之銀通州康熙二十年額銀六千九百七十六兩零本年地丁徵銀三千五百七十三兩零止足六月有餘之需缺額銀三千四百三兩零計缺五月有餘之銀三河縣康熙二十年額銀四千四百一十九兩零本年地丁徵銀三千六百八十八兩零止足十月之需缺額銀七百三十兩零計缺兩月之銀而本年地丁錢糧春季不能完納必待夏秋收獲之後始可徵收所有缺額銀兩勢須早為撥給今兵部將十九年所缺之銀於二十年九月中議覆十九年奏銷案內始行扣撥則二十年站銀直至二十一年九月間方得有銀撥補自今以往尚有一年之期為時甚逺目前現缺數月站銀夫馬工料無項支給人夫斷無不逃馬匹斷無不斃郵傳斷無不倒此不待再計而決也臣思各州縣站銀既有定額本年撥給與奏銷後撥給毫無增減總出朝廷錢糧何必遲之又久以候奏銷乎與其遲撥使經管各官有墊應之苦兼有塌驛之慮無如按期撥給俾資用不乏差使無誤之為愈也臣請敕下戶部會同兵部將涿良通等三州縣康熙二十年缺額站銀照數撥補康熙二十年以後站銀仍照康熙八年户部議準之定例専責守道經管令其每年春季查明缺額確數造册詳臣核允於驛站裁四銀內逐季報明給發年終造入奏銷册內具題聽部查核停其逐處咨部此外如各州縣驛或遇災傷錢糧蠲免缺額併存留祭祀俸食等銀缺額亦照例撥補造入奏册報銷庶圈占瘠邑諸務整頓不致窘竭時有呼籲之繁矣酌議運送炮位疏欽奉上諭事該臣看得直𨽻各屬銅鐵炮位前經户部郎中詹布禮逐處查明業經彚疏題報所有大小銅炮限於閏八月二十日內解部其多餘堪用鐵炮亦令陸續解部臣隨檄行守道會同巡道查議作何運送嗣據議覆炮位散貯各處莫如各就近起解為便隨經行令文武各衙門先將銅炮依限速解去後續據保定營參將張玊麒以炮多斤重需車數多窮辨難措具詳呈請臣隨批據守道董秉忠詳稱武職衙門炮位應請量給腳價給各營自行雇運以竣公事等情正在繕疏會題間於本年閏八月初十日準工部等衙門咨為請停各省解炮等事內開多餘鐵炮俱行銷燬之處應俟各省炮位盡行查明到日再議其無河道省分大小銅炮俱令驛遞傳送等因除各屬多餘鐵炮應另候部示遵行外至於大小銅炮先因定限急迫已分催文武各衙門依限起解現今亦有裝車就道者亦有未經起解者若遵新準部文令其由驛遞傳送而各營炮位又多在邊關山僻之所仍須運至大路州縣始有驛遞與其迂回道路轉交驛遞何如就其捷徑各自解京之為便但不給與腳價則解送無資窮辨奚能賠墊臣思驛遞傳送雇車之價例係按程撥給今將各營路自送之炮位各照所需車輛亦按程給與雇價是即以應給驛遞銀兩轉給各營則錢糧並未多費而於各營得免賠纍矣再查馬水紫荆等一帶關隘皆處萬山之中峻嶺深溝人難並行若係已毁之碎銅則人力尚可背負馬力尚可馱運今各炮有數百斤至千餘斤不等不脛不翼癡重不前雖欲藉衆扛抬而人足難容力無可施其所存炮位據稱皆當年本地置造今之不能運出亦猶昔之不能運入也是必另籌其法而後可以解送即輕小之炮止重百十斤者亦因路險難行僅可漸次馱送原定限期勢難勉副所當一併題明聽部議覆再議運送炮位疏欽奉上諭事案照直𨽻各省大小銅鐵炮位其直𨽻各營路解費無出與路險不能運送情由臣已另疏題請外至於各省大小銅炮除山東江南浙江江西湖廣五省并河南之地近運糧水次者可以載船解送尚有山西陜西并河南之不近水次者必須陸運直𨽻當總滙之區路必經由而各驛自工料裁四以來更值軍興旁午差使絡驛各官揭借賠墊已有骨立難支之勢雖三省銅炮難以預計然炮之重者率有數百斤至千餘斤不等整炮非已毁之碎銅可比人畜不能零星分負需車必多今查畿南大路舊有遞運所車久經裁盡又無額設車價銀兩萬難應此各省之多炮與其臨事而致誤不若先計以酌濟臣思額外車價原有報銷撥補之例唯是撥給於準銷之後則守候經年不能濟急當其應付之時無術設處實滋困纍苐此車價按程算給原有定數合無將此運炮之車準其於各州縣本處地丁等銀內隨時動支雇覔應付總係應給之銀未嘗額外多費而各屬得免借墊之苦公務不致遲誤矣臣再有請者有河道省分之炮位由船載以抵通州勢必用車運送入京而通州止額設車價銀七百兩每年支給不敷墊應至千餘兩不等今各省之炮責之一處運送進京力實難支併請一例動支正項錢糧雇募夫車以免困纍者也酌議運米腳價口糧疏遵旨運米賑濟蒙古事查照宣屬地方連遭荒旱災祲異常民命實有倒懸之苦仰荷皇恩軫恤蠲賑頻施幸獲稍延殘喘不致填於溝壑兹準部咨將宣屬米石運至殺虎口賑濟蒙古誠屬急需但宣府距殺虎口程途遙逺計往返有一千餘里及八百餘里不等此項米石長途運送若責之官役而俸食盡裁窮苦無出派之小民而煢煢餓殍力難負戴即賣妻鬻子拚命領運而解至中途或病或死米多未到不特民命堪憐而公務必致遲誤使非給以腳價口糧似難逺運且此賑濟蒙古事關緊要亦向來少有之事非尋常可比臣據南路通判陳天棟激切具詳批行守道董秉忠查議據稱運糧至五百里以外者原有準給腳價之例自應照例給價其五百里以內者雖定例內未開給與腳價但此枵腹之民何能挽運長驅應請恩準不拘常例量給口糧議令每夫一人管驢一頭駝米五斗每夫日給米五倉合每驢日給豆五倉合草半束折給銀六釐以為窮黎運送口糧之需米豆於節年存貯倉內動支草銀於現年地丁銀內動支給發於公帑無多費而事無遲誤小民不致痿斃於道路實受無窮之福矣議改防汛營制疏謹按地方衝僻之形勢議改防汛緩急之官兵以資守禦以固疆圉事該臣看得天津鎮臣所轄地方周長廣闊為兩京孔道九省咽喉邊腹海漕在在衝要臣每以靖盜安民妥設防汛為念今準鎮臣咨稱因時制宜有亟當酌議移調者如康熙十四年設立豐玊營守備駐劄豐潤兼轄六汛原不無鞭長莫及之虞玊田縣地處衝衢護送絡繹莊村稠密滿漢雜居非一把總所能支持應設守備一員駐劄玊田立為玊田營查喜峯同城者有遊擊一員中軍守備千總各一員兵丁二百餘名該路名雖邊口實屬內地且設有章京披甲把守其遊擊千總足以防禦應將喜峯路之中軍守備帶馬步兵丁二十名調駐玊田即將玉田把總改為專汛豐臺向係豐玊營所轄該汛坐落玊田地方應將豐臺把總改歸玊田營管轄玊田見有馬步兵丁一百零八名豐臺兵丁四十六名併帶來喜峯路兵丁二十名共計兵一百七十四名駐劄守備一員管轄把總二員立為玊田守備營制仍屬薊協統轄則在喜峯無損於玊田實為有益玊田既設守備則豐玉營應改為豐潤營守備管轄豐潤開平黑洋澗河四處庶衝汛不致有誤再永協地方當日設立海防三營原令蒲河營都司居中調度前以劉家墩守備調駐樂亭縣者蓋為樂亭城內被盜入劫起見近日海邊商販船隻往來干係重於平昔相應居中設立遊擊一員以資彈壓查務關營遊擊雖有催護漕糧之責但北接漷縣營南聯楊村營西通武清營相離俱皆不逺合將務關營遊擊改為蒲河營遊擊隨帶千總一員移駐蒲河即將南海營守備改為蒲河營中軍守備仍分防南海其蒲河見兵三百零二名駐劄遊擊一員千總一員把總二員多方訓練逺近巡防允足以資彈壓務關營遊擊既調駐蒲河應將蒲河營都司改為樂亭營都司隨帶蒲河營千總移駐樂亭其樂亭與劉家墩見在馬步兵丁一百九十八名外有因昔年樂亭失事抽調蒲河營馬兵八名南海營馬兵六名今蒲河南海均係海防要地應將原兵撥還二處外另於永協所屬邊口稍緩之營汛內抽撥馬兵十名步兵二十名合之樂亭原兵共計二百二十八名駐劄都司一員管千總一員把總二員仍屬永協統轄蒲河營都司既調駐樂亭應將樂亭營守備帶把總一員移駐務關改為務關營守備屬通協統轄務關見兵二百三十一名駐劄守備一員把總二員足以料理汛防漕務以上各營均換給關防各定營制一轉移間而官兵無庸添設俸餉亦無加增其於衝汛海疆俱有禆益矣請假歸葬疏微臣母喪未葬瀝陳哀衷仰祈聖慈俯允以全子道事竊惟聖朝敷教崇孝所以勸忠臣子立身竭忠必先盡孝未有子道有虧而可以事君臨民者也臣山右寒儒早年失恃蒙繼母李氏視臣猶之已出教養勤劬恩同乳哺臣於順治十八年叨選廣西羅城縣知縣其時臣父久已見背止有繼母在堂家世清貧甫除一職間關萬里欲奉母之任而力有不能僅偕二三僕人擔囊而往拋離母氏囑臣妻子奉養絶裾之情至今思之猶有餘痛在粵七載於康熙六年升授四川合州知州蜀道險阻自昔稱難欲迎母侍養而又不可得至康熙八年升湖廣黃州府同知雖轉遷已就近地而在任四年兩次入覲兼奉上司委調不常奔馳靡有寧宇及十三年二月內報升福建建寧府知府留補武昌府知府因浮橋一案革職旋補黃州府知府正值兵興終未遂迎養之私是臣竊祿有年臣母從未一嘗臣之食也至康熙十五年十月內接臣母病故訃音五內摧崩隨照例詳請回籍守制乃以逆賊梗化軍務倥偬督撫諸臣不以臣譾劣勉臣移孝作忠慰留再四隨經題準在任守制臣於斯時私念母在既不能盡菽水之歡而多事之秋若復力請回籍又不能盡鞠躬之義則忠孝兩失由是抱哀供職馳驅於軍旅之間而臣母停柩在家不遑顧也嗣蒙皇恩超擢於康熙十六年十月內特升湖廣分巡下江防道十七年六月內復升福建按察使尋升本省布政使十九年二月內簡授今職古來知遇之隆從無臣比臣前任江防道湖南猶阻聲教及任閩省藩臬漳澄正在用兵自抵今任一年有餘而黔滇餘孽未盡殄滅禁旅尚煩征討宵旰未舒臣之私衷何敢遽及且臣受命撫畿以來毫無寸補而聖眷有加本年二月內率夫沙河因得陛見特蒙製詩褒美更蒙賜帑金千兩內廏馬二匹又本年九月內駕幸雄縣復蒙宣賜麂兔魚雁等物及臣趨候聖安又蒙宣賜銀鼠褂併奶酒寵錫頻頒榮施逾分感激之私捐軀莫報唯慮暮氣已侵鞭䇿不效何敢言去辜負聖恩獨是臣於繼母生不能養死不獲殮罪已深重今停柩五年有餘尚未歸土如臣之為子亦何賴焉天倫父母事有未盡何以為人況臣今年六十有五日就衰邁若再遲延遺此未了大事而溘先朝露則通天之罪百世莫逭是以每一回思而拊膺頓足情難自已者也臣前此之奪情留任厯久不敢言歸者緣以四宇未寧王事靡盬人臣義不遑顧親之時也兹接部文滇南逆孽蕩平率土歸王普天同慶從此兵革不用臣民共享太平之樂我皇上誕敷文德首在扶植綱常敦崇倫理以維萬世之人心以固無疆之厯服臣謬任巡撫代宣聖化亦惟以綱常倫理教人乃躬際太平之盛非復從前多事之時若不歸葬母喪是貪戀顯榮忘親背義不孝之名不免貽譏於天下後世對屬臨民之際先懷慙歉又何以勸人興孝思致化民成俗之效耶伏祈皇上鑒臣私衷允臣回籍安葬母喪俾臣子道獲全完此一生大事則身外更無他慮犬馬餘年皆圖報聖恩之日矣奉旨于成龍所奏情辭懇切準假三個月回籍葬母事竣速行赴任供職該部知道請護印務疏恩準假期兼膺新命恭請道臣護理印務以便交代事康熙二十年十二月二十六日準吏部咨為微臣母喪未葬等事內開該直𨽻巡撫于成龍題前事康熙二十年十二月十八日奉旨于成龍所奏情辭懇切準假三個月回籍葬母事竣速行赴任供職該部知道欽此欽遵移咨到臣準此又於康熙二十年十二月二十八日準吏部咨為補授總督事內開本部題前事康熙二十年十二月二十四日奉旨于成龍升補江南江西總督應兼職銜爾部議奏欽此欽遵移咨到臣準此臣兩接部文俱經恭設香案望闕叩頭謝恩外竊念臣一介腐儒謬叨殊恩厯任外吏超擢直𨽻巡撫年餘以來毫無裨益自揣庸劣常懷覆餗之虞前以母柩久停在家特請回籍安葬荷蒙聖慈準假三個月令臣葬母事竣速行赴任供職捧讀之下感激無地正期完臣私衷疾趨供職勉圖後效復奉特旨升補江南江西總督臣聞新命不勝惶悚江南繁劇之地總督兼理文武事務任重責大如臣菲才何能勝此然以受恩深重又不敢控辭有辜知遇之隆唯有勉竭駑駘冀報髙厚於萬一苐臣歸葬母喪奉有欽定假期而新承簡命更不便久於遲曠所有直撫印務必須護理有人庶臣得以速於交代離任剋期回籍葬母事竣星馳前赴新任臣查直𨽻守道參議董秉忠操守廉慎才猷練達自臣抵任年餘同城共事日益砥礪留心政務加意民瘼凡所設施無不允當且查康熙十九年春夏之間直撫員缺部題奉旨令其護理合無循例將臣印務仍交董秉忠護理自可勝任無誤但未奉旨未敢擅交理合恭疏題請伏候命下臣謹遵奉施行請帶郎筆帖式疏請隨帶筆帖式以資任使事切照直撫衙門筆帖式郎圖於康熙十三年十二月內安設迄今七年有餘在前撫臣金世德任內己素稱勤慎及臣蒞任以來又經年餘益見其小心供事凡各衙門所行清字文移皆其翻譯並無差訛而且安分守法從不干預外務此誠筆帖式中所難得者今臣奉命升授江南江西總督職司軍務凡往來清字文移尤須慎密則翻譯之員必誠實循謹臣所素信之人庶可委用無疑合無將郎圖準臣隨帶江南以資任使聽部議奪伏乞敕部議覆施行恭報交代并舉賢員疏恭報微臣交代起行日期並繳敕諭事康熙二十一年二月初五日接準吏部咨為恩準假期兼膺新命等事內開直𨽻巡撫印務交與守道董秉忠暫行護理等因於康熙二十一年正月二十八日奉旨依議欽此欽遵移咨到臣準此臣隨將傳敕一道直𨽻巡撫關防一顆并吏書文卷於康熙二十一年三月初六日交送直𨽻守道參議董秉忠接收護理臣欽遵成命即於初六日自保定起程前往原籍安葬母柩事畢之日即星赴江南江西總督新任俟抵任後另疏題報外所有微臣原領直𨽻巡撫坐名敕諭一道理合恭繳臣再有陳者以人事君人臣之誼臣謬荷知遇抵任一年有餘於所屬各官細加察驗更時為勸勉除前歲舉劾案內將直𨽻守道參議董秉忠阜城知縣王燮薦舉在案又去年遵旨往宣府賑濟飢民將南路通判陳天棟薦舉在案內王燮已蒙行取其董秉忠陳天棟均未奉俞允注册而賢績已達天聽此外如柏鄉縣知縣邵嗣堯之矢志清潔髙陽縣知縣孫𢎞業之留心弭盜者槩不乏人然尚須勵終如始磨練歲時為將來國楨之選而較然不欺卓有成績者一為通州知州于成龍也具恬淡之性優通變之才治劇理繁允堪器使一為霸州州判衛既齊也化浮囂之氣凛清白之操任州幕而講學不輟署縣篆而滿漢咸和可當大任此臣一年來殫心吏治廉訪人才以報我皇上知遇之恩於萬一者也兹值離任之際不敢隱蔽特列名上聞期以表勵官方以盡臣舉賢之微誠耳伏乞睿鑒施行弭盜條約照得直屬逃人盜賊大為民害無論軍民紳士或犯窩逃或被盜劫家業不保甚至身命隨之而地鄰人等亦咸被其牽纍今欲為爾等謀保護安全之計莫如力行保甲古人守望相助出入相扶持良法美意可則可效用是因時制宜酌定條款編帙成書務使家喻戶曉共相勸勉以期寧謐本部院欽承簡命撫蒞兹土與爾等情關休戚故不憚諄諄告誡總欲爾等各守身家非好為多事也爾等當深思而力行之所有條款開列於後一十家立為一甲務選殷實老成端正勤慎者公舉為甲長報官九家咸聽約束違者稟官重究一十家各開男婦姓名年貌自祖父母及本身妻妾至子孫婦女與同居叔姪親戚并婢僕等人口作何生理盡數開立門單交與甲長不許遺漏以便認識稽查違者重究一九家民人互相保結其結內開某人作何生理平日并無窩逃蓄盜交結匪類出入旗下勾連生事遊手賭飲撒潑凶惡結黨刁訟起滅是非等項如有此等事犯某八家甘受連坐所結是實九家各具互結一張交付甲長以便編入甲內如朦混具結地方官查出九家各責三十板枷號兩個月敢有抗違不遵入甲者重究一九家之中平日有窩逃蓄盜交結匪類出入旗下勾連生事者八家不敢互結許本人赴官自首改過遷善咸與自新地方官另訂一册開列姓名或他處舊案扳犯許將本犯悔過首詞敘入以開生路或怙惡不悛地方官執法究治如力不能制者立刻申報以憑核參拏問其餘遊手賭飲撒潑凶惡結黨刁訟起滅是非者八家不肯互結亦另訂一册開列姓名不時稽查違者重究一甲長釘一甲簿凡十家之內有出外行走者即報明甲長今往某處公幹甲長注入簿內回日仍報明甲長某日事畢回轉即於簿內去時項下注明以便稽查或恃惡不報或詭祕不報八家查明某不在家即報甲長注簿次早報官拿究或八家通同隱諱不報甲長查出注簿報官本家與來人審明口供如來人清白任其回去本家仍以失報責二十板八家各責十五板如來人不端即差役押解原籍地方官查收注簿取收管於本處簿內注解收訖本家責四十板枷號三個月八家各責三十板枷號兩個月違者重究一十家之中立有甲長或不諳書寫即請鄰佑識字者登記或甲長有事他往即報明九家公同注簿將簿轉付甲內人收管登記甲長回日仍同九家將回轉情由注簿將簿收回如甲長家有親客來往亦照九家例注簿違者重究一市鎮居民開店接客須釘一簿每晚客寓同行幾人務查問客衆姓名係何處人氏來往何處或何公幹生理有無弓箭什物或自備騾馬或催長腳將騾馬毛色認明或孤客步履有無行李盡數登記簿內次早或去或住報送甲長查閲如有來厯謊張語言恍惚蹤迹可疑即密傳甲長保長窺伺去向夜晚小心隄防次日勿令早行以備不虞如玩忽不記他處失事行查店家簿內未開者從重治罪一十家之中有鄉紳兩榜貢監生員不便與庶民同例編查但直屬逃盜肆害夜不安枕白晝劫殺幾無虛日紳襟咸受荼毒厯厯有案該地方官酌議或鄉紳立一册文武兩榜各立一册貢監生員各立一册將家僕盡數開列册內邇來風俗頽靡有以武舉而窩盜者有以武生而為盜者種種不法已經事犯似應武舉貢監生員互相保結武舉貢監責之縣官文武生員責之教官如生員抗不互結者教官移縣轉詳如武舉貢監抗不互結者縣官申詳一併查究或武舉貢監生員居處隔逺未悉素行不便互保者另列一册如係鄉居願編入村莊保甲者聽其自便此分别貴賤之法以寓弭盜安民之意法在必行違者重究一鄉村各有牆垣柵欄日久倒壞目今農隙正宜修理各甲長公釘一簿輪流𣲖撥某日某人幾名看守柵欄某人幾名值日查夜登記簿內或遇盜警本村放炮鳴鐘擊鑼大家救護如堵禦不能入柵行劫者巡夜同守柵欄人等報明地方官各賞紅布五尺如已入柵欄力能救護不致失事者巡夜守柵人等報官各賞紅布一丈如當場打死擒獲盜賊者巡夜守柵人等各賞紅布一匹倘先事不能知覺臨時不肯救援以致盜賊入柵劫去財物拷傷失主者鄰佑并巡夜守柵人等一併究治敢隱諱不報者十家以通賊論一村莊居民一甲以至數十甲若無統屬則呼應不靈應設一保長以統率各甲或村莊止有一甲將附近村莊甲長聯成一處公舉一賢能保長料理地方各甲長將花名交付保長保長將各甲合總報官以憑稽察凡遇鄰村有事保長聞鐘炮鑼聲立刻傳炮各村一齊放炮保長即率所管村莊甲長一面分衆各據要路堵截一面率衆直赴當場救援或當場殺獲賊徒或要路擒拏賊徒者每名各賞銀五錢甲長賞銀一兩保長賞銀二兩如保長聞鄰村放炮不傳炮者罪坐保長甲長聞保長放炮不傳炮者罪坐甲長如甲長傳炮甲內人丁不赴援者罪坐各家如當場退縮觀望不前致賊逸脫者罪坐保長如分撥堵守要路放脫賊走者即未受賊賄甲長亦應治罪法在必行違者重究一地方設立保甲長協力守禦不可無器械使用查一村之中須置炮一具鑼數面各家成丁者各備門棍一條凡遇盜警先放炮以便保長會衆救援兼以鐘鑼齊擊則各家奮勇爭先更查甲內或有鳥鎗弓箭腰刀鐵尺長槍鐵義之家開明報官量留鳥鎗弓箭數件地方官書押鐫刻於上仍給本主甲長同本主具領存案不許攜帶别處行走如有遺失從重治罪其餘盡收入官照物給價如有匿藏甲長與八家首報本家以通賊論如甲長八家未經查出被傍人首報甲長與八家連坐至於刀尺鎗義槩鐫本家姓名當官驗明登記簿內以便稽察違者重究一地方人民有在圈占莊內居住旗房者查明幾家照例編入附近村民甲內如有抗違不服者查拘親屬務獲正身面取親屬保結交付甲長注入簿內本身仍以抗違國法枷責不饒一十家之內有窮苦民人不能度日者甲長報知地方官另造一册設法養濟如此等民人既不敢出外行走又無地土生意甲長不報罪坐甲長甲長已報地方官任其困餓顛連以致喪命溝壑或典雇旗下苟延歲月本院訪聞縣官以不職糾參如能設法生理養濟四季詳報存案以便紀功舉薦以上各款務須恪遵實行不得視為具文常套誤身家而干法紀保甲人等亦不得藉端滋擾自取罪戾後悔無及須知册諭者續增條約十家互結之法本部院在楚行之已久然在直𨽻有行不去者祗因南北風氣不同習俗亦異今加意咨訪有前此條約中所未備者酌增數則附列於後一直屬有等大盜彰明較著稱為馬上好漢子地方人等畏之如虎敬之如神稍有拂意即白晝劫殺或暮夜殺死全家凡屬良民口稱犯了王法止一人死惱了大盜則全家死因之寧死王法決不敢惱了大盜也從此思之求一不敢互保之八家不可得矣隱忍獻媚求保身家誰敢不保大盜如此保甲竟為養盜圈套嗣後地方官先訪大盜姓名密稟本院務憂深慮逺設法擒拿立斃杖下王法既行則良民有所倚靠氣直膽壯互保之法方能著實行去切勿如從前深州之受賊賄束鹿之畏賊鋒致大盜蜂起釀禍迄今不可救止也一禁馬之法本院業已飭行邇來密訪此法止可行之於良民百姓決不能行之於巨窩大盜凡屬窩家俱是大有身家之人院宇深邃僕從衆多馬匹弓箭器械無不備具且鄉愚村民望風懾伏稍有身家託為姻契不肖有司受其餽獻結成相知且自已贓迹纍纍畏其訐告一入牢籠明知故隱一經事犯多方遮飾地方百姓知其手眼通神怕到官不得死無奈連名公保預為結識之地其中黨羽引類呼朋極口稱寃每每釋放竟無顧忌若夫巨盜重價購買健馬追風逐電防汛官兵望風縮頭誰敢向前堵敵此等馬匹俱養之各處窩家踏就生意取之如攜一經事犯即藏窩家如追緝急逼或潛匿京邸或投充旗下地方官莫可誰何且此輩舉動更為駭人有買驢騾日行二三百里者有步行一日一夜走三四百里者今日打劫明日離失事處數百里矣因此事犯多被辨脫此種大盜一日不除則河南山東直𨽻終無寧晷嗣後地方官務要廉靜自守端正寡交更留心密訪切勿如滄州之被其愚弄則大窩必然斂手一切巨盜嫖賭性成揮金如土手頭一空便思行劫東來西去到處狐羣狗黨交相容匿不肯改悔不死不休且賊通九州某處有一生意便來勾引既已入夥明知事犯到官不饒總屬死命欲不去而不可得興言及此亦覺可憐一步錯了滿盤是錯地方官須要恩威并用將此夥巨盜心上時刻記算不要一刻放下某賊某日在某處即行密拿一經擒獲便思了當如某賊已有悔萌即傳投見善為解救處置得宜如事發緝拏逼急無處躲閃投見求免者萬萬不得寬縱立刻綁送失事地方切不可被他哄了總之天下無難事只怕不用心若將問百姓要銀子這副心腸用在拏強盜上何事不成各地方官都一心做起來賊無容身之地何愁地方不太平著實細心參閲一州縣地方或有一村都是盜一家祖孫父子世世做賊這互保之法如何行得去甲長是盜九家是盜明是強盜保強盜此處沒奈何只得亦編成保甲姑入羅網大約良民多賊盜少務擇有身家有才幹的做一保長立禁止夜行木牌時刻叮嚀各處甲長大家隄防看明這一村的出路去路於要緊路口埋伏鄉夫如遇此村人黑夜行走即行綁鎖次日稟官嚴審如無謀劫實迹治以夜行之罪如此防間日久彼不得動手或稍斂盜心亦未可定此蓬生麻中不扶自直之謂也著實奉行一保甲之法一行盜賊不得動手必與地方官為仇讐須要時刻防備這夥強盜謀害白日謹守城門稽察出入著巡捕官每日落時逐户查問并菴觀寺院不許容留間人更於衙內建一敵樓頂上蓋房二間每晚家人巡更地方官帶印宿於中一層嚴守樓門再於衙舍外邊撥更夫巡邏以防報復此先保其身方可實行保甲切勿疏虞一賭博乃為盜之根屢奉嚴禁法令不容寬假邇來訪得直屬每遇集市一夥大盜公然放頭開賭地保不敢過問地方官竟置膜視全不禁止這夥將打劫之物一擲輸去又商議行劫隨劫隨輸隨輸隨劫終無了日又將沒飯喫的窮人勾引在內地方官平日不肯禁賭養成盜黨及至事犯把入夥的窮民拿來一例梟斬於心忍乎此種罪過都在地方官身上只是貪財迷竅全不思想殺了這些窮人到陰司底下那個不嚷鬧終久一命要還一命逺在兒孫近在身何如打起精神嚴禁賭博稽查貧乏不知救了多少人的性命祿位如何不崢嶸子孫如何不昌大功德無邊比要銀子十分受用十分放心地方官要留心參閲飭查劣員檄直屬地方倍極衝疲又兼連年疊罹災祲百姓困苦不但民鮮蓋藏實已僅存皮骨惟在良有司加意調劑更藉道府等官實力整頓庶不致流離失所今本院新膺簡命撫綏兹土切切以察吏安民為念自入境以來風聞地方各官未能潔己奉公或征糧而濫收火耗者有之或遇差而派取民間者有之或嚴刑峻法貽纍地方者有之或聽信衙蠧恣意誅求者有之種種不法殊可痛恨若不急為釐剔其何以澄肅官針靖安地方乎苐恐耳目未周風聞未確除現在密訪外合行查報為此牌仰該道照牌事理文到細加體察務將不肖貪酷官員速行據實揭報以憑飛章參處至於昏庸衰老廢弛公務等輩亦即訪確分别報明核參該道務須實心察訪勿得以平日之喜怒為屬員之賢否亦不得瞻徇情面止以微員塞責如不實力奉行止循故套該道亦難辭咎嚴飭佐二擅理詞訟檄朝廷設官分職各有專司如府州縣佐二之設凡緝逃捕盜巡查私販領解錢糧等項是其職也至於一切民詞原係正印官之事其佐二等官不許干預以滋紛擾查定例一欵內開佐二等官不許準理詞訟如正印官批行事件方許審理等因久經通飭遵行在案乃邇來日久法弛佐二等官未免置若罔聞遇有呈詞稟狀無論可否槩行濫準差提混審恣意苛求值此災祲疊見之後蓋藏久虛之日若不亟為嚴飭誠恐擾害無窮為此票仰該道照票事理即速嚴飭所屬各府州縣凡一切強盜人命重情鬬毆戶婚田産等事務令印官親為審理不得復任佐二等官混行濫準差役拘提以滋擾害如正印官批行事件亦須即為審斷不得拖纍遲滯有曠民業若正印官不嚴加稽察仍由佐二等官濫準混審者該道訪確即行據實揭報以憑參處倘該道徇隱不報或被傍人告發或經本院察出責有攸歸嚴禁奢靡檄據直𨽻守道條議四款內一曰力崇節儉也天地之生財止有此數過用則易竭奢費必不支且暴殄狼藉凶札隨之必然之理也俗薄風靡華奢競尚一常餐而甘旨多簋一燕會而珍錯雜陳網羅搜盡禽魚適口務窮水陸致庖厨之慘殺驚聞椒桂之芬辛滿鼻誇髙爭勝恬若分然一衣而紈綺爭竒一裳而綾羅罔惜一襪而錦毺間錯一飾而珍翠千金甚至肥馬輕裘鷹隨犬逐杯盤狼藉郊圻甘脆飽及禽獸種種非分不特富家大户安然行之而輕薄喜好之徒亦俱勉強則效良可浩歎總由為民上者不身先儉朴以躬導之彼蚩蚩若輩何知物之當惜福之不可盡享耶夫飢固不可果腹則已寒固難禁苟暖輒休安在粗糲蔬瓠之不可充腹而布絮素衣之不可適體也誠能躬先約素懇切化諭使閭閻共知粒食之不可暴棄非分之足以喪身凡吉凶燕享日用尋常俱有定制不令過分更於朔望講約之日共相勸勵知禮之士大夫則化勉其家以及其族其戚耄耋之鄉老有行之耆民則轉相化勉夫子孫村里之間將見古朴可風物力常餘日積不見多而歲積則日盈苟逢水旱災荒未必遂致捉襟而肘露也等因到院據此擬合通行嚴飭為此票仰該道照票事理即便轉飭所屬凡飲食燕會俱有常度適口則已毋逞欲而珍錯雜陳毋競奢而水陸兼備服御衣飾俱有常制適體則己勿喜新而紈綺爭勝勿鬬麗而錦繡稱竒通國士庶俱因習尚成風罔惜物力是在為民上者務須躬先儉朴諄諄勸導由士大夫以及鄉耆由鄉耆以及編氓務使咸知物力艱難轉相化勉共返淳龎俾風移俗易本院將以覘諸有司之賢良教化矣倘或視為具文因循舊習有奉行之名而無奉行之實本院亦何樂有此屬員也定以溺職特疏糾參決不姑容各宜凛慎毋貽後悔嚴禁火耗諭朝廷則壤以定賦百姓按則以輸糧原有一定之規在州縣各官身為民牧亦當上體朝廷德意下念百姓困苦按則征收更不可意為輕重故火耗之禁功令首嚴所以勵官方惜民力甚切也乃有司視為辨髦全不凛遵指授匱書髙下其手有加二者有加三者有明雖加一而暗實加三者種種竊脂之行無異竊盜相沿成風恬不為怪本院自厯任以來此中情弊知之最悉今特膺簡命撫蒞兹土首以察吏安民為事凡各州縣衛務須洗心滌慮痛除積習毋額外以橫征毋恣意以朘削愛功名而愛百姓既可以不愧衾影復可以無慚職守明有循良之譽幽有陰隲之報即本院亦樂與諸有司共覩厥成特疏薦揚儻有不肖有司狃於故習甘蹈陋規不恤民怨不顧鬼譴或快意於輕裘肥馬或肆志於田宅妻妾或近為耳目之娛或逺為子孫之貽當民窮財盡之日飢饉洊臻之時稍有良心莫不拊膺長歎即多方軫恤尤苦國賦難完民力難支又安忍於正供正數之外敲鳩形鵠面之骨吸賣兒鬻女之髓以遂一身一家之欲忍心害理禍必不逺天道好報決不爽期總以為幽渺難憑且顧目前然國法具在本院決不敢徇縱以玩功令除通行各屬嚴飭外合行出示曉諭嚴禁餽送檄禮有交際原因分誼相近互為獻酬用將誠敬至名分懸隔體統攸關自合杜絶餽遺凛遵功令孰敢隕越以滋罪戾雖其間用下敬上禮順人情然既不可疏尤不可越本院與各州縣共事一土休戚固自相關名分實屬懸隔若復交際何異朋儔是敬上乃所以犯上順情適成其悖禮因循成習不獨有干憲典亦且褻瀆等威如大名縣知縣公然開具手本呈送中秋節禮越分犯上本應題參姑念初犯暫從寬宥合行嚴飭為此票仰該道照票事理即便轉行各屬申飭嗣後凡遇重陽冬至元宵等節并過路送禮各衙門槩行禁止如有私相餽獻查出併行題參決不姑寬各宜一體恪遵施行嚴禁略賣檄直屬歲歉民飢業荷皇仁發帑賑濟各邑窮黎咸宜共安鄉井以待有秋乃四外姦徒乘機興販人口結聯地棍簧惑鄉愚輕自賣身或賣子女所得價銀有限自賣之後或轉賣逺方或賣與旗下一倍數倍無知小民誤墮姦計遂致終身淪落該管有司從未禁遏殊屬溺職又旗下買民定有地方官用印報部之例各屬當於投遞賣契之時詳查確實然後用印近日祁州竟將背主投旗之曹來不問來厯祗憑地棍杜文常假揑之契即與用印前據曹來之主曹之完狀控批發保定府審明業將原契究出斷歸原主恐此外不查來厯混行用印者不止祁州一處已也合行一併通飭為此票仰該道照票事理即移行各府通行所屬州縣衛等官各於所屬境內不時體察如有外來姦徒勾串地棍興販人口者立行嚴拿究解至於旗下買民務將所買民人及地方鄰佑族長人等傳訊明確方與用印如有仍前怠忽不恤小民困苦任其輾轉販賣并旗下買身文契不行查明輕與用印者或本院訪聞或該道府揭報定以溺職指參各宜凛惕勿貽後悔飭查防守地方檄真定所屬地方遼闊西山一帶界連晉省窵逺險峻易於藏姦近見劫殺頻聞皆設備未周之故該道即將所屬各州縣併各關隘地方某處設有防兵若干駐劄城守者若干分防汛地者若干某處係緊要地方所設官兵果否足用某處地方遼闊來往巡查有無鞭長不及之虞逐一備悉查明酌量地方之緩急設兵之多寡今應作何裒益酌議妥確造册詳報以憑移咨總鎮會商定奪總期兵不添而巡查自周民不擾而盜風日息該道職任監司地方攸賴切勿以泛常視之也申嚴冒災檄直𨽻地畝被災特奉皇恩蠲免錢糧必使被災人户均沾實惠庶不負朝廷軫恤至意然有鄉僻之民愚昧可欺文已到而不知糧已除而不識户書里蠧劣襟姦棍朋謀串結或沈擱原行侵吞己納之糧或移甲換乙冒免他人之地種種弊端不一而足是將朝廷恤災之巨典徙飽姦蠧之溪壑殊可痛恨今各屬所報災傷地畝已奉部覆允準隨經頒發告示檄令該道轉發在案合亟嚴行申飭為此票仰該道查照票內事理即速移行該管道府廳轉飭該衛堡將前發告示多為鈔白於被災村莊遍貼曉諭勿得沈匿其被災花戶各按原報地畝照依應蠲分數將本年錢糧逐名除免如有已經完納者即照數流免下年錢糧至各花戶報災之時該衛堡俱有花名細數底册令將此項底册先送查核不必另造仍取戶書里役不敢作弊如有弊端願甘死罪結狀並該地方官印結一併呈送存案倘有愍不畏死之徒大膽玩法仍有侵欺冒免之弊或經訪聞或被告發定將結內有名書役及劣襟姦棍一併嚴提處死該地方官以通同侵冒特疏參拿決不輕貸嚴飭協拿盜賊檄盜迹詭祕出沒無常呼朋引類糾黨非一處之人朝西暮東行止無一定之所若事經發覺追捕嚴急則藏匿愈密所賴各地方官無分彼此協力擒拿庶姦宄無潛身之地而雈苻可期肅清今據南皮縣條議內稱鄰境之盜十不得一皆因各州縣衛拘泥界限接壤之地無異秦越不獨彼縣之人此縣不能往問即此縣之人潛入彼境如入深淵等語似此護盜成風地方何日得寧擬合通行嚴飭為此票仰該道查照票內事理即通移各道府轉飭所屬如遇鄰封失事追捕盜賊遁入境內即行接續窮追如係獲賊供出夥盜開有姓名住所移關提取即行設法擒拿務期同心協力共圖殄滅以靖地方慎勿彼此岐視倘有以鄰境失事漠不關心置之不追不緝或受大窩囑託或被捕役朦蔽將現在之賊以死故逃亡開脫一經本院訪聞定以縱盜黨賊分别題參究治各宜凛遵毋貽後悔嚴禁賭博諭四民之中各有本業咸宜安分以保身家乃有姦猾之徒希圖厚利開設賭場貪癡之輩墮入局中相聚賭博晝夜不息開場之家獨得其利贏者百無一二輸者比比皆是以致資財蕩盡田房準折一空棲止無所謀生無䇿或情極自盡或身為乞丐或自賣旗下或將妻女子媳賣為奴婢終身淪落或為盜賊致被擒獲身罹重辟此皆賭輸以後之形景也當聚賭之時還有互相爭競被人毆死者亦有疊輸氣苦殺死人命者如口北道詳報康明譽康光譽與韓鎮考等賭錢相爭兄弟二人俱被韓鎮考韓二考打死又如宣府營兵黃之元與前衛生員蔡繩枝鬬牌屢被繩枝所贏將繩枝殺死此係近日之事皆因賭博之故除批行究擬外合行出示嚴禁為此示諭士民人等嗣後各守恆業不許羣聚賭博如敢違禁定將賭博之人與開場放頭併抽頭之人及該地方俱照定例治罪決不輕貰若有首告賭博者提審得實照例將賭博銀錢一半給賞如同賭之人出首者免罪仍行給賞須至示者驅逐流娼檄士農工商各有常業官役吏胥各有職守無庸隕越本院蒞任以來禁止奢華以敦習尚嚴飭官方以明政體業經申飭在案邇聞習尚紛靡官常敗壞未有如廣平一府若是其甚者也如雞澤縣之栁下永年縣之南胡賈西巖村等處女戲雜沓娼婦繁多不止紳襟士庶破産招致即文武官辨出入衙門不特不行禁止抑且流連暢飲醉後狂悖上之官府敗其官方者如錢同知留宿於張守備署中并例監張文炳張文煜家嫖戲旦四娃者是也下之衙役忘其性命者如府門役齊佩蘭設騙各縣銀錢包宿李六縣戶房張文玉王立業侵本縣庫銀嫖宿王菊花是也似此官役士庶縱欲濫觴廢棄職業將見風俗日壞官常不整言之殊堪痛恨合行飭逐為此票仰該道照票事理作速轉移大名道將一切流來女戲娼婦嚴檄各該地方官盡行驅逐出境不許仍前容留併出示曉諭士庶人等嗣後務要恪遵前禁守其本業庶風俗不致頽靡而地方亦漸返淳龎矣併取各遵依報查施行再飭植樹浚井檄耕鑿樹藝培天地自然之利裕吾民衣食之源此誠根本之業但編户無知率多因循怠惰難與慮始唯賴司牧諸人留心勸導督率力行久之自收成效使小民安於利而不知本院於去年七月內有令各官督民廣植桑麻多浚井泉之檄通行在案兹據安肅縣王令申稱遵檄編為歌詞遍貼鄉村民皆爭先淘井報到四十八村已得井二千五百二十有餘且教植栁以為水斗之用又桑栽難覔凡榆栁之類莫不有利併作俗語遍貼目今民皆扦插等情似此一邑勸勉有方民皆趨利而爭先可拭目以觀成效矣其餘各屬曾否舉行厯久杳無報覆蓋徒視為虛文悉已置之髙閣深可痛恨若謂方物不類地土異宜即有不宜於桑無不宜於麻者且如榆栁之類乃最易生之物又不擇地而可期長茂者至泉源與土脈流通無地無水即或原隰髙下不同一邑之中間有石磧流沙亦自無多其土深壤沃之處無不可為井此二事勞僅一時坐享長久之利民何憚而不為官亦何憚而不勸也今閲王令所編歌詞簡切明曉愚民易於省記擬合一併通頒為此票仰該道府查照票內事理即通飭所屬恪遵原行并今檄事理實力舉行仍將發去歌詞照式刋刻遍貼鄉村諭民傳誦咸使知利爭趨俟歲終將勸民植過桑麻浚過井泉造册徑報本院查核以憑分别殿最其去歲通飭因何不即遵行緣由併取各屬回文彚詳報奪均毋違錯于清端政書卷五
