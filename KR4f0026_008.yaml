body:
  text: 于淸端政書巻八兩江總督于成龍撰吟詠書五言古老女吟妾身已許嫁梅實過三春四德未敢斁歸期何尚迍豈為儂貎寢應是婿家貧氷融霜又至何以采澗濵布絲郎可貿井臼妾所親旭日雁聲寂蛾眉低自顰誰家車和馬百兩爛其隣妾命嗟成薄桃葉空蓁蓁拊心叩昊天終待結朱陳就使窮難嫁詎將香逐塵悲思古賢婦饋饁敬如賔卬友心同否有生殊不均自嘆病體渾無力閒愁誰與憐炎凉悲二豎狐蜮寄丹田不願上方劍但持感應篇小官缺養母浮譽惱羣賢乆欲歸林卧豈為升斗牽菩提垂慈訓真覺孽難湔廉隅雖尋丈光明即佛仙隠㣲多玷垢㝠府不矜全只謂堪瞞衆誰知難哄天晨夕朝太岳思結再生縁輕脱敝衣裘予將撇俗纒秋風吹細雨霹靂䕶青蓮勸民黄俗喜訟鎮岐時作此勸之閉門且避事省爾窮民錢莫憾居官懶妻孥望爾還倉中無一粒比日斷晨煙儂自甘心餓嬌兒兩淚漣肝腸痛碎絶中夜不能眠望爾覔升斗忽聞訟獄牽哀哉飢欲死尚逞爾輕獧健訟因亡産飢寒猶不悛痛兒兼痛爾無食誰為憐挖蕨奴甘去爾回種麥田强如羅鼠雀枵腹與人喧安分救兒女空中自有天莫生狂蕩想官府自周全萬一無生路清貧赴九泉我今歌且泣勸爾此長篇紀行鷄鳴起茅店晨路漸熹微東北朝天子周馳望帝畿隻身走古道何必雲錦飛朔風吹栗冽霰粒灑征衣兩耳兜入帽兩腮削故肥足氷拳鐙䠥手皸垂鞭揮南楚寒暄半六花滿亦稀前後難遮顧僕夫徒歔欷急求旅店火冷戰念天威晨興復登路重山白霏霏面目加黧黑鬚髯㦸旂旂苦極還自慰厯險忘其碕指日拜天闕天香可袖歸十年奔故里未息漢隂機除夕除夕三十日江黄萬象新隂雲天地暖細雨柳梅春咫尺瞻龍座劬勞自小臣壺漿難濟衆掃榻且迎賓爆竹幾家響椒盤生㡳塵其二政餘空閉目燈燭忽輝光香瓣通三界人天依粉牆朦朧試一看惻惻使心傷其三四壁音容慘忽焉思故鄉老妻知歲事料得一家忙誰念居官者隻身惟雪霜幸兒伴我側談笑且開觴只恐倚門望淒然憾夜長其四新春指日過遊子整歸鞭舞綵期非逺雁行共一天老夫惟自苦形影誰為憐升斗羈難去妻孥情共牽况經饑饉日觸目誰仔肩祈得麥新熟平安報有年家中莫怨望拂䄂此心堅庚申除夕上谷署中作今夕是何夕明晨又一年三冬無再雪萬户有孤煙爆竹誰家響盆花幾處鮮早朝齊拜舞誰上嘒星篇竈冷疇為祀井寒空自漣哀哉孑遺歎忍待麥芊芊七言古勸民節儉歌皇帝二十一載秋海宇乂安平冦孽江南連歲困兵荒喜今豐稔民樂業我適奉命制兩江億萬生靈如保赤念爾吳風尚奢靡㒺知愛養與節嗇乍遇水旱多逃亡滿目鳩形歎羸瘠凡此一旦致流離皆由平日鮮蓄積聖訓垂戒示寧儉王制立法重足食易著損象享二簋詩美豐年盈百室我皇上諭十六條其四農桑五儉節爾民日習視為常我今再復丁寧説百王之聖首唐堯土簋鉶羮陋不飾萬世之師為宣尼飯疏飲水樂不戚後人淫佚與驕奢往往售田與鬻宅爾民有身即有家仰事俯育資贍給貧窮之家固宜儉貧可自存免貸息富厚之家亦宜儉富可長保免賣拆粗茶淡飯儘可飽何苦珍羞侈羅列總然下了三寸喉一般滋味無分别褐衣緼袍儘可煖何苦錦綺炫鮮潔總然遮得七尺體一般寒暑無差擇土壁茅簷儘可居何苦棟宇雕丹碧總然住得百年身一般坐卧無奇特留得甘㫖養父母何苦鼎烹宴賔客留得膏粱飽妻兒何苦冶遊費杯席留得餘財周宗族何苦邀福事仙佛留得餘粟散鄉黨何苦信邪求巫覡慎勿徵歌愛選聲慎勿貪淫愛漁色慎勿畫船競簫鼔慎勿寳馬裝鞍勒酒樓茶肆切莫登法物玩器切莫覔入廟燒香都是虚演戲酬神亦無益江寧秦淮蘇虎丘揚州紅橋好風月人道快遊名勝塲我道浪費金錢窟更有不肖少贏餘便思嫖賭任抛擲百萬呼盧豪自誇十千纒頭狂不惜又有無知好鬬强聽信刁唆事告訐苞苴甘作暮夜餽嚢槖罄供胥吏掇非徒作孽招人禍定應召怒遭天殛或流異鄉為乞丐或䧟非類為盜賊不知節儉一念差遂淪溝壑膏斧鉞思之可畏亦可痛亟宜猛省自怵惕趁此豐年有收成大家撙節莫狼藉減得一分存一分省得一粒存一粒如此積累少至多九年餘三三餘一縱值荒凶可無患奚憂凍餒虞匱絀莫待無時思有時常將有日思無日若要飽食與煖衣只須勤耕與力織儉為至寳一字箴民安物阜無奇術所期盛世致太平不願麟遊與鳳集但願菽粟如水火鼓腹含哺忘帝力上為國家養元氣下為烝黎儲命脉共迎天貺答君恩熙熙攘攘樂無極我今作歌勸遒人遍宣金口與木舌爾民各宜書一通毋為負我婆心切忍字歌心最慈刃最毒心上如何放把刀做來忍字有含蓄這把刀按不定鑽出頭來喪身命這把刀按得下任他兇險也不怕只要時時忍在胸自然利刃都無鋒古來多少能忍漢百般磨練成英雄我持一忍勸世人更把諄諄敎呉民呉地雖饒民鮮朴江北江南異風俗江北好勇多輕生江南好訟多速獄好勇皆由不忍來細嫌小隙搆禍胎或因圖産争田屋或因貪利謀錢財或因狂戲競口角或因酣酗迷酒杯或持刀棍或拳脚一時厮打勸不開强者既傷弱者死惹成人命醸成災兇首抵償斬與絞造意加功罪不小餘人也要杖一百禍到頭來悔遲了牽累父母與妻孥株連證佐及隣保本無夙怨非深讐不能忍耐尋煩惱在人止喪一條命自己身傾家復掃幾番敲夾方成招無限痛苦喫刑拷招成下在牢獄中衣不遮寒食不飽自作自受理應當拖䧟旁人做路殍更有一種最蚩氓希圖拌命去害人溺水投繯并服毒幽魂怨魄先沉淪豈知自盡不抵命近來禁例甚分明徒然短見塡溝瀆縱有真寃那得伸空撇妻兒抛骨肉重泉風雨泣冥冥皆因一念不能忍多少傾家與喪身乃若好訟尤可異事起睚眦極微細不肻按住心頭刀非爭名利只爭氣一投鏇棍及訟師敎唆扛幇無不至彌天架謊雲霧遮平地生波風浪沸賺將片紙入公門要歇手時也無計書吏承行便索錢差役執票先講費有司擇肥縱飽婪過客抽豐作芳餌不是豪衿出把持定有劣紳來䕶庇到得衙門臨審時鋪班使用都周緻一家贏了一家輸訟師挑撥燄更熾道府告過又到司更將院狀包投遞聳動發審與親提上司差票如雷厲解户歇家争共攅罪名贓贖誰相替連年屢月不得休貸盡親朋賣田地妻啼子哭家業消訟師衙役欣得意早使當時忍須臾豈至今朝空懊悔試觀不忍致百殃方知忍字召千祥我且細説你細聽忍中妙義難思量除却臣忠與子孝天倫大義首綱常若使兄弟共能忍豈肻同氣相䦧牆若使夫妻共能忍豈致反目生乖張若使朋友共能忍豈敎谷風興怨傷若待妯娌能以忍滿門和氣自吉昌若待婢僕能以忍合家鼓舞爭趨蹌若待姻親能以忍有時急難來相商若待隣里能以忍有時貧乏常相幇見人一味只謙遜不使勢力逞剛强鄉黨孰不相敬重面前背後齊稱揚豈直善名播當世定教黙祐感上蒼富貴之人固要忍忍能造福逾綿長貧賤之人尤要忍忍則安分作善良讀書之人須要忍磨穿鐵硯登廟堂力田之人須要忍滴盡汗血充倉箱行商坐賈須要忍和氣不怕走津梁傭工作匠須要忍小心不怕缺衣糧聖門言恕我言忍一字終身用不盡若敎用得忍字來境到逆時都是順也無愁也無悶眼底胸中本蕩平那有五嶽起方寸不慮窮不慮困水到渠成聽自然却有天公暗幇襯在昔唐時張公藝百口同居傳九世天子親幸問其由手書一紙百忍字忍能睦族能齊家旌表門閭稱高義我今治國如治家視爾萬民如子弟但能刻刻忍在心何難子孝與弟悌不鬭狠不忿戾太和宇宙皆元氣毋爭訟毋好事各安耕鑿享樂利一忍不為少百忍不為多忍得終身坦蕩蕩忍得片刻笑呵呵無災無禍好快活大家來聽忍字歌五言律戊午監試楚闈作皓月懸明逺奎光暎素秋瑤圗五老獻玉署衆英儔桂影天香發卿雲瑞氣浮末員微効職為國廣薪槱赤壁懷古赤壁臨江渚黄泥坂名鎖暮雲至今傳二賦不復説三分名士惟諸葛英雄獨使君今朝懷古地把酒對斜曛偶書春來隂雨多春去晴光好花蕊妬蜂鬚雛翎驚鷂爪柴門留月看琴堦倩風掃物理自如此鶯殘茂葉老霧大霧滿虛空山川一混濛人聲逺近際樹色有無中旭日光㣲杳羣隂慘薄叢糢糊難見路舉足我心忡壬戌秋九金陵署夢中作牢落風塵裏三千白髪新跨虹湖色變嘯月海嵐親椒雨鐵牛厰菊霜金馬隣帝鄉咫尺近浩氣達西秦七言律粤西九日冷落荒城又一秋毎逢佳節轉添愁黄茅嶂逺今猶古白髪風凄歎復羞菊瘦懶看空淚落雁回遙望暮雲收閉門却厭登髙去醉裏心魂到故丘戊申除夕入彭水採楠木宿神祠側作驅馳王事入彭川旅舍神宫辭舊年七載羅陽梅弄影三冬蜀道柳含煙石龜氣負星文粲林鳥聲催草木鮮忽憶家鄉思對鏡明晨霜鬢獨凄然長安邸中午日十載浮萍宦異鄉回思已事倍神傷榴裙噴火紅顔好荷葢擎珠綠水凉泡雨有無呼吸變奇雲生滅古今忙悲歌慷慨當年夢白髪空慚續命長夢境夢裏單眸一老翁胡床岸幘貎如童横談往事多奇異笑指英才在座中説到當年開福地􅀈蛇嚙體漫飛空問吾來楚若干紀六載流光荆棘叢其二門外依稀佳客至非仙非佛隔牕東贈儂一束古詩卷蝌蚪開書久别公夢轉含糊難記憶簷前錯認五更風一聲雲板徹寒署萬事攅心日未紅夢餐優曇花作有引余讀書山寺時夢餐優鉢羅花即吟一句云仙人賜我鉢羅花醒語純天上人檢藏知鉢羅花即優曇花也因賦以誌優曇曽記夢中餐山寺日高柏水寒雲繞佛龕常五色香飄精舍比芝蘭生平未識金銀氣偶爾輕抛麋鹿灘四十年來魔障盡好敎拂袖紫霞端冬至渡淮鳳陽路值一陽天霜透征裘陟巘巔九里山前沙草合石頭城角水雲連雙鳬唼喋浮淮浦孤雁翩翻下泗川馬首北來閒弔古舊陵宫樹不知年過虞姬墓在靈壁縣有紅色草見人輒舞俗名美人草和前人韻隂陵古道照殘陽策蹇荒塋弔楚亡血灑西風猿嘯月氣吞白帝劍生霜貞魂傍逐烏騅逝烈骨長凝碧草香行客莫知悲舞意春來疑作妬新妝其二破秦當日衂咸陽及敗誰嗔困北邙玉玦無謀定天下靑鋒有意謝君王八千歌散腸應斷九里煙銷骨尚香悔比樊姬差一諫空令妃血舞紅妝銅雀臺銅雀空臺漳水流雲横煙斷笑殘丘千門鎖鑰風塵暗萬里河山落日收才子文章堪極目美人臺榭半成洲半為漳水所壞英雄一世今安在明月依然是漢秋中途遇雪隂雲漠漠朔風寒雪染征裘行路難霰集氷凋憐馬滑花飛枝壓總心酸離披短袖侵膚潤凛冽長途刺骨瘢更憾蒼頭多怨語何時髙卧學袁安代兄憶弟天光黯澹雁行斜斷續行雲映逺霞太乙吹藜顛出火蠧魚蝕字腹生花素琴懸壁宫聲合青草當庭春意賖太史於今瞻紫氣德星應集我荀家恩假歸里葬親過固關作行行復過井陘口白髪皤皤非舊顔回首粤川多壯志勞心閩楚少餘閒欽承帝命巡畿輔新沐皇恩出固關四十年前經過地于今一别到三山祝蔡忠襄公尊配顧太夫人八袠有引中丞蔡忠襄公以明末壬午開府吾晉時冦亂蠭起蹂躪三秦公撫循吏民躬駐河上且戰且守朞年賊不能渡既潼關師潰退保太原大厦已傾難支一木甲申二月城陷公從容就義北面再拜自縊于三立祠吾鄉父老至今談公惠政烈節輒流涕欷歔過其祠下者低回而不能去余以西河後進景企芳徽瞻拜之餘毎深愾慕今越四十載謬叨兩江節制來蒞金陵適公仲子方炳應纂修通志之聘獲與周旋詢公家世清白門户零替之狀為之歎息方炳言其母顧太夫人於兹仲冬壽躋八袠負米代養菽水承歡一門節孝可謂無負公於九京矣聊賦四什敬祝九如奉以翟衣侑夫兕爵非止情殷介壽實由義切表忠云爾中丞秉鉞昔行邊屈指捐軀四十年馬革從容真不愧熊丸辛苦自堪憐河山百戰丹心痛爼豆三遷彤管賢忠節並全非易事幾人靑史有完編其二晉陽城畔訪遺祠毎憶摳衣下拜時老我今開江上幕遲公未拂隴頭碑編摩令子知家學訊問髙堂識母儀為説諸艱都厯盡氷霜贏得鬢如絲其三秦淮襆被急歸装拜母今稱八袠觴南岳夫人親授誥東吳名士盡登堂洗心鐘磬皈無量藏血衣冠誓未亡誰似一門鍾間氣獨為家國繫綱常其四兩江持節首維風棹楔褒貞即表忠茂苑碧城瞻婺宿長洲紫府傍墉宫重紆象服華筵上久罷魚軒委巷中聖代旌門多異典懷清臺築具區東賀壽才猷當代仰宗工經濟文章自不同名著玉堂稱繡虎功齊銅柱集飛鴻一身化育鈞陶際萬姓生成指顧中從此豫州多氣象惟憑湘澤望髙嵩其二數年寒署戴清輝為戀深恩尚未歸挾纊何緣同縞帶捉襟殊愧等緇衣盾邊檄就常摧敵馬上詩成已解圍敢訂中原霖雨足願分餘潤慰調饑五言絶句無酒一夜一壺酒牀頭已乏錢强欲禁酤我通宵竟不眠春雨屈指春三月連隂九十朝花片落泥涔柴煙帶濕燒春暮清明方過去榖雨又新來眼看春光盡遊人何日回客訪溪我來客訪溪獨坐夕陽西古道荒已沒隔籬聞鳥啼辛酉上元上谷祈雨作時經臘無雪恐傷二麥持齋三月冀少回天意故作此示羣僚俾各知所省戒云皓月當空照黄塵逐日飛求沾驚蟄雨腸斷幾千回七言絶句羅城署中閒詠牕前馴鴿行書案驚醒主人午夢時起坐閒看十七史古今成敗有誰知其二子厚當年被謫時柳州城上寫新詩那知千載存亡後我與先生共客羈濮湖夜月水落林空蔓草長猿吟虎嘯石龕傍攀蘿尋勝窮人力月色悠然照古塘東津漁火夜靜沙寒灘水鳴雲横露冷渡浮萍星垂兩岸靑燐見故遣幽人撒網驚魚城煙雨石城遥望碧雲端峭壁荒凉煙水寒屈指興亡幾許事清風明月在江干金沙落雁金沙依舊掛灘長孤雁飛飛下夕陽煙斷水寒棲不定稻梁覔處是他鄉晩菊年年九日報花開偏爾今年懶脱腮似怕主人添瘦骨綻黄歛影乍徘徊其二桃李芳菲盡有期菊花愛晩獨遲遲西風搖落今重九尚爾韜英更待誰其三籬邊把酒問青天何苦繁霜帶醉煙縱使向榮嗟已暮更遲疎影益人憐其四一般培植百花臺衆卉争妍不肻開趁取清標須速發莫虛涼序問將來有感書生終日苦求官及做官時歩歩難牕下許多懷抱事何曾行得與人看偶吟石崇豪貴范丹貧生後生前定有因傳語世間名利客不如安命是髙人寫夢終日思家悵復吁夢魂飛泊洞庭湖忽驚信篆歸何處别却耆童覔舊途中秋值雨有感正擬中秋看月華無端雨後黑雲遮天公有意朦朧過不許淸光照碧紗其二歲歲中秋離别天登樓羞看月團圓嫦娥㑹得愁人意雲閉寒宫合早眠秋吟一年又有一年秋難禁時時憶故邱獨坐琴臺心萬里庭前草木盡含愁其二漫誇解綬是何人五斗安能强絆身屈指古今猶未逺閒看菊蕊倍傷神春月臘月出門履雪山梅花向暖綻紅顔春來桃李横岡嶺我自披裘草色閒蜀中山行幾人鞅掌幾人閒山裏僧家獨閉關風雨一犁堪自慰醉歸春社月西灣自吟逢人漫道不如意滿腹原來不合時回首靑山千萬里樂天安命亦何疑鷄冠花亭亭赤幘岸臺端傲出風霜不自寒要識朝陽憑一唱扶桑髙捧海瀾安成都兩任邊荒嚢乏錢低頭羞語尉巡前淮隂受却少年辱也了前生一惡緣其二易老馮唐虚歲月難封李廣未公侯晉秦同好今吳越只為方圓不可儔其三萬里孤舟亦一官窮途主僕强加飱單衣難禦朔風冷倚户無言白眼看送王子重公車三年簡鍊揣摩成喜送公車上帝城我到八閩將改歲杏花時節看題名贈屬邑浠川淑氣冠齊安撫字催科萬姓寛尤望氷壺澄到底神君年少足稱歡讀聘君歌挑燈夜讀聘君歌句句關情觸目多萬物生來同此性吾民不聽却因何其二挑燈夜讀聘君歌引得船頭駭浪多風雨無心猶㑹意吾民不聽却因何其三挑燈夜讀聘君歌水底魚龍噴浪多浪裏魚龍猶聽講吾民不聽却因何其四挑燈夜讀聘君歌江色星光隠沒多雲横斗轉星還現吾民不聽却因何其五吾民不聽却因何豈是吾民癡詐多定有個中真線索從容細讀聘君歌其六吾民不聽却因何笞杖流徒總是多偏與人猜猜不著從容細讀聘君歌其七吾民不聽却因何月旦鄉鉊講亦多室暗心虧神目電從容細讀聘君歌其八吾民不聽却因何表正影端差莫多俸禄脂膏皆妙語也須添入聘君歌壬戌九日人人盡説登高好惟我求閒不得閒山後山前無數景叮嚀遊客莫空還題王子重書室句盆魚牕草真儒意茗椀爐香靜者心補遺乙卯春題書雪堂竹笋纔生黄犢角蕨芽初放小兒拳試尋野菜和香飯便是黄州二月天詩餘憶王孫黄昏獨自聽烏啼芳草樓前漸滿堤寄語王孫莫意迷蚤須歸花影將斜月欲西如夢令歲暮容顔非舊食少形骸消瘦睡起不勝愁頻呌蒼頭斟酒斟酒斟酒夢見故鄉花柳其二赤壁鶯啼岸柳岐鎭雨肥園韭憶别若為情且看燕飛紅痩回首回首穀雨淸明時候滿庭芳脱却蠻烟奔離蜀道三年又到光黄生來命薄才力比誰强眼見此身已老消磨了多少疎狂百年裏有幾人跳出傀儡逢塲思量還故里簞瓢陋巷澹泊何妨任隨緣過日説甚彭殤幸遇杏花赤壁訪遺跡感慨悲傷尋兩地半邱荒草一望白雲鄉百字令楚天和靄忽風狂雲黯霎時雨洩濺入篷牕噴碎玉濕透竹穹珠滴鼉怒龍吟雷轟電掣永夜無休歇桃燈倚枕危檣只恐吹揭待旦爽氣微開枝頭梅子閙似金丸擊菡萏池塘花葉好醉倒渾如無力紫燕無聲烏鴉影滅一帶柴門僻幾人酣飲頓忘昨夜岑寂風流子曉風吹破屋春將暮聲碎滴簷頭見霧繞千村珠開萬樹銜泥燕子帶濕歸樓心歡喜㸃來翻麥浪響過徹溪流茅屋閉門靑山洗漱牧童幾個戴笠騎牛停雲時午後凝眸望滿目繡錯田疇恍惚紅遮古道綠暎滄洲願自今伊始桔橰掛月禾秧飲露婦子嬉遊懷想醉翁遺跡今古誰儔西江月終日陰雲霡霂空過上已踏靑殘紅片片滿長亭兩岸浮萍靡定鶯報春歸誰送遊人獨歎飄零五更杜宇更難聽萬囀千愁不竟其二百歲春光有限一年幾度花紅及時笑傲趁東風正好鞦韆輕送無奈人生易老又當零雨其濛淸明寒食總成空看破浮雲如夢附古文序二篇墓表一篇江南通志序任兩江總制時作我皇上御極二十有二年癸亥禮部奉㫖檄催天下各省通志限三月成書臣成龍承乏兩江總督應董其事江西去臣駐劄江寧千有餘里乃檄署江西巡撫布政使臣張所志草創送臣審定送部其江南省通志則臣成龍與江蘇撫臣余國柱安徽撫臣徐國相徴屬府州縣新舊各志及先儒先賢著述論建之有關地方應備採拾者開局江寧延聘在籍儒臣及丈人宿學通達治體諳悉典故者編纂稽考甲乙次第而臣成龍臣國柱臣國相且相與親為討論焉并董在局諸臣就明繼晷敏皇將事計六閲月而書成共七十六巻臣成龍以職掌所及當有以序其簡端竊見九州之土宜貢賦載於禹貢中古丈尚簡質不事詳贍其後周官所掌三墳九邱與禹貢所載體制不同而秦漢所收列國圗籍時久世逺莫可較訂嗣後或有所述出自一隅一事不足傳信即陳沂楊慎所撰山東四川通志固稱善本然皆私自屬草體例未純皇上乃渙大號申巽命先取各省之志以成一統之志正欲於衆中求其詳於繁中舉其要夫修志之役必始於縣縣志成乃上之府府薈集之為府志府志成上之督撫督撫薈集之為通志通志歸之禮部然後輯為一統志於是無所不該山川貢賦土産人物之類無所不備上下數千載使之瞭如目前然則通志之舉其事不綦重而為之不綦難歟且江南之視各省纂集雖均而難易懸絶何也各省通志原有成書而江南絶無所本事屬創始未易周匝雖窮博採豈無絓漏其難一也孫吳六代以逮明初其經國大猷代各異制披尋史乗浩如煙海旁考别紀又多舛誤稽辨雖勞詎協至當其難二也江左人物甲於四方偉人駿烈尚疑遺佚至如節孝隠逸悉存姓氏既恐淆雜欲裁訛濫慮沒幽潛其難三也所見異辭所聞異辭紀載歲月逺於春秋虞初雜志任情好惡志家之體無容疑誤並存裁量之能豈盡銖黍不爽其難四也大江左右僑立州郡分𨽻不常命名變易考往已多無徴準今何由參覈其難五也而臣等又以迂疎不學之才兼以簿書塵冗之苦短綆汲深曷能勝任惟是祗承詔㫖與同事諸臣其詳其慎纂集成書止足以備一統志之採輯而未敢自信為良史也顧臣成龍自策名入仕仰見聖治右文皇上單詞隻字皆足與詩書典誥争光逮及備官畿輔聞見益親近又與江蘇撫臣國柱共事撫臣國柱久在禁庭身依紫極常語臣成龍皇上以天縱之姿好學稽古講筵詰難燕閒辨問多發先儒之未發宵旰之暇考核異同披覽得失未嘗旦夕釋巻頻命詞臣有所纂著皆足昭垂千載山至於髙則拳石出雲水歸於深而淵泉不竭臣等幸託唐虞之盛世依附臯益之末光使樸僿鄙陋之所纂輯得備崇文内庫之目以垂不朽臣等實有榮幸焉是為序樂經内篇序任福建臬使尋陞方伯奉命陞直𨽻巡撫時作余承乏八閩實司臬事白雲在天每刑人於五聽之庭懲暴亂理寃抑呈制憲姚撫憲吳兩先生以上讞於天子雖生人之念日厪於死人之法而桁楊三木痛楚哀號常不得伸展眉額用是恒憬然曰唐虞時雍風動刑期無刑成周刑措不用何風之淳也太和在宇宙詎易言哉臯陶士制百姓於刑之中以敎祗德與后夔典樂敎胄實同源而異流何也樂陽刑陰樂仁刑義未能漸斯民於骨髓即日取斯民而督責之未易善也語曰禮樂不興則刑罰不中其是之謂乎故知樂者禮之根蒂尤刑之神髓也孝經曰移風易俗莫善於樂良得其原矣毘陵張子炅生彚十三經之語樂者成其書曰樂經内篇攜就商訂余曰千金之裘非一狐之腋思無邪一言克備全經善得其解者觸類可以旁通裒集衆美雅可自命一家是編原本太和之保合深究祀天神祭地祇享人鬼之奥義自天命人心三綱五常之大以及日用起居之㣲靡不悉備而且攷律吕之相生定宫徴之互叶旁搜廣採舉凡正聲子聲正半變半之説鮮不備具研抉精密器與人合德以音傳淸濁隆殺罔有遺缺即謂該樂之全可也昔后䕫韶箾鳳凰來儀師曠清角鳴鶴率舞馬仰秣於巴瑟魚出聽於牙琴聲音之道與造物通其感召洵有莫知其然而然者故知樂之微其於天下無難矣樂記曰大樂與天地同和今聖天子建中和之極正德利用厚生九敘維歌矣凡贊㐮歌敘者惟以樂防民之情而教之和則以致鬼神以和邦國以諧萬民以安賔客以悦逺人以作動物躋天下於唐虞三代之盛於以鼔吹休和即雲門咸池韶濩六代之樂舉不外是苟不探其原而僅求之黄鍾累黍遂致阮咸譏荀朂之尺短和峴病王朴之聲髙李照縱黍嫌於太長胡瑗横黍苦於太短或專求之金石而鬴斛有古今之不同斗臬有眞贗之難辨紛紛於制器吹律以祈合天地之元音安能興雅頌而復古樂也哉抑聞之唐太宗有言朕聞人和則樂清若百姓安樂則金石自諧矣是誠得與民同樂之㫖易雷地豫豫順以動故天地如之此作樂崇德之所由來不可識政教之大成也與披覽是編踰月忽移藩署更懼不克負荷屢上之姚呉兩先生兹復奉簡命北綏畿輔任愈大責愈重益深惴慄爰以教民和一念用自策勵因公之同好導揚太和共覩聖治之咸五登三焉謹序驍騎將軍柱石王公墓表任湖廣分巡下江防道新陞福建臬使時作公諱宗臣號柱石南陽淅川人生有異徴偉骨相膂力絶人喜韜畧射獵禹山洧水間以雄桀自命弱冠遊荆益國初滇黔未入版圖公即審順逆仗策來歸世祖章皇帝嘉之命從事郢鄂今上龍飛之五年滇蜀平江漢底定上念豫楚隘要惟西陵弋陽為重鎮晉公都督僉事駐黄州公至則簡練將士蒐椉補卒於㦸門右隙地闢射圃超距翹關角力較藝立廟祀馬神春秋取駒閑廏蕃庶暇則角巾從容柳蔭中指顧形勝用兵之地以示將佐公紀律既嚴什伍無舛彍弦之士襏襫耰鋤懽然聚處樵牧近於梐枑鷄犬放於營壘其威重慈惠如此性藹厚愛敬士大夫士之賢而貧者民之孤寡篤癃者歲時賙給以為常而其自處則甚約或饋美酒十數罌悉以頒之麾下雖古投醪挾纊何多遜焉康熈七年有隣鎮叛卒匿大崎山中摉牢四出公命偏師馳往擒其渠魁九人送大府餘黨遂鳥獸散歲大饑首倡捐賑存活數萬人上聞加一級十二年癸丑冬滇黔變起倉卒公不震不戁惟申國威明號令備戰守明年正月三日大司馬撫軍張公檄守武昌公星夜率兵往元夜有警公謹斥堠息燈火停漏皷分哨九門而自環甲坐譙樓上夜半領十數騎周巡雉堞竟夕惟飲湯一盞而已賊寢謀不敢發是時大司馬出奇制勝視公如左右手五月麻城東山賊起公請於大司馬率師東下值守憲徐公疾趨至麻城相與贊畫悉中機宜且𠞰且撫不旬日東山平冬十月江右賊出鄱陽陷湖口數縣進逼楚境蘄州大震公奉大司馬命急駐蘄與下雉一軍為掎角時精甲盡在武昌而公所部多新募糧餉匱軍容未振余力圗芻糗並贈火槍百口公立赴蘄蘄民稍安公委羅田守備黑子駐黄梅清江鎭㑹禁軍樓櫓西上夾攻賊賊敗走收湖口星子諸縣自蘄以上金湯安堵事聞上大嘉歎數賜紀録而公以勞瘁病作和門星隕櫪馬夜驚嗚呼痛哉時康熈十四年二月廿二也大司馬思公功特疏請䘏曰方兹多事之時該將勤勞頗著與尋常病故者不同今王宗臣幼子伶仃窮途旅櫬情實可愍應否比照夷陵鎭標馬之迅病故之例恩賜存䘏少慰忠魂激勸勞臣俾服皇恩靡盡疏上天子惻然改容奉俞㫖賜祭葬先是康熈六年覃恩誥封驍騎將軍元配劉氏封夫人並封二代考妣如其官廕一子入監讀書公子名麟紱公卒麟紱甫六歲居喪成禮今且十齡舉止如成人頴異能文黄之人既德公不忍其裔之歸豫也相與留公匶而公素與里中王氏篤兄弟誼有年麟紱將長為黄岡人康熈十七年戊午十月二十九日卜葬公於縣東還和鄉楊坂之原既建塋兆既揜黄腸畏壘相鄉永思無疆嗚呼哀哉麟紱聘現任武昌府城守都督僉事李公諱兆捷女女二俱幼未字公之葬也既礱石鐫誌納壙中而黄之紳士以余知公最深屬文表墓摭實直書用告來禩覽斯文者有所考述庻以禆國史焉鄭肻崖詩集序肻崖黄岡幽人也自臨臯赤壁閩海春潮燕山朔雪靡不晨夕與共昨年秋又訪余於三山石城再閲冬春矣肻崖有句云赤壁清風連越嶠金臺明月又揚州洵浮踪聚散眞歲月也比北道就養於上谷之堯封余摉其行笈有自為詩殘紙蠧蝕得近三百首詩道性情本取其温厚和平有闗於世道人心此四始六義之所以風世也今肻崖栖心道岸放情塵表足跡所至弔古品今不為凡響或時闡聖賢之微丈或時寄漁釣於烟水或時慨昔人之不可見或時抒境遇之所欲言咸以聲韻自寫性情總不欲以姓名聞之海内余素同漢陰南北互忘賓主不急為之裒彚成帙懼漸以為不足輕重愈遺落廢棄特屬繕寫授梓庶宇内讀書學道高人知瀟湘江漢間尚有張子同陸鴻漸其人而肫摯悱惻猶髣髴靈均山鬼天問諸篇閑衛正學更溯源道州濂溪紺寒清水也爰濡筆而弁其端跋鄭肻崖詠筠陽書院七賢詩聖學自濂洛關閩後躬行實踐閑衛孔孟正宗者代不乏賢其穎慧高明流入葱嶺教外别傳者亦復不少得此直指仁體功用仍不外子臣弟友贊頌七賢各如其實洵不敢跬歩違背可謂篤誠之學跋鄭肻崖漁舟詩余在黄州九年交肻崖老人最深比癸亥春日秦淮石城間出畫冊釣魚圖展翫良久雅與張志和陸龜䝉同一風尚余不禁神遊浩浩烟波中矣因捉筆題曰風雨晦明皆造化山河大地一漁翁于清端政書卷八
