body:
  text: 于清端政書卷二兩江總督于成龍撰黃州書初至黃郡與友人書天下有極苦之地居之久而不為苦者羅城合州是也天下有不苦之地入其境而即為苦者黃州是也羅城為蠻煙瘴雨之鄉其苦古今人共知之然久之而茅屋頽垣布衣疏食裸體跣足長歌痛哭習以為常彼其心不在此也在乎欲全生歸家而已又久之而時和年豐盜息民安官民親睦在下易於見德在上易於見功日用之需費有限而一於儉上司禮節不行無所憎惡逮至合州人煙絶滅水陸衝煩苦矣僕則挑水運柴主則讀書飲酒民間供應盡裁上司誅求亦寬往來仕客聞風而歎惜以去夫役因之無擾在上則曰清操毅敏又曰刻苦矯厲為良吏美之又加悲焉憫其窮也在下埀涕號泣無復官民禮此居極苦之地而不為苦者也若夫黃州則不然居郡丞之位履文物之邦署宇嚴肅役胥羅列士民聚觀耳目雜遝狐裘黃黃者同寅也衣裳楚楚者屬邑也蒞斯土者主尚可布衣而步行乎僕尚可挑水而運柴乎為之治其執事備其傘蓋繁其交際咸借貸以應而冷署如冰下無以為德上無以為功五窮環至應接不暇如之奈何此居不苦之地而適為苦者也八年十二月二十五日蚤舟中驟見小犬長者龎然幼者突然竟不識為誰家子徐聽其聲音抱頭痛哭此命數蹇厄父南子北者九年一旦見面肝腸欲碎者也頃捧手札數載隔絶如對芝眉灑淚痛懷始知老年伯奄忽仙遊猶記聶親翁覲旋寄有尊諭勉慰備至尚存笥中忽焉乘箕上天五內震悼此痛切而難已者也惟年兄以禮節情為時自玉積緒萬千書不盡意統希台照不次初守黃郡上張撫臺稟成龍于七月二十五日在麻城縣望花山準武昌府關移委官賫黃州府印信本日叩恩接印理黃州府事于八月初四日離望花山初六日至省回復撫部院嚴命又因新派槽䥷鍋桶等項軍需向閫司領協餉置辦羈遲數日于初十日辭赴黃州十一日巳時到府即將草一百萬束照糧均派行各州縣催解已經報明在案又軍需困民已久成龍不忍將槽䥷鍋桶等項再派民間情甘自任其勞分委屬官覔買木料差役調取匠作買辦鐵炭楠竹籮筐木掀撮箕等物查結各憲守催事件拮據半日神已昏聵十二日早親看起爐處所復清查堆積公文有黃岡縣縣丞王公濯呈繳日收公文自七月十七日起至八月初十日止共拆公文四百六十一件十二日鋪司投遞公文九十一件共五百五十二件自巳時至二更方行拆完成龍不覺頭暈目眩嘔血不止查各項公文堆積如山咸係要件非經承敢于怠玩亦非成龍敢于懸閣皆緣缺員塵封一時何以速理且成龍于本年三月初九日理武昌府事晝夜不遑四月初四日委往咸寧蒲圻于五月十五日歸省即辦解嶽州軍需五月二十二日委往麻城東山于八月初六日方得回省數月奔走身履危險罪戾滋深精力已竭夫以積勞之微軀一旦覩要件之沉積頓使心神驚悸感成癆瘵之危症目前扶病料理務期新派軍需毫無違誤但恐病勢危篤將來不可保也合先稟明到黃州任申飭諭照得本府新奉督撫兩憲會疏補授黃郡撫綏人民全賴賢有司相助為理以匡不逮本府凛遵憲檄夙夜匪懈為爾民謀安生樂業之長策寢食未安惟恐有負上意兹于七月二十五日在麻屬望花山鋪開印視事矣合行飭知為此示府屬官民人等知悉嗣後各體本府愛民至意大家齊心固守清查保甲如有面生歹人聲音互異立刻驅逐境外務使兵民協和城守事宜照依往例多撥人役嚴加守禦盤詰姦宄以靖地方該巡捕員役毋得疏玩取咎未便為黃州各屬報災請蠲詳覆查看得天災流行所在恆有或災于夏而有報蠲夏災之例或災于秋而有報蠲秋災之例未有如今嵗之水旱相仍夏秋並災之甚者也遍閲九屬士民痛籲州縣哀請真淚溢紙上悲不成聲成龍不覺心酸涕流雖夏災報逾定限乃緣風鶴有警士民奔竄呈訴愆期性命之念重初不計及水旱之洊至誠有如蘄州里民張重高等呈稱播遷未歸以致失時不報之詞確為真情通計一歲正賦錢糧既免夏災復免秋災所剩徵納協濟軍需亦復幾何當此叛賊交訌之日荆嶽用兵之時訛言起滅不常士民居徙無定誠有如前府余三汲所詳恐欲徵而無民可徵之語實為有見至于老弱溝壑少壯流離慘不忍言飢寒切膚羣聚為盜宜為後慮此各屬士民有寧死于他鄉為民請命計出萬全之詞誠有如前府余三汲所詳挺而走險黃安知縣徐秉仁所詳以安為盜之心瞻前顧後均有裨國家之碩畫也逆賊作亂人心共憤指日授首當事請協餉以濟軍需暫寬此日災民之命將來百姓感恩踴躍輸賦報效者正自無窮誠有如黃梅縣革職知縣王庭龍所詳留此一邑災黎為後日種田輸賦之民可謂痛哭流涕實意為國為民者矣成龍更有請焉目前荆嶽進𠞰備辦槽䥷鍋桶起運草束穀米等項無不藉民力以輸將若寬小民今歲之賦雖未得小民效順之財而歡呼趨事亦可得小民效順之力並可得小民效順之心成龍愚昧不識忌諱統祈憲裁詳請題蠲除未奉緩徵之先各屬已徵銀兩並照秋糧盡數恩豁以救民命以培國脈合據黃屬士民州縣呈詳妥議申報請免夷運詳竊照力役之征古今通義前次赴荆運夷軍糈派黃州府七千五百石蒙嚴飭雇覔夫驢勿派里甲力役誠愛養百姓培植國本之盛意也漢陽雇騾可稱盡善武昌雇驢亦蚤有成算成龍奉文稍遲忙不及備若買驢雇夫必延遲誤事晝夜焦思無已設借驢之法言定驢回給主傷損官賠里民踴躍赴公毫無難色而領運無人點衙役代勞各役向隅環泣費幾唇舌方有定局各屬照例遵行此成龍一片苦心於倉卒之際為濟急之舉期以上不誤公下不病民已耳無如夫驢至荆便已疲斃日久所傷必多兼誤運事而荆州之夫驢一呼可以萬計於是委官審度時勢為雇夫之舉每石夫價有一兩者有一兩一錢五分者有一兩二錢三分者除官價六錢五分應幫夫價自三錢五分至五錢八分不等此外去役之盤費驢隻之草料賠驢之價值俱屬妄費咸係官賠方幸運米蚤竣私為得計倐焉二運之檄又至矣牌仰在荆夫驢再運然夫驢久已各回將何以應各屬申請盈案紙上之哀訴盡是哭聲筆端之揮灑無非淚漬成龍之心已碎術已窮是當年西山之運苦在民而今日夷陵之運苦在官如逼之仍照前運有司力竭豈甘坐困掩耳盜鈴安能舍里甲而索竒計也莫若行力役之征光明正大官民相濟終為久逺之法如里甲艱於逺行有前運雇夫之成例在焉成龍萬不得已更有泣陳前次派武漢黃三府運米之數漢陽府兩縣派米二千石武昌府除江夏蒲圻通城嘉魚量派外尚有六縣該運米六千石黃州府除黃梅廣濟量派外止有七縣該派米七千石前次多派米五百石成龍以運米未必如此之苦且夫驢可以帶運此五百石之任勞似無傷也不料一石有一石之費彼此輕重不均各屬議論沸騰今二運多派之米似難再運如以已派不便紛更查德安府於已派內新減一千石或可援請伏乞憲裁敇司道公議定官民運米之法施均派恩減之仁庶奉行不至遲誤軍需可以濟矣上張撫臺請免運夫稟成龍於十九日晚渡江敦請各騾店婉辭懇求無如堅執不許憂心如焚專委馮縣丞叩稟憲階漢陽有騾武昌有驢成龍將何以應即於二十日夜至黃細問蘄水縣丞王遴自荆至夷路程運米事情荆州六十里至穿心店三十里至河溶五十里至當陽三十里至玉泉寺四十里至連平四十里至涼亭二十里至風寶山三十里至夷陵共三百里山路﨑嶇一夫止負米三斗帶食米一斗多負決不能行兼有被褥雨蓋之纍領米收米必需半月是一月止可運米六斗也荆州除遵法官雇外運米一石索銀一兩六錢王縣丞離荆時一兩六錢已不肯運頃有信自荆州來土人每石討價二兩五錢是運米七千五百石須費萬金以外黃屬甫定之餘災傷之際何堪當此苦纍目前正餉雖完南漕正在催比轉盼明歲錢糧又行開徴民窮莫措委實難支官價六錢五分為數雖少何至浮加數倍未必非射利之徒乘機作祟貽害百姓貽誤軍需成龍計窮力竭與士民密議捐輸夫價以救一時之急伏乞憲臺恩憐成龍苦心俯允捐輸恩免運夫成龍幸甚地方幸甚請捐輸運價免役運夫詳竊照我國家三十年來愛養百姓堯天舜日海內享升平之福一旦吳賊逆天首亂湖北震驚邇來侵犯夷陵王師會𠞰軍行糧從難容刻緩需夫饋餉勢所必至凡踐土食毛之氓正效力報恩之日也兹因荆民疲於奔命派及武漢黃三府黃屬該運米七千五百石敢不竭蹶從事成龍考古度今審其時勢權其機宜有用民之力者有用民之財者名雖殊而實則相濟惟期有禆公事而已如黃屬者應用財而免用力之區也黃屬九州縣以時勢言之除黃梅廣濟今夏水災題達請蠲而黃梅兵馬過往踐傷更甚已蒙司道公議裁減量派不議外麻城黃岡羅田蘄水環繞崇山峻嶺接豫省之商城固始連廬州之六安英霍聯絡四十八寨素稱易與為亂難與為治之地去歲么魔蠢動人心叵測屢煩官兵而麻城令屈振竒黃岡令李經政蘄水令蔣燦羅田令王光鼎相與戮力撲滅題敘各軍功在案黃安密邇羅山豫冦釀禍黃安令徐秉仁躬親招撫題敘紀録在案黃陂與孝感黃安接壤逆賊搶楊店驛馬查報題明在案黃屬之時勢如此迄今婦子以寧地方無警然投誠向化之輩雖云革面難信革心成龍何敢一刻置諸懷則權其機宜不得不為萬全之計也查派運米七千五百石每夫運米五斗計用夫一萬五千名呼之難猝至聚之深可憂是夫未至荆而成龍膽先落矣奉守憲牌議運米一石應給官價銀六錢五分則七千五百石應支官價銀四千八百七十五兩是朝廷未嘗輕役一民有此官價何處不可覔夫成龍為軍糈計又為地方慮情願勸勉屬民捐輸銀四千八百七十五兩為募夫之助少省朝廷金錢以伸黃民急公之義以彰上憲恤下之仁用民之財寬民之力婦子仍然以寧地方仍然無警於軍糈民生未必無禆益也如捐輸不前成龍任遲誤軍需之罪或恐成龍藉端分外苛派甘心正法以謝州縣或恐州縣藉端分外需索成龍揭報以謝士民此成龍窮極計生憂心焦悴權其機宜如此否則運夫之催逼中途之逃亡運米之遲速一日公事未竣一日憂心莫展成龍惟有愁悶絶命已耳伏乞憲臺迅飭司道各憲會議成龍寢食俱廢晝夜望賜恩命以解倒懸之危謝徐守憲詳免派夫稟成龍屢聞派夫之議晝夜愁悶如坐針氊於本月初十日稔知憲臺詳請折價武漢黃三府士民戴如天之仁隂德萬代朝廷受無疆之福鞏固百世成龍不覺心折手額踴躍欲舞復望憲臺一力主議哀懇必行成龍奉命唯謹伏乞憲鑒為麻城請改南折詳麻城一邑僻處萬山之中東北與豫省光息商固接壤東南與江南英霍六安比鄰不通水次惟宋埠一鎮僅有盈盈一水九月之後水涸沙淤需用竹􅑉僅裝米八九石不等尚須人在水中牽拽百里之逺出鵝公頸方抵大江艱苦異常此厯來南米蒙允改折久經憲臺洞悉無庸成龍瑣陳也目今軍糈扣算已定刻不容緩若俟麻邑南米接濟夫以盈千纍百之米用八九石之竹􅑉挽運曠日遲久欲其速濟軍需豈可得乎在百姓筋疲力竭已不可言而軍中之庚呼毫無禆益兹據里民梅天章等呈稱恩詳改折以從民便呼籲痛切成龍悉知麻城之山隅不近水次更審酌軍糈之緊急難容緩待不敢膜視合據詞請命伏乞憲恩憐山城水路阻逺兵食萬難刻緩俯從民便飭糧憲照例允折庶公私有濟兵民受福無窮矣上張糧道諫止採買稟成龍猥以謭劣幸荷恩培感戴終身然覆餗之懼恆切寸心目前軍糈孔亟憲臺晝夜不遑成龍屬在下吏不能少助一籌自反深慚第採買糧米成龍有三慮不敢不為憲臺陳之黃屬邇來鼠竊狗偷遍地橫行憲差賫銀務宜愼密前聞有盜自省跟憲差至陽邏托憲臺洪福來差早已登岸幸免無事兹聞來差不加愼密將銀兩裝在口袋明搭騎走惹動匪類計算恐不可測此露白之慮一也賫銀採買必訪殷實經紀自可無失兹聞憲差不察虛實概行混領混給若輩領銀之後販豬買鹽視為已物不惟遲誤軍需恐此輩窮棍花費一盡攜家逃走定煩緝追此散銀之慮二也採買軍需係上倉糙米兹聞憲差遍發示條糙米之外一概收買大船小船絡繹不絶以致民欲買升合不能到手宋埠附近地方居民已閧然不能相安今聞牙魚坑百姓又有奮不顧身之舉此地方之慮三也伏乞憲臺密飭差役小心謹愼細擇經紀糙米之外勿包攬客船仍分些須以濟民食成龍不識時宜冒昧上陳可否惟候憲裁上張撫臺請免募鎗手稟成龍質腐才疏仰荷知遇之恩即肝腦塗地難酬萬一惟期保障黃土紓憲臺東顧之慮幸今歲雨暘時若百室頗盈婦子頗寧人心貼息無復去歲風鶴之警逆黨煽惑之擾咸賴我憲臺恩威並用深仁厚澤淪浹黃民之骨髓成龍毫不敢有所假飾以欺憲臺也惟鼠竊狗盜未能絶迹雞犬尚為騷動成龍恆鰓鰓憂之邇來民多訛傳調軍前之夫抽民間之丁成龍靜以鎮之訛言甫息忽于本月初三日奉藩司牌召募鎗手某州縣招募若干名立刻催報前此百姓之所訛傳為抽丁者即此故也愚民實不知為召募也第此亦關係地方安危大事夫以為召募則可若定某州縣招募若干名恐未盡善也黃屬皆耕田鑿井之庶民有父母妻子之關切其中或有遊手好間情願為兵者召募入伍彼亦甘心可濟實用此招募不拘多寡行之則可如定以某州縣若干之數有司不善奉行畏上督責猝募無一應者勢不得不押鄉保以公報勢不得不派銀兩以雇覔恐此一舉地方多囂動矣姦人乘之禍不可測且有成龍不敢言者遇知己之賢又不忍不言也前荆州調黃協之兵甚至親友泣別灑淚赴途光景淒慘不堪聽聞更有一二雇覔代行彼已情願入伍尚且如此况耕田鑿井之民有父母妻子之纍一旦逼以招募之舉又不知作何光景也伏乞憲臺裁酌俾憲臺焦心苦思剿撫經營之地方獲以萬全如召募必不可免似不宜分派州縣限定數目止責成成龍量其緩急陸續招解可否允行統祈憲鑒蚤為定議庶人心安而地方無虞矣上張撫臺招募獵戶稟庸材腐質蒙恩拔識寵以章服優以異典知己之感千載一時德難酬報當此逆賊侵犯正大彰撻伐之期凡屬臣子罔不奮勵况成龍受憲恩隆重恨不能坐展一籌少舒憲憂寢食為之不安于本月十二日已時恭接憲牌取用獵戶各縣不能奉行致違憲命但獵戶與鎗手雖同而實異黃屬獵戶最少鎗手可學而能各屬或泥定獵戶不敢妄報罪誠有由成龍凛遵憲檄多方勸諭招致年力精壯習熟鳥鎗者濟時之用伏乞憲臺霽威姑宥各屬無知之愆成龍感戴無既復張撫臺招募鎗手并運驢夫役稟張漢一委牌遵諭面給仍再四勸勉竭力報恩無滋擾地方已赴黃安縣訖於本月二十七日談以從來黃成龍復發委牌一張俾與張漢一協力召募乂託羅山生員羅一者亦往召募不拘多寡此委羅一者便於談以從勸募可無他説也運米驢已有六百隻點衙役二百四十名每夫四名領驢十隻立一小旗每夫二十名領驢五十隻立一大旗以免混淆驢尾烙印記驢項繫懸牌書毛色并夫姓名以便認識口袋雨具俱全均有記號又恐衙役辛苦設備帳房委照磨李德署縣丞唐紹先督領刻日起行尚有夫驢如法陸續前往木料委經厯張徙溟催辦合先報聞以紓憲慮捕盜巴河歸報張撫臺稟成龍叩謁憲階回府料理運米苦無頭緒以致心火焚熾又因夜查關廂街道城門一嚮馬驚墜傷成龍倍加憂悶數日稍愈夫驢亦就甫得安枕不料心火外發膚生膿胞卧牀呻吟於本月初十日忽聞巴河有失盜之傳漸不可長成龍扶病微行由徑至鎮入失主之屋細看前後兩門並無打壞蹤迹情有可疑亦不敢苟且輕易再行密訪拿獲一犯居住偏僻素行不端十一日復以點煙甲為名遍訪真盜立刻緝拿當晚二更回衙十三日失主到府文武同赴城隍廟會審失主身無點傷情更可疑當晚刻拿失主家奴十四日早審窺見隱情知為失主奶公通盜也但真盜未獲何以服失主奶公之心於十五日晚在葦源口拿到一盜即時鞫訊自認情真十六日蚤再加細問滿盤托出則成龍前訊奶公通盜之情果無差謬隨傳失主面聽供詞陸續呌失主家僮俾盜識認第一第二供稱不認至第三乃為奶公盜大言是他調線開門而失主奶公俯首不能強辨立刻即將盜口供出的黨差役分布緝拿大約多係興國地方慣盜一面差役往興國移文協拿隨將盜與奶公寄黃岡縣監候差役回府必有著落此夥竊盜毫無顧忌若不嚴法以懲人人效尤將來何所底止另容申報憲臺創一懲百成龍因此勞攘數日膿胞益勝臀不能坐手不能持腿不能站又值木料堆集江干不躬親檢查終不放心強病支持遍體疼痛不能假寐蘄州木料先行蘄水木料頭幫已過黃岡不過一二日裁截停當合幫赴荆地方事宜委張武舉鄒貢生沿路立堡巡防事尚未竣成龍血氣久衰精力已枯力不從心強勉供職地方一應事宜伏乞憲臺寬慮上張撫臺籌捕盜稟成龍才力疏庸自愧難肩重任久荷憲恩俯鑒至於地方盜賊橫行失主與鄉保朦蔽不報習染成風以致鼠狗無忌真堪裂皆成龍已痛切上陳幸憲臺頒式嚴飭成龍敢不一力奉行若成龍屬員朝夕告誡一已之功名事小百姓之殘害地方之擾亂事大天理良心安可以一已功名竟置百姓地方於不問也巴河烏林二案非成龍抱忿不甘微行密緝又蹈前轍目前烏林港一事訪有蹤迹但恨成龍力薄不能供養緝拿人等不料鼠輩仍無顧忌行劫倍甚自蘄州至九江處處變亂成龍躁激欲死又蒙督憲嚴檄責成龍前在岐亭盜息民安何今日奉行不力反致盜案纍纍成龍更苦之甚矣前在岐亭稍有風聲便可傳知朝聞夕拿頃刻立擒登時處死皆躬親經理今地方寥廓各屬朦蔽不報在成龍以為可幸無事誰知養癰至此成龍疏虞之罪其何能辭無奈遍發捕役各處打聽蘄州又失兩事失主帶傷鄉保不報州官不知成龍即刻行查務遵憲頒式以滅此鼠輩特成龍血氣衰弱實不能當此焦勞統祈憲憐上張撫臺籌報水災稟今歲水災自四月泛漲至十月初旬尚未退涸變出異常蒙憲駕臨仙桃鎮親看水勢軫恤災黎敕藩司取各府屬被災情形繪圖請蠲誠覆載斯民鞏固邦本之至意也成龍愚昧揣度時勢竊有眇見上陳凡天下事情與勢而已官與民休戚相關如遇疾苦何忍膜置痛哭陳情職所當然若今歲之水災各屬為民請命此今日之情也目前西南用兵日費不資而賦稅全盛之省惟有北直浙江江南山東山西河南是朝廷之所入有限而兵馬之需餉浩繁且關𣙜與鹽課俱不能征如舊額司農仰屋因之官俸役食等項裁扣殆盡而加徵鄉宦編派屋稅無非艱難補苴之計此今日之勢也以今日之情審今日之勢國用匱乏災傷疊告皇上痛念民瘼敕王大臣會議蠲免在廷諸臣憂心軍需輾轉無策欲蠲災則絀餉欲充餉則勸徵勢處兩難此安徽撫憲豫審情勢有水不成災之疏而部議又有高郵等處亦不準蠲之覆也目今湖北水災最苦最慘者無踰沔陽潛江景陵漢川黃梅廣濟如以被水諸縣槩為請命合計蠲免錢糧太多部臣必有難色倘如江南事例則最苦最慘諸邑受害自不可言即痛哭流涕恐難補救或回天有力幸邀皇仁而司農計窘必將十六年民賦如鄉宦一例加徵是以絀於十五年者加於十六年則蠲災之惠淺而加徴之纍更甚且蠲災不過一歲而加徴必俟事平苦若之何雖朝廷必無之事成龍籌及兵餉不得不為之過慮也揣情與勢之間而期於救民實際或擇被災之最苦最慘者會請蠲災其餘仍行勸輸將國計與民生相濟為用尚未卜廷臣之會議何如也此成龍愚昧之見未知有合時宜否伏乞憲鑒報張撫臺地方妖異稟成龍才疏德薄久荷覆庇兼辱教誨而區區緝盜安民之私素蒙洞鑒至恩拔郡守惟覆餗是懼倍加防禦幸履任一載頗保無虞忽於去歲五月大風示警以後怪異疊見自冬迄今府城回祿屢虐兵民受困或見為火團或見為赤鴉齋戒祈禱茫無一應此一異也猛虎晝行路絶人稀夜傍民舍巧為緩步之狀故作嘔吐之聲哄人出視犬出吠則銜之而去此又一異也有一等賊民三五成羣匿於林中日將暮伺有孤客粧成猛虎一喊跳出將客挾入深林縛歸藏土室內不見天日遞賣他方有一等妖民青天白日大路之上用手將行人臉上一抹其人即不能言語頭畜行李公然收去此又一異也至於山隅孤村有一等惡少高郵沔陽流民人物魁梧衣服整齊口稱討米勒索無厭稍不如意傾家搜括城市鄉村男扮女粧公然行走沿門乞食徑入內室與婦人鬧爭全無忌憚人不知覺若夫偷盜牛驢到處皆是成龍欲以德化之而德薄欲以法制之而法窮將刑不勝刑盜不勝盜矣種種怪異從未經見更可異者豫省光羅大雪盈尺即黃岡境內雨雪潤濕而麻城黃安自秋徂冬全無雨雪土堅成塊犁不能入麥未下種野無青菜固成龍不肖所致亦是造化菀枯不齊目前開徵不知何狀兹當新正履端之始乃憲臺百福駢臻之會正千官慶賀之辰亦即萬姓望澤之期成龍備敘黃屬情形仰冀憲鑒俯賜軫恤以埀𢎞庥上張撫臺籌緝逋冦稟史國柱包藏禍心煽惑地方蒙憲臺面諭密緝成龍凛遵指授幸未漏網鼠賊就縛咸伏憲臺威靈成龍何功敢當奬諭至練長王芳逺等感荷憲恩特賞袍帽銀兩成龍愈踧踖不安兹奉密諭孫調元汪華之陳克韶成龍刻即設法迅擒倘遁入黃安便為籠中之鳥決不致兔脫貽禍內地但成龍新聞陳鼎業陶白雪潛逃九江苦無的役緝拿唯望王芳逺張漢一方茂貞來黃密議陶楊二生成龍給以委牌俾防守畢家鋪一帶地方又六安麻埠告警密邇羅麻成龍於羅田界鄰六安英山等處已發委牌諭有身家生員豫為防備仍委武舉張尚聖赴羅偵探成龍揣度時勢另具密稟伏乞憲鑒又招募鎗手係生員吳之鄒經理成龍因黃梅飢荒募穀四百餘石委生親往賑救尚未回黃俟吳生回府清查頂替情由另報報張撫臺籌捕餘冦稟才疏性拙幸逢知遇格外殊恩感佩終身黃麻東山仰賴憲威頗稱寧謐孫調元就擒已除腹心之禍止有陳鼎業仍祈溫諭張漢一遍緝料難漏網訪孝感山洞中藏賊甲三十副鳥鎗數十杆已密差查起未知虛實江右寧州賊平興國大冶無驚而黃州可以安枕伏乞憲鑒外程鎮邦家貧糊口不給武舉魯試拿賊盜一案久在武昌統冀恩施報張撫臺獲陽邏偽劄稟十月二十七日晚據陽邏生員楊瓊枝陶大定出首遊擊偽印劄綾一段守備偽印劄紙一張同黃岡縣知縣李經政至衙密繳二生冒雨星夜來黃實屬忠誠當賞銀二十兩其送劄陳遇之子陳鼎業即刻會同朱守備委吳把總密擒已將偽劄二張呈驗守憲轉繳合就報明祈即會同各上憲以備叵測緣係機密事宜恐有泄漏不便關移慰諭陽邏士民諭照得地方之不靖由於人心之未安人心之未安由於疑畏之未釋陳鼎業父子家世陽邏同鎮士民非親即友偽劄一案或有附和入黨者或有知情觀望者或有畏禍結舌者鼎業事露人人自危誠無足怪本府確知爾等隱情槩不株連於去歲十二月內親臨爾鎮發示勸諭爾民之心可以安矣春三月間爾民復驚畏不安或因不軌之徒潛布流言今史國柱等已經授首則爾民之心可以無驚矣或又見陳玉之久禁首犯未除恐其波及今陳玉之等已正法則爾民之心更可以安矣又或見陳鼎業陶白雪等未獲遍行緝拏致生疑畏不知巳逃必捕者朝廷之大法來歸必釋者朝廷之大恩即張漢一方茂貞投誠有功撫部院賞賜袍帽銀兩現今録用已有明驗若陳鼎業陶白雪等洗心改過親自投誠不但不究前非亦且嘉與維新倘執迷不悟定期必獲此理勢之必然與爾民何干多此一畨疑畏合行曉諭為此示仰本鎮諸色人等知悉凡倡亂者許自投誠即行奬賞親戚鄰佑槩不株連有私行詐害者許被害之家不時喊稟便行究治各宜安心樂業毋自貽戚招安六安州麻埠諭照得嵗比不登小民失業者衆困於衣食往往相聚為非原其初念豈便甘心作賊不過計窮無聊希延旦夕耳朝廷知爾民此苦故投誠歸命者概從寬宥分别奬賞各省督撫久悉此情故倡亂脅從者先事招徠不忍遽𠞰本府仰體上意俯察下情疾首痛心無非欲保爾民之身命洗爾等之惡名區區此誠天日可鑒前者蒲圻不守言者遂指為從逆大將軍震怒將加剪滅本府單騎入城招徠底定至今安土樂業得免誅夷次值麻邑東山告變主𠞰之言一日數至本府親加撫綏各憲賞賚優隆今兹家室豐登盡為樂土近者羅山賊首隔省來歸本府不以越郡為嫌督撫不以鄰省岐視迅發銀布衣食移咨豫撫及所在官司赦其罪愆護其田里彰彰耳目共見共聞此豈本府别有異術不過仰仗朝廷寬大與各憲慈恩處置得宜能服其心耳今聞爾麻埠地方亦有亂信風聞不的虛實未分事屬南省在本府可以膜視但念爾等同處天壤之間誰非朝廷赤子或為勢豪所迫或為飢寒所驅或輕信亡命之徒假造偽劄轉相煽誘以致二三無賴謂釁隙可乘富貴可望甚至謂大兵精鋭進討湖南江西可以乘間陸梁不知挾持偽劄之人即係近省犯罪潛逃者計無復之故假此入夥若此輩果係滇黔親信則彼必留為自用安肯逺奔數千里之外其人若果有才能亦必自戀富貴又安肯出萬死一生以試虎口即爾等偏信不疑亦須審度時勢試看湖南江西相持一載彼曽進尺寸否自救不暇焉能救人目今滿兵一萬新駐九江而四王爺李總統大軍不下數萬正從信陽過師分駐廬鳳江州等處倘聞爾等竊發遣一旅之師關會江西湖廣河南江南四省與爾連界郡縣會兵進𠞰爾等求撫不得欲逃不能滇黔之逺水不救近火本地之親鄰盡為敵國黠者背約先逃愚者束手待斃眼前之妻子盡屬他人祖遺之田産盡為官物仇讐快意親戚悲傷垂及子孫尚為笑柄爾時求本府今日一紙書安可得耶如謂本府不出實心徒以大言相恐不妨廣為偵探商之老成以決從違蓋好亂喜事之人常以訛言哄動爾等不察事勢轉相傳布認假為真至敗方知悔已何及往年爾等地方亦曾有亂彼時首事者尚有膽識結連者尚有數郡控弦者尚有萬人曾幾何時灰飛煙滅父老尚能言之爾等當亦目擊則其效亦可睹矣合行曉諭為此示仰麻埠士民人等知悉或有難白之隱情切膚之痛楚以及飢寒科役仇傾勢挾種種苦情不妨徑赴本府投訴本府一面移會爾府官司善為安插一面飛詳本省撫憲轉咨爾省撫憲求其寬宥賑濟一如羅山等處事宜決不食言其有才力過人志懷報效者本府定保舉題敘以憑録用立賜顯榮必不以傾心向化之誠置之空言無用之地此本府一片婆心故不避越俎之嫌諄諄勸勉如慮本府地方區堡嚴密不敢徑通當令二三老成隨傳示人前來先為照會倘執迷不悟則本府與爾輩相隔數百里風馬牛不及利害俱非所關亦坐視爾等之噬臍而已思之慮之以毋負逺念至意上張撫臺籌畫預備稟今日之時勢靡定人心之向背無常相機制勝圖萬全之䇿在封疆大臣審先後緩急之宜而已成龍下吏沐恩高厚稍有聞見何敢緘默不言去嵗滇黔告警人心蠢動時勢之一大變也王師雲屯荆鄂鞏固而人心定矣嗣後江右告警人心復為蠢動時勢之又一變也禁旅電馳府縣恢復而人心再定矣目前秦川用兵聲聞不一人心易於搖動姦究煽惑潛謀叵測此時勢之變而乂變也凡所以肅清內地謹防外冦無一事不為要務憲臺受國家重任晝夜不遑形神勞瘁而湖北繫天下安危愈不得不蚤為之籌畫矣今嵗元旦生員吳之鄒在署成龍命占一課得旅卦官鬼不動主無賊冦但恐四月有一小警立春日命程鎮邦占一課亦係旅卦官鬼不動恐四月有一小警本月十九日徐司獄寄一課係鼎之訟齗云地方反側已安四月有一虛警無害五六月漸就平息勿慮成龍愈憂之蓋徐司獄之課最驗去嵗成龍自蒲圻歸武昌也占主敵人受降未幾而有招撫東山之役自撫竣而赴武昌也占云東南還有一行冬月而果有剿何士榮之舉兹占四月有警安敢不豫為隄防黃府屬所可慮者麻城黃安羅田黃梅四縣今趙提督鎮守潯江黃梅可無虞也羅田年來安靜無有釁端成龍諭生員蕭二至小心謹守麻城渠魁殱滅猝難再禍且有協兵五十名駐扎項家廟虛實動靜可以緩急相聞所慮者黃安離府太逺談以從倡亂之時城中紳襟聚蒼頭數百將為內難以從一撫居為首功今以從未歸羅山又不便發兵防守此處恐有疏虞成龍於黃麻地方命鄒家河貢士鄒世美練鄉兵五十名潘家塘生員蕭命福練鄉兵一百名牙魚坑余忠信觀音閣陳玉環共練鄉兵五十名居中預備以防不時之警此成龍一府之事也其餘形勢要害憲臺自有籌畫成龍不敢不鰓鰓過慮之細閲諸家占辭應主西南則荆嶽隄防更宜嚴慎成龍受恩難報敢以所見所聞陳獻期盡此心伏乞憲鑒籌廢藩及江淤地畝認糧議清查田畝一案關係國計民生既防欺隱又免包賠誠於目前籌餉之中為久逺善後之圖煌煌天語培養根本積纍功德豈微識淺謀所可幾及也成龍自奉清丈之檄查算黃屬田畝咸遵部頒全書起科原無缺額可省行丈滋擾厲民惟為國用計止有衛所地畝荒熟未清江湖崩淤小民爭訟似應清丈認課者也至於廢藩宅基園塘原無錢糧不在更名地畝之內曽條陳藩憲酌詳以清丈理頭緒總期不病國不病民為籌餉涓滴之一助也成龍準蘄衛請丈出首蘆地報明前往而該衛已經查確出具印結申報毋容再丈因見蘄城滿目荒草居屋晨星查係故明荆府諸王宗室廢基麒麟山下荆府正宫建立佛殿東宫建立關夫子廟四傍營兵蓋屋居住蒼雞山前德安府為已故王參將修屋家眷居住東城應山府為現在李鄉紳領修街房鳳凰山底永福府已開為菜園有庠生願領為學堂一時人心鼓動爭認價求領有十數兩者有二三十兩者有四五十兩者合算有七百餘金而懇領尚未止息查更名地畝一案係載正賦錢糧在蘄州全書額內比時苦於承墾無人正賦缺額變價之説格格難行何暇議及廢基荒園也田地招人開墾納糧尚且難之城內之荒基招人建屋居住將誰應乎國家三十餘年地方享承平之福雖數載冦氛密邇而人心鞏固咸為子孫之計願上價承業已建屋者無官基虛懸之慮甫認領者有創造日新之漸合乎人情似屬可行若編入更名地畝恐人心退避蓋以地畝每年耕種納糧與屋基修蓋居住有不同也但變價之説恐開後釁或易變價之名為上價令開廢基修屋居住以實城內之煙户以壯金湯之氣色未知可否伏候憲裁若夫淤地一項臨江鋪與洲民相爭松楊鋪與屯軍相爭屢懇丈立界限又羅湖洲李家嶺首報新淤三十五頃成龍親赴鴨蛋洲踏看除久淤已種熟者將新報之弓口畝數與老册對查內有溢額者照畝認納蘆課此無容議惟相爭之地界尚在盈盈一水中先將竹纜量定丈數兩家駕船水面插竹水底各立界限成龍均平分之鴨蛋洲量定四十九弓臨江鋪自認一百三十二弓此地江流在上並草塌白沙之無迹不知相爭之意為何也成龍細加採訪據洲民崔雲從稱臨江鋪界內占去伊今年麥地蓋以九十月之交水涸地出種麥至來年三四月間收麥任江水湧流如此之地似可免議留百姓以有餘無如各願認課永為已業祈免後來之葛藤松楊鋪與屯地亦同此類至羅湖洲李家嶺據報三十五頃又報一十五頃係互控黃岡縣憑衆處明立約今丈明願承蘆課但西江之水雖淤而東江之水已崩似非永業將來包賠之苦在所不免但不認課則承業者終不安心旁觀者難禁指摘成龍仰體德意凡一切已崩者可否將新淤補還準賜印照以杜衆議庶可免賠已崩之糧而又認新淤之課也又有葉家洲係大江流水溢入有淤無崩似可承課又查蘆政淤地五年一丈自康熙二年丈後迄今十有餘年值兹奉行丈定似可免將來部差之煩又有陽邏等處湖清水曰湖止水曰汊載麻鐡乾魚正供長江流水業甲納府鈔正供江水崩淤不常凡有新淤水應歸長江業甲無如湖課業甲與兩岸居民每多私占取魚亦爭請丈且有舉首隱沒湖璫淤地成龍因案牘積久回府料理伏乞憲裁可否併查如奉文查出田畝多寡有紀録加級即升之例誠以鼓舞效力之法雖清查為州縣職所當然但成龍在蘄在洲目覩州縣在烈日之中步行查丈揮汗如雨面顔頳黑為國盡心不憚勞瘁紀録加級即升固屬酬庸之恩典然或邀一時之功名貽日後官民之苦纍此成龍之本心所不安也又廣濟民首出王莊未知虛實可否行查首虛反坐合併敘明統乞憲裁或敕藩憲酌議萬全杜百姓之物議免大部之瘢索賜示以便遵行勸諭急公照得滇黔作亂大兵征𠞰鍋槽草豆勢所必需非官司之忍心苛求實兵馬之日費浩繁爾民逺處山谷辦解固苦而各官軍前支放淒楚尤甚本府在武昌答應因草不足曽撞頭於柱上因豆不足曽逼跳於江中因船不足曽捨命於湖內傷哉九死一生言之涕泗交流是屢次派徵爾民有賣兒鬻女之慘而催解不前居官有性命存亡之危即撫部院朝廷大臣身受窘辱大小官員奔走泥塗實厄運偶逢三桂造孽害我官民夫誰怨尤在朝廷軫念民艱一應軍需現發帑銀尤恐下情難達特委三大臣料理糧糗決不派之民間浩浩皇恩諭告屢頒且撫院告示有軍需孔亟念切如傷請銷腳價請緩征賦宵旦不遑形神交瘁之語昭然在人耳目爾民閲之豈不痛哭無如上恩有餘而下行則阻如買草每束一分二釐未嘗短價而發銀未能足數且零星發買必有折損差役鄉約俱有盤費此項銀兩豈非一分二釐數內乎若夫軍前折草官價一分二釐如數支給查每旗有三營每營甲喇四五名共有十四甲喇不等即分銀十四封稱折最苦且五日一放無限留難又八旗有八委官支持每放有賞賜哀哉此分外費用不準開銷責之官賠窮官有何家業而能賠耶爾民之苦官知之居官之苦爾民何能知之若夫武昌之草費至二分荆州之草費至三分以外哀哉官民交病誰好為之如本府署武昌時因安撫來麻時衙中尚有總督令箭供奉棹上差官夜不收坐則衆喧嚷行則拉馬頭居官如此之苦而欲州縣之緩催得乎所幸者禾苗豐盛天恩也錢糧停徵皇恩也黃屬地處江北雖有兵馬往來不過一時之驚比之荆襄鄖嶽武漢一帶大兵駐扎野無青草糞積如山民人流離不知何所黃屬尤徼天幸得享太平合行曉諭為此示仰黃屬民人知悉軍前需用勉力支持且照糧派解尤屬衆擎易舉縱受追逼皆由天定切勿怨尤難星無不過之日逆孽有速平之機照項蠲補以酬勞費諒不爾靳慎選鄉約諭照得朝廷設立鄉約慎選年高有德給以冠帶待以禮貌每鄉置鄉約所亭屋朔望講解上諭十六條勸人為善去惡甚盛典也後世查姦戢暴出入守望保甲之法更多倚賴焉無如黃屬風俗澆漓教化陵夷凡有司勾攝人犯差役不問原被告居址輒至鄉約之家管待酒飯稍不如意詬詈立至且於朔望點卯之日肆行凌虐倘人犯未獲即帶鄉約回話是差役之嚇詐鄉約倍甚於原被二犯更有苦者人命盜賊不離鄉約牽連拖纍夾責受害甚之詞訟小事必指鄉約為佐證投到聽審與犯人何異且一事未結復興一事終朝候訊遷延時日無歸家之期離縣近者猶可朝來暮去三家店等處逺在縣治百里之外即以點卯論兩日到縣一日點卯再兩日歸家是半月內在家不過十日加以協拿人犯清理區保手忙足亂無一寧晷若三家店邱鄉約賣一婢女止應得鄉約一年民間那有許多婢女以供因公賠纍乎凡為鄉約者所宜痛哭流涕也言之可為太息當日給冠帶待禮貌之優典何在講解十六條查姦戢暴之良法何在一旦責成保甲彼鄉約曽未家居何由而勸人為善去惡何由而諭人出入守望名實不符上下相蒙世道頽靡大不堪言因之年高有德鄙為奴𨽻殷實富家視為畏途或情或賄百計營脫而寡亷喪恥之窮棍兜攬充役串通衙捕漁肉煙民以編甲漏造為生意以投呈證佐為活計惟恐地方之不多事也居民之不興訟也差役之不來照顧官府之不來呼喚也事勢至此尚可言乎故報充鄉約巡檢有常規差役有常規書辦有常規此等銀兩非出之煙户而何鄉約之苦至此極矣於是有半月之鄉約一月之鄉約有朋應幫貼之鄉約真如問徒擬軍求脫離而不可得更有良心喪盡之輩報一名賣一名臨時必用陪點上下交接又有頂首積弊錮習不可救藥欲端風化靖地方宛如癡人説夢兹奉上臺嚴檄力行保甲本府仰體德意痛革前弊合行曉諭為此示諭地方人等知悉自示之後有司隨查明鄉分於適中之地立鄉約所亭屋選年高有德者擇吉迎送給以衣頂行二跪一揖禮在鄉約所任事朔望諭鄉民聽講十六條此外一不許票仰協拘人犯二不許差役到家飯食三不許原被告指為證佐四不許朔望點卯五不許請立印簿六不許差督編查煙甲七不許買辦軍需八不許人命盜案牽連姓名九不許投遞報呈十不許紳襟把持凡人命盜案勾攝人犯惟保甲保長地方是問惟爾鄉約無事則勸化愚民有事則密稟自封用圖記牢釘星夜飛遞一年更換地方平靖訟獄不興者年終給以稱職字匾地方多盜訟獄繁興者年終書不稱職用木刻條釘於門首或斂錢擾害不公不法者訪實即時懲革於縣前懸大木牌書貪惡鄉約姓名於上以示勸懲於以端風化靖地方庶幾近之矣凡我屬邑勉力行之以宣揚上憲德意未必於地方風俗無裨益也禁士子充里役諭照得國家設立學校考取民間俊秀子弟優免差役以示作養之意誠盛典也故上自縉紳下及編氓之家凡有子弟延師教授罔不冀一青其襟雖前程逺大此其階梯而養尊處優實不等於齊民即武途與文學并重國家原無異視無如楚風不古黃屬文武生員訪有充當里役奔走衙門恬不知怪日與𨽻卒為伍者不思國家優免之謂何黌宫卧碑之謂何豈盡有司失隆重之禮抑亦諸生甘自蹈秦士之賤也合行嚴禁為此示諭所屬文武生員知悉自示之後務宜各愛體統自重名器如生員名下糧石數多另立名色親身上納不許催收甲戶錢糧或云戶口消乏豈果無一二人丁可應里役何苦自賤至此如必欲包收應役該州縣將應役生員姓名查對紅案别釘一簿直書學名申繳本府以憑轉報學憲查核法在必行該州縣勿得隱諱貓鼠同眠以致士風愈下此本府一片熱腸慎毋有違申飭保甲諭照得編查保甲團練鄉勇之法無事則稽察盜賊以遏亂萌有事則相機救援防禦堵𠞰不動支糧餉而兵足不調撥官兵而賊除兵農合為一家戰守不分兩局自古及今消弭姦逆安靖封疆未有善於此者也若不揣事勢者以修立垣堡遂為聚衆見製造器械輒云謀叛不知為逆之人聚匿深山大澤何常有一定之垣堡私造利戟長矛幾曽畏有司之禁約惟善士良民守分奉法堡無完牆家無寸鐵倏忽之間死賊突至赤手空拳東投西竄賊能縱恣殘民民無所恃拒賊妻子為虜牛種為掠骨肉分離室如懸罄歸怨於上相率為賊田地日荒糧稅日減其何以培國脈固根本耶本府前奉督撫司道編查麻城三鄉區保甲册籍委用堡長垣主分派戶首煙甲嚴取鄰居互結責以守堡禁夜總期地方盜息民安向化樂業正寓兵於農以人治人之微意也乃好事姦宄懼此法一行彼無所匿從中造揑訛言妄稱抽丁恐嚇愚昧見保長編册疑惑橫生或不遵稽察或隱漏户口殊可駭歎當此禁旅如雲所向克捷各省客兵尚多間置何須爾等村農荷鋤充伍即使果欲抽丁莫非王土莫非王民功令孰敢不遵奚必先假編查然後按册索取乎且爾等疑保甲為抽丁隱匿不肯入册小而言之漏戶有抗法之罪大而言之觀望有闔門之誅試看東山逆地尸橫遍野血流成渠是保甲抽丁而死者歟抑從賊作逆而死者歟編保甲出鄉勇者未損一人不編保甲妄想富貴者死已千百保甲無害於人從逆無利於已固自彰明較著奈何勸爾為善便自千難萬難未嘗驅爾為逆竟若神牽鬼使何愚於為惡而不智於為善乎本府憐爾等癡頑再申警戒宜乘此間暇修築垣堡各備器械以資防禦爾堡長垣主户首鄉保煙甲人等宜自愛重慎勿驚疑果能妄念不生非事不作士為善士民為良民本府待為腹心州縣隆以優禮橫逆不至刑罰不加何等安逸尊榮較何士榮等妄想富貴而家破身亡者豈止天淵懸隔哉本府更有勸諭被賊煽惑入夥者宜作速投見改過遷善即為好人若潛伏草澤為人捕得自送性命爾堡長垣主當以招徠為念切莫乘機挾財誤命從來不義富貴都是禍根孽緣能於此中分明便是希聖希賢心地思之慎之請禁健訟條議查看得楚黃健訟從來久矣而安邑刁風於今為烈所以該縣有請嚴主唆越訴之詳是必積鬱憤悶深疾牢不可破之陋習仰冀肅清姦宄之嚴威細繹詳內辭意實有所指難逃洞鑒蒙批府嚴查遵即行縣據實敷陳去後該縣復稱仰體兩部院使民無訟之心謬抒愚衷以期小補原非有所指等情申覆前來成龍據文轉報奉憲臺斧鉞之嚴申飭玩忽之罪責令確議具詳成龍又何敢疏略如前而不為憲臺備陳之湖北地方自十三年風鶴之後水旱頻仍兼以湖南未復憲臺為封疆大臣日夜焦勞凡屬僚仰遵憲飭防姦察偽以敉寧地方為急務且用兵日久荆嶽軍供有司拮據不遑去嵗洪水為災疚心倍甚無如黃屬姦棍幸免兵馬之擾如江右之慘不念皇上憫恤之𢎞仁不惜有司保全之辛苦不畏連年天災之疊見專以起滅詞訟為長技魚肉良善為兒戲破人家産為得志誣衊紳襟富室為威風安邑貧瘠民雖好訟可無大傷而麻城黃岡蘄州之刁風實為可異一夥姦棍呼朋引類搖唇鼓舌人人自危成龍再四勸諭以王法可欺鬼神決不可欺將來男盜女娼滅門絶户之報毫不可爽而惡等恬不知怪夫使民無訟古帝尤難之成龍德涼才薄豈能易俗於一旦亦付之無可如何而已該縣之詳傷時憫俗實非無意而無所指一語乃遁辭也不得巳也成龍又何敢忖度他人之心而懸擬之憲檄下飭將州縣已經審結之案準於解文備敘詳奪有無煩瀆是否可行誠憲臺審酌上下之情欲以嚴禁小民之刁訟乂欲大破有司之賄庇甚費盛心也如民間詞訟止許有司準理而禁止越訴惟恐勢豪紳襟積年衙蠧一手把定有司受賄徇情亦未可定或執一偏之見或多疏略之失以致民寃莫伸上干天和是許民上控以清積弊誠不可緩也辨理軍民寃枉國法具存既經上讞自有公齗則州縣審結之案似不必於詳文備悉恐開文飾到底之病又滋往返駁究之煩但州縣為發迹之始有未控州縣而徑赴上控者有原告在州縣而被犯徑赴上控者有原被俱控州縣未經審斷而急赴上控者一事而衙門告遍種種不一成龍曽有禁訟條約如州縣不準民詞或已準塌案不審許赴府控告務於狀內開明州縣不準塌案不審年月情由如本府不準民詞或已準塌案不審應赴上控訴務於狀內開明告府不準塌案不審年月情由將府州縣以不職參究如州縣已經審理或受賄徇情或執拗疏略不恤民隱許赴府申寃務於狀內粘連州縣審語如本府已經審理或受賄徇情或執拗疏略不恤民隱應赴上申寃務於狀內粘連本府審語果有不法等弊分别輕重輕者記過重者參革究擬於審察民情真偽之中寓甄别州縣優劣之意於以禁刁訟而嚴官方此成龍一片苦心已通行各屬張挂曉諭而姦棍藐不遵依黃民無良傷天害理莫此為甚成龍因事涉瑣屑當軍務倥偬之日憲臺寢食不安之時不敢煩瀆止自愧德薄化淺引罪負愆而已成龍更有下情痛切陳之小民之訟也非盡原告之失也止因稍有口角在傍訟棍陡起風波挺身代告書名作證即原告亦不能自主之也且牽告無辜或以泄宿忿或以食弱肉及至提審彼飛揚逺遁脫身事外致原被兩敗俱傷此代告之害深可痛恨也嗣後原告上控即發江夏縣押歇家解本犯回籍查實取收管回報另行起解候審則代告之弊或可少除矣又有一等光棍聚集省會出入衙門開張客店專以包攬詞訟為生涯或有愚民一時小忿投入羅網便成驚天動地之詞一黨姦棍塞滿村墟止寄一原被佐證姓名訟事從天而降儼然居停禍福在其掌握此包攬之害深可痛恨也嗣後申飭江夏縣挨門嚴查凡麻城黃安等處刁棍在省會者無論久住暫住押解回籍取本地方官收管存案仍力行保甲諭民本分生理禁止出入衙門則包攬之弊或可少清矣又有一等訟師凡告訴不準之詞一經毒手無不聳準如成龍奉批上行事件或有以蘄州而冒稱武衛者或有以武昌而冒稱黃屬者此猶其小者也有以田土之事而揑稱夥兵活殺者有以口角之微而揑稱殺傷人命者誣之以不得不準之詞及至質審不曰代書張大其詞已不知情則曰事不告大不得上準不曰無謊不成詞則曰路遇人誤寫加以反坐哀號乞命是原被證佐之家盡淪喪於訟師之筆端此代書之害深可痛恨也嗣後準理詞訟先考定代書分衙門伺候無得攙越有代書圖記者準理臨審情與事違者代書依律究治仍將原犯罪狀坐於代書名下則代書之弊或可少止矣再飭州縣倣木皂𨽻之法凡遇準理詞訟差木皂𨽻遞送鄉保知會依限赴審如過期不至或失落沉閣先加欺公之罪後定原被之案若夫本府奉上批詞州縣解到人犯三日內不審或已審之後十日內不招詳報上者成龍甘認曠職之罪州縣逺近不同近者以半月為期逺者以二十日為期如過期不解成龍即行報明繩州縣以曠職之罪或各犯居住星散難以依限申解亦應州縣詳明轉請展限仍按期結案庶幾府州縣勵精圖治民寃無抑可省上憲清問之勞從此訟獄衰息風俗雍睦時和年豐家給人足於以輸正賦供軍需綽綽乎有餘裕矣何患乎南冦之不蕩平楚疆之不底定哉緣奉批飭確議事理成龍不揣愚瞽不識忌諱冒昧上陳冗繁過多未知有禆清訟與否與王協鎮書前者臨江出師有投石超距之勢老親臺緩帶輕裘謀在萬全即刻稟明撫憲來諭慰甚昨承翰教兼賜塘報賊之形勢如在目中增兵已請命酌議戰船業奉俞允現買五隻餘俟陸續備辦火藥俟天稍晴與朱親翁料理吳把總鳥鎗四十杆解赴軍前相煩查用東南軍務撫臺藉重實恃為太山引領企望不盡願言與同僚書今日之事人心思亂惟在靜以鎮之而已不必與愚民較短長我心不動則浮言自息此謝安石之所以全江左冦萊公之所以定宋室也借船二十一隻特著貴價押回緩急相濟感何可言但每船領銀伍錢未知肯開銷否共銀十兩五錢望取船户一領狀粘連用印申繳存案財帛分明大丈夫此生此心惟有天日可表耳臨楮感切與各屬邑令書正值分秧之時忽有挑夫之檄令人愁眉不展幸黃岡縣慷慨捐募并不問之里民頓覺心胸爽快不佞何緣遇此賢能輩相助為理也生民之慶朝廷之福但捐募必須有法斟酌妥當方克濟事望同乃心力無俾一人專美不勝欣瞻與屬令書今日居官咸怕盜案殊不知盜案何足懼也目前失主鄉保恐其拖纍槩隱不報即有報聞槩稱竊盜以致鼠輩毫無忌憚且成羣打夥揚言誰敢報官定行報讐縱盜而盜愈多始也畏事既也畏盜地方敗壞已不堪言嗣後失事鄉保不報嚴加懲責盜賊自然斂手十案之中縱不全獲亦可獲其半盜賊自然膽裂是不畏盜而盜自滅也或云盜案可壞功名第不思一已之功名其事小百姓之受害地方之受驚其事大天理良心何忍以一已之功名竟置地方百姓於不問也勉力報緝不佞一力相幫可不數月而地方清靜矣此不佞躬親之事勿謂老髦不聽也惟留神不宣禁諭荒民照得六月旱災已極七月以來連日下雨東山一帶其雨已足竟稱豐稔岐宋之間亦屬大有唯西北一帶雨雖不足而陰雲四起已非無雨之象近聞西北等處人心洶洶或向有穀之家封倉閉糶不但理法不容亦見人心昏昧時維七月尚未交秋目下有雨仍屬豐年即令無雨種麥種菜尚望有秋若秋後無雨田禾盡稿十月之交爾百姓一面竭力支持諸有司自當設法賑濟未有豐凶未定自蹈法網先干不測者也除已往不究外合行禁諭士民人等各安生業毋得妄為倘有不法許區長指名首報以憑究處慎勿死於法而得生於飢則幸矣籌黃安飢民諭照得黃安飢荒較他屬尤慘本府雖以軍需繁劇晝夜焦勞未嘗一刻少忘至府之日業將九屬情形痛切呈詳請蠲請賑已蒙撫部院知照彚題在案其未完槽䥷什物等項一槩免解新派草束發餉銀代買我民自可安心受窮但所種禾稻有不獲顆粒者八月秋中荒村男婦尚不得一飽若至十月之交雨雪載塗其何以堪今計九月天氣猶暖爾民尚可竭力支持及至隆冬必致飢寒不能出户凡老山羊角石灰等處有真正孤寡貧窮朝不保暮者本户量為周濟倘本户貧乏不能周濟鄉保設法賑救若鄉保貧乏不能賑救報官設法若户首鄉保坐視其死隱忍不報查出定償命不饒仰生員某等逐户細查飢民緩急確册彚報以便本府設法量給升斗苟延時日本府先借銀一百兩買穀積貯候買完報數本府親臨給散以救須臾餘俟勸輸全賑爾百姓各宜安分俟命決不使我民餓死特諭慰諭黃安飢民照得府屬災荒惟黃安最甚本府念切民艱業已具詳請蠲請賑蒙撫部院彚題在案又目今槽䥷草米等項本府一一代為備辦解訖爾民既免軍需可以安枕又思爾民飢荒除出示勸諭鄉保户首設法賑救外本府隨借銀兩買備穀石俟隆冬給發斷不令爾等餓死我民可以放心無憂近聞光羅交界一帶間有竊發或迫於飢寒或迫於催科或窘於軍需種種苦情皆未可知我民患切震鄰合行出示曉諭為此示仰黃安連界士民知悉探彼情形速相勸諭令彼悉將苦情具詞本府以憑詳院移咨豫撫體恤撫綏轉危為安倘彼不悟爾等宜自為身家計并體本府苦心督率鄉勇嚴為堵禦以分涇渭定將有功士民詳請奬賞目前大兵經過恐動聽聞乘便撲滅噬臍莫及思之慎之毋忽勸賑諭帖今嵗飢荒太甚窮民畏法甘心餓死罔敢為非凡我士庶孰無惻隱之心本廳已倡輸化緣晝夜憂思自已力薄不能溥施又恐募化錢穀難於周給有一法於此飢民咸有户族仰户長稽查合族化米贍養如無戶族責在甲長稽查報知鄉保與練長會議計區內飢民之多寡合一區煙民布施搭救上戶節省酒肉中戶減少飲食集日用口腹之餘􅅹救戶族鄰佑之死亡鬼神有知必報以戶族興盛鄰佑和睦施多者子孫富貴施少者家門平安或飢民繁多竭區內之施化力不能給即據實報明公議設法官助如區內户長甲長坐視飢餓不報知族尊鄉保練長以致飢民餓死者戶長甲長照見死不救科罪鄉保練長力不能繼忍心不報官者各倍罰賑此以族中之布施養族中之飢衆區內之布施救區內之飢衆易為照管法似省便且以官賑備其不足或可野無餓殍和氣召祥豐稔可俟將此立斃之殘生得見來秋之大有不惟施救者欣同樂利而更生者不知如何頂戴也此法出自苦心思維凡我士庶勉強而力行之不勝引領以望賑飢募引民為邦本故周官制貢必通以二十年食乃民天故周官救荒則經以十二政蓋天災之流行時有而人事之補救宜然今奉督撫司道俱有賑濟之惠顧我紳襟士庶寧無樂輸之人余禱愧桑林憂深雲漢重念兹土罹此疾威自夏徂秋既彌月而不雨為耕為穫遂百畝之如焚隔宿無糧十室恆有其九半菽不飽四民奚止於三余晝思而夜省念嗷鴻之無策恆傷心而慘目懼巧婦之難炊欲為議代議更既無緒之可議思為移民移粟實無地之可移故效持鉢之小技暫為燃眉之急圖共丐洪慈大施惻隱幾石幾斗幾升可救一時之婦哭兒啼或銀或米或錢立蘇片刻之飢魂餓鬼無亡七級專賴一忱補遺覆糧道催夷運印領詳查得夷陵兵米初奉派運之時茫然無措亟為夫驢馱運之舉費盡焦勞周折一時官民驚恐緣不知荆州有夫可雇惟虞稍遲軍供也竭力催辦甚至衙役為夫兒送婦泣號天慟地每一州縣夫驢絡繹數里及至荆州夫頭攬運一日用夫數千名立刻可備復為雇夫之議而夫驢空回往返月餘夫之口糧驢之草料其費不資且損一驢賠價二兩三兩不等盡出有司之囊此番之妄費深可惜也初時之張皇深可危也彼荆州夫價之多寡誰復為之瑣計耶至二運之時已有成局夫價之低昻欵項咸得而知之撫部院洞燭往事再四申飭嚴禁州縣私幫而運米之規大定矣煌煌憲令孰敢少違憲臺仰體撫部院深意牌仰糧廳督運府官出具印領荆庫支夫價六錢五分赫赫憲令又孰敢不奉行惟謹兹忽奉憲牌有催州縣差役赴荆幫運之行卑職竊有疑焉荆州有夫可雇荆庫有餉可領押運有官可委更有廳員坐理安用州縣差役為也或以雇夫亦需差役該廳有糧捕差役兩班在府領本年春夏二季工食赴荆伺候儘可役使乂安用州縣差役為哉若夫三運六千石之派不知黃梅廣濟之全免米若干麻城黃安羅田之量免米若干尚未蒙憲頒確數卑職無憑奉行前三月內該廳赴荆督運卑職出具二千六百六十石印領在荆庫支餉雇夫運米報明憲臺在案迄今數月屢催運米實收未準該廳關移難以報憲俟前次印領米數實收移府之日卑職將後次運米印領星夜飛賫決不敢稍有延緩合並敘明兹奉飭催應據實申報伏乞憲鑒移糧廳運米乏員牒查得黃州府派運夷米初次運過七千五百石此數原多派五百石蒙督部院垂憐減運五百石以七千石作實數實裁去浮額之數不在恩免正數之內有本府原詳可查復奉撫部院痛切民瘼全免黃梅廣濟兩縣量免麻城黃安羅田三縣應在七千石內酌免查黃梅原派運米六百四十九石六斗廣濟原派運米七百三十二石四斗五升兩縣共米一千三百八十二石五升今派運米六千石是黃梅廣濟二縣全免米內尚少免米三百八十二石五升也奉糧憲檄開量免麻城黃安羅田運米誠仰體撫部院如傷之仁憐念黃屬邑疾苦之德也再查奉藩憲檄行酌議量免麻城黃安羅田三縣運米本府遵依議免麻城三百六石應運米三百六石免黃安二百九十三石六斗四升應運米一百四十六石八斗免羅田一百八十三石七斗五升應運米一百八十三石七斗五升共該免米七百八十三石三斗九升今派運米六千石是麻城三縣有撫部院恩批量免之名而未沾石斗升合之惠且於糧憲檄開除量免麻城黃安羅田運米之行不合至於黃梅廣濟兩縣二次夷米已經全免復經催運實為苦纍貴廳曽言免文在後催運在先第三次運時可以抵兌此本府通盤打算有二千六百六十九石零之印領也疊準貴廳移文止稱運米六千石並不詳及黃梅廣濟之全免若干麻城黃安羅田之量免若干實在清算何得尚有六千之數或以本府議免麻城黃安羅田之米為太多亦無虛負撫部院憲恩石斗升合之不免也且細繹糧憲檄文並無不量免麻城黃安羅田運米之行貴廳催檄如雨堅執六千石之見恐黃梅廣濟之米未經全免麻城黃安羅田之米未經量免日後訟興以為違悖撫部院糧憲之批示牌文誰任其咎雖貴廳為急公起見亟思奮志於功名然為上為德為下為民亦當披肝􅅹膽向上憲激切陳之凡事必實落有據自可奉行無礙再貴廳在荆一月有餘荆庫之餉銀現貯每米一石夫價六錢五分不知目今已運米若干果否已獲實收何諄諄然止慮二千零之外尚有未送之印領也果將前印領內米數運完祈蚤頒實收星夜再送印領決不遲誤貴廳急公立業之美意若夫委官當時移送立催起程又經移明貴廳申報撫部院藩糧二憲在案因前又派夫五百名赴荆搬運軍器需委的員而黃屬之員勢若晨星本府經厯張徙溟移送貴廳照磨李德解米武昌而本府乏員矣黃岡典史周錦移送貴廳團風河泊所唐學增陽邏巡檢夏應升奉上調委團風巡檢汪源感噎疾卧牀止留署縣丞唐紹先候解運夫而黃岡乏員矣蘄水典史施鳳翔移送貴廳巴河巡檢張一經蘭溪巡檢金華國奉上調委止留縣丞王霖候解運夫而蘄水乏員矣廣濟武六巡檢潘應選奉上調委雙城驛丞王驎在荆未歸止留典史湯銘候解運夫而廣濟乏員矣麻城巡檢孫承祐龔熙俱奉上調委止留典史楊蕙芳候解運夫而麻城乏員矣黃安巡檢金之彪移送貴廳雙城巡檢李永潤久調軍前止留典史陳銓候解運夫而黃安乏員矣蘄州吏目鄭淑聲奉各憲飭知留任巡緝大同巡檢陳祥瑞奉上調委茅山巡檢劉源深奉上飭知丁憂不許委用止留州判吳日性候解運夫而蘄州乏員矣黃陂典史李文熛申報抱病止留縣丞馮時奉候解運夫而黃陂乏員矣羅田在萬山之中巡檢一員不敢離任止留典史陸錫綬候解運夫而羅田乏員矣黃梅兵馬接踵差使絡繹尚請委員協濟又非可以他邑較也惟本府似為贅疣藩憲又以貴廳捕務相責正在議復若各州縣徵比錢糧無擅離汛地之例時勢至此捉襟露肘將何術以應之審時度勢以揮霍有餘之才應束手無策之事萬懇貴廳一力支持先將前次印領內米數刻期運完則後來之印領星電飛賫可無煩慮矣合行牒覆申撫院變通夷運法詳查得三運夷米一案前蒙糧憲詳請知府出具印領糧廳在荆庫支銀募運與州縣無相干涉似視運事太易檄文到府卑職早已料此運之必致遲誤揭參之萬難幸免矣當本府王通判赴荆之時卑職曽諄諄面囑如有苦難亟申請上憲裁奪無如該廳仰怵威嚴鉗舌不敢申訴止向卑職嘵嘵不休今糧憲已開揭參究矣卑職不得不詳悉陳之糧憲之初詳誠為美談但未細審出具印領者責在知府荆庫領銀者責在糧廳而雇募承運較工價之多寡爭錙銖之末利肯運與不肯運其權又在夫也即荆州本地之官亦不能強不肯運之夫而督之使前况黃州隔屬之官豈能強荆州不肯運之夫而押之速運乎此遲誤運米之由實勢之所必至而亦事之無可如何者也至於揭參一事在卑職尚邀愛惜州縣之虛名即加斧鉞之誅怡然受之而不辭最可憐者以一無米而炊之糧官自春徂秋夫不肯運價不能增束手待斃其憂懼愁苦不知何似一旦揭參罹罪實實寃枉此該廳之不敢陳情而卑職不忍不代訴者也每石夫價六錢五分已為定例况當國用告匱司農仰屋之時裁扣加增無非為軍需不足起見夫價誰復敢言然當計窮力詘之日又不能不通融於其間也糧憲檄行照武漢事例武漢豈有神輸鬼運之術亦不過行州縣協運之一法耳時勢至無可奈何萬不能不待濟於州縣否則卑職受參糧官纍死毫無補於夷運伏乞憲裁俯允照武漢之例州縣協運則運米雖遲而告竣亦易失之東隅者尚可收功桑榆也若止責成糧官終必誤事卑職雖具印領亦難逃遲誤軍需之咎惟有席藁待罪而已兹準該廳據荆州夫頭申瑞等為賞電民情始末懇著本屬雇運以免違誤事閲其情詞實乃夫不肯運價不能增之確據而糧憲檄行仍著本屬雇運之語亦無非州縣協運之法合據實詳請統乞憲鑒批示以便遵行上偏院韓撫臺用兵事宜台旌抵石頭口卑職祗誠晉謁伏承溫諭并令條陳長沙事宜卑職某山右書生不諳軍旅辱承清問不自度量謹以素所聞見審酌時勢披瀝肝膽冒昧上陳一用兵之道以審酌時勢為第一要務今日西南交訌各處時勢不同封疆大臣荷朝廷恢復之責須揣度用兵之利害何在主張先定而後指揮可以如意務期勝敵尤先期我之不為敵勝目前王旅深入長沙逆賊堅壁清野彼必料自江右達湖南山路﨑嶇運糧艱難欲以坐困我師求戰不得求攻不克進退惟谷此淮陰之屈服左車諸葛之六出祁山正此故也目前憲臺奉命統兵長沙兼理糧餉蒿目運饋之不繼誠識時勢之要務合當題明長沙未復州縣負固總有餉銀採買無地勢不能不問之江右督撫運糧有責成軍中無庚癸之慮庶得以抒展謀慮漸次布置矣一運糧重務雖責成於江右而江右之山路與嶽州之水路不同且江右人心渙散再加以運米之苦倘奉行不善益深益熱禍不可測况江右運米之處正我兵出入之門戶轉輸之法不可不早定也審酌形勢或五六十里擇堅固城垣為屯糧之所如無城垣創立土堡積貯糧米撥兵防守遞相轉運可無長途之纍題定糧道糧廳督運將官領兵護送不惟饋運相踵亦且聲援相接正合兵家步步為營之法矣一資糧於敵非久逺之計誠如憲慮但目前長沙居民為逆賊趕逐扶老攜幼勢不能逺去必與附近郊圻百姓避兵山谷朝不保夕且遍地禾苗正值收割之時罔不揮淚痛哭亟宜遍傳示諭俾民收割即發餉銀現買以百姓已失之禾獲意外之價人不悅服未之有也第恐大兵蹂躪已久民不相信疑畏不前幸馬臬憲隨征當日衙役料避居長沙不逺倘招致一二人開誠布赤確示以不忍相欺之實意若得一二戶向田收割則聞風接踵塞滿南畝即逆賊亦不能強為之制矣較諸葛祁山割麥之策似高一著不惟兵餉可足藉以少紓江右饋運之勞且收拾人心平復湖南之一大機括也一湖南自用兵以來長沙之民與江右之民往來未嘗斷絶先施恩於江右則仁風必及於湖南可動南方向化之心再訪連界居民親眷厚加賞賜俾彼此援引則叩謁轅門者自不乏人且湖南最苦穀賤如有積粟之家重價採買而沿路城垣土堡所貯之米可備而不用或有投見貧民不能糊口者安插江右勿俾失所以牽係萬姓思慕之意此平復湖南之所以漸及也一逆賊堅守長沙既料我兵乏食又料我兵不能渡江則湘潭一帶決無重賊防守然我得長沙人心自有渡江竒策當年元兵受困於揚子江中扣船獻計者盡出人意計之外天下事何可量也湘潭山陜客商最多久滯思歸選本地豪俠仗義密諭多給護身牌票彼客商必募船私渡叩見之後思保資本歸家不惟湘潭各處人心搖動而我兵亦可藉彼船以渡江矣此出其不意攻其無備之一法也一湖南官員身陷賊地父母妻子多在北方誰不望雲欷噓且皇恩浩大竟未誅求妻孥雖有風聞終是魂夢驚疑須查縉紳開出籍貫移咨各省督撫行文本籍俾家人寄平安書信必有乘間來歸者縱賊境盤詰不能脫身亦可擾亂彼地人心至於天時地利人和前賢言之甚悉無容贅陳勿肆殺掠固平定之首重勿分滿漢尤戰取之密慮書生一得之見未知有合時宜否伏祈憲鑒任黃州時湖廣張撫臺來札計八道積勞之後慎勿過於鞅掌以致欲速反遲也接來翰殊為念切幸善為調攝以慰不佞惓惓麻城一案備述賢勞已繕疏具題矣募兵事屬難行因兵主王題有責成督撫招募鳥鎗手二千名之説誠恐部文一到難以猝募不得不行司酌議不意其轉行各府也此事若分派州縣必開僉派里下之端必得府州縣善為招募俾令樂於從戎方得其力此皆開支戰餉將來一進湖南之後為兵為民仍可任從其便幸親翁即為陸續召解多多益善切囑切囑夷陵兵米屢準督院咨移欲於各府派夫赴荆運解愚意若一派夫則將來便無底止且此項米每石議定給腳價六錢五分自荆領米運夷為程二百四十里此項腳價若自備夫驢足以有餘今司道議派黃屬運米七千五百石幸親翁即為酌之止須得一能員料理似可不必轉派州縣以滋民纍得親翁力行更可為各府倡率耳惟即酌覆為荷荆州大將軍新設援𠞰營急需鳥鎗手頃據張漢一方茂貞二人稟稱暫委職銜彼可以各招募五百名今將委牌二紙付去如其言果屬可信於地方無擾則將牌給彼親翁或再給與執照倘親翁處可以召募有人而其事於地方有礙似又不必多此一畨委募即將原牌繳回可也幸酌之接來翰知夫驢一項已有成緒殊慰懸懸但委官必須府佐方能彈壓且交米領米俱得迅速幸再酌之其夫驢起程日期亦須即為速報以便檄知荆夷等處并咨督院禁飭就近營汛拉扯耳鎗手分招極善并復巴河獲盜具見摘姦發伏之竒此等雈苻橫行自當嚴為懲創但失事未據報聞是強是竊尤宜據實具報毋致代為下屬受過也瘡疾尤冀慎攝率復不一姦人屢擾內地此畨又擒史國柱皆親翁之妙略也但孫調元尚爾逋誅聞其同行有兩人一為汪華之一為陳克韶同遁入黃安一路且聞談以從陶克凌李素之係其親密舊好查談以從等舊係招撫之人尚未發回羅山幸親翁密授方略俾其迅擒賊首調元不致脫切速切速兩接來翰蒿目時艱籌畫防禦同心之言已識懷抱但方此多事之時要當以綢繆禦外侮尤在以鎮靜安人心斯為兩得之耳清查田地事關國計民生固不可任民欺隱以虧惟正之供亦不可聽有司邀功以滋異日包賠之害然必求其實使上下均受其益蘄州清出廢藩宅基地如堪載賦者宜於更名田地內清出升科昨接親翁之詳已批藩司查議矣至於公議價值之説查昔年更名田畝曽有變價之部行後因民纍不堪遂爾中止今應作何舉行幸再為備復可耳于清端政書卷二
