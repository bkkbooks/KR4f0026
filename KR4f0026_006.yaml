body:
  text: 于清端政書卷六兩江總督于成龍撰兩江書優升謝恩疏康熙二十一年二月初六日准吏部咨開文選清吏司案呈奉本部送吏科抄出本部題前事內開該臣等查得于成龍係見任直𨽻巡撫兼都察院右副都御史江南江西原設總督一員管理今將于成龍照例升為兵部右侍郎兼都察院右副都御史總督江南江西等處地方軍務兼理糧餉操江仍帶紀録三次於新任康熙二十一年正月二十七日奉㫖于成龍清亷素著著優加兵部尚書兼都察院右副都御史總督江南江西等處地方軍務兼理糧餉操江寫敕與他餘依議欽此欽遵抄出到部送司相應行咨案呈到部移咨到臣准此竊臣寒微謭劣猥䝉皇上知遇授以直𨽻巡撫蒞任一年有餘愧無寸長足録皇上不以臣庸鄙溺職復授以江南總督巨任臣方慮智力短淺時凜覆餗之懼乃又荷殊恩令臣兼理江西督務撫心自問臣有何能而當此兩江之重寄耶今邀皇上不次優典加臣以兵部尚書職銜臣驚聞成命不覺汗流浹背雖皇上之寵眷日隆而微臣之愧悚日甚惟有益加黽勉竭盡駑駘仰報髙厚於萬一耳除臣䖍設香案望闕叩頭外臣謹具本恭謝請暫停江蘇舉劾疏竊照文職官員定例二年舉劾所以澄叙官方鼓舞人材甚盛典也然必舉果循良則舉者知榮而未舉者知勵亦必劾果貪墨則劾者知悔而未劾者知畏將舉不虛舉劾不虛劾而朝廷勸懲之典以立今康熙二十一年又值二年屆期安徽所屬臣已恪遵成憲採訪得實照例舉行在案至於江蘇一帶大小屬員臣虛衷體訪亦亷得其概然有立身在名節之際而行事未必盡孚于民隱有行已在清濁之間而舉動未必盡攖乎民怒蓋賢非循卓之尤貪非汚墨之甚恐舉之劾之不足以為未舉未劾者愧勵安敢率為入告臣請今次舉劾似宜暫停官之賢者臣奬進誘掖徐觀厥成果其清操自矢初終不易臣自特疏題薦官之不盡賢者臣仰體皇上寬大之仁提命教誡以期自新萬一怙惡不悛臣亦不時糾參不敢稍為姑容庶激勸不爽而於澄叙官方鼓舞人材或少有裨益矣請豁民缺漕項疏臣猥以菲材荷䝉皇上特簡總制兩江當蒞任之初披閲臣署案牘恭誦康熙二十年十二月二十日恩詔內開康熙十七年以前民缺錢糧稅銀及帶徵錢糧該督撫查明保題到日豁免欽此臣伏讀之頃不勝感誦皇上加惠元元之至意即古之湯文無以過也雖經署督臣徐國相謄黃頒行苐恐不肖官役仍敢違悖朦徵臣隨大書告示分檄各司道通行曉諭并咨移江安二撫臣會核民缺冊結具疏題蠲去後乃於康熙二十一年六月十一日總漕臣邵甘准户部咨為察核通庫等事康熙十七年以前未完漕項錢糧一案查詔款內開所關河漕一應情罪俱不赦免相應仍咨總漕將此項錢糧速行徵完如有不完將經管各官題參等因是部覆綦嚴追呼之令又將遍告閭左臣痌瘝在抱輾轉思維竊謂恩詔內河漕情罪俱不在恩免者似指有誤河道漕運情罪處分文武臣而言原未云民缺漕項錢糧亦不赦免也且備查康熙十年欽奉恩詔豁免康熙六年以前民缺而江南省漕項錢糧實在已奉豁免數內又康熙十八年欽奉上諭停徵康熙九年以前民缺並康熙十八年奉㫖豁免康熙十二年以前民缺凡漕項銀米莫不開入民缺內一例蠲停今康熙二十年欽奉恩詔豁免康熙十七年以前民缺及帶徵錢糧天語相同並未指出漕項錢糧不准豁免字樣是皇恩浩蕩誠如天地覆載無不包容而部臣拘於另條河漕情罪俱不赦免之詔款復令追徵臣思畎畝小民任土作貢按畝輸將辦折者曰條銀辦本者曰倉米總皆出於地丁一條編徵從未另有一辦漕之田畝以故窮簷蔀屋凡有逋缺者一聞恩豁莫不舉手加額載道歡呼如釋重負不謂詔下數月之後又有漕項不准赦免之行復將則壤計丁分别追比竊恐小民愚昧未易諳此規條保無有不肖官胥乘機弊混竟將起存之民缺亦藉稱漕項朦徵紛擾大負我皇上蠲恤之深仁者乎江南賦稅甲於天下自兵興而後轉輸邊餉撥協軍供不下二三千萬之多今遺此舊項缺籍通盤合計不過尾數即有漕項之名又多係折色減存實非運北漕糈可比是催徵徒詘於民力蠲免無損於天庾矧當四海升平亟應休養財賦之源上培國本伏祈我皇上垂鑒東南民力凋敝已深特沛恩綸一體蠲豁俾億萬窮黎仰沐堯天舜日歡聲雷動歌誦聖德於億萬年勿替矣除一面查取民缺細數冊結候㫖遵行外臣謹㑹同總漕督臣邵甘江寧撫臣余國柱安徽撫臣徐國相合詞具題請補江寧知府疏看得江寧知府一官不獨為八邑之表帥而實為通省之領袖臣奉命初到江南一切有關官民事務尚未周悉正須守才兼備之員以補佐臣之不逮到任以來目覩江寧知府陳龍巖老成持重亷潔自矢且其料理各項錢榖應付過往官兵尤徵肆應之才臣深幸其得一良吏可以收臂指之效而表式乎羣寮不意於康熙二十一年六月十九日未時病故臣聞報如失左右手竊念朝廷儲養人材固不乏才德兼優之儔但吏部銓選原有定例今該府員缺部臣自必循資按格掣籖推補誠恐所推者操守有餘而才幹不足或才幹可觀而操守難慿以之經理重地難免覆餗之虞必得才守兼全如臣任直隸巡撫所薦通州知州于成龍霸州州判衛既齊區畫一切事務庶可政修事舉勝任而愈快相應仰請皇上俯念江寧知府一官關係最重不拘銓選常例敕部立速揀選或命廷臣會推清操久著幹練成效者星馳赴任俾臣專心倚任地方幸甚微臣幸甚留徽六太三營官兵疏看得康熙十三年饒逆變亂以後所在煽動前督臣阿席熙於要地之綢繆務早等事案內將江寧將軍下各營閒甲兵糧一千名以六百名補入徽州營以四百名補入六安營俱裁去參將改設副將又太湖一營前任江寧撫臣馬祜為汛廣難以綜理等事添設右軍守備一員專管江南汛地俱各奉有俞㫖欽遵在案今康熙二十年十二月二十日恭逢恩詔款開軍興以來添設緑旗官兵應行裁汰者該督撫提鎮詳查題請裁汰欽此當經前督臣移㑹撫提諸臣並行徽州六安太湖三營酌議裁汰去後據徽州營副將姚𢎞信六安營副將周于仁太湖營遊擊李鳯翔等請將原補官兵仍舊留用並准安徽撫臣咨覆相同臣查徽郡東聨德平樂興西接浮梁倒河匝處萬山之中層巒疊嶂最為奸宄出沒之所臣檢閲舊案如逆賊王跳鬼及饒逆侵犯之時悉因三省連界汛廣兵單不敷防禦以致小醜陸梁此前督臣所以改設副將添布重兵彈壓也又六安一汛綿亘數千餘里與湖廣黃麻等處相接實為江南西陲重地臣前任黃州府時剿撫東山逆孽何士榮等厯覩江廣形勢但見英霍二處山深谷邃伏莽堪虞非安設重兵不足以捍此巖疆前督臣早已見及此也今二處官兵布置周密地方稍稱平靜正宜安愈圖安綢繆未雨若拘於軍興以後添設之名而裁此險汛之兵將臣恐不軌之徒伺隙思逞彼時再議增兵安輯而地方已不勝其驚擾矣臣謂徽六兩營官兵斷斷難以議裁伏查部文與恩詔內議裁官兵似指有事省分題設重鎮而言至於徽六兩營原從地方險隘起見且千名之兵又係通省各營閒甲較於他省額外添設者不同若夫太湖一汛臣自閩地赴任直省經由其間湖面廣濶一望無際港㲼叢雜素為盜藪該營添設右軍守備一員專司江南汛地誠為營制起見更難與軍興後所添官兵一概而論臣以事關封疆重務不敢膠執己見隨又備商昭武將軍等議覆僉同是以謬陳臆議將前項官兵照舊留用臣非不知裁兵即以節餉然為地方計久逺則亦不得為朝廷惜金錢又何況三營所增之俸餉尚有額內應給之原款乎相應仰懇皇上俯念徽州六安太湖三營皆係山澤險汛續補官兵准其照舊留用永垂經制其有益地方誠非淺鮮也補撫標額兵疏看得江寧安徽二撫標原添設官兵二千五百名經部臣會議留為經制將督提鎮協各營內老弱裁汰以足其數奉有俞㫖移咨到臣臣隨移行欽遵去後兹准提臣楊捷咨稱江南地方廣濶外有江海內有叢山無險不備各營額兵節經裁減處處兵單萬難再裁議將徽六二營所裁續添兵丁一千名抵補尚不敷一千五百名再於通省內地各營裁汰等因臣思裁補撫標兵缺雖部議於督提等標汰除然未有不量其汛地之險易而槩行裁汰者今查江南幅􅊷遼濶水陸兼防在在需兵而沿江沿海為尤甚如崇明雲臺俱各孤懸海中金山柘林青村南滙川沙吳淞黃浦又皆逼近海面京口一鎮跨江設險咽喉要津且有漕白糧艘經由若夫泰州一營兼轄興掘二汛民竈雜處地極其廣而兵僅三百四十餘名是以上各營急需多兵彈壓均不便議裁此外內地額兵共計止有三萬五千七百九十餘名而議裁二千五百名所裁過多則營伍空虛汛守鮮不廢弛是撫標兵缺雖取足於腹裏各營而汛廣兵單又不可不豫為之所此提臣徽六二營裁兵撥補之議為有見也蓋徽六二營新裁兵一千名原係通省閒甲今以各營閒甲而仍抵各營之裁汰祗以增足五萬五千之額原非另外添設即朝廷多此千兵糧餉非與國帑有虧而各營多此千兵汛守則與地方有益相應仰請皇上允臣所請將徽六二營新裁兵丁一千名即抵撫標之數其餘一千五百名容臣於內地各營通融分𣲖陸續裁汰可也臣謹㑹同具題請寬裁兵疏看得江省袁臨地方奉㫖抽兵防守一案臣准部文隨移會江西撫提二臣定議去後准撫臣咨覆議於袁鎮奉裁兵內挑選四百名共足袁營兵一千二百名以資防禦臣查袁鎮標兵即在各省保泰一案二年裁汰之數今所添四百名則係新增而非額內抽撥且逆氛煽亂之後營兵多寡皆係隨時布置今地方平靖又須從長計議相險設防以為經久之計隨又備咨商酌去後兹准撫臣佟某行據布政司張所志詳議咨覆前來臣查江右營制康熙十一年前督臣麻勒吉題明設兵二萬八千八百二十九名逮康熙十三年逆氛猖獗之後各營續添官兵共三萬三千餘名逾於定額之數前䝉皇上寬以二年消除則通省營制仍應照前督臣已定之數為準其袁臨與撫標應添撥兵共一千八百五十名即於此二萬八千八百二十九名之內酌量汛地險易通融抽撥以成一定之制如袁臨地方關係緊要向設兵八百名今議增兵四百名查饒州九江地處腹裏尚可裒其有餘以補袁營之不足應於饒州營抽兵六十名九江營抽兵三百四十名共兵四百名以足袁營兵一千二百名之額又撫標應設兵一千五百名內本標向有護衛兵五十名今應抽撥兵一千四百五十名查南瑞鎮標南昌城守水師九江南湖水師撫建饒等營雖無多兵可撥然皆屬平易內地較與銅鼓南贑等各營水陸要泛不同應於南瑞鎮標裁兵七百五十五名南昌城守營裁兵一百二十八名南昌水師營裁兵一百二十八名建昌營裁兵一百九十名南湖水師營裁兵一百六十五名饒州營裁兵八十四名共裁兵一千四百五十名合以撫標原額護衛兵五十名以足兵一千五百名此則袁臨與撫標應添應撥之兵數也至於撫建二屬既裁去提鎮今應如前督臣原定經制仍復撫州建昌二營此外各營官兵數目均循其舊惟廣信地方界鄰浙閩深山邃谷允為險隘該營原止設兵五百八十名不敷防禦今宜稍為更定議增兵一百五十六名共兵七百三十六名查撫州居南建兩府之中實為腹裏平易之地該營原設兵七百八十名尚可議裁兵一百五十六名添入廣信防守此則舊額與要地應復應更之兵數也營制既定所有續添官兵統於二年之內消除全完以遵成議再查裁兵之成議等事一案江西未經裁完官兵部議仍照康熙七年會議之數限一年內裁足臣思江西自十三年以後續添之兵三萬三千餘名過於原額現在紛紛裁汰若再將額內之兵同時并裁未免艱於安插以臣愚見似宜先將續添各兵儘於二年內消除俟裁完之後容臣量度時勢再照康熙七年會議定數斟酌汰除足額庶目前安插之兵免於壅滯而裁汰之數得有分别也其各營有應復官辨及管轄汛地敕書關防各項事宜俟部覆命下之日臣另行查明具題外謹合詞密題再陳請蠲漕缺疏竊照康熙十七年以前民缺及帶徵錢糧恭逢康熙二十年十二月二十日恩詔渙頒令督撫查明保題豁免是不拘何項錢糧凡屬拖缺在民者悉得概邀恩豁天下臣民莫不翕然稱慶而江南窮黎被澤尤深祗緣總漕督臣邵甘以二十年帶徵十四年漕項咨部請示蓋從帶徵之官不應仍受參罰而言而部臣謂所關河漕情罪俱不赦免令將漕項錢糧速行催完則因處分之情罪而並將民缺之漕項一並不赦矣臣恭繹恩詔款開止云民缺及帶徵錢糧督撫查明保題豁免原未開除漕項錢糧不在赦免也且百姓按畝輸賦無論或本或折俱係一條鞭徵其辦納漕項者並非另有一等地畝即拖缺漕項者亦非另有一等小民似赦則俱赦不應因漕項之情罪而牽纒纍及漕項錢糧以負皇上浩蕩洪恩伏讀恩詔款開一河道漕運關係重大一應情罪俱不赦免此款為慎重河漕起見然既指明情罪二字似因侵盜河漕庫帑與工程未固漕運違誤者特行摘出與民缺漕項錢糧原不相涉案查康熙十一年為災邑又被等事彚報各屬等事彚報淮揚等事户部覆前江寧撫臣馬祜各疏康熙十一年被災起存漕糧漕項及康熙十年漕糧漕項俱准照數全免是因十一年之被災而并帶徵之漕項一例豁免矣又查康熙十八年為備陳舊缺無徵等事前江寧撫臣慕天顔請將康熙十年十一年十二年民屯地丁并漕項未完銀米概賜蠲豁奉有俞㫖允行而漕項又䝉豁免矣何况康熙二十年皇恩肆赦普天同慶反將無徵漕項令窮簷赤子復受追呼之苦乎臣謂康熙十七年以前一切民缺漕項錢糧悉應一概蠲免在朝廷不過去此無徵之虛數而窮民即得共邀免比之實惠庶與恩赦款例相符相應仰請皇上俯念漕項錢糧即在民缺地丁之內准援往例恩賜全蠲俾江南萬姓仰沾聖澤歡聲雷動其樂利誠非淺鮮也題留鎮江知府疏竊照京口濱江負海地處衝要又當閩浙孔道素稱繁劇且為旗營駐防之所軍民雜處豪暴間出非偏僻旁郡可比臣駐劄省會撫臣亦相距稍遠耳目或有難周所賴道府彈壓整頓良非淺鮮况知府為親民之官戢兵以安民倚藉尤切臣自到任以來凡要地郡守之淑慝尤必加意體訪目覩鎮江府知府高龍光守絶一塵才長肆應革除耗羡屏絶餽遺真以實心而行實政他如綏靖地方審理逃務調劑得宜旗民允服無忝表帥允稱理繁之任似此才守兼優之員正可砥礪官方方欺久任奏效乃因康熙十九年分漕船開兊違限案內部議降級調用奉㫖依議欽遵在案是龍光以遲誤漕船降調自應遵奉解任臣又何容瀆奏但臣䝉皇上委畀兩江重寄夙夜殫心全藉羣策效力相助為理且鎮江與省會接壤勢如臂指旗民錯雜治理為難于以保障而調劑之非如龍光其人者慮難仔肩而稱職也伏查定例被降之官果係清亷愛民良吏許該督撫題請留任等語又查康熙二十一年二月內安徽撫臣徐國相為請㫖事題留太湖縣知縣章時化一疏吏部援引廣東撫臣金俊題留肇慶府降調知府張京鍷部覆准其留任之例將時化覆准留任在案今龍光才守兼優臣知之最稔實係清亷愛民良吏既與保題之例相符又與部覆所述張京鍷留任之處相合况龍光升授今職之時原奉特㫖補授則其才守久在睿鑒中臣從地方起見為朝廷惜此人才不敢緘默仰懇皇上施使過之仁允臣所請敕部議覆將龍光帶所降之級仍留原任俾得展布所長以竟其用臣得以倚為車輔則劇郡得人而叢脞無憂矣特薦江蘇藩司疏竊惟論人授官固當就才之短長以分繁簡若就官論人又當按地之繁簡以定髙下江南賦重役繁民生凋敝兼以水旱頻仍供億四出官斯土者長才欲黽勉而回頭無進步之階短才困積逋而束手鮮周身之策案牘日見紛紜催科日見繁苦求其痛自鞭策志期上達者屈指不一二見也臣等荷䝉簡命督撫吳中入境受事親見其難朝乾夕惕茹蘖飲氷上以期答朝廷委用之重下以期慰生民樂業之望細事必出於躬親勺水必凛於夙夜舉凡屬吏公事進見多方訓誨隨事禁飭嚴其守又察其所守之真僞勤其政又訪其敷政之寬嚴莫不爭相濯磨矢心釐剔未幾而以盜案降級者見告矣未幾而以逋缺落職者見告矣未幾而以違限處分者見告矣在朝廷乃不得不處之定例在各官亦不能自逃之罪案故自郡守以及有司問其官則席不暇暖問其職則整頓無心勢使然也即今大計之典正以周官考績之法伸國家彰疸之權所關誠非渺小而守令各官無一堪膺斯選豈皆妄自菲薄甘居庸劣乎地實限之耳况藩司為錢糧總滙數百萬之賦稅於此考成本省外省之兵餉於此徵解大小屬員之賢否於此表率以至民生之疾苦水旱之災傷於此嚴稽核而賴賑恤其繁苦百倍於郡縣其責任亦百倍於郡縣苟非才能肆應氣堪百折鮮不朝受命而夕僨轅矣如江蘇布政使丁思孔厯任既久參罰固多既不敢違例以入卓異之列又不敢拘例以蹈蔽賢之愆臣等為地方人才起見敢合詞特舉其政蹟班班敬為皇上陳之外省之協餉江省最多此則刻不容緩者本官自到任迄今解過協餉一千三百餘萬從無片刻遲誤京口駐防豆草糧餉皆尅期解給即遇災荒之嵗亦必設法接濟此其實蹟之見於軍餉者也用兵以來江省前後奉造塢沙二船二百餘隻本官催辦工料竭蹶恐後閩楚江西馬匹弓箭及駐防䝉古甲兵衣帽等項捐助製備不以絲毫纍民此其實蹟之見於軍需者也蘇郡為閩浙咽喉軍旅往來更换船隻連年絡繹不絶本官措置供應親自儹辦住宿河干不辭勞勩此其實蹟之見於軍行者也清隱地勸開墾共計升科一萬餘頃而公私稱便又清增雜稅及補徵田房稅銀二萬兩此其實蹟之見於公帑者也各屬起解錢糧親自經收不假手於吏胥批回隨投隨掣又飭行各屬徵收里民自封投匱禁止火耗如遇災祲則量行緩徵使民力稍裕而糧餉不匱此其實蹟之見於催科者也捐修蘇州府學等處使寒生讀書其中資以膏火觀風所拔士於丁巳戊午辛酉三科中式甚衆又設立鄉約宣講上諭十六條及申明六諭家喻戶曉此其實蹟之見於文學教化者也飭行各屬設立育嬰堂以育遺嬰並施棺以資掩埋發藥以救瘟疫此其實蹟之見於濟人者也至於居脂膏之位而不以賄聞處奢華之地而不以侈著公私絶其請託出入嚴其關防尤其介性貞操矯然特立者矣乃以參罰糾纒無由振拔不惟本官之淹蹇任事灰心凡勞吏之聞風亦皆短氣既不足以彰聖明使過之仁又非臣等以人事君之義查前任撫臣慕天顔曽以上海縣知縣任辰旦常熟縣知縣林象祖俱有積逋未清特疏薦達業荷皇上特允行取得備掖垣之選候補清華之列今思孔之繁與難視二臣何止百倍耶倘臣等隱忍而漫為姑置蔽賢之過與徇私等臣之所不敢出也臣等非不知藩司為錢榖之府思孔為詿誤之身特疏為出尋常之外不能不起人形似之議然而臣等之可自信者心也所以報皇上者心也况臣等深荷皇上格外之知不敢蹈知而不舉之罪且思孔行已入覲輦下仰祈皇上親賜咨訪其人之才能賢否難逃睿照如果臣等所舉不謬伏乞皇上破格擢用則立賢之典可以度越千古且使凡為臣子者皆感激思奮以希特達之遇其於吏治民生未必無小補也臣謹㑹同江寧撫臣余國柱合詞具題乞休疏准吏部咨開云云奉㫖于成龍從寬留任餘依議欽此欽遵備咨到臣准此臣捧讀溫綸感愧彌深隨恭設香案望闕叩頭謝恩訖竊臣以庸材謬膺督寄年老疏陋一嵗之內兩䝉聖慈寬留是臣之愚忱為我皇上洞鑒臣安敢不期竭駑劣盡此餘生以仰報天高地厚於萬一然皇上之宥臣將謂臣之精力尚堪振刷以期效於將來也伏念江南財賦重地事務殷繁而又加以江西兵燹之餘尤宜調劑是非年富力強者難副其任今海宇蕩平民物熙恬我皇上勵精圖治日昃不遑恆惓惓以吏治民生為念每盥讀聖諭局蹐不安臣勉力拮据思所以副我皇上安愈圖安之意無奈兩目久昏兩耳不聰自去秋染瘧之後復得怔忡之症每辦事午夜心胸驚悸輒不能寐焦思愈集則精神愈憊精神既竭則事務糊塗勢所必然臣勉勵之念雖切而艱大之任自揣萬不能勝是臣無禆兩江之治化實負期望之聖心將來再有貽誤縱睿慈曲加矜全臣有靦面目尸位素餐將何以砥礪寮屬統馭士民耶伏乞皇上俯念地方重大鑒臣老邁不堪供職特賜休致臣沐皇恩有生難報惟願生生世世圖效犬馬而已臣謹具奏恭候睿鑒施行于清端政書卷六
