body:
  text: 于清端政書卷七兩江總督于成龍撰兩江書咨訪利弊通行檄照得大弊不革則大利不興一縣有一縣之利弊一鄉有一鄉之利弊自當因地制宜相時興革但兩江幅􅊷遼闊一時耳目難周端在賢有司殫心匡理庶國計民生兩獲安全況大江左右或邇年旱潦物力多艱或兵燹遺黎瘡痍未起尤宜加意釐剔以臻至治凡有利國利民所當興者幾何事害政害民所當革者幾何弊該州縣身在地方見聞必確合亟轉行咨訪仰該府官吏照票事理即便轉行所屬州縣凡地方官政民情有宜於昔而不宜於今利於官而不便於民或利所當興慮阻撓於勢要或弊所當革苦積習之因循其最關民瘼安上全下事宜該府暨州縣務須明白指陳徑行詳報本部院虛衷採擇極力舉行毋得假公濟私捨大言小浮詞托拾徒煩披閲並不許由司道府轉詳致滋格礙示親民官自省六戒朝廷設官分職皆為治民而與民最親莫如州縣近來積弊成習親民者反以纍民甚有不知亷恥為何物而天理人心四字置之髙閣不問矣噫吏治日壞如倒狂瀾何時止乎用是偶採成言兼參時弊陳列六則朝夕省觀自為猛惕倘反是道也王法不及必有天殃及之矣謹列如左一曰勤撫恤州縣之官稱為父母而百姓呼為子民顧名思義古人所以有保赤之喻也夫保赤者必時其飲食體其寒暖事事發於至誠保民者亦當規其飢寒勤其勸化事事出於無僞蓋無僞則有實心縱力有不及與事有掣肘然此心自在即於萬分中體認一分亦百姓受福處也昔陽城云撫字心勞知撫字必從心出由心而發隨事加恤便有裨益若徒外面托拾一二便民好事以為得意亦市名也其去殘忍者幾希耳是不可不戒一曰慎刑法草木禽魚皆有生命不可恣意殺伐況人為萬物靈其肌膚手足悉胞與也人不幸而涉詞訟又不幸而於詞訟中受刑罰雖十分不可寬必須求一分稍可寬處此吕叔簡戒刑書內所以有不輕撻不就撻之說也至於囹圄福地昔言已及當思入此者皆無知小民或有寃枉極可哀痛自然稍加體念若徒任意禁獄與任意加刑甚有狥情面恣苞苴以下民之皮膚供長吏行私之具者或身或子孫定遭奇禍是不可不戒一曰絶賄賂為貧而仕雖乘田委吏止為祿養未嘗於祿養之外有别徑也若舍此而外多求便利即為暮夜楊伯起之四知言之已可凜矣昔人云士大夫若愛一文不值一文又云從來有名士不用無名錢試思長吏於民論到錢處亦何項為有名乎夫受人錢而不與幹事則鬼神呵責必為犬馬報人受人財而替人枉法則法律森嚴定當妻拏連纍清夜省此不禁汗流是不可不戒一曰杜私派小民應辦正額尚且難應未知私派從何起也不過頻年來軍需緊急如解馬賠馬與兵馬行糧草豆衝途供應動以千百無計可支故有派之民間俟日後銷價給發者如近來行糧價值檄行刋附由單之末以防發給短少之弊是部院大臣亦疑州縣為先取民而後發價矣不知先取後發雖至公無私小民之揭借其利己經數倍況長吏派一錢則胥吏派數錢長吏派一斗則胥吏派數斗有極不堪命者乎何如稍那正供現價現買而即力請上臺迅速開銷并由單價直亦多此一番周折昔人云於不得已中求一分擔當即人民利益處也至於因公苛斂任意誅求種種乘機自利不啻為盜取人定然自有後禍是不可不戒一曰嚴徴收小民正供自有額賦外此分釐非可苟也近來徴收立法著令自封禁絶火耗上之所以嚴州縣者可謂周且密矣夫為州縣而受上之禁飭即使無弊自好者尚覺汗顔至為州縣而并禁飭之不靈倘有自欺則有心者將視為何等乎古人云錢糧一節若肯請減其善無量今錢糧不能減而去其錢糧中加增之弊亦與減錢糧倣佛況鳩形鵠面衣食啼號此等困苦小民欲陰搜其膏血縱令安然無事滿載還家後日亦必生流蕩子孫以覆敗之是不可不戒一曰崇節儉天生財物固供人用然必存不得已而用之之心方能用度相繼倘奢侈任意飲食若流無論暴殄固犯譴呵即費用必思取給是亦壞心術之萌蘖也夫長吏近民雖自己足食尤當思民之無食者自己披衣亦當思民之無衣者推此一心縱令衣食淡薄尚且不能消受而猶欲起侈麗之想乎鄭俠語人云無功於國無德於民若華衣美食與盜何異夫衣食甚細而至以盜相推此充類至盡惟恐長吏之稍奢也是不可不戒移江西撫院轉飭各屬妄借分捐咨照得民間之困苦莫甚於私派有司之掣肘盡苦於分捐江右各屬自甲寅以來賊寇蜂起征師雲集一時軍需供應費用不資如解送御馬倒斃置造戰船營房搬運滿洲骸骨以及修理公署協濟科場無不咄嗟立辦維時事迫俱係動支正項及至事後算銷則有核減價值者又有不准開銷者由是設處分捐之法包藏私派之弊或草單半幅或飛簽一枝立催照數繳完不留一毫形迹以致長吏焦心彌甚小民剜肉難堪恭讀康熙二十年十二月二十日恩詔一款內開康熙十九年以前用兵各省採買供應大兵緑旗官兵糧草價值有經駁減者亦有尚未奏銷者該督撫確查保題到日准銷等因欽遵在案則是從前一切核減追補之銀俱在保題准銷之內又何有病官纍民之事但恐不肖官員與夫襟棍蠧胥上下扶同打成一片猶借分捐名目仍然苛派里民本部院逺駐江寧耳目一時難及仰祈貴院念切同舟嚴加禁飭并查各屬如有不肖官員藉事風生妄借分捐從中濫派致纍小民立賜移示㑹疏題參以警溺職以蘇民困飭勵學政事宜掄才為國家大典造就培養實始黌宫況江南大邦係人才㑹萃之地學道為通省文衡責任綦重務在精白乃心矢公矢慎操守亷潔振拔孤寒庶不負朝廷任使至意若懷不肖之念苞苴盛行致開奔競之途徑竇百出煌煌功令置若罔聞學政廢弛有江河日下之勢所以前經左都御史魏題請剔除十弊禮部覆准奉㫖遵行已久謂可稍挽頽風乃本部院下車以來訪知積弊多端有難悉數如上下交通則弊在有司表裏作奸則弊在胥吏鑽謀賄托則弊在生童究之種種情弊皆由學道無潔己之念不能正以率下以故難於杜絶耳從來學道一官非進士出身不在是選當其做秀才時若遇不公不明之學道必有大不平之鳴怨憤訕謗而罵詈隨之何以自已做到此官則又躬自蹈之全不記寒窗呫畢之苦寡亷鮮恥敗壞身名莫此為甚即謂銅山金穴利令智昏不暇為潔身之謀然誰無子孫誰不願子孫成名顯達而瞞心昧己贓私纍纍獨不畏明有國法幽有鬼神現在發覺則有身家性命之憂日後凋零更受男盜女娼之報乎至於儒童赴試為士子進身之階務須守正待時何必妄求躁進乃素封之家倚錢神為作合紈袴之子恃竿牘以求通是父兄平日先以自炫自鬻教其子弟則子弟所習見習聞無非夤緣賄賂又安肯潛心肄業以望學問之有成古來由白屋而為公卿取紫青不藉門第載在史冊不可勝數更如近代之王元美陳卧子皆江南人文領袖何嘗不出簮纓世胄又何嘗藉祖父餘廕以取科第即此可作讀書人榜樣爾等有此營求之費何不資其膏火慎擇良師俾子弟下帷攻苦磨礪以須而必欲百般鑽刺以奪單寒上進之路致使懷才自好之輩皓首窮經卒不得一青其襟抑鬱沈淪愁歎之聲載道聞之心惻思之髮指誠使爾輩翻然自悔各安誦讀不為習俗所移則考試官無從射利雖欲不公不可得矣何患弊源之不清乎聖賢學問祇在義利兩途蹈義則為君子趨利即為小人由一念之公私分人品之邪正何不洗心滌慮勉做好人本部院上體朝廷右文作人至意下為憐才剔弊起見諄諄誡諭并將訪聞各項情弊為十弊中所未有或有而未詳盡者條分縷析如左一學道私人大約以掌案長接為心腹掌案者以事歸總握長接者以行近親隨輒敢大膽進言先瞰本官之需用巧為借貸以充應及至到任後官吏閧聚一堂視名教為貸利之藪私議進學補廩提等等項分别府州縣之大小以定生童價目之髙下及將按試之日掌案長接預遣積蠧副役并包攬棍徒潛匿本地方菴觀歇家招搖說合串同門役水夫暗通記號奸宄莫測嗣後學道按試止許隨帶謹恪書吏數名以供書寫著府州縣等官嚴加􅊧檢進署直至試畢發案後方隨本官出館到别府亦如之其菴觀歇家等處無許容留冒役棍徒等人地方官仍不時緝訪拏究一學道發牌考試各府抵境之日地方官借迎接為名即用言餂私情預為結納及試生童之日又借提調送考名色投謁進見或暗通線索或代達私書甚至考後次日府㕔州縣等官借稱公事進謁而學道亦不時傳見館門啓閉無常亦無禁鑰以致上下交通弊竇叢生嗣後凡府㕔縣等官出迎該道槩行謝絶送考㸃名畢各歸本署供職不得參見一考試前一日府官送童生案冊教官送生員學冊以備學道㸃名入試從來彌封編號印簿及場內坐號紅簿㸃名後即發該府州縣收貯所以發案之日止將原卷發府拆對原冊填案近有司任意逢迎學道竊幸察對公然收存道署不但夤緣者坐號姓名可以暗中摸索并貴介子弟三代姓名注原冊之上如有囑托更覺瞭然在目今後學道㸃名畢即將彌封坐號等簿當發該府州縣攜回毋蹈前轍一學道按試例應教官送考并府首領縣佐二等官巡捕其在巡捕等員巡視考場或借效勞乞恩已屬不法至教官為親臨屬員易通情弊甚有投認師生擅通薦函並夤緣關說等弊殊干憲紀今學道按試某處之日預期㸃定巡捕二員量㸃送考教官幾員關防供職試畢發案後一并發放無許朝進暮出以杜私端一童生赴試必由縣府二考録取送道文章髙下務須縣府秉公校閲庶真才得以上進近不肖有司視為具文全無慎重之意有等故為少取以名數之先後分賣價之低昻有等一味盡情依薦牘之差等為填案之甲乙致孤寒而有抱負者屈抑不伸望道試如登天之難即學道有意遴才亦無從甄拔因而改絃易轍謂此中原無佳卷何妨受賕肥槖此念一萌上行下效府州縣愈無忌憚真才何由得達今後嵗科二試縣府考拔取童生務令公明閲卷不妨一覆再覆以杜傳遞代倩等弊覆試既畢即發全案無得稽留以待鑽刺仍粘連三卷送道察對筆迹如所取卷內有文理荒謬必係府縣官徇情受賄該道即申報本部院以憑嚴究一廩生保結原係稽察刑喪過犯冒籍娼優隸卒等項不得混試近有不法劣襟受賄作弊朦朧濫保外更有串通外府有文無行之人先作本縣儒童冒名赴考往往幸獲及發案有名或索勒本童謝銀或朋奸覓人頂買俗有沽切頭飛過海名色殊屬駭異嗟嗟取額幾何寧堪此輩網利該道按試日先期傳集各學廩生逐名嚴詢各具甘結所保儒童如蹈前項等弊罪甘褫革仍加究處法在不宥一進學儒童原分大中小縣著有定額每大縣賄買人多限於額數將本童填入窮僻小縣案內仍恐小縣攻擊冒籍俟發紅案後巧令本童具呈改學仍歸本縣者又商籍取數較多赴考儒童與民籍較少亦有以民籍赴考儒童混進商籍者接木移花為弊匪細今該道務期嚴核本籍秉公閲卷毋得混淆一按試一府閲卷既畢即當發案或因私槖未飽故為稽延竟將試卷帶往别府童生則懸價以待入局生員貧富又教官素所熟悉至有不肖教職故以富生姓名聲言考置劣等嚇賄提拔貪婪無忌莫此為甚有蹈此弊者該道即行揭報提處又捐納童生有一體發案之部文尤不得藉口稽遲嗣後捐納童生陸續取齊外先將取定正額童生於覆試次日即將原卷發府拆號填名申報本部院以憑察對一童生試卷必經發府拆號填名所以學道之權往往知府得以操之因而交通關節一切過付皆出其手不惟去取竊擅甚至拿捏訛頭纍千盈萬據為已有及學道索取結局府官以業經紅案有名恃為無可如何竟致白賴者學道亦以曖昧自誤不敢聲張惟有隱忍而已此等大沒良心人傷天害理該道何苦徒損心術受制於人名利交失自已不能逃鬼神之譴責子孫又必受禍患之報應可不畏哉是在學道亷潔自矢則上下體統凜然具在自不受屬官之挾持矣一試官例設挂號胥役收進文書學道職在衡文專司學政無軍務刑名錢糧緊要等事近各府州縣鄉紳以私函不便直達往往借現任官封賄囑門役擅行投遞或因勢迫情邀以致真才淪落深可痛恨此後凡有官封文書止許開口投遞如有請托私書該道即刻將原封原書星速呈送本部院一併題參至於沽名奔競所在有之而盜竊虛聲下江尤甚每借憐才二字藉口公薦聮名竿牘究屬朋利私心而於孤寒實學毫無裨益亦當嚴行杜絶一不肖官屬上下關通交互作弊每遇一考於府取正案試卷之外送空頭印卷多寡不等遇有身未赴考肯出大錢及鑽求大來頭薦書者竟代作文字二篇居然入泮此弊首當嚴禁其前列生童例應將原卷解部不得擅行改竄至於刷卷等弊往往有之俱應痛革一設科取士文武並重豈以學習韜鈐遂可視同辨髦近日每以武途忽視為狥情交際之具或送往來過客或賞巡捕等官乞恩或進士一二人舉人四五人明目張膽扛說一名竟為成例遂有市井逰手無賴之人目未識丁不諳騎射賄托鑽營濫叨名器一入武庠便約結匪類三五成羣借衣頂為護身之符視衙門為壟斷之地把持謗訕肆行無忌此皆係學道拔試不加慎重於始致滋澆惡成風此後考試武途生童務須秉公校視果係弓馬熟嫻䇿論優通方准拔取毋得縱意狥私致使干城失寄以上諸欵皆係本部院察訪最真切中時弊自示之後該道務與各提調教職官吏紳襟人等洗滌肺腸實心痛改得真才以報朝廷振文教以吐士氣本部院斷不沒人之善定行特疏奬薦倘怙終不悛陽奉陰違本部院耳目最近隨時隨地密行察訪如前十二弊有一於此立刻飛章入告官則摘印子襟黜革候㫖按律擬罪其蠧胥奸棍即刻斃之杖下本部院實心實政斷不托諸空言使宫牆名教之地為爾等藏垢養癰也又衡文者愛惜人家好文字爾子孫有文字定為衡文者愛惜若一味愛錢只恐子孫縱㑹做文字決不出頭更恐神鬼怒恨生出瞎眼子孫上長街唱蓮花落要看字也不能彀了莫笑老夫迂談興利除弊條約照得州縣各官厲民積弊處處皆然而江南尤甚本部院下車以來即訪有等不肖有司悖違嚴㫖剝削小民而莫之恤因循陋規而莫之除本部院恤民念切本擬將此等積弊據實入告仍開劣員以昭貪墨闒冗之戒但初經蒞任正望各屬悔罪維新之候姑從寬典除己往不究外自今伊始爾等各官務將後開積弊盡行痛革所有應禁各欵臚列於左一嚴禁火耗徴收錢糧照部頒法馬令花户自封投匱不許暗加火耗久奉禁例況經功令創懲州縣各官自宜洗心革面乃訪聞江南下江州縣徴收錢糧仍有火耗上江較為尤甚而江西州縣火耗竟有每兩加至一二錢不等哀此小民剜肉醫瘡吞聲飲泣而不肖有司方且肥家潤槖坐致富饒恬不知恥本部院念火耗之弊害民最衆而纍民最甚務必痛除盡革以紓民困如有不遵訪出定行參究該管道府不行揭報均難辭咎一禁止私派小民終嵗勤苦竭駢胝之力難完輸將之供而不肖州縣往往巧立名色借端私派如條銀則有傾銷解費之派漕糧則有修厫監兌之派由單編審則有刋刻紙張之派種種名色弊難枚舉甚至江西地方有湖差蘆差門差竈差橫徵苛斂更可駭異本部院頗有所聞俟亷訪得實旦暮具疏糾參如各官能及早猛省痛自湔滌本部院姑開面網准與自新若怙終不悛陽奉陰違或經訪聞或被告發立行參處斷不姑息以貽一路之哭也一嚴禁餽送從來寡所用斯亷所取未有用之極繁多而取之能亷潔者也本部院訪得兩江官員専事彌縫惟尚交際司道府㕔州縣生辰令節到任署任卸事自下而上無不遞相餽送視地方大小區别等差盈千纍百目為舊規於是官評之賢否吏治之勤拙俱不可問且此等餽送不出於錢糧之加徴火耗則出於詞訟之婪取贓私以小民之膏血供多官之結納民生何以得遂物力何以得阜也本部院下車清介自持誓不受屬員一毫餽送爾司道府㕔州縣務期共相砥礪痛絶餽送庶幾懸魚瘞鹿之風逺逮古人而飲水茹蘗之操更重今日倘視具文藐玩不遵本部院訪聞得實白簡具在斷無寬貸一訪拿衙蠧澄叙官方必先剔除衙蠧蓋此輩浸潤蠱惑於本官不曰某項舊規可取則曰某事前官曾行且曰上司交際平日費用勢不得不取資於此大佞似忠本官一墮其術遂招搖兜攬顛倒是非播弄威福本官利其暮夜之金甘受捉鼻蠧役憑城依社小民側目含寃毋論刑名錢糧大小衙門在在皆然緣積蠧久居衙門或父子兄弟出入朋充或已役滿而仍前干預本官不肯破面驅除以致流毒無窮今後各官嚴行覺察如有積年蠧役及干犯前項種種情弊者即速開具欵揭呈報本部院以憑盡法究處如敢扶同徇庇及將小眚微疵揑飾塞責者察出參究不貸至於經制之外容留白役并照定例題參各宜凜慎毋以身名輕徇下役一訪拿光棍剪蟊賊所以培嘉禾鋤强暴所以安良善本部院訪得兩江地方有等光棍交結匪類串通衙蠧或指逃嚇詐或唆盜妄扳凡溫飽素封之家輒行嫁禍搆害睚眦殺人道路側目是使熙皡之盛世尚有痛心疾首之民地方官寧不重負職守耶自示之後如有此等光棍橫行無忌殘虐小民者立即呈報本部院以憑盡法處死至江寧鎮江有扒手蘇州松江有打降皆地方喇虎該有司一并訪拿重處以絶奸宄姑息容隱察出並究不貸一禁止問刑遲延案無留牘斯獄鮮沈寃屢奉俞㫖內外問刑衙門事件不許遲延至於易結之事故意遲延不結從重處分欽遵在案今本部院聞兩江各衙門一切事件不遵限完結經年纍月株連蔓引羅織鍛鍊甚而久滯囹圄瘐斃民命抑或男女無别致傷風化至於户婚田産易結細事亦必曠延日月以致小民拋家失業及批允發落又有羈比罰贖之苦逮事完釋放已四壁蕭然室如懸罄矣言之深可痛恨今後各衙門事件詞訟不拘大小俱要遵限完結易結細事隨到隨審即行省釋並不得濫罰贖鍰敢有故違或經訪聞或被告發題參重究各宜凜遵毋貽後悔一嚴禁借旗放債駐防滿兵皆係禁旅大臣統帥戍守紀律自是嚴明斷無縱容旗丁盤債虐民之事但地方無籍奸徒影射旗勢或串同旗下家奴等狐假虎威狼狽作奸違禁取利及印子錢名色盤算估折稍不遂意鞭撻橫加小民無可如何殊干法紀今後如有此等奸徒借旗盤債行凶虐民即行呈報以慿㑹同將軍嚴審如平人立置重典如係有職人員請㫖革究决不輕恕一嚴禁濫差衙門差役禁戢猶懼不法若濫行差遣則猶虎而翼其不至噬人者鮮矣本部院訪得司道府差下縣縣差下鄉俱足為民害而府縣差害民尤甚蓋司道差去民間稍逺故其害民猶少若府差有每年坐催地丁兵餉名色此輩謀票入手攜朋引類一到該縣庫胥户役皆有初見禮儀縣官間有賞賚此役久住該縣需索無厭稍或不遂凌轢長官咆哮公堂無所不至再如縣差下鄉承催錢糧拘提人犯酒食差錢狼貪豕􅊳窮鄉僻壤辱及婦女幾無天日尤為切齒今後錢糧事件立限完解司道府不得擅差一役下縣州縣錢糧務要遵照禁革里排頒發限串令花户自封投匱截票歸農至於詞訟非人命逃盜止許原告領牌自拘俱不得擅差一役下鄉如有故違事發官則飛章參奏役則立斃杖下决不姑貸一嚴禁濫收監倉犴狴之設所以收禁重犯非濫及無辜輕罪也兩江虐政不論重輕罪犯輒擅收監而獄吏禁卒百般凌虐多方索詐甚而打凶打肥名目及劣員殘逞勒取病呈等弊種種惡蹟難以罄述今後除死罪重犯照例鎖􅀈外其餘輕罪人犯不許概加桎梏至於催科詞訟並婦女非犯重罪不許收禁佐二衙官不許擅將人犯收寄倉鋪印官躬親督視囚糧按時給發夏月不時灑掃以除瘟疫冬月量給草茵以免凍斃倘有故違仍踵前轍者許各犯家屬奔控轅門以憑提究一嚴禁捕役非刑私拷獲盜未經到官豈容捕役先取口供臨審方可動刑安得奸徒私加酷治本部院聞兩江捕快人等每於初獲盜犯未經到官輒私帶荒郊慘拷酷弔名為坐索或誣良認盜或授意指扳箠楚之下能無妄供而捕官希圖結案朦朧成獄黑寃難辨聞之眥裂今後獲盜不許捕役私訊拷打如非拒捕格鬬而本犯被傷者定係前弊該本官即行嚴究捕役倘有不遵官則題參重究役則立刻處死决不姑貸一禁止保歇省㑹府縣歇家最為作奸犯法之藪故定例歇家與衙蠧同罪法至嚴也其在省㑹府城者外府州縣解錢糧則包攬投納使費更有洗批那移之弊解人犯則包攬打㸃行賄更有主唆扛幫之弊至州縣歇家包當糧里代納錢糧及至侵漁缺缺逃脫無蹤有司恐礙考成勒令花户重賠小民含寃莫訴再而主唆原被刁訟興詞及至兩造明知悔悟而詞入公門欲罷不能彼且徐收漁人之利此等歇家甚於陷穽愚民無知誤墮身家立破罪不容誅該地方官嚴行查訪據實嚴拿究擬如狥私阿縱定以失察參處决不姑息一嚴禁訟師兩江地方俗尚健訟小忿輒裝大案逺事揑稱新寃載鬼張弧問官無從詰審揆厥所由皆緣奸惡訟師不照本人據事直書採揑株連希圖聳聽及准理之後兩造茫然更且從中主唆恐嚇詐騙未及對簿而原被之身家幾傾於訟師之手言之殊堪髮指示後代書止許直書情事不得别有增減仍填代書姓名如審有虛誣者提代書從重嚴究其有過惡昭著訟師地方官并訪拿解轅門處死不貸一禁止取用行户江南雖商賈輻輳衆貨聚集人物繁華然皆逐末之輩揭本借資聊以糊口兾得微息至江南地方十室九空生計寥寥再而江西當用兵之後瘡痍甫起凋瘵未復官斯土者宜如何潔已愛民軫恤撫綏或可漸復元氣乃兩江弊政各官凡一應日用等物無不取用行户或短價虧缺或勒掯不給以致資本消乏一㕓既匱八口啼飢本部院稔悉此害殊堪髮指自禁之後各官有蹈前轍者許諸色人等赴轅門喊告審實立即題參以為貪黷剝民者之戒各宜警省毋自貽戚一禁止奢靡佚逰禮莫重於婚喪俗莫敦夫勤儉本部院察家禮載親喪一節三月而葬謂附棺者必誠必敬乃爾江南地方多尚虛文半縻於佛事半惑於堪輿以致停棺不葬久而風火暴露皆不可測既愧人子之心且失慎修之禮至於兒女婚姻競尚華侈每因百兩未爛盈門遂致三星徒賡束楚奢既越禮遲則愆期均非風俗之美他如牛首春風秦淮夜月以及各處招提名勝不過騷人韻士借以為逰覽非四民恆業所可留連甚至良家婦女駢肩纍迹燒香拜願自招輕薄致啓釁端尤為可恥今後地方親民各官諄加勸諭喪葬以禮婚姻以時勸以務本慎以逺恥俾風俗一返淳龎斯世道永安熙皥矣如有不遵查出重究一嚴禁兵丁虛冒離次失伍已為軍法所不容虛名冒餉更屬王章之難宥兩江為東南重地汛防戍守最為喫緊本部院訪得各標營將辨多有坐占名糧或數分十餘分不等而營識本身之外亦坐占一分者此等坐占之糧差操不與獨於提鎮㸃名時令其僕厮披執應名而已是使朝廷嵗糜養兵之餉而不獲收養兵之用墮軍實而干法紀莫此為甚自示之後各營戰守馬步兵丁俱要現在實數不許仍前坐占虛冒如敢故違訪出定以軍法從事决不輕饒嚴禁漕弊各欵照得徴兑漕糧弊竇多端雖經本部院屢飭通行嚴禁但恐所屬印運各官狃於故習不思閭閻困苦不念身家為重仍然陽奉陰違恣肆勒索殘虐吾民亦不可定今值開兑伊邇所有漕弊事宜合再摘欵嚴禁一禁旗軍勒索之弊夫漕糧官收官兑原不令軍民㑹面此定例也自五米十銀之外不許多有加增近聞旗丁驕橫不曰米色不佳則曰私增斛面掯勒多端乃於十銀額支之外每石又加銀六分名曰六銀相沿日久遂成錮例其銀以厫書經收入手臨兑轉給而厫書藉此名色又復加斂分肥嗟嗟小民有限脂膏何堪如此剝削深可痛恨示後如有運辨狥縱不法旗丁串同厫書借端勒索或經本部院訪聞或被里民告發官辨飛章指參丁書立拿杖斃一革差擾之弊各屬徴收漕糧從前俱係差催致小民以有限之金錢填若輩無窮之溪壑本部院深悉民間積困不苦於正供而苦於差擾今催納漕糧止許照地丁設立滚單之法屇限不完再發木皂行提使百姓省一分之差費即可早完一分之正供如有違禁差擾定行糾參不貸一禁奸棍包納之弊米色乾圓潔淨最為第一要務近訪有地方光棍人等住居倉旁借開張米鋪為名攬收里納糧米多勒費用代為完交纍百盈千掗派粞碎糠粃串同厫書倉役人等機乘早晚無人之際一槩混斛厫內致啓旗丁掯勒之端厲國病民深可痛恨示後如有奸棍仍前包納紊亂漕規者司漕各官訪實即行鎖解轅門以憑立斃杖下一禁舵水擁擠倉場之弊收兑漕糧重地理宜肅清止許一旗一綱領兑原不容帶領多人致滋鼓噪示後如有運辨不遵示禁仍縱不法旗丁多帶舵水人等蜂擁倉場灸詐兑費凌辱官役者監兑府㕔各官立刻揭報以憑嚴拿究處一革倉夫穴竊之弊倉夫一役不過専司啓閉而設然此輩居住倉側慣借看守為名遂敢作奸偷米是多一鼠竊也及至兑運之後又將存倉竹木潛行拆取致纍里民備辦今應斥革逐令歸農不許仍住倉側每晚印官親臨封倉另選誠慎人役左右巡緝如有抗違不遵除拿倉夫處死外并將司漕各官從重指參一革雜派淋尖之弊小民終嵗勤勞粒粒辛苦而狼戾者視若泥沙每於兑漕之時借稱驗收樣米名色棍蠧羣踞水次任意勒索甚至開倉神福有費紅單酒席有費糧差總書有費奏銷算帳有費百計取盈不饜不休及至糧米入厫必要踢斛淋尖多索耗米不等鄉民任其蹂躪莫敢誰何示後如仍踵前弊一經訪聞或被里民告發官即飛章糾參蠧役立拿杖斃一禁包歇充當之弊漕催五年一輪承管各甲之米其倉中修葺鋪墊皆其事也然而鄉愚不諳書算每每倩雇積年棍蠧包攬代充因而串通蠧書共相侵蝕以致虧米缺兑貽纍匪輕今務令正身充當如有奸棍包充作弊司漕各官查拿解轅處死一禁對支恤米之弊各邑孤貧恤米此朝廷優養無告之民向有勢棍富豪利其有此恤米可以兑給漕糧先將銀米借貸及至兑漕之時取盈扣算在豪富則圖利而不仁在孤貧則抵債而愈困更且共相垂涎支給觀望不納誤漕病官莫此為甚本部院深悉其弊示後各邑務須漕糧兑足即將存倉之米照數給領一槩不許兑支如有勢棍富豪不遵示禁仍蹈前轍者司漕各官訪實即行鎖解轅門以憑立斃杖下慎勿狥隱并干未便一禁厫書飯食之弊各屬徴兑漕糧每用書役司理其事名曰厫書其中遂有索費之名則曰飯食里民計米付銀勢不可缺而且侵蝕折乾往往缺兑誤運仍派里排賠補名曰厫缺錮弊相沿牢不可破如有此等情弊訪實官參吏處不貸以上各欵皆切漕政錮弊本部院不靳諄諄誡諭無非欲爾官辨丁役人等痛改前非嘉與維新之意如果實力奉行革除積習自當分别奬勵倘仍怙惡不悛剝削小民者官即飛章指參役拿立斃杖下法在必行斷不姑寬各宜猛省毋貽後悔通飭各屬私派納訪檄照得訪拿衙蠧原為除害安民如各該衙門果有大奸巨憝贓真證確者應即按名拿解聽候發審追擬以彰國法近聞江右各官每借訪拿名色上而司道下而佐雜等役莫不有派名曰納訪竟成貿易盈千纍萬公行比追上官惟思納訪銀兩一任大奸巨憝槩不查拿蠧役既完納訪銀兩愈肆咆哮橫行婪詐以致蠧弊日深民害愈烈興言及此殊可痛恨除現在密訪參拿究處外合行通飭為此票仰該司官吏照票事理即便移行所屬各衙門一體遵照嗣後務宜痛改積習持亷秉公將該衙門積奸大蠧不時亷訪揭報以憑懲究不許仍前上下通同私訪派納婪贓庇蠧敢有故違法紀怙終不悛該司即將貪黷官員揭報參處慎毋瞻狥弭盜安民條約照得江南一省幅員遼闊盜賊竊發所在有之或剽掠閭閻之間或肆劫江湖之上為害於民殆無虛日抑思此盜賊者莫非朝廷之赤子良由該地方官始則撫綏鮮術既不能禁民之不為盜繼而弭戢無方又不能化盜而歸於民因循忽視俾流毒未有底止將何以肅郊境而臻寧謐乎本部院欽承簡命委任封疆目擊地方情形為安全黎庶之計禁暴戢奸所宜亟講因於體訪籌畫之外博採輿論分别諸條如陸路之首重保甲水路之嚴飭汛防是為弭盜之大綱而其餘各欵亦皆旁搜斟酌歸於至當無有剩義用是刋刻成編遍行各屬轉相告誡務在家諭户曉使知本部院保護民生至意雖窮鄉僻壤水澨山陬咸令恪遵毋視為紙上之空言也況保甲之法久經奉㫖而向來地方官視為故事行之不力以致奸民匪類改革無期凡膺民社之寄者豈不有忝厥職自發條約之後各宜督率居民實心舉行如果勸諭周遍約束精嚴使盜藪肅清居民安堵本部院定行特奬倘仍前玩愒或陽奉陰違以及借端需索本部院一有訪聞官吏及保甲長人等分别懲處斷不寬貸末欵言之詳矣宜各凜遵毋忽所有規條開列於後一設甲長凡十家立為一甲務須各該州縣印官刻意勵精以實心行實法單騎簡從躬詣各地方查編每一甲之內秉公遴選端正勤慎殷實老成之人一名舉為甲長稽察九家咸聽約束慎勿狥私濫舉亦不得轉委衙官借端生事仍令九家各開男婦姓名年貌自祖父母父母及本身妻妾至子孫婦女與同居同姓異姓族戚並僕婢等人口作何生業盡數開列門單交與甲長以便識認稽查其甲長亦將本家家口照前式開列門單聽九家互查均毋遺漏隱瞞違者重究一取互結甲長既已遴舉十家俱應聮名互保其保結內開某某家士農工商各係作何生業平日俱無窩逃蓄盜交結匪類勾旗訛詐闖將打降凶酒撒潑嫖賭為非刁訟抗糧等項如一家有此等事犯九家甘受連坐互結一張公同書押交付甲長以便編入甲內倘有前項不法之徒而九家朦混具結者地方官查出除本犯照應得之罪究治外九家各責三十板枷號兩箇月其抗違不遵入甲者一併重究一准自首遷善查互結之法既行倘十家之中有某家平日係窩逃蓄盜交結匪類勾旗訛詐闖將打降等項九家不敢互結者許本人報知甲長注簿仍赴官自首改過咸與自新地方官另記一冊開列姓名或他處舊案扳犯許將本犯某年月悔過首詞叙入以開生路或怙惡不悛地方官執法究治如力不能制者立刻申報以憑核參拿問其餘凶酒撒潑嫖賭刁訟抗糧者九家不肯互結亦准報明自首另記一冊開列姓名不時稽查有無改過實迹違者重究一立甲簿凡十家之內有出外行走者即報明甲長今往某處作何生理勾當甲長注入簿內回日仍報明甲長某日事畢回家即於簿內本人出外事由之下注明以便稽查或恃强不報或詭祕不報八家查明某不在家即報甲長注簿次早報官拿究倘鄰近州邑適於此日此夜失盜即移解㑹訊如八甲通同隱諱不報甲長每晚查某不在家即眼同八家注簿次早報官先責八家各二十板枷號一箇月後拿本犯審處又如十家之內有親戚朋友來相拜望者即報知甲長本家有某處某客某親同行幾人是何姓名或步或舟或騎或轎帶何行李來此甲長即注入簿內或本日即去或隔宿而去本家仍報明甲長於前報項下注明以便稽查或恃强不報或詭祕不報八家公報甲長注簿報官拿究或八家通同隱諱不報甲長查出注簿報官拿本家與來人審明口供如來人來厯明白任其回去本家仍以失報責二十板入家各責十五板如來人不端即差役押解原籍地方官查收注簿取收管於本處簿內注解收訖本家責四十板枷號三個月八家各責三十板枷號兩個月以上二條甲長通同隱諱一經地方官查出將甲長加等重究一稽甲長十家之中遴舉甲長或不諳書寫即煩鄰佑識字者登記或甲長有事他往即報明九家公同注簿將簿交付甲內老成持重之人收管登記甲長回日仍公同九家將回來情由注簿將簿收回如甲長家有親客來往亦照九家例注簿違者一體治罪一設保長各村莊居民一甲以至數十甲若無統率則涣散難齊呼應不靈今應約以十甲為率該地方官再加遴選舉一端方公直老成勤慎之人充作保長以統率之料理地方各甲咸聽約束將花名交付保長保長將各甲合總報官以憑稽查如小村莊止有一二三甲不等應將附近村莊甲長聮成一處公舉保長料理約束一如前制俟一年後另選更换以察功過而防弊端倘有不法保長借端擾害地方一經察出或被害告發俱照衙役犯贓從重治罪一分鄉紳十家之中有京外仕宦或見任或里居及未出仕之進士舉人不便與庶民同例編查但逃盜肆害不特官民交困紳襟亦受荼毒厯厯有案可稽今應該地方官酌量另立一冊務令各宦將實在家屬僕從人等盡數開列冊內送地方官備查各宦仍互相稽察倘有違悖功令者公同舉首地方官轉申按治如法倘係鄉居紳宦願編入村莊保甲者聽從其便至於一切微官如在京異途雜職及在外文官州邑佐二以下武官守千以下及武甲科並貢監文武生員等項每州縣多者不下千人少亦數百及百餘員名不等若另列各冊散漫難稽應與齊民一例編入保甲違者重究一恤窮民凡十家之內有窮苦民人不能度日者甲長同保長報知地方官另造一冊設法養濟如此等人民既不敢出外行走又無地土生意為民牧者不加存恤必致轉於溝壑如保甲長不報罪坐保甲長如已報地方官任其飢餓喪命或典雇旗下苟延嵗月本部院訪聞地方官以不職糾參若能設法養濟四季詳報存案以憑記功舉薦一修整牆柵凡市鎮鄉村各有牆垣門柵原以慎啓閉而資衛護此舊制也乃年深日久率多毁坍今應各照舊制逐一補葺堅固保甲長公訂一簿輪流派撥某日某人幾名看守柵欄某人幾名承值查夜俱登記簿內或遇盜警本村放炮敲鑼如有寺宇之處以鳴鐘為號該地方居民同心協力一齊救護如堵禦盜賊不致入柵行劫者巡夜同守柵人等報明地方官酌賞銀五錢保甲長賞銀一兩如已入柵欄力能救護不致失事者巡夜守柵人等並保甲長賞亦同前至於力能當場打死擒獲盜賊者巡夜守柵人等并保甲長報官加倍賞銀一兩仍令本地方人等置酒食酬勞倘先事不能知覺臨時不肯救援以致盜賊入柵劫去財物拷傷失主者鄰佑并巡夜守柵人等及保甲長一併究治敢隱諱不報者十家俱以通賊論再照各地方編派夜巡守柵人等往往舍巨族而責貧民夫貧民不過孑然一身耳何須防賊所應防者正為富貴之家起見乃不輪流看守反使貧人常川代為巡察甚非理法之平嗣後不論貧富一體派守違者從重究處其鄉紳亦應遣家屬輪當永著為令一建敵樓各村莊既設保甲長督協守禦必須敵樓方得逺視廣聽今酌定凡村莊居民有過百家以上者即於本村之外建造敵樓一座務比本村房屋高長數尺以便逺望其樓基不論亂石磚塊和以膠泥俱可築壘止取厚實堅固勿事粉飾上蓋小樓一間內置炮一桿鑼一面每日於各甲之內輪派一人晝則四面瞭望夜則徹夜支更凡遇有事立刻放炮鳴鑼使本村保甲長早得糾衆格鬬其附近各敵樓聞聲亦即放炮鳴鑼一齊接應各保長即率所管甲長一面分撥堵截要路一面合力救援賊勢既孤我衆益鋭不難當場就縛矣如能殺死及擒獲賊徒者在事人等每名賞銀一兩甲長及守敵樓人每名賞銀一兩五錢保長賞銀二兩若擒殺十名以上大夥强盜者加倍賞賚仍俱令本地方人等備酒食酬勞如賊至本村不行放炮鳴鑼者罪坐保長并守樓之人如保長已聞放炮鳴鑼不速傳甲長者罪止坐保長如保長已傳知甲長而甲內人丁不速救禦者罪坐甲長并不救禦之人更有堵勦不力或當場退縮觀望致賊逸脫者酌審情形分罪保甲長至於分撥堵守要路放賊走脫者即未受賊賄亦行嚴究若聞鄰村鑼炮不行接應及保甲長協救不力者應罪坐鄰村保甲長守樓人等法在必行均毋玩忽一置器械各村莊既建造敵樓置有炮鑼矣凡遇盜警自應㑹衆救援奮勇爭先全資器械嗣後各家俱備門棍一條如有鳥鎗弓箭腰刀鐵尺長鎗鐵義之類亦准開明報官量留鳥鎗弓箭數件地方官書押鐫刻於上仍給本主甲長同本主具領存案止許防護本村及救援鄰村不許攜帶别處行走如有遺失從重治罪其餘盡收入官照物給價如有匿藏甲長與八家首報本家以通賊論如甲長八家未經察出被旁人首報甲首與八家連坐至於刀尺鎗義槩鐫本家姓名當官驗明登記簿內以便稽察違者重究一防積賊夜行有等凶惡地方一村都是盜一家祖孫父子世世做賊互結之法如何行得甲長是盜九家是盜明是强盜保强盜此處沒奈何祇得亦編成保甲姑入羅網大約良民多賊盜少務擇有身家有才幹的做一保長立禁止夜行木牌時刻叮嚀各家甲長大家隄防看眀這一村的出路去路於要緊路口埋伏鄉夫如遇此村人黑夜行走即行綁鎖次日稟官嚴審如無謀劫實迹治以夜行之罪如此防間日久彼不得動手或稍斂盜心亦不可定此蓬生麻中不扶自直之謂也著實奉行違者重究一禁闖將打降邇來最為民害者無如闖將打降陰奸匪類動則蜂羣拉㑹不時結黨狐行入其局者豪强逞凶犯其鋒者身家立碎若輩雖不為盜而其為害更甚於盜嗣後責成各旅店酒肆留心密察凡投宿人等如有冒稱旗下出入不明或假托投文並無驗照即係前項罡梟陰惡密速報官查拿審訊明白從重治罪如無為非作歹實迹該地方官差役押解回籍收管倘有前項棍徒旅店酒肆容留住宿隱匿不報一經官司察出或被知情首發先將店家重責後拿本犯審處違者重究一稽察旅店凡城市鎮集居民開店接客須定一簿每晚投宿之客同行幾人務查問客衆姓名係何處人氏今往何處作何勾當生理有無弓箭什物或自備馬騾或雇長腳將騾馬毛色認明如乘船則係某處寫載坐轎又係某處雇夫幾名其孤客步履有無行李盡數一一登記簿內次早或去或住報送甲長察閲如有來厯詭祕語言謊張蹤迹可疑者即密傳甲長保長窺伺去向夜晚小心隄防次日勿令早行以備不虞如玩忽不記他處失事行查店家簿內未開者從重治罪一訪擒大盜各屬有等積年大盜黨羽繁多布置周密地方人等畏之如虎敬之如神稍有拂意即飛簷走壁暮夜殺死全家凡屬良民口稱犯了王法止一人死惱了大盜則全家死因之寧死王法決不敢惱大盜也從此思之求一不敢互保之九家不可得矣隱忍獻媚求保身家誰敢不保大盜如此保甲竟為養盜圈套言之殊堪髮指嗣後地方官當以弭盜安民刻刻在念先訪大盜姓名確實巢穴密稟本部院務憂深慮逺設法擒拿立斃杖下王法既行則良民有所倚靠氣直膽壯互保之法方能著實行去切勿偷安隱忍釀成大害自干不職嚴參也慎切慎切一懲窩盜强徒竊賊尚有一時無知誤入夥內事後猶知悔改惟有一種積惡巨窩每於鄉里間假為豪俠氣象暗訪某處有殷富之家串通捕役勾結無賴凶徒一呼雲集劫財之後坐地分贓及盜犯被獲又為夤緣賄縱甚有指使黨類别劫資財以供使費遂致大盜橫行益無忌憚嗣後地方官督率保甲長留心細查各甲內如有窩盜實迹之人許保甲長同八家連名公首立拿嚴審解報其於獲盜之日先究真正窩家一體正法若捕役教唆誣陷平民定行反坐該地方官仍大張示諭一切赦前窩犯文到之日速將從前窩盜緣由一一自首免罪若更能舉發盜黨擒拿審實者另加賞賚一察旗盜江南無賴奸民往往投靠江寧京口等旗下為護身之符旋稱告假回籍晝則倚勢行凶夜則糾衆打劫地方官追捕急迫彼即仍竄歸旗無從究詰揆厥所由總因旗主貪利財物明知故縱其出外之時裝成圈套先遞逃牌若劫掠滿載而歸則曰自回投主將逃案圈銷或事發被獲諉稱已遞逃檔與本主無涉積習相因以致投充人等肆意橫行深為民害嗣後地方官務實力奉行保甲之法將旗人原無告假回籍之例遍示曉諭各保甲人等不時稽察如有投旗人私自回籍者保甲長即同八家協拿報官立刻押解公衙門究審不許稽遲時刻以致扳纍善良若通同狥隱一經發覺將窩家照例治罪外保甲長及八家人等定行一體連坐一禁養馬民間養馬屢經奉㫖嚴禁乃密訪此法止可行之於良民百姓決不能行之於賊盜蓋積賊巨盜手眼通神每每詭稱某旗姻契某標效用不惜重價購買健馬馳騁之下直可追風逐電防汛官兵望風畏怯誰敢向前堵敵是盜風熾焰實由地方官不將馬禁實力申嚴也嗣後民間仍敢違禁養馬者著落該甲內之八家報明保甲長據實報官將本犯照例從重治罪如八家隱諱不報經保甲長報官者將八家一體連坐倘保甲長通同容隱地方官察出者保甲長均與同罪決不姑恕一嚴飭江防自安慶以至京口大江兩岸有安逰奇瓜鎮等營分界撥防原為緝拿江洋大盜而設每汛設有瞭髙樓一座營房三間哨船一隻撥定辨兵晝夜瞭望巡防遇有盜賊打劫行舟隨即放炮鳴鑼駕船追緝鄰汛一聞響炮立速應援盜賊自難飛逸無有不就擒者乃訪聞邇來巨盜每多粧扮客商將器械藏匿舟中灣泊濵江無人之處窺伺客船肆行劫奪以致官兵不及覺察追捕雖云積賊狡黠亦由防汛懈弛嗣後専責各營將嚴督守汛辨兵各於應守汛內每夜沿岸巡察如有載人空船灣泊無人地方即時盤問來厯押赴防汛處所看守次早再加盤詰倘有弓箭刀鎗鐡尺銃炮等項器械形迹可疑語言恍惚並無批牌可據者即送附近州縣審明詳報不許將來往商賈重載貨船一槩混查需索財物告發立行杖斃如客船被盜行劫防汛官兵有能即時追獲兵丁管隊每名賞銀一兩千把總記功彚叙如本汛不能追獲被别汛拿獲者將别汛官兵照例犒賞記功本汛辨兵各捆打四十棍如與别汛協力同拿者仍行給賞該營副參逰守等官應於夜間不時乘坐小艇沿江逰巡每月終出具所轄水汛地方並無盜賊劫財傷人不致隱諱印甘結狀呈送存案具結之後或經本部院訪聞或被失主告發千把總先行提拿捆打該管官飛章參究一嚴緝湖盜江南地方素稱澤國如江寧太平寧國三府屬接界處之萬頃路西白鷴石桕諸湖蘇屬之太湖松屬之􅍩湖廬屬之焦湖揚屬之髙郵寶應湖鳯淮等屬之洪澤等湖水面遼闊港汊叢多實為聚盜之藪凶徒匪類往往生長聚族於斯習慣水性或蕩漾輕舠以渡為事或操駕小艇以漁為名藏匿蘆葦深處窺伺往來客船肆行劫奪雖濵湖處所設有汛防辨兵率多在營坐視全不駕船巡緝逮失事之後聞報追趕而賊船已逺遁無蹤矣嗣後責令各該營將著落本汛千把總每日帶領兵丁駕船分路逰巡遇有盜賊即時追拿務獲其賊船藏匿蘆葦之中嚴加搜查不許停泊如船內藏有刀鎗鐡尺等器械立刻解赴有司嚴審詳報如湖中失事有能即時追獲盜賊者兵丁管隊各賞銀一兩千把總記功彚叙倘縱容賊船往來全無拿獲者立提千把總捆打三十棍該管營將一并參究又訪得沿湖盜賊日則在湖操舟行劫夜則登陸窩藏奸民之家􅒬酒賭博又有等佯為莊農市儈日間各處探訪約訂夥黨至夜分下湖行劫客載者更有陸地盜線邀串湖盜乘夜突入村莊大肆劫掠甚至搶去殷富商民挾持取贖者種種橫行恣為民害總緣附近奸民窩藏勾引之故各州縣應將傍湖一帶墟埂居民親行另編保甲又如前街居民已編入甲內矣尚有後層臨水居民茅簷零落地方官易於忽視遺漏今應詳細編查使之聮絡一處得以互相稽察若一家窩藏匪類容隱不報一經察出甲長八家一體以賊情連坐并將保長重究仍専責捕盜府佐并該地方印官督令該境內典史巡檢率領勤慎捕役不時在於湖邉河套各處密行查緝但不許借端需索保甲長居民供應飯食等項如有故違捕役立拿處死捕官即時斥逐仍按贓治罪一編烙船號查各湖賊盜多係本處駕船捕魚之奸民往往出沒蘆栁叢密汪洋巨浸間探有來往孤舟肆行劫奪後即櫓槳齊施風帆逺引而去若遇官司捕拿急迫彼則沈贓水底依然漁户更有等積奸網船晝則在港捕魚夜則出港行劫凡濵江河汊等處無不皆然大為民害今應専責該地方官各就境內情形躬詣水次實心清查將一切漁網鴨嘴划快等船倣照稽察村莊百姓之例編立牌甲遴委公正保長總理查取聮絡互結存案該印官不必假手胥役致滋需索之弊即著落各保長挨甲編定字號於船尾印烙某州縣某保某甲第若干號船户某人字樣於船身或首尾塗漆顔色記認即逺處暸望亦可分别仍彚造花户字號細冊一樣二本以一冊報官一冊存保長處不時查㸃各船止許白晝撑駕生理遇晚聚泊原港如有一船為非作歹及夜間私撑出外者許甲長及同甲八船報明保長公同首官拿究若九船互相容隱經保長查首者將九船並治以罪如保長通同容隱别經事發或地方官訪拿者將保長一體連坐至本處額編船數之外另有來厯不明之船混入港口以捕魚為名踪迹詭祕者該保甲長即報官稽察不得私行容留又本甲之船年久拆毁者應注銷原號其新造者補編入冊若買别堡舊船應另行編烙俱於月終由保長彚冊報官又各衙門差船各營巡船俱令該管官辨一體編烙其漕鹽官舫驛道站船并往來巨艘客商重載等船不在查編之列一設水柵操舟强劫之徒得以肆行無忌者總緣水面四通八達劫奪之後揚帆而去絶無攔阻之故也按大江以南之官河水勢甚平俱建有跨塘橋梁逺者十餘里近者數里不等今酌定凡係官河大路橋梁之下俱應設立堅固水柵責令本地方保甲長輪派該地方甲內之人専司啓閉每夜定更時分即將柵欄閉鎖甲長鳴鑼傳喚過往船隻灣泊汛墩處所敲梆巡警至天明方許放行其戌亥子丑寅時不許片帆行走如各船已泊近汛墩而仍被賊劫者必係汛兵通同應報官拿究又如有外來之船除緊急軍務兵餉等差許守柵人查明果有前途營汛護送及照驗憑據者始准放行其餘一切船隻俱令停泊仍報明保甲長盤詰前柵擅行放走情由次早報官挨究如本柵私自放行者亦聽下柵報官察究至於各處支河小港路口俱應建設水柵責令該保甲居民輪流看管晨昏啓閉凡禁約事宜一如前例其有紆流僻汊如果為商民船隻所不經由確係盜賊出沒之間道該地方官據實詳明本部院立樁釘塞若水面寬闊為樁柵所不能施者應關㑹該營汛量撥兵船不時往來逰巡加意偵防均毋故違一飭船埠凡商賈軍民人等攜帶錙重逺行必投牙埠寫船者以船户之來蹤去迹惟牙埠知之最詳為可倚而可托也乃有等無賴船埠祇圖兜攬多趁牙錢竟不察詢船户來厯輕為攬載以致匪類操舟往往於中途僻處劫財害命深可痛恨嗣後各地方一切船埠俱置立空白厚簿一大本送地方官鈐記號印存貯凡遇船户投牙先登詢確實來厯籍貫及駕船舵水男婦若干名口姓氏年貌如係回空攬載者驗其原攬客票內籍貫姓氏果否相符一一填注冊內編定字號遇有客商投埠即眼同該商將某年月日裝載某客人某項貨物行李等類一并填入簿內照謄牙票給商以便長行該埠頭仍將印簿按季送地方官倒换稽核倘有謀劫事犯彼處按照牙票本處按照底冊立刻關㑹原籍地方提拿凶身船户并玩法牙行一并置之以法決不姑寬該地方官仍於水路馬頭大張示諭往來商賈人等務令投埠雇船毋惜牙行小費而私自雇覓並將某某官塘大路防汛整密堪以泊船及某某處港汊叢雜為盜賊出沒之區不宜泊船立樁明白曉諭使知趨向定程便於早泊遲開以防意外之慮不致貪趕程途僻道夜行自貽伊戚矣均毋故違一嚴諱縱文武官辨平時既不留心防毖一遇盜發畏干處分即威脅失主里鄰改呈匿報其有焚殺昭彰萬難掩人耳目者十案之中僅報一二而又預伏搶竊姦仇等字樣為將來卸過之地以致捕役揣其意㫖不行拘拿里鄰懼於牽連不敢舉首互相隱瞞諱日甚而盜愈多民生何日得安言之真堪髮指嗣後各地方凡有盜劫該失主不必疑畏即據實具報州縣如已報州縣而五日內不行通報反行逼勒失主者許徑赴道府㕔首報若道府㕔護庇州縣不行轉報許失主徑赴本部院轅門擊鼓喊稟察實將文武官辨一并照諱盜例題參其有挾制失主改寫首呈於初報文內預伏搶竊姦仇等字樣含糊支飾者本部院不罪失主惟將該管官辨照隱諱參處決不姑寬一禁推諉朝廷設立文武官員總以除暴安民為首務且普天之下莫非王土乃邇來玩愒之官動以疆域異視一遇交界地方被劫輒行推卸鄰封官則借以幸免處分役即因而賄放賊盜彼此互諉上下相䝉遂致狡賊窺緝捕之無人專在接壤之區恣肆劫掠小民受其荼毒真不堪命矣嗣後各州縣遇有交界地方失事如係本屬境內立時據實申報一面㑹同該管營汛文武同心選差勤幹兵快設法跴拿一面關㑹鄰封添差協緝使强徒鼠竄無門自然就縛如敢擅行推諉以致真賊逺揚者定將該管文武官員俱照諱盜例題參重處其千把總等捆打三十棍決不姑寬一禁誣良各屬㕔印捕盜等官不思朝廷設官分職職守謂何乃平日既不能弭盜安民一遇地方失事有等不肖之官功名念熱止圖緝獲過半兾免處分不暇端詳獲賊之是非真僞因而積奸捕役得以播弄威權賄放真盜妄拿良民動以非刑勒其認贓扳夥輾轉誣陷天理何在法令難容興言及此不禁目眦髮竪嗣後各州縣印官於獲盜審訊之時務將理欲關頭認明必須平心靜氣將各盜隔别調開逐名提至階前揭去上下衣服驗明有無私拷傷痕然後細加推鞫上盜月日情形執何器械劫何財物果否與失主報單相符其事前同謀合夥姓名及事後在何處俵分贓物是否與同案别賊所供一一吻合再將所獲之贓令失主認明真確無疑始行招解府㕔倘有私拷誣陷情弊立即據實通詳將捕役置之以法斷斷不可庇縱如州邑朦朧具招經府㕔審出寃誣者該府㕔立將州縣職名揭報本部院題參重處若府㕔含糊責在司道審豁詳參倘司道依樣率轉一經本部院審出寃陷除立時釋放外定將司道府㕔州縣等官一并嚴參不貸一飭捕兵各屬應捕原為緝盜而設乃今之承是役者反縱盜為害一捕名下多蓄穿窬小偷縱其在外掏摸獻納月規至大夥强徒亦多受賄通線未露曲為包蓋已露陰放脫逃表裏作奸養盜囮利更有汛地守兵瞷過客之厚資窺居民之饒蓄勾盜夥劫器械既便取攜門禁誰復攔阻骫法殃民深屬可恨嗣後府㕔州縣營汛稽察捕兵一如小民保甲之法查取聮絡保結若捕役有養盜縱盜事發竟以窩家論罪其同結之役不先行舉首者一并連坐至防兵為盜該汛千把總并互結之兵俱以知情重究仍將營將飛章參處一革白捕各屬捕役原應官為募充遇有地方失事勒限比緝盜賊乃正捕一名之下又私帶白役數名沿厯鄉村窺探殷懦之家指盜指贓百般索詐正捕利其工於攫金倚為鷹犬甚有白役冒捕昏夜持鏈銬之具擁衆入村混將良民指盜先掠家資仍帶至荒僻處所非刑弔打逼獻藏金逮事發報官官籍無名以致追緝杳無弋獲是假捕害民竟同大盜矣嗣後各捕盜府佐及州縣等官應將在官捕役設立卯簿一一㸃訊明白每名各給印信腰牌一面寫本役姓名年嵗籍貫一面圖畫本役面貌令其出入隨身懸挂以聽差使仍大張示諭所屬軍民人等通知如有捕役指拿盜賊而無印信腰牌及有而年貌不對籖票無名者許本甲地方人等㑹同擒縛報官轉申本部院按以光棍論罪其攜帶白役之正捕照衙役犯贓從重究擬法在必行決不姑恕一禁指扳盜贓凡盜賊贓物窩家知情寄頓自應依律究擬毋容少貸惟有等原不知情如典鋪當銀居民誤買之類當以理恕乃有等玩法捕役樂於生事動以起贓為由率領虎役多人咆哮入室名雖搜查實同搶掠稍拂其意即唆令盜口咬扳更有仇隙誣陷者糊塗有司聽其撥調拘解逮經司府審明超豁而無辜受纍家資業已蕩然言之深可痛恨嗣後各屬捕盜㕔印等官拿獲賊盜時止究現在之贓立案定罪其已經典賣者如果經失主認明應照賊犯原典原賣之數該地方官捐資取贖以警疏防之愆俟臬司審結日徑將贓物給付失主收領至盜犯供扳借寄之贓非有確實證據者一概不許誅求倘惡捕仍敢違禁唆扳勒索及典賣之贓地方官不與失主取贖或白向鋪户强取者許被害人等奔控各該上司轉詳本部院官則飛章題參役拿立時杖斃決不姑饒一禁凌虐失主凡士民人等不幸而遭强盜劫財傷人其苦楚已自難堪乃地方官欲諱盜劫又必使失主纍上加纍動稱報贓不實失事不真或乘其罅隙而揑以閨門不肅或因其疑似而坐以家屬通同官則瞷鄰里之殷饒責以救護不力役則指比緝之使費恣其需索多般逮獲盜認贓失主未還故物而問官捕役先挾之與强盜一批起解赴府赴司經年候審上下胥𨽻蔓詐不休嗟嗟失主受此拖纍無窮未有不自悔其初之不諱而盜賊益恃以肆劫無恐失盜遭官之諺洵不誣也嗣後被盜失主一經投呈地方官立刻察詢明自據實申報各該上司一面多差勤幹捕役四面跴緝務獲真盜追贓正法不許借端凌虐失主希圖諱隱亦不得縱容捕役需索其獲盜起解時失主另具一批候司府審明即釋令寧家敢有胥役仍前需索者許失主不拘司審府審時俱准當官指名具稟查拿審實立行盡法究處至起獲之贓如係珍貴財物等件在州縣質認明白即當官鎖貯箱匣之內加以印封轉解司府質審後亦當官封鎖如前俟結案日即發失主收領以杜抵换之弊敢有故違并行重究一逐娼妓江南民風澆薄逰手好閒子弟每被無賴棍徒勾墮花栁場中癡心迷戀初則蕩産傾家漸至為非作歹且流梟黠賊埋名改姓托身於逰娼窠婦之家晝隱宵現結交地頭匪類揣探某某家資殷富又想劫盜財物以供纒頭鴇婦愛錢百計為之庇諱納垢藏汚莫此為甚嗣後専著保甲長細查該地方若有逰妓土娼盡行驅逐通限一月之內另改别業如敢不遵保甲鄰佑即行公首到官將龜棍重責三十板枷號兩個月娼婦當官配賣如有積棍把持保甲鄰佑通同隱諱不報者或經官司察出或被旁人首告先將保甲鄰佑各責三十板仍拿積棍龜棍一同枷號究處違者重究一禁賭博查定例賭博之人係民責四十板枷號兩個月開場放頭之人責四十板枷號三個月該管官不行查拿均有處分良因賭博近於盜賊専有一等積盜將打劫之物開張賭場暗行踹盤踏線勾引夥黨恣肆劫掠而無籍賭棍掇賺良家子弟墮其彀中初則局騙分肥漸至賭輸入夥逮事後發覺不特首領不保且上玷祖父下纍妻子言之真可寒心更有衣冠學校之流亦每溺志呼盧此尤風俗厚薄人心邪正所關均當痛行嚴禁嗣後編定保甲十家之內一有開場賭博之家招來無籍棍徒哄誘良家子弟放頭賭錢以致潛匿奸宄盜蹤叵測者不論保甲長及八家人等許即奪其牌骰籌馬財物一并訐首地方官立拿放頭之犯並賭犯按以盜情從重究擬仍拿各犯父兄論罪如甲長八家隱諱不報或經官司察出或被知情首發者將甲長八家一并連坐其保長以疏忽重處若名教中人不知自重一犯前條立刻題參褫革一體治罪法在必行斷不姑恕一禁邪教無為白蓮等教最為奸宄叢聚之區陽以闡揚佛法為名陰則揑造符䜟妄言禍福無知愚民誤墮彀中靡不被其煽惑集羽黨而訂血盟姦盜詐僞無所不為功令首應嚴禁嗣後該地方官著落保長責令各甲長將甲內人户不時互相稽察如有前項奸徒邪教煽惑確有實據者八家立即報明保甲長即日報官嚴拿解赴本部院以憑照妖言惑衆律論斬如保甲及八家通同隱諱不報該地方官察出或被知情首發定行一并治罪該地方人等亦不得妄借仇隙首害平民違者反坐一禁僧道菴院容留歹人蓋緇衲羽流之處本為清淨法門原非奸徒遁迹逰客假寓之所嗣後各州縣務將境內一切僧房道院俱大張告示禁飭該住持不許容留走方僧道外來逰客無籍人等居住如有蹤迹可疑來厯不明之輩恃强投寓者許住持協同地方保甲長鄰佑扭送到官從重究處倘住持擅留住宿容隱不報或經地方官察出并保甲長鄰佑人等舉首審實定將該住持究處驅逐一寬宥自首强盜凡人之為盜賊者原非天性使然也或為貪汚官司逼追或遭勢豪大户侵凌與夫飢寒迫身一念之錯墮身苦海抱頭竄伏靜夜自想豈無一㸃遷善改過之心惟恐投首到官仍難免刀頭一死遂致疑畏不前殊不知大夥强盜除殺人放火及投首後再做强盜者不準首免外其餘俱準自首免罪或本犯雖不到官而凂人代首及本犯之父兄妻妾子孫大功以上親戚人等代為出首俱準作自首免罪其小功緦麻親首告本犯亦得減等免死大清律上開載甚明本部院仰體皇上好生之仁特與推誠曉諭各地方文武官辨速行大書告示遍貼城市鄉村凡有本處行劫及别省行劫逃竄該屬境內一切强盜見此告示或本身到官或凂人代首或本犯之父兄妻妾子孫親戚人等代為舉首俱立刻備將從前强劫緣由據實投首所在官司速與轉申本部院立即題明免罪放歸原籍安插若更能招集黨夥同首或投首後舉出逸賊姓名巢窟便於官兵緝捕者另加賞賚從此革面革心回頭是岸慎勿因循畏避必待官司捕獲那時駢首就戮悔無及矣凜切凜切一誡惰民士農工商各有一業夫人必有恆業而後安分守己不致放逸非為乃近來民間子弟率多不工不商非農非士受享父兄現成衣食每日逰手好閒往來賭窟娼家結交匪類富饒者漸至飢寒貧窮者流為亡命穿窬伏莽是其下場行徑雖云父兄平日失於拘束然邑有惰民不教而殺俱為民上者之過也嗣後各州縣官於朔望講解鄉約時將上諭第十條內務本業以定民志一條痛切開導務使小民人人猛省仍著落保甲長各查甲內子弟年至二十成丁者著伊父兄上則讀書次則耕種貿易再次則百工技藝督其専課一業毋許逰手曠惰習染非為違則保甲長報官提伊父兄責懲仍將本人枷號逰行四鄉以為惰民之戒如保甲長狥隱不報及挾仇誣報並罪不恕一講鄉約蓋民無常性習俗則移孔子曰性相近也習相逺也使其日聞善言自將感慕而為善行風俗漸淳人心漸古又安得有雈苻之劫掠輕陷法網哉恭照上諭一十六條昭示尚德緩刑化民成俗之要久經刋刻通行乃地方官尚有化導未純奉行未力應再申嚴嗣後各州縣官務於每月朔望躬詣明倫堂督率教官齊集諸生及父老子弟人等將上諭一十六條內教孝勸忠和鄰睦族勤學務本守法奉公等事宜逐條詳繹宣揚婉轉勸導切實奉行其僻逺鄉村應敦選齒德並優允堪士民矜式之人聘為鄉約大村每村一人小村或數村一人亦如前制按期講誨不許胥棍濫充亦不得藉端生事該州縣如果能勸率有方風淳俗美闔境全無邪僻匪類者本部院察實官則以賢良題褒鄉約免其雜差仍給匾以示奬勵一禁需索查以上各規條如遴委保甲長及建樓修柵烙船等事與夫造冊取結諄諄誡諭莫非本部院一片苦心欲為百姓籌畫安全至意全賴循良有司打㸃精神推心行法著實舉行如敢陽奉陰違藉端需索倚法作弊本部院耳目最近一經訪實官則摘印羈候飛章題參役拿立時處死其保甲長如敢欺壓鄉愚及一切詐索事發俱照衙役犯贓嚴例重究決不姑饒嚴禁抽豐諭江南財賦重地連嵗災荒十室九空凋疲已極司牧各官身在地方自宜軫念艱難多方體恤以培養元氣鞏固邦本乃有等不肖竭盡民力濫結親知而往來過客絡繹如雲或挾勢需索輾轉請托或冒稱瓜葛盤踞招搖包攬詞訟顛倒是非凡民間借盜勾逃詐財假命以及户婚田土細事無不說合線引暮夜分肥出入衙署拴通地虎廢紳惡棍起滅風波網羅局騙威逼聽斷無厭貪婪把握官柄屈抑下情交逰饋送金錢悉是小民破家脂血抽豐作耗竟成通病本部院深悉此弊合亟嚴禁為此示仰督屬文武官員紳士軍民人等知悉嗣後此等大膽逰棍務要各自斂迹不得仍前周流出沒見利忘命地方官先潔己自守毋得曲徇情面交結此輩吮吸我民通飭僧道寺院歇家各處不許潛留頓宿如有前項情弊一經告發訪實定置以法地方官並從重參處斷不姑寬一線也凜遵毋忽禁送節禮諭交際之道古今不廢而名分所在體統宜清本部院督制兩省與各州縣各官勢位懸殊舉劾攸關若逢時饋獻希妄通達本部院安肯收受敲骨吸髓之贓物而平分男盜女娼之報應也除檄行藩臬轉行飭禁外合行出示曉諭為此示仰督屬文武官員人等知悉一體遵照毋違又批當此官民交困之時如此行徑鬼神寧不切齒令人痛苦也勸令節費諭惟儉助亷大夫士民所共知也優伶大席雖敬客甚為糜費情誼反不浹洽即間有行者除子孫慶祝髙堂餘悉止之至於親友坐談道義人情所必不可少一飯五簋足矣不惟自免借貸實所以仰體聖主崇儉至意嚴禁輕生諭天心好生民命至重乃有無知愚氓罔惜身軀或因口角微嫌或因睚眦小忿輒尋自盡投繯溺井服毒而死者比比皆然原其意謂拚一死可以圖賴他人殊不知自盡無抵命之條而已死不可復生拋父母棄子女永絶夫婦之好舉家號慟慘目傷心死而有知不識其追悔當何如也古人云生死亦大矣何可因一朝之忿自行戕賊致死哉此皆愚夫愚婦一時短見不知此身所關之甚重也父母生我則我之一身為父母所倚賴我生子女則我之一身又為子女所仰給輕生自盡耄年父母何人奉養幼小子女何人撫育人雖至愚莫不有愛父母憐子女之心何其忍於拋棄乎有死之重比於泰山者惟男死於忠孝婦死於節烈乃為得所若因微嫌小隙憤恨而死男為頑蠢婦為潑悍不孝不義非節非烈枉死而不得善名徒貽人以訕笑由此思之其亦可以猛省矣至於奸惡之徒指尸訛詐糾衆毁人房屋碎人家伙搶人衣資逢人亂打凶暴等盜賊輕生之人謂死後有此一畨可行故拚命之念由之起也除已通檄各司道府轉行出示飭禁外合再刋刻曉諭凡居民人等無論男婦各將身命自重保全父母子女慎勿因一時嫌隙短見輕生倘有投繯溺井服毒身死者指告他人槩不準理若以自縊自溺自毒揑為謀故毆打情詞即坐以誣告之條若不經官糾衆私行打搶借端訛詐一槩拘拿申報本部院治其搶奪之罪各宜凜遵毋忽革秋審陋規檄本年五月二十六日據江蘇按察司呈詳請禁秋審陋規等事到部院據此隨於詳內批開秋審陋規有司借端科派里甲需勒行户本部院已經訪悉今該司能猛力革除焕然一新深為可嘉仰即立榜嚴禁各屬敢有故違立即揭報以憑參究等因批行并全詳抄粘外為照該司衙門從前於秋審一事均有陋規私派情弊本部院正在嚴察拿究今值該司履任方新諒能潔已率屬以除積弊誠恐有司仍蹈前轍恣意科派及積蠧奸胥借名滋擾合亟嚴飭為此牌仰該司官吏照牌事理即便遵照嚴飭胥役不許借秋審名色需索有司以致州縣科派里甲勒取行户仍一面通行所屬立榜永禁嗣後如有前項情由訪聞立即據實揭報官聽特參役拿處死斷不寬貸文到先將奉行過遵依報查嚴飭旗下買人檄照得旗下買人雖有無論地方著用正印官印信準買之例但聞江南習俗每有假冒籍貫雇充中保之弊用印官一時被其欺蒙及至投旗復逃原籍地方何由而知往往民人窩逃有司失察强半皆出於此合行申飭為此票仰該縣官吏照票事理嗣後如有旗下買人用印者先將所買之人姓名籍貫及媒保等人俱報本部院存案一面提集契內媒保嚴訊真正籍貫姓名并將媒保之兩鄰保甲先行提詢面驗契內媒保是否真正本地住籍之人取具甘結然後用印如媒保係他縣人移明彼處有司存案除出示曉諭外倘敢仍前混行用印養癰害民官參吏處不貸禁田房找價檄照得民間田房彼此交相買賣自必憑中按時估價兩相情願而後成議未有絶賣之産復又告找告增者近訪江南陋習索騙成風當其棄産之時未免田地荒蕪房屋傾圯或因賦稅無出或因婚喪乏資彼時勢處燃眉急覓售主及至憑中議價契賣交割買主執業之後漸將荒田布種成熟頽垣修葺改觀不知幾費經營而原主突萌索找之念遂有地方勢豪垂涎美産設謀扛幫更有一班訟師地棍播弄風波不曰半價鯨吞即曰利債滾算訐告經年居間硬證有司視為置産之人必皆殷實可啖濫差勒索稍不遂意斷贖斷追以至小民受其漁獵甚至有衙蠧侵盜錢糧追比不前動以變産為名掗賣良善株連蔓引貽纍無辜種種錮弊若不痛加剪除民害何所底止合行飭禁為此牌仰該司官吏照牌事理即便轉行各屬出示嚴禁嗣後如有奸民將已賣田房告找告增并地方官擅行準理以及勢豪訟棍夥同嚇詐者許被害之人赴轅控稟以憑參拿究處仍將通飭遵行過緣由具文報查清理獄禁通行檄本部院初膺簡命總制兩江軫念民生疾苦凡興利除害之事自當漸次舉行所最關心者惟各監所人犯俱係無知赤子誤罹法網雖孽由自作情實堪憐當此恩赦普頒一切罪犯咸邀原宥且時逢熱審天氣漸炎若槩行淹禁臭穢薰蒸勢必傳染疫癘監斃囹圄深為憫惻所有各監所人犯凡係赦前并現在審理輕罪各案自應立速清查分别保釋合亟飭行為此票仰該司府官吏照票事理即便通飭所屬親詣監所逐一清查凡係赦前例應援宥並現在審理輕罪各案情非重大者立行保釋毋任奸胥留難勒索概行濫禁如盜叛等案係欽案內緊要重囚法應監固者仍飭令獄官禁卒均給囚糧打掃潔淨毋使穢氣薰蒸遇有疾病速撥良醫調治並嚴諭獄卒不許凌虐罪囚如敢故違一經本部院訪察得實立即差拿處死仍將應禁保釋人犯開明事由備造清冊呈報核奪均毋遲延批蘇松道清理獄禁詳據蘇松道詳稱各屬監房每因修理錢糧奉裁致多坍塌上漏下濕疾疫易生雪虐風悽飢寒難免仰請通行嚴飭守令各捐己資將監鋪房屋凡有傾頽損壞之處逐一修葺務期堅固仍責提牢吏卒旦晚用心打掃潔淨庶不致薰蒸穢觸染病傷生至於囚糧一項雖有捐設銀米但此關係報銷必欽犯及部案有名者方得分給其他流徒以下并寄監别屬解到事犯皆不與焉果係真無家屬凍餒堪憫者多方捐措加意周給庶獄底餘生賴以全活再如禁卒凌虐罪囚其害不可勝言或橫行杻械或遏絶獄食皆因需索未遂更有牢頭酷灸新犯尤為慘烈一待新囚入禁百端苛索講盤斂費苟不饜壑置之黑阱寃柙以至弔拷威逼湯火非刑無所不至串同捕卒教賊扳良尤其長技或有身家之人偶犯羈禁必倍遭其迫脅荼毒不至滿欲不止相應詳請痛加禁絶等因當經批開披閲捐給囚糧修理監房句句痛切字字哀矜不覺惻隱之心勃然發動本部院前任閩臬躬親察監嗣任直撫惟囚犯厪懷不謂今日幸獲同心也至牢頭之惡更為慘毒本部院曾任粵西栁州府羅城縣令賑府監囚犯哀訴牢頭禁卒之虐天日俱慘仰速時刻留心嚴飭所屬矜恤囚犯勿令飢餒監房勿令滲漏免染病疫陰功浩大子孫受福無窮仍候通行兩臬司實意倣飭決不有辜美意良法也批朱同知甘結從重參處此王法也本部院豈肯輕輕放過於天地鬼神何與省心自問發為誓詞孔夫子曰丘之禱久矣如豫所否者天厭之非誓而何誓雖為下等人說法然君子戒慎恐懼工夫不外是也尸居而龍見淵默而雷聲又何說與孟子云書曰天作孽猶可違自作孽不可活又云如此則與禽獸奚擇哉又云人見其禽獸也又云獸相食且人惡之又云孔子曰始作俑者其無後乎又云桎梏死者非正命諄諄告誡何嘗不說到身家性命禍福上邉如今貪贓剝皮的提起筆害怕講這話頭殊不知舉頭三尺有神明如何瞞得過他去立意要改惡一刀兩斷筆下就活現出一箇閻羅天子來重重地獄如在目前便時時打㸃一念一事猶不敢肆意貪贓如輕描淡寫姑且做箇戲法兒頑一頑殊不思湛湛青天不可欺就有許多凶神惡鬼緊隨莫愁不參處就有參處的日子家破身亡子孫討飯吃君子做事如青天白日何諱之有如今的人不知悔罪都吃了諱的虧知之檄示剿海行兵方略照得用兵之道無論賊之多寡總貴謀出萬全故為將者每事謹慎自不難於克敵奏功今逆賊周雲龍潛踞舟山雖屬海上逰魂然亦未可忽視且摉剿之師出於兩省未免混淆江南船兵乃京口崇明川吳各處調集又非該鎮練習之師尤可慮者兵行詭道該鎮提兵出洋惟恐賊人奸謀叵測更須著意伺察即如浙督部院所題閩船十隻於十一月十七日夜乘潮欲進海門及被汛兵攔阻而黎明已開行北去此等關鍵不可不加防備再軍機往來全憑印篆慎勿纎毫疏略種種機宜均須慎密為此照㑹該鎮俟京口五十七船齊集吳淞之時即將官兵數目配定船號造具清冊三本擇定日期一面起行一面通報以憑移㑹浙省督撫部院㑹疏題報並行沿海經過營汛知悉爾受兹委任務須持重謹慎各船領兵將領俱宜和衷共事統馭士卒寬嚴並用一到瀝港即將到汛日期官兵數目通報督撫一面與定鎮㑹合每事互相商酌而行毋得彼此參差倘逆賊投順又須察其真誠方與來歸仍宜多方隄備以防奸謀往來公文先察印式大小次驗篆文疏密然後審其移文體統庶免冒竊之弊軍中號令宜嚴宜明而每晚暗號更須毖密至於應用號帶旗色一面出洋一面知㑹浙洋領兵鎮員文內開載未盡事宜又當臨時斟酌切勿疏略有負本部院委任至意也祭天妃祠文維康熙二十二年冬十二月總督江南江西部院于成龍奉㫖㑹勦舟山海冦周雲龍擇是月吉日命京口左路水師總兵官張某統領沙船一百隻官兵五千餘員名㑹同浙省出洋摉勦謹以剛鬛柔毛之儀致祭於天妃聖母座下而告曰維神職司水府名達天庭上扶國祚下佑民生凡在所禱默歆響應方今盛世江海蕩平舟山餘冦尚爾頑冥屢逼川沙迭近崇明肆其狠毒劫掠靡寧奉㫖㑹勦我旅斯陳百餘戰艦五千甲兵統領將佐實為師貞發自京口㑹於浙津伏望神力呵護前行出洋摉島風濤不驚天吳避影水怪潛形所向披靡助我威靈殱此餘孽聿奏膚勳恭惟聖母鑒兹悃忱于清端政書卷七
